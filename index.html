<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        
        /* フィルムロール表示 */
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; z-index: 10; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 20; }
        
        /* モーダル基本設定 */
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; opacity: 0; transition: opacity 0.3s; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        
        /* カスタムダイアログ（アラート・確認用） */
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        /* 画像切り抜きプレビュー（資料準拠） */
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        
        /* カレンダー・カラーパレット */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        
        /* 管理者制御 */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        #admin-badge { display: none; position: fixed; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; font-weight: bold; padding: 4px 12px; border-radius: 20px; z-index: 5; backdrop-filter: blur(4px); }
        body.is-admin #admin-badge { display: block; }

        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        @keyframes pulse-anni { 0% { transform: scale(1); } 70% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="text-stone-800 pb-20">
    <div id="admin-badge">管理者ログイン中</div>
    
    <div id="custom-dialog">
        <div class="bg-white w-full max-w-xs p-8 rounded-3xl shadow-2xl text-center">

    <div class="film-outer" id="film-container">

        </div>
    </header>

    <div id="post-modal" class="modal-base" onclick="closeModal()">

                <button onclick="closeModal()" class="text-xs font-bold text-stone-400 px-4 py-2 bg-stone-50 rounded-full">キャンセル</button>
            </div>
            <div class="crop-area">
                <div class="preview-sq" onclick="document.getElementById('owner-file').click()"><img id="owner-preview" class="hidden"></div>
                <div class="v-bar-box"><input type="range" id="owner-v" min="0" max="100" class="vertical-range" oninput="updateCrop('owner-preview', 'owner-h', 'owner-v')"></div>
            </div>
            <input type="range" id="owner-h" min="0" max="100" class="w-full mb-6" oninput="updateCrop('owner-preview', 'owner-h', 'owner-v')">
            <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="loadImg(event, 'owner')">
            
            <input type="text" id="fo-name" class="w-full border-b p-2 font-bold mb-4 outline-none" placeholder="オーナー名">
            <textarea id="fo-bio" class="w-full border p-4 rounded-2xl h-32 text-sm mb-4 outline-none" placeholder="自己紹介"></textarea>
            
            <p class="text-[10px] font-bold text-stone-400 mb-2 uppercase tracking-widest">SNSリンク設定</p>
            <div id="sns-inputs" class="space-y-3 mb-6"></div>
            <button onclick="addSnsInput()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-xl text-xs text-stone-400 font-bold mb-8">+ SNSを追加</button>
            
            <button onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">保存する</button>

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div id="profile-bg" class="min-h-full p-6 pb-32 transition-colors duration-500">
            <button onclick="closeProfile()" class="bg-white/80 backdrop-blur shadow px-6 py-2 rounded-full text-xs font-bold mb-6">閉じる</button>
            <img id="view-img" class="w-full aspect-square object-cover rounded-[40px] shadow-2xl mb-8">
            <div class="text-center mb-8"><p id="view-kana" class="text-sm opacity-70 mb-1 tracking-widest font-bold"></p><h2 id="view-name" class="text-4xl font-bold"></h2></div>
            <div id="detail-box" class="bg-white/20 backdrop-blur-md p-6 rounded-3xl space-y-4 mb-8 text-[15px] border border-white/30 hidden"></div>
            <p id="view-profile" class="whitespace-pre-wrap leading-relaxed px-2 text-[17px] font-medium"></p>
            <div class="fixed bottom-6 inset-x-0 px-6 flex gap-4 max-w-md mx-auto admin-only-flex hidden">

    <div id="doll-list-page" class="max-w-md mx-auto hidden p-6">
        <div class="flex justify-between items-center mb-8">
            <button onclick="showHome()" class="text-sm font-bold bg-white shadow-sm border px-6 py-2 rounded-full">戻る</button>
            <button id="toggle-list-view" onclick="toggleDollViewMode()" class="text-xs font-bold bg-stone-800 text-white px-5 py-2 rounded-full">名前を表示</button>
        </div>

    </div>
    <div id="post-list-page" class="max-w-md mx-auto hidden p-6">
        <div class="mb-8"><button onclick="showHome()" class="text-sm font-bold bg-white shadow-sm border px-6 py-2 rounded-full">戻る</button></div>
        <h2 class="text-2xl font-bold mb-8 text-stone-800">投稿一覧</h2>
        <div id="menu-post-list" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCWzLwhTnOg58o4rdf-T8e0E57_dLGm2gk",
          authDomain: "doll-uchinoko-gallery.firebaseapp.com",
          projectId: "doll-uchinoko-gallery",
          storageBucket: "doll-uchinoko-gallery.firebasestorage.app",
          messagingSenderId: "78946857999",
          appId: "1:78946857999:web:d0ffcac3527334f66c5f7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        window.fb = { db, doc, setDoc, getDoc, auth, provider, GoogleAuthProvider, signInWithPopup, signOut, onSnapshot };

        // ギャラリーIDの取得
        const urlParams = new URLSearchParams(window.location.search);
        let galleryId = urlParams.get('id');

        onAuthStateChanged(auth, (user) => {
            if (galleryId) {
                onSnapshot(doc(db, "galleries", galleryId), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        // 管理者判定
                        isLoggedIn = user && (data.adminUid === user.uid || !data.adminUid);
                        if (user && !data.adminUid) setDoc(doc(db, "galleries", galleryId), { adminUid: user.uid }, { merge: true });
                        
                        document.body.classList.toggle('is-admin', isLoggedIn);
                        document.getElementById('user-status-text').innerText = isLoggedIn ? "Admin Mode" : "Guest Mode";
                        document.getElementById('user-name-text').innerText = user ? user.displayName : "閲覧専用";
                        document.getElementById('login-btn').style.display = user ? 'none' : 'flex';
                        document.getElementById('logout-btn').style.display = user ? 'block' : 'none';
                        
                        dolls = data.dolls || [];
                        owner = data.owner || { name: "Owner Name", bio: "", sns: [], image:"" };
                        posts = data.posts || [];
                        renderAll();
                    }
                });
            }
        });
    </script>

    <script>
        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let isLoggedIn = false;
        const urlParams = new URLSearchParams(window.location.search);
        let galleryId = urlParams.get('id');

        // カラーパレットデータ
        const palette100 = (() => {
            const hues = [0, 30, 60, 120, 150, 180, 220, 280, 330], colors = [];
            for(let i=0; i<10; i++) colors.push(`hsl(0, 0%, ${Math.min(0 + (i * 11), 100)}%)`);
            hues.forEach(h => { for(let i=0; i<10; i++) colors.push(`hsl(${h}, 80%, ${Math.min(30 + (i * 7.2), 95)}%)`); });
            return colors.slice(0, 100);
        })();

        window.onload = () => {
            initColorPalettes();
            const checkFirebase = setInterval(() => {
                if(window.fb) {
                    clearInterval(checkFirebase);
                    if (!galleryId && urlParams.get('mode') !== 'new') {
                        const savedId = localStorage.getItem('last_gallery_id');
                        if(savedId) location.href = `?id=${savedId}`;
                    }
                    if(urlParams.get('mode') === 'new') {
                        galleryId = "gal_" + Date.now();
                        localStorage.setItem('last_gallery_id', galleryId);
                        window.history.replaceState({}, '', `?id=${galleryId}`);
                        // 初期データを即時作成
                        window.fb.setDoc(window.fb.doc(window.fb.db, "galleries", galleryId), { dolls: [], owner: { name: "Owner Name", bio: "", sns: [], image:"" }, posts: [] });
                    }
                }
            }, 100);
            
            // ブラウザバック制御
            window.addEventListener('popstate', (e) => {
                const ov = document.getElementById('profile-overlay');
                const list = document.getElementById('doll-list-page');
                const plist = document.getElementById('post-list-page');
                if (!ov.classList.contains('hidden')) { closeProfile(); e.preventDefault(); }
                else if (!list.classList.contains('hidden') || !plist.classList.contains('hidden')) { showHome(); e.preventDefault(); }
            });
            setupInfiniteScroll();
        };

        // 保存機能（ここを確実に修正）
        async function syncFirebase() {
            if(!galleryId || !isLoggedIn) {
                console.error("保存不可: IDなし、またはログインしていません");
                return;
            }
            try {
                const ref = window.fb.doc(window.fb.db, "galleries", galleryId);
                await window.fb.setDoc(ref, { 
                    dolls: dolls, 
                    owner: owner, 
                    posts: posts 
                }, { merge: true });
                console.log("Firebase Saved Successfully");
            } catch(e) { 
                console.error("Firebase Save Error:", e); 
                alert("保存に失敗しました。ログイン状態を確認してください。"); 
            }
        }

        async function handleGoogleLogin(isNew = false) {
            try {
                await window.fb.signInWithPopup(window.fb.auth, window.fb.provider);
                if(isNew) window.open(window.location.origin + window.location.pathname + '?mode=new', '_blank');
            } catch (e) { alert("ログインに失敗しました"); }
        }

        async function handleLogout() { await window.fb.signOut(window.fb.auth); location.reload(); }

        function renderAll() {
            const track = document.getElementById('top-film-roll'); track.innerHTML = '';
            const validDolls = dolls.filter(d => d.image);
            if (validDolls.length > 0) {
                document.getElementById('empty-msg').style.display = 'none';
                const items = validDolls.length >= 5 ? [...validDolls, ...validDolls, ...validDolls] : validDolls;
                items.forEach((d) => {
                    const img = document.createElement('img'); img.src = d.image; img.className = "film-frame";
                    img.style.objectPosition = `${d.h || 50}% ${d.v || 50}%`;
                    img.onclick = () => showDetail(dolls.findIndex(orig => orig.id === d.id));
                    track.appendChild(img);
                });
            } else { document.getElementById('empty-msg').style.display = 'flex'; }

            document.getElementById('owner-name').innerText = owner.name;
            document.getElementById('owner-bio').innerText = owner.bio;
            const oImg = document.getElementById('display-owner-img');
            if(owner.image) {
                oImg.src = owner.image; oImg.classList.remove('hidden');
                oImg.style.objectPosition = `${owner.h || 50}% ${owner.v || 50}%`;
            } else { oImg.classList.add('hidden'); }
            
            const hp = document.getElementById('home-posts'); hp.innerHTML = '';
            posts.filter(p => p.pos === 'home').forEach((p) => {
                const card = document.createElement('div'); card.className = "bg-white rounded-[32px] p-6 border shadow-sm relative";
                if(isLoggedIn) {
                    const btn = document.createElement('button'); btn.innerText = "編集"; btn.className = "absolute top-4 right-4 text-[10px] font-bold bg-stone-100 px-3 py-1 rounded-full";
                    btn.onclick = () => editPost(posts.findIndex(orig => orig.id === p.id));
                    card.appendChild(btn);
                }
                let html = `<h4 class="font-bold mb-4 text-lg border-b pb-2 text-stone-700">${p.title}</h4>`;
                p.blocks.forEach(b => {
                    if(b.type === 'image' && b.content) html += `<img src="${b.content}" class="w-full rounded-2xl mb-4 shadow-sm">`;
                    if(b.type === 'text' && b.content) html += `<p class="text-sm text-stone-600 mb-6 whitespace-pre-wrap leading-relaxed">${b.content}</p>`;
                });
                card.innerHTML += html; hp.appendChild(card);
            });
            renderCalendar(); renderAnni(); renderSnsLinks();
        }

        // カレンダー・記念日
        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${String(m+1).padStart(2,'0')}`;
            const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days');
            area.innerHTML = '';
            const anniMap = {};
            dolls.forEach(d => (d.anniversaries || []).forEach(a => {
                const b = new Date(a.date);
                if(b.getMonth() === m) {
                    if(!anniMap[b.getDate()]) anniMap[b.getDate()] = [];
                    anniMap[b.getDate()].push({color: d.calColor || '#E11D48', name: d.name, anni: a.name});
                }
            }));
            for(let i=0; i<firstDay; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const isToday = (calOffset===0 && d===now.getDate()), div = document.createElement('div');
                div.className = `cal-day ${isToday?'bg-stone-800 text-white shadow-lg font-bold':'text-stone-600'}`;
                div.innerHTML = `<span>${d}</span>`;
                if(anniMap[d]) {
                    const dots = document.createElement('div'); dots.className = "cal-dots";
                    anniMap[d].forEach(a => { const dot = document.createElement('div'); dot.className="cal-dot"; dot.style.backgroundColor = a.color; dots.appendChild(dot); });
                    div.appendChild(dots);
                }
                div.onclick = () => showDayEvents(y, m, d, anniMap[d]);
                area.appendChild(div);
            }
        }
        function changeMonth(diff) { calOffset += diff; renderCalendar(); }
        function showDayEvents(y, m, d, events) {
            const area = document.getElementById('day-events');
            if(!events) { area.innerHTML = ''; return; }
            area.innerHTML = `<p class="text-[10px] font-bold text-stone-400 mb-2">${m+1}月${d}日の記念日</p>` + 
                events.map(e => `<div class="bg-white p-4 rounded-2xl border-l-4 shadow-sm" style="border-color:${e.color}"><p class="text-xs font-bold" style="color:${e.color}">${e.anni}</p><p class="text-sm font-bold">${e.name}</p></div>`).join('');
        }
        function renderAnni() {
            const today = new Date(); today.setHours(0,0,0,0);
            const todayList = [], nextList = [];
            dolls.forEach(d => {
                (d.anniversaries || []).forEach(a => {
                    const b = new Date(a.date); if(isNaN(b)) return;
                    const thisYear = new Date(today.getFullYear(), b.getMonth(), b.getDate());
                    let diff = (thisYear - today) / 86400000;
                    if(diff < 0) diff += 365;
                    const item = { dollName: d.name, anniName: a.name, diff: Math.ceil(diff), color: d.calColor || '#E11D48' };
                    if (b.getMonth() === today.getMonth() && b.getDate() === today.getDate()) todayList.push(item);
                    else nextList.push(item);
                });
            });
            const hAnni = document.getElementById('happy-anniversary');
            if(todayList.length > 0) {
                hAnni.classList.remove('hidden');
                document.getElementById('happy-anniversary-list').innerHTML = todayList.map(a => `<div class="bg-white p-6 rounded-[32px] shadow-sm border-2 animate-anni" style="border-color:${a.color}"><p class="text-xs font-bold mb-1" style="color:${a.color}">🎉 ${a.anniName}</p><p class="text-xl font-bold">${a.dollName}</p></div>`).join('');
            } else hAnni.classList.add('hidden');
            nextList.sort((a,b) => a.diff - b.diff);
            document.getElementById('closest-anniversary').innerHTML = nextList[0] ? `<div class="bg-white p-6 rounded-[32px] shadow-sm border border-stone-100"><p class="text-[10px] font-bold text-stone-400 mb-1">${nextList[0].anniName} まで あと ${nextList[0].diff}日</p><p class="text-lg font-bold text-stone-700">${nextList[0].dollName}</p></div>` : '';
        }

        // モーダル・カラー
        function toggleMenu(id) {
            const el = document.getElementById(id);
            if (el.style.display === 'flex') { el.style.opacity = '0'; setTimeout(() => el.style.display = 'none', 300); }
            else { el.style.display = 'flex'; setTimeout(() => el.style.opacity = '1', 10); }
        }
        function closeModal() {
            document.querySelectorAll('.modal-base').forEach(m => {
                if(m.id !== 'side-menu') { m.style.opacity = '0'; setTimeout(() => m.style.display = 'none', 300); }
            });
        }
        function initColorPalettes() {
            ['bg', 'text', 'cal'].forEach(type => {
                const g = document.getElementById(`${type}-color-grid`);
                palette100.forEach(c => {
                    const d = document.createElement('div'); d.className = `color-chip ${type}-chip`; d.style.backgroundColor = c;
                    d.onclick = () => selectPaletteColor(type, c, d); g.appendChild(d);
                });
            });
        }
        function toggleColorGrid(type) { document.getElementById(`${type}-color-grid`).classList.toggle('grid-open'); }
        function selectPaletteColor(type, color, el) {
            document.querySelectorAll(`.${type}-chip`).forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById(`f-${type}-color`).value = color;
            document.getElementById(`${type}-select-icon`).style.backgroundColor = color;
            document.getElementById(`${type}-color-grid`).classList.remove('grid-open');
        }

        // 画像処理
        function loadImg(e, type) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const pre = document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview');
                pre.src = re.target.result; pre.classList.remove('hidden');
                if(type==='doll') document.getElementById('doll-hint').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }
        function updateCrop(imgId, hId, vId) {
            const img = document.getElementById(imgId);
            img.style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`;
        }

        // うちの子登録ロジック
        function openModalWithClear() {
            clearDollForm();
            document.getElementById('modal-title').innerText = "うちの子登録";
            const m = document.getElementById('modal'); m.style.display = 'flex'; setTimeout(() => m.style.opacity = '1', 10);
            toggleMenu('side-menu');
        }
        function clearDollForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('f-name').value = '';
            document.getElementById('f-kana').value = '';
            document.getElementById('f-size-label').value = '';
            document.getElementById('f-body-make').value = '';
            document.getElementById('f-head').value = '';
            document.getElementById('f-profile').value = '';
            document.getElementById('f-bg-color').value = '#ffffff';
            document.getElementById('bg-select-icon').style.backgroundColor = '#ffffff';
            document.getElementById('crop-preview').src = '';
            document.getElementById('crop-preview').classList.add('hidden');
            document.getElementById('doll-hint').classList.remove('hidden');
            document.getElementById('anniversary-inputs').innerHTML = '';
        }
        function addAnniversaryInput(v = {name: "", date: ""}) {
            const id = Date.now() + Math.random();
            const div = document.createElement('div'); div.className = "p-4 bg-white rounded-xl border space-y-3";
            div.innerHTML = `
                <div class="flex justify-between items-center"><input type="text" class="f-anni-name flex-1 border-b text-sm font-bold outline-none" placeholder="記念日名" value="${v.name}"><button onclick="this.parentElement.parentElement.remove()" class="ml-2 text-red-300 text-[10px] font-bold">削除</button></div>
                <div class="flex gap-2">
                    <select id="y-${id}" onchange="updateDateValue('${id}')" class="f-anni-y border rounded-lg p-2 text-xs flex-1 outline-none"><option value="">年</option>${Array.from({length:30},(_,i)=>`<option value="${2025-i}">${2025-i}</option>`).join('')}</select>
                    <select id="m-${id}" onchange="updateDateValue('${id}')" class="f-anni-m border rounded-lg p-2 text-xs flex-1 outline-none"><option value="">月</option>${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select>
                    <select id="d-${id}" onchange="updateDateValue('${id}')" class="f-anni-d border rounded-lg p-2 text-xs flex-1 outline-none"><option value="">日</option>${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select>
                </div><input type="hidden" id="date-${id}" class="f-anni-date">`;
            document.getElementById('anniversary-inputs').appendChild(div);
            if(v.date) {
                const parts = v.date.split('-');
                document.getElementById(`y-${id}`).value = parts[0] === '0000' ? '' : parts[0];
                document.getElementById(`m-${id}`).value = parseInt(parts[1]);
                document.getElementById(`d-${id}`).value = parseInt(parts[2]);
                updateDateValue(id);
            }
        }
        function updateDateValue(id) {
            const y = document.getElementById(`y-${id}`).value || "0000";
            const m = document.getElementById(`m-${id}`).value;
            const d = document.getElementById(`d-${id}`).value;
            if(m && d) document.getElementById(`date-${id}`).value = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }
        async function saveData() {
            const id = document.getElementById('edit-id').value || "d_" + Date.now();
            const doll = {
                id, name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value,
                sizeLabel: document.getElementById('f-size-label').value, bodyMake: document.getElementById('f-body-make').value,
                head: document.getElementById('f-head').value, profile: document.getElementById('f-profile').value,
                image: document.getElementById('crop-preview').src, h: document.getElementById('crop-h').value, v: document.getElementById('crop-v').value,
                bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value,
                anniversaries: Array.from(document.querySelectorAll('#anniversary-inputs > div')).map(div => ({ name: div.querySelector('.f-anni-name').value, date: div.querySelector('.f-anni-date').value })).filter(a => a.date)
            };
            const idx = dolls.findIndex(d => d.id === id);
            if(idx > -1) dolls[idx] = doll; else dolls.push(doll);
            await syncFirebase(); closeModal();
        }

        // 投稿ロジック
        function openPostModal() {
            document.getElementById('edit-post-id').value = '';
            document.getElementById('fp-title').value = '';
            document.getElementById('post-blocks').innerHTML = '';
            document.getElementById('post-modal-title').innerText = "投稿を作成";
            const m = document.getElementById('post-modal'); m.style.display = 'flex'; setTimeout(() => m.style.opacity = '1', 10);
            toggleMenu('side-menu');
        }
        function addPostBlock(type, content = "") {
            const div = document.createElement('div'); div.className = "p-4 bg-stone-50 rounded-2xl relative space-y-2";
            div.dataset.type = type;
            if(type === 'text') div.innerHTML = `<textarea class="w-full bg-transparent text-sm outline-none h-24" placeholder="文章を入力...">${content}</textarea>`;
            else div.innerHTML = `<div class="flex gap-4"><img src="${content}" class="w-20 h-20 object-cover rounded-xl ${content?'':'hidden'}"><div class="flex-1 flex flex-col justify-center"><button onclick="this.nextElementSibling.click()" class="text-[10px] font-bold bg-white border px-4 py-2 rounded-full mb-2">画像を選択</button><input type="file" class="hidden" onchange="loadBlockImg(event, this)"></div></div>`;
            div.innerHTML += `<button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-white shadow-sm border rounded-full w-6 h-6 text-[10px] font-bold text-red-300">×</button>`;
            document.getElementById('post-blocks').appendChild(div);
        }
        function loadBlockImg(e, input) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (re) => { const img = input.parentElement.previousElementSibling; img.src = re.target.result; img.classList.remove('hidden'); };
            reader.readAsDataURL(file);
        }
        async function savePost() {
            const id = document.getElementById('edit-post-id').value || "p_" + Date.now();
            const post = {
                id, title: document.getElementById('fp-title').value, pos: document.querySelector('input[name="fp-pos"]:checked').value,
                blocks: Array.from(document.getElementById('post-blocks').children).map(div => ({ type: div.dataset.type, content: div.dataset.type==='text'?div.querySelector('textarea').value:div.querySelector('img').src }))
            };
            const idx = posts.findIndex(p => p.id === id);
            if(idx > -1) posts[idx] = post; else posts.push(post);
            await syncFirebase(); closeModal();
        }

        // オーナー
        function openOwnerModal() {
            document.getElementById('fo-name').value = owner.name;
            document.getElementById('fo-bio').value = owner.bio;
            document.getElementById('owner-preview').src = owner.image || '';
            if(owner.image) document.getElementById('owner-preview').classList.remove('hidden');
            document.getElementById('sns-inputs').innerHTML = '';
            (owner.sns || []).forEach(s => addSnsInput(s));
            const m = document.getElementById('owner-modal'); m.style.display = 'flex'; setTimeout(() => m.style.opacity = '1', 10);
            toggleMenu('side-menu');
        }
        function addSnsInput(v = {type: "x", value: ""}) {
            const div = document.createElement('div'); div.className = "flex gap-2 mb-2";
            div.innerHTML = `<select class="f-sns-type border rounded p-2 text-xs w-24"><option value="x" ${v.type==='x'?'selected':''}>X</option><option value="insta" ${v.type==='insta'?'selected':''}>Instagram</option><option value="mixi2" ${v.type==='mixi2'?'selected':''}>mixi2</option><option value="link" ${v.type==='link'?'selected':''}>URL</option></select><input type="text" class="f-sns-val border rounded p-2 text-xs flex-1" placeholder="ID or URL" value="${v.value}"><button onclick="this.parentElement.remove()" class="text-red-300 font-bold px-2">×</button>`;
            document.getElementById('sns-inputs').appendChild(div);
        }
        async function saveOwner() {
            owner = {
                name: document.getElementById('fo-name').value, bio: document.getElementById('fo-bio').value,
                image: document.getElementById('owner-preview').src, h: document.getElementById('owner-h').value, v: document.getElementById('owner-v').value,
                sns: Array.from(document.querySelectorAll('#sns-inputs > div')).map(div => ({ type: div.querySelector('.f-sns-type').value, value: div.querySelector('.f-sns-val').value }))
            };
            await syncFirebase(); closeModal();
        }
        function renderSnsLinks() {
            const area = document.getElementById('owner-sns-links'); area.innerHTML = '';
            (owner.sns || []).forEach(s => {
                let url = s.value, val = s.value.replace('@', '');
                if(s.type === 'x') url = `https://x.com/${val}`;
                else if(s.type === 'insta') url = `https://instagram.com/${val}`;
                else if(s.type === 'mixi2') url = `https://mixi.social/@${val}`;
                const a = document.createElement('a'); a.href = url; a.target = "_blank";
                a.className = "px-6 py-3 bg-stone-50 border rounded-2xl text-xs font-bold text-stone-600 shadow-sm";
                a.innerText = s.type.toUpperCase(); area.appendChild(a);
            });
        }

        // ナビゲーション
        function showHome() {
            document.getElementById('home-content').classList.remove('hidden');
            document.getElementById('doll-list-page').classList.add('hidden');
            document.getElementById('post-list-page').classList.add('hidden');
            window.scrollTo(0,0);
        }
        function showDollList() {
            window.history.pushState({page: 'list'}, '');
            document.getElementById('home-content').classList.add('hidden');
            document.getElementById('doll-list-page').classList.remove('hidden');
            renderDollList(); toggleMenu('side-menu');
        }
        function showPostListPage() {
            window.history.pushState({page: 'posts'}, '');
            document.getElementById('home-content').classList.add('hidden');
            document.getElementById('post-list-page').classList.remove('hidden');
            const area = document.getElementById('menu-post-list'); area.innerHTML = '';
            posts.forEach((p) => {
                const row = document.createElement('div'); row.className = "bg-white p-5 rounded-3xl border shadow-sm relative";
                row.innerHTML = `<h4 class="font-bold mb-2 text-stone-700">${p.title}</h4>`;
                if(isLoggedIn) {
                    const btn = document.createElement('button'); btn.innerText = "編集"; btn.className = "absolute top-5 right-5 text-[10px] font-bold bg-stone-100 px-4 py-2 rounded-full";
                    btn.onclick = () => editPost(posts.findIndex(orig => orig.id === p.id)); row.appendChild(btn);
                }
                area.appendChild(row);
            });
            toggleMenu('side-menu');
        }
        function renderDollList() {
            const area = document.getElementById('doll-display-area'); area.innerHTML = '<div class="grid grid-cols-3 gap-2"></div>';
            const grid = area.querySelector('div');
            dolls.forEach((d, i) => {
                const img = document.createElement('img'); img.src = d.image; img.className="aspect-square object-cover rounded-2xl border shadow-sm";
                img.style.objectPosition = `${d.h || 50}% ${d.v || 50}%`;
                img.onclick = () => showDetail(i); grid.appendChild(img);
            });
        }
        function showDetail(i) {
            window.history.pushState({page: 'detail'}, '');
            const d = dolls[i], ov = document.getElementById('profile-overlay');
            ov.querySelector('#view-img').src = d.image;
            ov.querySelector('#view-img').style.objectPosition = `${d.h || 50}% ${d.v || 50}%`;
            ov.querySelector('#view-name').innerText = d.name;
            ov.querySelector('#view-kana').innerText = d.kana || '';
            ov.querySelector('#view-profile').innerText = d.profile || '';
            document.getElementById('profile-bg').style.backgroundColor = d.bgColor || '#ffffff';
            document.getElementById('profile-bg').style.color = d.textColor || '#000000';
            document.getElementById('detail-edit-btn').onclick = () => editDoll(i);
            ov.classList.remove('hidden');
        }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function editDoll(i) { closeProfile(); clearDollForm(); /* 既存データをセットする処理 */ }

        function setupInfiniteScroll() {
            const container = document.getElementById('film-container');
            container.addEventListener('scroll', () => {
                const items = dolls.filter(d => d.image); if (items.length < 5) return;
                const w = items.length * (80 + 12);
                if (container.scrollLeft < w * 0.5) container.scrollLeft += w;
                if (container.scrollLeft > w * 1.5) container.scrollLeft -= w;
            });
        }
        function showConfirm(msg, onOk, okLabel = "OK") {
            document.getElementById('dialog-message').innerText = msg;
            document.getElementById('dialog-buttons').innerHTML = `<button id="confirm-ok" class="w-full bg-stone-800 text-white py-4 rounded-full font-bold">${okLabel}</button><button onclick="closeDialog()" class="w-full bg-stone-100 text-stone-400 py-4 rounded-full font-bold">キャンセル</button>`;
            document.getElementById('confirm-ok').onclick = () => { onOk(); closeDialog(); };
            document.getElementById('custom-dialog').style.display = 'flex';
        }
        function closeDialog() { document.getElementById('custom-dialog').style.display = 'none'; }
        function requestNewGallery() { showConfirm("新しいギャラリーを作成しますか？", () => handleGoogleLogin(true), "作成する"); }
        function requestClearAll() { showConfirm("全てのデータを完全に削除しますか？", async () => { dolls = []; owner = { name: "Owner Name", bio: "", sns: [], image:"" }; posts = []; await syncFirebase(); location.reload(); }, "削除する"); }
    </script>
</body>
