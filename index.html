<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保存防止 */
        img, .preview-sq, .film-frame, .film-outer { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-user-drag: none;
        }

        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        
        /* モーダル基本設定 */
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        #side-menu { justify-content: flex-end; padding: 0; }
        
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        
        /* カレンダー */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        /* カラー選択 */
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 200000; display: none; align-items: center; justify-content: center; font-weight: bold; }
        
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <div id="loading">処理中...</div>

    <div id="custom-dialog">
        <div class="bg-white w-full max-w-xs p-8 rounded-3xl shadow-2xl text-center">
            <p id="dialog-message" class="text-[16px] mb-8 leading-relaxed font-bold whitespace-pre-wrap text-stone-700"></p>
            <div id="dialog-inputs" class="mb-6 space-y-4 hidden">
                <input type="text" id="auth-gallery-id" class="w-full border p-3 rounded-xl text-sm outline-none focus:border-stone-400" placeholder="公開用ID(半角英数)">
            </div>
            <div id="dialog-buttons" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div class="film-outer" id="film-container">
        <div id="top-film-roll" class="film-scroll-track"></div>
        <div id="empty-msg" class="absolute inset-0 flex items-center justify-center text-stone-500 text-xs font-bold">画像が登録されるとここに並びます</div>
    </div>

    <header class="p-4 bg-white border-b sticky top-0 z-[100] flex justify-between items-center">
        <h1 onclick="showHome()" class="logo-font text-3xl cursor-pointer">Doll Uchinoko Gallery</h1>
        <div onclick="toggleMenu('side-menu')" class="p-2 cursor-pointer relative z-[10001]">
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800"></div>
        </div>
    </header>

    <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">
        <div class="bg-white w-72 h-full ml-auto p-6 flex flex-col overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
            <div class="space-y-1">
                <button onclick="showHome(); toggleMenu('side-menu');" class="text-left py-4 font-bold border-b w-full text-stone-800">🏠 ホーム</button>
                <button onclick="openModalWithClear(); toggleMenu('side-menu');" class="text-left py-4 font-bold border-b text-blue-600 w-full admin-only">✨ うちの子を登録する</button>

            <div class="py-6 space-y-2 border-b">
                <button id="login-btn" onclick="handleLogin()" class="w-full py-4 bg-stone-800 rounded-xl text-sm font-bold text-white shadow-lg">Googleでログイン</button>
                <button id="logout-btn" onclick="handleLogout()" class="w-full py-3 bg-red-50 rounded-xl text-xs font-bold text-red-400 hidden">ログアウト</button>

            <div class="py-10 space-y-4 admin-only">

                <button onclick="openPostModal()" class="w-full py-4 bg-stone-800 text-white rounded-2xl text-sm font-bold shadow-lg">📝 投稿を追加</button>

            </div>
        </div>
    </div>

    <div id="doll-list-page" class="max-w-md mx-auto hidden p-6">

        <h2 class="text-xl font-bold mb-6">投稿一覧</h2>
        <div id="menu-post-list" class="space-y-2"></div>
    </div>

    <div id="modal" class="modal-base" onclick="closeModal()">

            <h3 id="modal-title" class="text-xl font-bold mb-6">うちの子登録</h3>
            <div class="crop-area">

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div id="profile-bg" class="min-h-full p-6 pb-32">
            <button onclick="closeProfile()" class="bg-white shadow px-6 py-2 rounded-full text-xs font-bold mb-6">閉じる</button>
            <img id="view-img" class="w-full aspect-square object-cover rounded-3xl shadow-xl mb-8">
            <div class="text-center mb-8"><p id="view-kana" class="text-sm opacity-70 mb-1"></p><h2 id="view-name" class="text-3xl font-bold"></h2></div>
            <div id="detail-box" class="bg-white/20 backdrop-blur-md p-6 rounded-3xl space-y-4 mb-8 hidden"></div>
            <p id="view-profile" class="whitespace-pre-wrap leading-relaxed px-2 text-[18px]"></p>
            <div class="fixed bottom-6 inset-x-0 px-6 flex gap-4 max-w-md mx-auto admin-only-flex hidden">
                <button id="detail-edit-btn" class="flex-1 bg-stone-800 text-white py-4 rounded-full font-bold">編集</button>
                <button id="detail-del-btn" class="flex-1 bg-red-50 text-red-400 py-4 rounded-full font-bold border border-red-100">削除</button>
            </div>
        </div>
    </div>

    <div id="owner-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <div class="crop-area">
                <div class="preview-sq" onclick="document.getElementById('owner-file').click()"><img id="owner-preview" class="hidden"><span id="owner-hint" class="text-stone-300 text-xs font-bold">画像を選択</span></div>
                <div class="v-bar-box"><input type="range" id="o-crop-v" min="0" max="100" class="vertical-range" oninput="updateCrop('owner-preview', 'o-crop-h', 'o-crop-v')"></div>
            </div>
            <input type="range" id="o-crop-h" min="0" max="100" class="w-full mb-6" oninput="updateCrop('owner-preview', 'o-crop-h', 'o-crop-v')">
            <div class="space-y-4">
                <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="loadImg(event, 'owner')">
                <input type="text" id="o-name" class="w-full border-b p-2 font-bold" placeholder="オーナー名">
                <textarea id="o-bio" class="w-full border p-3 rounded-xl min-h-[80px] text-sm outline-none" placeholder="自己紹介" oninput="autoResize(this)"></textarea>
                <div id="sns-inputs-container" class="space-y-3"></div>
                <button onclick="addSnsInput()" class="w-full py-2 bg-stone-100 rounded text-xs font-bold">+ SNSリンクを追加</button>
                <button onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">保存</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 id="post-modal-title" class="text-xl font-bold mb-4">投稿作成</h3>
            <input type="hidden" id="edit-post-id">
            <input type="text" id="p-title" class="w-full border-b p-3 font-bold mb-4 outline-none" placeholder="タイトル">
            <div id="post-blocks-container" class="space-y-4"></div>
            <button onclick="addPostBlock()" class="w-full py-4 border-2 border-dashed border-stone-200 rounded-2xl text-stone-400 text-sm font-bold mt-4">+ ブロック追加</button>
            <div class="flex gap-4 p-4 bg-stone-50 rounded-2xl text-xs mt-6 items-center">
                <label><input type="radio" name="p-pos" value="home" checked> ホーム</label>

            </div>
            <button onclick="savePost()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold mt-6">保存</button>
        </div>
    </div>

    <div id="article-page" style="display:none; position:fixed; inset:0; background:white; z-index:10001; overflow-y:auto;">
        <div class="max-w-2xl mx-auto p-6 pb-20">
            <div class="flex justify-between items-center py-6 mb-10 border-b">
                <button onclick="closeArticle()" class="text-sm font-bold text-stone-400">← 戻る</button>
                <div class="flex gap-4 admin-only-flex hidden">
                    <button id="art-edit-btn" class="text-xs font-bold bg-stone-100 px-4 py-2 rounded-full">編集</button>
                    <button id="art-del-btn" class="text-xs font-bold bg-red-50 text-red-400 px-4 py-2 rounded-full">削除</button>
                </div>
            </div>
            <h2 id="art-title" class="text-3xl font-bold text-center mb-12"></h2><div id="art-content" class="space-y-6"></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://eegxuxsyaradufdcvzuj.supabase.co';
        const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let adminEmail = "", dollViewMode = 'grid', currentRawImg = { doll: null, owner: null };
        const urlParams = new URLSearchParams(window.location.search);
        let galleryId = urlParams.get('id');

        const palette100 = (() => {
            const hues = [0, 30, 60, 120, 150, 180, 220, 280, 330], colors = [];
            for(let i=0; i<10; i++) colors.push(`hsl(0, 0%, ${Math.min(0 + (i * 11), 100)}%)`);
            hues.forEach(h => { for(let i=0; i<10; i++) colors.push(`hsl(${h}, 80%, ${Math.min(30 + (i * 7.2), 95)}%)`); });
            return colors.slice(0, 100);
        })();

        window.handleLogin = async function() {
            const { error } = await supabase.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: window.location.href } 
            });
            if (error) alert("ログインエラー: " + error.message);
        };

        window.handleLogout = async function() { await supabase.auth.signOut(); location.reload(); };

        window.toggleMenu = (id) => { 
            const m = document.getElementById(id); if(!m) return;
            m.style.display = window.getComputedStyle(m).display === 'none' ? 'flex' : 'none';
        };

        window.onload = async () => {
            initColorPalettes();
            if (!galleryId || urlParams.get('mode') === 'new') { openCreationModal(); } 
            else { 
                showLoading(true);
                await loadGalleryData(); 
                showLoading(false);
            }
            const { data: { session } } = await supabase.auth.getSession();
            checkUser(session?.user);
            supabase.auth.onAuthStateChange((_e, s) => { checkUser(s?.user); renderAll(); });
            renderAll(); 
        };

        async function loadGalleryData() {
            const { data } = await supabase.from('galleries').select('*').eq('id', galleryId).single();
            if (data) { 
                dolls = data.data.dolls || []; owner = data.data.owner || owner; 
                posts = data.data.posts || []; adminEmail = data.admin_email || ""; 
            }
        }

        async function syncData() {
            if(!galleryId) return; showLoading(true);
            await supabase.from('galleries').upsert({ id: galleryId, data: { dolls, owner, posts }, admin_email: adminEmail });
            showLoading(false);
        }

        async function uploadImage(blob, prefix) {
            const fileName = `${galleryId}/${prefix}_${Date.now()}.webp`;
            await supabase.storage.from('doll-images').upload(fileName, blob);
            return supabase.storage.from('doll-images').getPublicUrl(fileName).data.publicUrl;
        }

        function checkUser(user) {
            const isAdmin = (user && adminEmail && user.email === adminEmail);
            document.body.classList.toggle('is-admin', isAdmin);
            document.getElementById('login-btn').classList.toggle('hidden', isAdmin);
            document.getElementById('logout-btn').classList.toggle('hidden', !isAdmin);
        }

        function renderAll() {
            const film = document.getElementById('top-film-roll'); film.innerHTML = "";
            dolls.forEach((d, i) => { 
                const img = document.createElement('img'); img.className = "film-frame"; img.src = d.image; 
                img.onclick = () => showDetail(i); film.appendChild(img); 
            });
            document.getElementById('empty-msg').style.display = dolls.length ? 'none' : 'flex';
            const oImg = document.getElementById('display-owner-img'); oImg.src = owner.image; oImg.classList.toggle('hidden', !owner.image);
            document.getElementById('owner-name').innerText = owner.name || "";
            document.getElementById('owner-bio').innerText = owner.bio || "";
            const snsBox = document.getElementById('owner-sns-links'); snsBox.innerHTML = "";
            (owner.sns || []).forEach(s => {
                const b = document.createElement('button'); b.className = "text-xs font-bold bg-stone-100 px-6 py-2 rounded-full";
                b.innerText = `${s.type}: ${s.val}`;
                b.onclick = () => window.open(s.val.startsWith('http') ? s.val : `https://${s.type}.com/${s.val}`, '_blank');
                snsBox.appendChild(b);
            });
            renderAnniversaries(); renderCalendar(); renderHomePosts();
        }

        window.saveData = async () => {
            const btn = document.getElementById('save-doll-btn'); btn.innerText = "保存中..."; btn.disabled = true;
            try {
                const id = document.getElementById('edit-id').value, h = document.getElementById('crop-h').value, v = document.getElementById('crop-v').value;
                let imgData = (id !== "" && dolls[id]) ? dolls[id].image : "";
                if(currentRawImg.doll) {
                    const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 1000;
                    const s = Math.max(1000/currentRawImg.doll.width, 1000/currentRawImg.doll.height);
                    ctx.drawImage(currentRawImg.doll, (1000-currentRawImg.doll.width*s)*(h/100), (1000-currentRawImg.doll.height*s)*(v/100), currentRawImg.doll.width*s, currentRawImg.doll.height*s);
                    imgData = await uploadImage(await new Promise(r => cvs.toBlob(r, 'image/webp', 0.85)), "doll");
                }
                const d = { name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value, image: imgData, bodySize: document.getElementById('f-size-label').value, bodyMake: document.getElementById('f-body-make').value, head: document.getElementById('f-head').value, anniversaries: Array.from(document.querySelectorAll('#anniversary-inputs > div')).map(row => ({ name: row.querySelector('.f-anni-name').value, date: row.querySelector('.f-anni-date').value })).filter(a => a.name), bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value, profile: document.getElementById('f-profile').value };
                if(id === "") dolls.push(d); else dolls[id] = d;
                await syncData(); location.reload();
            } catch (e) { alert(e.message); btn.innerText = "保存する"; btn.disabled = false; }
        };

        window.saveOwner = async () => {
            try {
                let img = owner.image; const h = document.getElementById('o-crop-h').value, v = document.getElementById('o-crop-v').value;
                if(currentRawImg.owner) {
                    const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 600;
                    const s = Math.max(600/currentRawImg.owner.width, 600/currentRawImg.owner.height);
                    ctx.drawImage(currentRawImg.owner, (600-currentRawImg.owner.width*s)*(h/100), (600-currentRawImg.owner.height*s)*(v/100), currentRawImg.owner.width*s, currentRawImg.owner.height*s);
                    img = await uploadImage(await new Promise(r => cvs.toBlob(r, 'image/webp', 0.85)), "owner");
                }
                owner = { name: document.getElementById('o-name').value, bio: document.getElementById('o-bio').value, image: img, sns: Array.from(document.querySelectorAll('.sns-input-row')).map(row => ({ type: row.querySelector('.sns-type').value, val: row.querySelector('.sns-val').value })).filter(s => s.val) };
                await syncData(); location.reload();
            } catch (e) { alert(e.message); }
        };

        window.savePost = async () => {
            try {
                const blocks = [];
                for (const el of document.querySelectorAll('.post-block')) {
                    const imgEl = el.querySelector('img'), text = el.querySelector('textarea').value;
                    let url = "";
                    if (!imgEl.classList.contains('hidden')) {
                        if (imgEl.src.startsWith('data:')) url = await uploadImage(await (await fetch(imgEl.src)).blob(), "post");
                        else url = imgEl.src;
                    }
                    if(url || text) blocks.push({img: url, text});
                }
                const idx = document.getElementById('edit-post-id').value, d = { title: document.getElementById('p-title').value, blocks, pos: document.querySelector('input[name="p-pos"]:checked').value };
                if(idx === "") posts.push(d); else posts[idx] = d;
                await syncData(); location.reload();
            } catch (e) { alert(e.message); }
        };

        window.showDetail = (i) => {
            const d = dolls[i]; if(!d) return;
            document.getElementById('view-img').src = d.image;
            document.getElementById('view-name').innerText = d.name;
            document.getElementById('view-kana').innerText = d.kana;
            document.getElementById('view-profile').innerText = d.profile;
            const bg = document.getElementById('profile-bg'); bg.style.backgroundColor = d.bgColor; bg.style.color = d.textColor;
            const det = document.getElementById('detail-box');
            let html = "";
            if(d.bodySize) html += `<div><p class="text-[10px] opacity-50 font-bold uppercase">Size</p><p class="font-bold">${d.bodySize}</p></div>`;
            if(d.bodyMake) html += `<div><p class="text-[10px] opacity-50 font-bold uppercase">Body</p><p class="font-bold">${d.bodyMake}</p></div>`;
            if(d.head) html += `<div><p class="text-[10px] opacity-50 font-bold uppercase">Head</p><p class="font-bold">${d.head}</p></div>`;
            det.innerHTML = html; det.classList.toggle('hidden', !html);
            document.getElementById('detail-edit-btn').onclick = () => { closeProfile(); openModal(i); };
            document.getElementById('detail-del-btn').onclick = () => { showConfirm("この子を削除しますか？", async () => { dolls.splice(i, 1); await syncData(); location.reload(); }); };
            document.getElementById('profile-overlay').style.display = 'block';
        };

        window.loadImg = (e, type) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    currentRawImg[type] = img;
                    const pre = document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview');
                    pre.src = ev.target.result; pre.classList.remove('hidden');
                    document.getElementById(type === 'doll' ? 'doll-hint' : 'owner-hint').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(f);
        };

        window.addAnniversaryInput = (v = {name:"", date:""}) => {
            const div = document.createElement('div'), id = Math.random().toString(36).substr(2, 9);
            div.className = "flex flex-col gap-2 p-4 bg-white rounded-2xl border border-stone-100";
            div.innerHTML = `<input type="text" class="f-anni-name w-full border-b py-1 text-sm outline-none" placeholder="記念日名" value="${v.name}"><div class="flex gap-2"><select id="m-${id}" onchange="updateDateInput('${id}')" class="border rounded p-2 text-xs flex-1"><option value="">月</option>${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select><select id="d-${id}" onchange="updateDateInput('${id}')" class="border rounded p-2 text-xs flex-1"><option value="">日</option>${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select></div><input type="date" class="f-anni-date hidden" value="${v.date}">`;
            document.getElementById('anniversary-inputs').appendChild(div);
            if(v.date) { const [y,m,d] = v.date.split('-'); document.getElementById(`m-${id}`).value = parseInt(m); document.getElementById(`d-${id}`).value = parseInt(d); }
        };

        window.updateDateInput = (id) => {
            const m = document.getElementById(`m-${id}`).value, d = document.getElementById(`d-${id}`).value;
            if(m && d) { const row = document.getElementById(`m-${id}`).closest('div').parentElement; row.querySelector('.f-anni-date').value = `2000-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
        };

        window.addSnsInput = (s = {type:"x", val:""}) => {
            const div = document.createElement('div'); div.className = "sns-input-row flex gap-2";
            div.innerHTML = `<select class="sns-type border rounded p-2 text-xs"><option value="x" ${s.type==='x'?'selected':''}>X</option><option value="instagram" ${s.type==='instagram'?'selected':''}>Instagram</option><option value="link" ${s.type==='link'?'selected':''}>Link</option></select><input type="text" class="sns-val border rounded p-2 text-xs flex-1" placeholder="IDまたはURL" value="${s.val}">`;
            document.getElementById('sns-inputs-container').appendChild(div);
        };

        window.addPostBlock = (b = {img:"", text:""}) => {
            const div = document.createElement('div'); div.className = "post-block p-4 bg-stone-50 rounded-2xl space-y-3";
            div.innerHTML = `<div class="aspect-video bg-stone-200 rounded-xl overflow-hidden cursor-pointer flex items-center justify-center" onclick="this.nextElementSibling.click()"><img src="${b.img}" class="${b.img?'':'hidden'} w-full h-full object-cover"><span class="${b.img?'hidden':''} text-[10px] font-bold text-stone-400">画像を選択</span></div><input type="file" accept="image/*" class="hidden" onchange="const img=this.previousElementSibling.querySelector('img'),span=this.previousElementSibling.querySelector('span'),f=this.files[0]; if(f){const r=new FileReader(); r.onload=e=>{img.src=e.target.result; img.classList.remove('hidden'); span.classList.add('hidden');}; r.readAsDataURL(f);}"><textarea class="w-full bg-transparent p-2 text-sm outline-none" placeholder="本文" oninput="autoResize(this)">${b.text}</textarea>`;
            document.getElementById('post-blocks-container').appendChild(div);
        };

        window.initColorPalettes = () => {
            ['bg','text','cal'].forEach(type => {
                const grid = document.getElementById(`${type}-color-grid`);
                palette100.forEach(c => { const chip = document.createElement('div'); chip.className = "color-chip"; chip.style.background = c; chip.onclick = () => { document.getElementById(`f-${type}-color`).value = c; document.getElementById(`${type}-select-icon`).style.backgroundColor = c; grid.classList.remove('grid-open'); }; grid.appendChild(chip); });
            });
        };
        window.toggleColorGrid = (type) => document.getElementById(`${type}-color-grid`).classList.toggle('grid-open');

        window.showHome = () => { document.getElementById('home-content').classList.remove('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.add('hidden'); };
        window.showDollList = () => { document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.remove('hidden'); document.getElementById('post-list-page').classList.add('hidden'); toggleMenu('side-menu'); renderDollList(); };
        window.showPostListPage = () => { document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.remove('hidden'); toggleMenu('side-menu'); renderPostListMenu(); };
        window.closeModal = () => document.querySelectorAll('.modal-base').forEach(m => m.style.display = 'none');
        window.closeProfile = () => document.getElementById('profile-overlay').style.display = 'none';
        window.closeArticle = () => document.getElementById('article-page').style.display = 'none';
        window.showLoading = (s) => document.getElementById('loading').style.display = s ? 'flex' : 'none';
        window.updateCrop = (id, hid, vid) => { const img = document.getElementById(id); img.style.objectPosition = `${document.getElementById(hid).value}% ${document.getElementById(vid).value}%`; };
        window.autoResize = (el) => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };

        function renderCalendar() {
            const container = document.getElementById('cal-days'), monthLabel = document.getElementById('cal-month'), eventBox = document.getElementById('day-events');
            container.innerHTML = ""; eventBox.innerHTML = "";
            let d = new Date(); d.setMonth(d.getMonth() + calOffset);
            monthLabel.innerText = `${d.getFullYear()} / ${d.getMonth()+1}`;
            let last = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
            for(let i=1; i<=last; i++) {
                const day = document.createElement('div'); day.className = "cal-day"; day.innerText = i;
                const dots = document.createElement('div'); dots.className = "cal-dots";
                let dayAnnis = [];
                dolls.forEach(doll => { (doll.anniversaries || []).forEach(a => {
                    const [_, am, ad] = a.date.split('-').map(Number);
                    if(am === d.getMonth()+1 && ad === i) {
                        dayAnnis.push({ ...a, doll });
                        const dot = document.createElement('div'); dot.className = "cal-dot"; dot.style.background = doll.calColor || '#E11D48'; dots.appendChild(dot);
                    }
                })});
                day.appendChild(dots);
                day.onclick = () => {
                    eventBox.innerHTML = dayAnnis.length ? dayAnnis.map(a => `<div class="p-4 rounded-xl text-xs font-bold flex items-center gap-3" style="background:${a.doll.bgColor}; color:${a.doll.textColor}"><div class="w-2 h-2 rounded-full" style="background:${a.doll.calColor}"></div>${a.doll.name}: ${a.name}</div>`).join('') : `<p class="text-center text-stone-300 text-xs py-4">予定はありません</p>`;
                };
                container.appendChild(day);
            }
        }
        window.changeMonth = (n) => { calOffset += n; renderCalendar(); };

        function renderAnniversaries() {
            const list = document.getElementById('happy-anniversary-list'), closest = document.getElementById('closest-anniversary');
            list.innerHTML = ""; closest.innerHTML = "";
            let today = new Date(), annis = [];
            dolls.forEach((d, di) => { d.anniversaries.forEach(a => {
                let [y, m, d_] = a.date.split('-').map(Number), date = new Date(today.getFullYear(), m-1, d_);
                if(date < new Date(today.getFullYear(), today.getMonth(), today.getDate())) date.setFullYear(today.getFullYear()+1);
                annis.push({ ...a, dollName: d.name, dollIdx: di, fullDate: date, isToday: (today.getMonth()+1 === m && today.getDate() === d_) });
            })});
            const todayAnnis = annis.filter(a => a.isToday);
            document.getElementById('happy-anniversary').classList.toggle('hidden', !todayAnnis.length);
            todayAnnis.forEach(a => { 
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-3xl shadow-sm border-2 border-pink-100 mb-4 animate-anni cursor-pointer"; 
                div.innerHTML = `<p class="text-xs font-bold text-pink-400 mb-1">${a.name}</p><p class="text-xl font-bold">${a.dollName}</p>`; 
                div.onclick = () => showDetail(a.dollIdx); list.appendChild(div); 
            });
            annis.sort((a,b) => a.fullDate - b.fullDate);
            if(annis.length) { 
                const a = annis[0], days = Math.ceil((a.fullDate - today)/(1000*60*60*24)); 
                closest.innerHTML = `<div class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm"><div><p class="text-[10px] font-bold text-stone-400 mb-1">${a.date.replace(/-/g,'.')} ${a.name}</p><p class="font-bold">${a.dollName}</p></div><div class="text-right"><p class="text-[10px] font-bold text-stone-300 uppercase">あと</p><p class="text-xl font-bold text-stone-800">${days}日</p></div></div>`; 
            }
        }

        function renderHomePosts() {
            const container = document.getElementById('home-posts'); container.innerHTML = "";
            posts.filter(p => p.pos === 'home').forEach(p => {
                const art = document.createElement('article'); art.className = "space-y-4 cursor-pointer";
                art.onclick = () => openArticle(posts.indexOf(p));
                if(p.blocks[0]?.img) art.innerHTML += `<img src="${p.blocks[0].img}" class="w-full aspect-[4/3] object-cover rounded-3xl shadow-sm">`;
                art.innerHTML += `<div class="px-2"><h4 class="font-bold text-xl mb-2">${p.title}</h4><p class="text-sm text-stone-500 line-clamp-2">${p.blocks[0]?.text || ""}</p></div>`;
                container.appendChild(art);
            });
        }

        function renderPostListMenu() {
            const container = document.getElementById('menu-post-list'); container.innerHTML = "";
            posts.filter(p => p.pos === 'menu').forEach(p => {
                const d = document.createElement('div'); d.className = "p-6 bg-white rounded-3xl shadow-sm border border-stone-100 mb-4 cursor-pointer";
                d.onclick = () => openArticle(posts.indexOf(p));
                d.innerHTML = `<h4 class="font-bold text-lg mb-2">${p.title}</h4><p class="text-xs text-stone-400 line-clamp-2">${p.blocks[0]?.text || ""}</p>`;
                container.appendChild(d);
            });
        }

        window.openArticle = (i) => {
            const p = posts[i]; if(!p) return;
            document.getElementById('art-title').innerText = p.title;
            const cont = document.getElementById('art-content'); cont.innerHTML = "";
            p.blocks.forEach(b => {
                if(b.img) cont.innerHTML += `<img src="${b.img}" class="w-full rounded-3xl shadow-lg">`;
                if(b.text) cont.innerHTML += `<p class="whitespace-pre-wrap leading-relaxed text-stone-600 px-2">${b.text}</p>`;
            });
            document.getElementById('art-edit-btn').onclick = () => { closeArticle(); openPostModal(i); };
            document.getElementById('art-del-btn').onclick = () => { showConfirm("この投稿を削除しますか？", async () => { posts.splice(i, 1); await syncData(); location.reload(); }); };
            document.getElementById('article-page').style.display = 'block';
        };

        function renderDollList() {
            const container = document.getElementById('doll-display-area'); container.innerHTML = "";
            if(dollViewMode === 'grid') {
                const grid = document.createElement('div'); grid.className = "grid grid-cols-3 gap-2";
                dolls.forEach((d, i) => { const img = document.createElement('img'); img.className = "w-full aspect-square object-cover rounded-xl"; img.src = d.image; img.onclick = () => showDetail(i); grid.appendChild(img); });
                container.appendChild(grid);
            } else {
                dolls.forEach((d, i) => { const item = document.createElement('div'); item.className = "flex items-center gap-4 py-3 border-b cursor-pointer"; item.onclick = () => showDetail(i); item.innerHTML = `<img src="${d.image}" class="w-12 h-12 rounded-full object-cover"><span class="font-bold text-sm">${d.name}</span>`; container.appendChild(item); });
            }
        }

        window.toggleDollViewMode = () => { dollViewMode = (dollViewMode === 'grid' ? 'list' : 'grid'); document.getElementById('toggle-list-view').innerText = (dollViewMode === 'grid' ? '名前を表示' : '画像のみ表示'); renderDollList(); };

        window.openModal = (i = "") => {
            document.getElementById('modal-title').innerText = (i === "" ? "うちの子登録" : "うちの子編集");
            document.getElementById('edit-id').value = i;
            const d = (i === "" ? { name:"", kana:"", image:"", bodySize:"", bodyMake:"", head:"", anniversaries:[], bgColor:"#ffffff", textColor:"#000000", calColor:"#E11D48", profile:"" } : dolls[i]);
            document.getElementById('f-name').value = d.name; document.getElementById('f-kana').value = d.kana;
            document.getElementById('f-size-label').value = d.bodySize || ""; document.getElementById('f-body-make').value = d.bodyMake || "";
            document.getElementById('f-head').value = d.head || ""; document.getElementById('f-bg-color').value = d.bgColor;
            document.getElementById('f-text-color').value = d.textColor; document.getElementById('f-cal-color').value = d.calColor;
            document.getElementById('f-profile').value = d.profile; document.getElementById('anniversary-inputs').innerHTML = "";
            (d.anniversaries || []).forEach(a => addAnniversaryInput(a));
            document.getElementById('bg-select-icon').style.backgroundColor = d.bgColor;
            document.getElementById('text-select-icon').style.backgroundColor = d.textColor;
            document.getElementById('cal-select-icon').style.backgroundColor = d.calColor;
            document.getElementById('crop-preview').src = d.image; document.getElementById('crop-preview').classList.toggle('hidden', !d.image);
            document.getElementById('doll-hint').classList.toggle('hidden', !!d.image);
            currentRawImg.doll = null; document.getElementById('modal').style.display = 'flex';
        };

        window.openModalWithClear = () => { currentRawImg.doll = null; openModal(); };

        window.openOwnerModal = () => {
            document.getElementById('o-name').value = owner.name || ""; document.getElementById('o-bio').value = owner.bio || "";
            document.getElementById('owner-preview').src = owner.image || ""; document.getElementById('owner-preview').classList.toggle('hidden', !owner.image);
            document.getElementById('owner-hint').classList.toggle('hidden', !!owner.image);
            const container = document.getElementById('sns-inputs-container'); container.innerHTML = "";
            (owner.sns || []).forEach(s => addSnsInput(s));
            currentRawImg.owner = null; document.getElementById('owner-modal').style.display = 'flex';
        };

        window.openPostModal = (i = "") => {
            document.getElementById('post-modal-title').innerText = i === "" ? "投稿作成" : "投稿編集";
            document.getElementById('edit-post-id').value = i;
            const p = i === "" ? { title:"", blocks:[], pos:"home" } : posts[i];
            document.getElementById('p-title').value = p.title; document.querySelector(`input[name="p-pos"][value="${p.pos}"]`).checked = true;
            const cont = document.getElementById('post-blocks-container'); cont.innerHTML = "";
            if(p.blocks.length) p.blocks.forEach(b => addPostBlock(b)); else addPostBlock();
            document.getElementById('post-modal').style.display = 'flex';
        };

        function showConfirm(m, onYes, yesText = "はい") {
            const d = document.getElementById('custom-dialog'), msg = document.getElementById('dialog-message'), btns = document.getElementById('dialog-buttons');
            msg.innerText = m; btns.innerHTML = "";
            const y = document.createElement('button'); y.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold"; y.innerText = yesText;
            y.onclick = () => { d.style.display = 'none'; onYes(); };
            const n = document.createElement('button'); n.className = "w-full bg-stone-100 text-stone-400 py-4 rounded-full font-bold"; n.innerText = "キャンセル";
            n.onclick = () => d.style.display = 'none';
            btns.append(y, n); d.style.display = 'flex';
        }

        async function openCreationModal() {
            const d = document.getElementById('custom-dialog'), msg = document.getElementById('dialog-message'), inputs = document.getElementById('dialog-inputs'), btns = document.getElementById('dialog-buttons');
            inputs.classList.remove('hidden'); btns.innerHTML = "";
            msg.innerText = "新規ギャラリーの作成\n公開用IDを入力してログインしてください";
            const b = document.createElement('button'); b.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold"; b.innerText = "Googleでログインして作成";
            b.onclick = async () => {
                const id = document.getElementById('auth-gallery-id').value.trim(); if(!id) return alert("IDを入力してください");
                const { data } = await supabase.from('galleries').select('id').eq('id', id).single();
                if(data) return alert("そのIDは既に使用されています");
                localStorage.setItem('pending_gallery_id', id); handleLogin();
            };
            btns.appendChild(b); d.style.display = 'flex';
        }

        (async () => {
            const p = localStorage.getItem('pending_gallery_id');
            if(p) {
                const { data: { session } } = await supabase.auth.getSession();
                if(session) {
                    await supabase.from('galleries').insert({ id: p, admin_email: session.user.email, data: { dolls: [], owner: { name: "Owner Name", bio: "", sns: [], image:"" }, posts: [] } });
                    localStorage.removeItem('pending_gallery_id'); window.location.search = `?id=${p}`;
                }
            }
        })();

        window.copyURL = () => { navigator.clipboard.writeText(window.location.href); alert("URLをコピーしました"); };
        window.shareSNS = (type) => { const u = encodeURIComponent(window.location.href); window.open(type === 'x' ? `https://twitter.com/intent/tweet?url=${u}` : `https://social-plugins.line.me/lineit/share?url=${u}`, '_blank'); };
        window.requestNewGallery = () => { showConfirm("新しいギャラリーを作成しますか？", () => window.open(window.location.origin + window.location.pathname + '?mode=new', '_blank'), "作成する"); };
        window.requestClearAll = () => { showConfirm("全てのデータを完全に削除しますか？", async () => { dolls = []; owner = { name: "Owner Name", bio: "", sns: [], image:"" }; posts = []; await syncData(); location.reload(); }, "削除する"); };
    </script>
</body>
</html>
