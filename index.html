<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; z-index: 10; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 20; }
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; opacity: 0; transition: opacity 0.3s; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        #admin-badge { display: none; position: fixed; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; font-weight: bold; padding: 4px 12px; border-radius: 20px; z-index: 5; backdrop-filter: blur(4px); }
        body.is-admin #admin-badge { display: block; }
        @keyframes pulse-anni { 0% { transform: scale(1); } 70% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase設定（index.htmlと同じ設定を想定）
        const firebaseConfig = {
            apiKey: "AIzaSyB...", // 実際のAPIキーに差し替えてください
            authDomain: "uchinoko-...",
            projectId: "uchinoko-...",
            storageBucket: "uchinoko-...",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.fb = { db, doc, getDoc, setDoc, auth, signInWithPopup, provider };

        let dolls = [];
        let posts = [];
        let owner = { name: "Owner Name", bio: "", sns: [], image: "" };
        let isAdmin = false;
        const galleryId = new URLSearchParams(window.location.search).get('id') || 'default_gallery';

        // 初期化：データ同期
        onSnapshot(doc(db, "galleries", galleryId), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                dolls = data.dolls || [];
                posts = data.posts || [];
                owner = data.owner || owner;
                renderAll();
            }
        });

        // ログイン状態監視
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.body.classList.toggle('is-admin', isAdmin);
            document.getElementById('user-status-text').innerText = user ? "Administrator" : "Viewer";
            document.getElementById('user-name-text').innerText = user ? user.displayName : "ゲスト";
            document.getElementById('login-btn').classList.toggle('hidden', isAdmin);
            document.getElementById('logout-btn').classList.toggle('hidden', !isAdmin);
            renderAll();
        });

        // --- 保存ロジック ---
        async function saveData() {
            const id = document.getElementById('edit-id').value || Date.now().toString();
            const annis = Array.from(document.querySelectorAll('.anni-row')).map(row => ({
                id: row.dataset.id,
                label: row.querySelector('.f-anni-label').value,
                date: row.querySelector('.f-anni-date').value,
                m: row.querySelector('.f-anni-m').value,
                d: row.querySelector('.f-anni-d').value
            }));

            const newData = {
                id,
                name: document.getElementById('f-name').value,
                kana: document.getElementById('f-kana').value,
                image: document.getElementById('crop-preview').src,
                cropV: document.getElementById('crop-v').value,
                cropH: document.getElementById('crop-h').value,
                size: document.getElementById('f-size-label').value,
                body: document.getElementById('f-body-make').value,
                head: document.getElementById('f-head').value,
                profile: document.getElementById('f-profile').value,
                bgColor: document.getElementById('f-bg-color').value,
                textColor: document.getElementById('f-text-color').value,
                calColor: document.getElementById('f-cal-color').value,
                bday: document.getElementById('f-bday').value,
                bdayM: document.getElementById('f-bday-m').value,
                bdayD: document.getElementById('f-bday-d').value,
                welcome: document.getElementById('f-welcome').value,
                welcomeM: document.getElementById('f-welcome-m').value,
                welcomeD: document.getElementById('f-welcome-d').value,
                anniversaries: annis
            };

            const idx = dolls.findIndex(d => d.id === id);
            if (idx > -1) dolls[idx] = newData; else dolls.push(newData);

            await setDoc(doc(db, "galleries", galleryId), { dolls, posts, owner }, { merge: true });
            closeModal();
        }

        async function savePost() {
            const id = document.getElementById('post-edit-id').value || Date.now().toString();
            const newPost = {
                id,
                image: document.getElementById('post-preview').src,
                cropV: document.getElementById('post-v').value,
                cropH: document.getElementById('post-h').value,
                date: document.getElementById('fp-date').value,
                m: document.getElementById('fp-m').value,
                d: document.getElementById('fp-d').value,
                text: document.getElementById('fp-text').value,
                dollIds: Array.from(document.querySelectorAll('.post-doll-tag.active')).map(el => el.dataset.id)
            };

            const idx = posts.findIndex(p => p.id === id);
            if (idx > -1) posts[idx] = newPost; else posts.unshift(newPost);

            await setDoc(doc(db, "galleries", galleryId), { dolls, posts, owner }, { merge: true });
            closeModal();
        }

        // --- セレクトボックス生成 (index.html準拠) ---
        function initSelects() {
            const mOption = (sel) => {
                for(let i=1; i<=12; i++) sel.add(new Option(i, i));
            };
            const dOption = (sel) => {
                for(let i=1; i<=31; i++) sel.add(new Option(i, i));
            };
            ['f-bday', 'f-welcome', 'fp'].forEach(prefix => {
                const m = document.getElementById(prefix + '-m');
                const d = document.getElementById(prefix + '-d');
                if(m) mOption(m);
                if(d) dOption(d);
                // 同期用イベント
                const dateInput = document.getElementById(prefix + (prefix==='fp'?'':'') + '-date') || document.getElementById(prefix);
                if(dateInput) {
                    dateInput.addEventListener('change', (e) => {
                        if(!e.target.value) return;
                        const [y, mm, dd] = e.target.value.split('-');
                        if(m) m.value = parseInt(mm);
                        if(d) d.value = parseInt(dd);
                    });
                }
            });
        }

        // 記念日入力欄追加
        window.addAnniversaryInput = function(v = {}) {
            const id = v.id || Date.now();
            const div = document.createElement('div');
            div.className = 'anni-row p-4 bg-stone-50 rounded-2xl space-y-2 mb-2';
            div.dataset.id = id;
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <input type="text" class="f-anni-label border-b bg-transparent font-bold text-xs outline-none" placeholder="記念日名" value="${v.label||''}">
                    <button onclick="this.parentElement.parentElement.remove()" class="text-red-300 text-[10px]">削除</button>
                </div>
                <div class="flex gap-2">
                    <select class="f-anni-m border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option>${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select>
                    <select class="f-anni-d border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option>${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select>
                </div>
                <input type="date" class="f-anni-date date-input w-full" value="${v.date||''}">
            `;
            document.getElementById('anniversary-inputs').appendChild(div);
            const mSel = div.querySelector('.f-anni-m');
            const dSel = div.querySelector('.f-anni-d');
            const dInp = div.querySelector('.f-anni-date');
            if(v.m) mSel.value = v.m;
            if(v.d) dSel.value = v.d;
            dInp.addEventListener('change', (e) => {
                const [y, mm, dd] = e.target.value.split('-');
                mSel.value = parseInt(mm); dSel.value = parseInt(dd);
            });
        };

        // --- 画像処理・クロップ ---
        window.loadImg = function(e, type) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const imgId = type === 'doll' ? 'crop-preview' : 'post-preview';
                const hintId = type === 'doll' ? 'doll-hint' : 'post-hint';
                const img = document.getElementById(imgId);
                img.src = re.target.result;
                img.classList.remove('hidden');
                document.getElementById(hintId).classList.add('hidden');
                updateCrop(imgId, type==='doll'?'crop-h':'post-h', type==='doll'?'crop-v':'post-v');
            };
            reader.readAsDataURL(file);
        };

        window.updateCrop = function(imgId, hId, vId) {
            const img = document.getElementById(imgId);
            const h = document.getElementById(hId).value;
            const v = document.getElementById(vId).value;
            img.style.objectPosition = `${h}% ${v}%`;
        };

        // UI表示制御（共通）
        window.toggleMenu = (id) => {
            const el = document.getElementById(id);
            const isOpen = el.style.display === 'flex';
            el.style.display = isOpen ? 'none' : 'flex';
            setTimeout(() => el.style.opacity = isOpen ? '0' : '1', 10);
        };

        window.closeModal = () => {
            document.querySelectorAll('.modal-base').forEach(m => {
                m.style.opacity = '0';
                setTimeout(() => m.style.display = 'none', 300);
            });
        };

        // 初期実行
        window.onload = () => {
            initSelects();
            renderCalendar();
        };

        // グローバル関数への紐付け（ボタンクリック用）
        window.saveData = saveData;
        window.savePost = savePost;
        window.handleGoogleLogin = async () => {
            try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
        };
        window.handleLogout = () => signOut(auth);

        // ... その他の描画系関数 (renderAll, renderCalendar等) は既存のdoll2.htmlを継承 ...
    </script>
</body>
</html>
