<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f5f5f5; margin: 0; -webkit-tap-highlight-color: transparent; user-select: text; }
        .app-outer { display: flex; justify-content: center; background-color: #f5f5f5; }
        .app-container { width: 100%; max-width: 600px; min-height: 100vh; background: #fcfaf8; box-shadow: 0 0 50px rgba(0,0,0,0.05); position: relative; padding-bottom: 80px; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        .film-outer { background: #1a1a1a; overflow-x: auto; padding: 20px 0; position: relative; min-height: 120px; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        .preview-sq { aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; background: #fff; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        @keyframes pulse-anni { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 100000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #333; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="font-bold text-stone-800">処理中...</p>
    </div>

    <div id="confirm-modal" class="modal-base">
        <div class="modal-content text-center">
            <p id="confirm-msg" class="font-bold text-stone-800 mb-6 whitespace-pre-wrap"></p>
            <div class="flex gap-4">
                <button onclick="closeConfirm(false)" class="flex-1 py-3 bg-stone-100 rounded-xl font-bold">キャンセル</button>
                <button onclick="closeConfirm(true)" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">実行する</button>
            </div>
        </div>
    </div>

    <div class="app-outer">
        <div class="app-container">
            <div class="film-outer" id="film-container">
                <div id="top-film-roll" class="film-scroll-track"></div>
                <div id="empty-msg" class="absolute inset-0 flex items-center justify-center text-stone-500 text-xs font-bold">Gallery Data</div>
            </div>

            <header class="p-4 bg-white border-b sticky top-0 z-[100] flex justify-between items-center">
                <h1 onclick="showHome()" class="logo-font text-3xl cursor-pointer">Doll Uchinoko Gallery</h1>
                <div class="flex items-center gap-2">
                    <button onclick="shareSite()" class="p-2 text-stone-600 hover:bg-stone-100 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    </button>
                    <div id="menu-trigger" onclick="toggleMenu('side-menu')" class="p-2 cursor-pointer">
                        <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
                        <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
                        <div class="w-6 h-0.5 bg-stone-800"></div>
                    </div>
                </div>
            </header>

            <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">
                <div class="bg-white w-72 h-full ml-auto p-6 flex flex-col overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
                    <div class="space-y-1 flex-1">
                        <button onclick="showHome(); toggleMenu('side-menu');" class="text-left py-4 font-bold border-b w-full">🏠 ホーム</button>
                        <button onclick="openModalWithClear()" class="text-left py-4 font-bold border-b text-blue-600 w-full admin-only">✨ うちの子を登録</button>
                        <button onclick="showDollList()" class="text-left py-4 font-bold border-b w-full">📸 うちの子一覧</button>
                        <button onclick="showPostListPage()" class="text-left py-4 font-bold border-b w-full">📝 投稿一覧</button>
                        <div id="guest-menu" class="py-4">
                            <button onclick="handleGoogleLogin()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold shadow-lg">🚀 自分のギャラリーを作る</button>
                            <p class="text-[10px] text-stone-400 mt-2 text-center">Googleログインで管理画面が作成されます</p>
                        </div>
                    </div>
                    <button id="logout-btn" onclick="handleLogout()" class="py-4 text-red-400 font-bold text-sm admin-only">ログアウト</button>
                    <div class="py-6 space-y-4 admin-only">
                        <button onclick="openOwnerModal()" class="w-full py-4 bg-stone-100 rounded-2xl text-sm font-bold">👤 オーナー設定</button>
                        <button onclick="openPostModal()" class="w-full py-4 bg-stone-800 text-white rounded-2xl text-sm font-bold">📝 投稿を追加</button>
                    </div>
                </div>
            </div>

            <main id="home-content">
                <section id="owner-section" class="p-8 bg-white text-center">
                    <img id="display-owner-img" class="w-24 h-24 rounded-full object-cover mx-auto mb-4 border-4 border-stone-5 hidden">
                    <h2 id="owner-name" class="text-2xl font-bold mb-2"></h2>
                    <p id="owner-bio" class="text-sm text-stone-500 px-4 mb-6 whitespace-pre-wrap"></p>
                    <div id="owner-sns-links" class="flex flex-col items-center gap-3"></div>
                </section>

                <section class="p-6 bg-stone-50">
                    <div id="happy-anniversary" class="mb-8 hidden">
                        <h3 class="text-[10px] font-bold text-pink-500 uppercase mb-4 tracking-widest border-b border-pink-100 pb-2">Happy Anniversary!</h3>
                        <div id="happy-anniversary-list"></div>
                    </div>
                    <h3 class="text-[10px] font-bold text-stone-400 uppercase mb-4 tracking-widest border-b pb-2">Next Anniversary</h3>
                    <div id="closest-anniversary"></div>
                </section>

                <section class="p-8 bg-white mt-4 border-t">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changeMonth(-1)" class="p-2 text-stone-400">◀</button>
                        <h3 id="cal-month" class="font-bold text-lg"></h3>
                        <button onclick="changeMonth(1)" class="p-2 text-stone-400">▶</button>
                    </div>
                    <div id="cal-days" class="cal-grid mb-6"></div>
                    <div id="day-events" class="space-y-3"></div>
                </section>

                <div id="home-posts" class="p-6 space-y-8"></div>
            </main>

            <div id="doll-list-page" class="hidden p-6">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showHome()" class="text-sm font-bold bg-stone-100 px-4 py-2 rounded-full">戻る</button>
                    <button onclick="toggleDollViewMode()" class="text-xs font-bold bg-stone-800 text-white px-4 py-2 rounded-full">表示切替</button>
                </div>
                <div id="doll-display-area"></div>
            </div>

            <div id="post-list-page" class="hidden p-6">
                <div class="mb-6"><button onclick="showHome()" class="text-sm font-bold bg-stone-100 px-4 py-2 rounded-full">戻る</button></div>
                <h2 class="text-xl font-bold mb-6 text-stone-800">投稿一覧</h2>
                <div id="menu-post-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-xl font-bold mb-6">うちの子登録</h3>
            <div class="preview-sq mb-6" onclick="document.getElementById('doll-file').click()">
                <img id="crop-preview" class="hidden"><span id="doll-hint" class="text-stone-300 text-xs font-bold">画像を選択</span>
            </div>
            <div class="space-y-6">
                <input type="file" id="doll-file" accept="image/*" class="hidden" onchange="loadImg(event, 'doll')">
                <input type="hidden" id="edit-id"><input type="text" id="f-name" class="w-full border-b p-2 font-bold outline-none" placeholder="お名前">
                <input type="text" id="f-kana" class="w-full border-b p-2 text-sm outline-none" placeholder="ふりがな">
                
                <div class="p-4 bg-stone-50 rounded-2xl space-y-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold text-stone-400">誕生日</label>
                        <input type="date" id="f-bday-cal" class="w-full border p-2 text-sm rounded mb-2" onchange="syncDate('cal', 'bday')">
                        <div class="flex gap-2"><select id="f-bday-m" class="border rounded p-2 text-sm flex-1" onchange="syncDate('select', 'bday')"></select><select id="f-bday-d" class="border rounded p-2 text-sm flex-1" onchange="syncDate('select', 'bday')"></select></div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold text-stone-400">お迎え日</label>
                        <input type="date" id="f-welcome-cal" class="w-full border p-2 text-sm rounded mb-2" onchange="syncDate('cal', 'welcome')">
                        <div class="flex gap-2"><select id="f-welcome-m" class="border rounded p-2 text-sm flex-1" onchange="syncDate('select', 'welcome')"></select><select id="f-welcome-d" class="border rounded p-2 text-sm flex-1" onchange="syncDate('select', 'welcome')"></select></div>
                    </div>
                </div>

                <div id="anniversary-inputs" class="space-y-3"></div>
                <button onclick="addAnniversaryInput()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-xl text-xs font-bold text-stone-400">+ 記念日を追加</button>

                <div class="p-4 bg-stone-50 rounded-2xl space-y-3">
                    <p class="text-[10px] font-bold text-stone-400">カラー設定</p>
                    <div class="flex justify-between items-center cursor-pointer" onclick="toggleColorGrid('bg')"><span>背景色</span><div id="bg-select-icon" class="color-select-btn"></div></div>
                    <div id="bg-color-grid" class="color-grid"></div><input type="hidden" id="f-bg-color" value="#ffffff">
                    <div class="flex justify-between items-center cursor-pointer" onclick="toggleColorGrid('text')"><span>文字色</span><div id="text-select-icon" class="color-select-btn"></div></div>
                    <div id="text-color-grid" class="color-grid"></div><input type="hidden" id="f-text-color" value="#000000">
                    <div class="flex justify-between items-center cursor-pointer" onclick="toggleColorGrid('cal')"><span>カレンダー色</span><div id="cal-select-icon" class="color-select-btn"></div></div>
                    <div id="cal-color-grid" class="color-grid"></div><input type="hidden" id="f-cal-color" value="#E11D48">
                </div>

                <textarea id="f-profile" class="w-full border p-4 rounded-2xl text-sm h-32 outline-none" placeholder="プロフィール"></textarea>
                <button id="doll-save-btn" onclick="saveData()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold">保存する</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="post-modal-title" class="text-xl font-bold mb-4">投稿作成</h3>
            <input type="hidden" id="edit-post-id">
            <input type="text" id="p-title" class="w-full border-b p-3 font-bold mb-4 outline-none" placeholder="タイトル">
            <div id="post-blocks-container" class="space-y-4"></div>
            <button onclick="addPostBlock()" class="w-full py-4 border-2 border-dashed border-stone-200 rounded-2xl text-stone-400 text-sm font-bold mt-4">+ ブロックを追加</button>
            <div class="flex gap-4 p-4 bg-stone-50 rounded-2xl text-xs mt-6 items-center">
                <span class="font-bold">表示場所:</span>
                <label class="flex items-center gap-1"><input type="radio" name="p-pos" value="home" checked> ホーム</label>
                <label class="flex items-center gap-1"><input type="radio" name="p-pos" value="menu"> メニュー</label>
            </div>
            <button id="post-save-btn" onclick="savePost()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold mt-6">投稿を保存</button>
        </div>
    </div>

    <div id="owner-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <div class="preview-sq mb-4" onclick="document.getElementById('owner-file').click()">
                <img id="owner-preview" class="hidden"><span id="owner-hint" class="text-stone-300 text-xs font-bold">画像を選択</span>
            </div>
            <div class="space-y-4">
                <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="loadImg(event, 'owner')">
                <input type="text" id="o-name" class="w-full border-b p-2 font-bold" placeholder="オーナー名">
                <textarea id="o-bio" class="w-full border p-3 rounded-xl text-sm h-24" placeholder="自己紹介"></textarea>
                <div id="sns-inputs-container" class="space-y-3"></div>
                <button onclick="addSnsInput()" class="w-full py-2 bg-stone-100 rounded text-xs font-bold">+ SNSリンクを追加</button>
                <button id="owner-save-btn" onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">保存</button>
            </div>
        </div>
    </div>

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div class="app-outer">
            <div id="profile-bg" class="app-container p-6 pb-32">
                <button onclick="closeProfile()" class="bg-white/80 shadow px-6 py-2 rounded-full text-xs font-bold mb-6">閉じる</button>
                <img id="view-img" class="w-full aspect-square object-cover rounded-3xl shadow-xl mb-8">
                <div class="text-center mb-8"><p id="view-kana" class="text-sm opacity-70 mb-1"></p><h2 id="view-name" class="text-3xl font-bold"></h2></div>
                <div id="detail-box" class="bg-white/20 backdrop-blur-md p-6 rounded-3xl space-y-4 mb-8"></div>
                <p id="view-profile" class="whitespace-pre-wrap leading-relaxed px-2 font-medium"></p>
                <div class="fixed bottom-6 inset-x-0 px-6 flex gap-4 max-w-[600px] mx-auto admin-only-flex hidden">
                    <button id="detail-edit-btn" class="flex-1 bg-stone-800 text-white py-4 rounded-full font-bold">編集</button>
                    <button id="detail-del-btn" class="flex-1 bg-red-50 text-red-400 py-4 rounded-full font-bold border border-red-100">削除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dolls = [], owner = { name: "", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let isLoggedIn = false, currentUID = null, onConfirmAction = null;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const viewID = urlParams.get('id');

            const { data: { session } } = await db.auth.getSession();
            isLoggedIn = !!session;
            const myID = session?.user?.id;
            
            // 閲覧対象の決定：URLにIDがあればそれ、なければ自分のID
            currentUID = viewID || myID;

            if (currentUID) {
                await loadAllData(currentUID);
                document.getElementById('guest-menu').classList.add('hidden');
            } else {
                document.getElementById('guest-menu').classList.remove('hidden');
            }

            if (isLoggedIn && (!viewID || viewID === myID)) {
                document.body.classList.add('is-admin');
            }

            initColorPalettes();
            initDateSelectors();
            renderAll();
        };

        async function loadAllData(uid) {
            try {
                const { data: d } = await db.from('dolls').select('data').eq('id', uid);
                const { data: o } = await db.from('owner').select('data').eq('id', uid).maybeSingle();
                const { data: p } = await db.from('posts').select('data').eq('id', uid);
                if (d) dolls = d.map(x => x.data);
                if (o) owner = o.data;
                if (p) posts = p.map(x => ({...x.data, _rowId: x.id})); // _rowIdは内部用
            } catch (e) {}
        }

        async function saveToSupabase(table, dataArrayOrObject) {
            if (!isLoggedIn) return;
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const { data: { user } } = await db.auth.getUser();
                if (Array.isArray(dataArrayOrObject)) {
                    await db.from(table).delete().eq('id', user.id);
                    const list = dataArrayOrObject.map(d => ({ id: user.id, data: d }));
                    await db.from(table).insert(list);
                } else {
                    await db.from(table).upsert({ id: user.id, data: dataArrayOrObject });
                }
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function renderAll() {
            const track = document.getElementById('top-film-roll'); track.innerHTML = '';
            dolls.forEach((d, i) => {
                if(!d.image) return;
                const img = document.createElement('img'); img.src = d.image; img.className = "film-frame";
                img.onclick = () => showDetail(i); track.appendChild(img);
            });
            document.getElementById('empty-msg').style.display = dolls.length ? 'none' : 'flex';

            const oImg = document.getElementById('display-owner-img');
            if(owner.image) { oImg.src = owner.image; oImg.classList.remove('hidden'); }
            document.getElementById('owner-name').innerText = owner.name || "Owner";
            document.getElementById('owner-bio').innerText = owner.bio || "";
            
            const snsArea = document.getElementById('owner-sns-links'); snsArea.innerHTML = '';
            (owner.sns || []).forEach(s => {
                const a = document.createElement('a');
                let pref = '🔗 ', url = s.val;
                if(s.type==='Twitter') pref='𝕏 '; else if(s.type==='Instagram') pref='📸 '; else if(s.type==='mixi2') { pref='Ⓜ️ mixi2 '; url = 'https://mixi.social/@' + s.val.replace('@',''); }
                a.href = url; a.target = "_blank"; a.className = "block w-full max-w-[240px] text-center bg-white border py-3 rounded-xl text-xs font-bold shadow-sm";
                a.innerText = pref + (s.type==='mixi2' ? '' : s.type); snsArea.appendChild(a);
            });

            const hp = document.getElementById('home-posts'); hp.innerHTML = '';
            const mpl = document.getElementById('menu-post-list'); mpl.innerHTML = '';
            posts.forEach((p, i) => {
                if(p.pos === 'home') {
                    const card = document.createElement('div'); card.className = "bg-white rounded-[32px] p-6 border shadow-sm relative";
                    let html = `<h4 class="font-bold mb-4 text-lg border-b pb-2">${p.title}</h4>`;
                    p.blocks.forEach(b => {
                        if(b.img) html += `<img src="${b.img}" class="w-full rounded-2xl mb-4">`;
                        if(b.text) html += `<p class="text-sm text-stone-600 mb-6 whitespace-pre-wrap">${b.text}</p>`;
                    });
                    if(isLoggedIn && (!new URLSearchParams(window.location.search).get('id'))) {
                        html += `<div class="flex gap-2 mt-4 pt-4 border-t">
                            <button onclick="openPostModal(${i})" class="text-xs font-bold text-stone-400">編集</button>
                            <button onclick="confirmDeletePost(${i})" class="text-xs font-bold text-red-300">削除</button>
                        </div>`;
                    }
                    card.innerHTML = html; hp.appendChild(card);
                } else {
                    const btn = document.createElement('button'); btn.className = "w-full text-left py-4 px-6 bg-white border rounded-2xl font-bold shadow-sm mb-2";
                    btn.innerText = "📝 " + p.title; btn.onclick = () => { showHome(); openPostModal(i); }; mpl.appendChild(btn);
                }
            });
            renderCalendar(); renderAnni();
        }

        // アニバーサリー計算 (正確な年齢と100日キリ番)
        function renderAnni() {
            const happyArea = document.getElementById('happy-anniversary'), happyList = document.getElementById('happy-anniversary-list'), nextArea = document.getElementById('closest-anniversary');
            happyList.innerHTML = ''; nextArea.innerHTML = ''; happyArea.classList.add('hidden');
            let nexts = [], events = [];
            const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            dolls.forEach((d, idx) => {
                const dates = [{t:'birth', n:'誕生日', d:d.birthday}, {t:'welcome', n:'お迎え日', d:d.welcomeDay}, ...(d.anniversaries||[]).map(a=>({t:'custom', n:a.name, d:a.date}))];
                
                dates.forEach(v => {
                    if(!v.d) return;
                    const origin = new Date(v.d), originZero = new Date(origin.getFullYear(), origin.getMonth(), origin.getDate());
                    const diffDays = Math.floor((today - originZero) / (86400000));
                    
                    // 当日判定 (月日が一致)
                    const isToday = (origin.getMonth() === now.getMonth() && origin.getDate() === now.getDate());
                    const years = now.getFullYear() - origin.getFullYear();

                    if(isToday && diffDays >= 0) {
                        let label = "";
                        if(diffDays > 0) { // 登録当日(0日目)以外
                            if(v.t === 'birth') label = `(${years}歳)`;
                            else label = `(${years}周年)`;
                        }
                        events.push({ text: `${d.name} の ${v.n} ${label}`, doll: d });
                    } 
                    // 100日ごとのキリ番
                    else if(diffDays > 0 && diffDays % 100 === 0) {
                        events.push({ text: `${d.name} ${v.n}から ${diffDays}日目！`, doll: d });
                    }

                    // 次回までの日数
                    let nextDate = new Date(now.getFullYear(), origin.getMonth(), origin.getDate());
                    if(nextDate < today) nextDate.setFullYear(now.getFullYear() + 1);
                    const daysTo = Math.ceil((nextDate - today) / 86400000);
                    nexts.push({ doll: d.name, title: v.n, color: d.calColor||'#E11D48', days: daysTo });
                });
            });

            if(events.length) {
                happyArea.classList.remove('hidden');
                events.forEach(ev => {
                    const div = document.createElement('div'); div.className = "bg-white p-4 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-4 cursor-pointer";
                    div.onclick = () => showDetail(dolls.indexOf(ev.doll));
                    div.innerHTML = `<img src="${ev.doll.image}" class="w-12 h-12 rounded-full object-cover border-2 border-pink-200"><p class="font-bold text-stone-800 text-sm flex-1">${ev.text}</p><span class="text-xl">🎉</span>`;
                    happyList.appendChild(div);
                });
            }
            if(nexts.length) {
                nexts.sort((a,b)=>a.days - b.days);
                const closest = nexts.filter(x => x.days === nexts[0].days);
                closest.forEach(b => {
                    nextArea.innerHTML += `<div class="bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center mb-2" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold">${b.doll}</p><p class="font-bold">${b.title}</p></div><b class="text-lg">あと ${b.days} 日</b></div>`;
                });
            }
        }

        // 独自確認ダイアログ
        function customConfirm(msg, callback) {
            document.getElementById('confirm-msg').innerText = msg;
            document.getElementById('confirm-modal').style.display = 'flex';
            onConfirmAction = callback;
        }
        function closeConfirm(res) {
            document.getElementById('confirm-modal').style.display = 'none';
            if(res && onConfirmAction) onConfirmAction();
            onConfirmAction = null;
        }

        async function confirmDeletePost(idx) {
            customConfirm("削除すると元に戻せません\n実行しますか？", async () => {
                posts.splice(idx, 1);
                await saveToSupabase('posts', posts);
                renderAll();
            });
        }

        // ページ遷移時にメニューを閉じる
        function toggleMenu(id) { 
            const el = document.getElementById(id); 
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; 
        }
        function showDollList() { 
            toggleMenu('side-menu');
            document.getElementById('home-content').classList.add('hidden'); 
            document.getElementById('doll-list-page').classList.remove('hidden'); 
            renderDollList(); 
        }
        function showPostListPage() { 
            toggleMenu('side-menu');
            document.getElementById('home-content').classList.add('hidden'); 
            document.getElementById('post-list-page').classList.remove('hidden'); 
        }
        function showHome() { 
            document.getElementById('home-content').classList.remove('hidden'); 
            document.getElementById('doll-list-page').classList.add('hidden'); 
            document.getElementById('post-list-page').classList.add('hidden'); 
            document.getElementById('profile-overlay').classList.add('hidden');
        }

        // 日付セレクトボックス同期
        function syncDate(from, type) {
            const cal = document.getElementById(`f-${type}-cal`), m = document.getElementById(`f-${type}-m`), d = document.getElementById(`f-${type}-d`);
            if(from==='cal') { if(cal.value){ const dt=new Date(cal.value); m.value=dt.getMonth()+1; d.value=dt.getDate(); } }
            else { if(m.value && d.value){ const y=new Date().getFullYear(); cal.value=`${y}-${m.value.padStart(2,'0')}-${d.value.padStart(2,'0')}`; } }
        }

        async function handleGoogleLogin() {
            await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } });
        }
        async function handleLogout() { await db.auth.signOut(); window.location.href = window.location.origin + window.location.pathname; }

        function shareSite() {
            const url = window.location.origin + window.location.pathname + (currentUID ? '?id='+currentUID : '');
            if(navigator.share) navigator.share({ title: document.title, url: url });
            else { navigator.clipboard.writeText(url); alert("リンクをコピーしました"); }
        }

        // --- 以下、以前の基本ロジックを統合 ---

        function initDateSelectors() {
            ['bday','welcome'].forEach(t => {
                const m=document.getElementById(`f-${t}-m`), d=document.getElementById(`f-${t}-d`);
                m.innerHTML='<option value="">月</option>'; d.innerHTML='<option value="">日</option>';
                for(let i=1; i<=12; i++) m.innerHTML+=`<option value="${i}">${i}</option>`;
                for(let i=1; i<=31; i++) d.innerHTML+=`<option value="${i}">${i}</option>`;
            });
        }

        function loadImg(e, type) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader(); rd.onload = (re) => {
                const img = new Image(); img.onload = () => {
                    const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                    cvs.width = cvs.height = (type==='doll'?800:400);
                    const s = Math.max(cvs.width/img.width, cvs.height/img.height);
                    ctx.drawImage(img, 0, 0, img.width*s, img.height*s);
                    const b64 = cvs.toDataURL('image/webp', 0.7);
                    if(type==='doll') { document.getElementById('crop-preview').src = b64; document.getElementById('crop-preview').classList.remove('hidden'); document.getElementById('doll-hint').classList.add('hidden'); }
                    else { document.getElementById('owner-preview').src = b64; document.getElementById('owner-preview').classList.remove('hidden'); document.getElementById('owner-hint').classList.add('hidden'); }
                }; img.src = re.target.result;
            }; rd.readAsDataURL(f);
        }

        async function saveData() {
            const btn = document.getElementById('doll-save-btn'); btn.disabled=true; btn.innerText="保存中...";
            const id = document.getElementById('edit-id').value;
            const getVal = (t) => { const m=document.getElementById(`f-${t}-m`).value, d=document.getElementById(`f-${t}-d`).value; return (m&&d)?`2000-${m.padStart(2,'0')}-${d.padStart(2,'0')}`:null; };
            const data = {
                name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value,
                image: document.getElementById('crop-preview').src,
                birthday: getVal('bday'), welcomeDay: getVal('welcome'),
                bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value,
                profile: document.getElementById('f-profile').value,
                anniversaries: Array.from(document.querySelectorAll('.f-anni-item')).map(el => ({
                    name: el.querySelector('.f-anni-name').value,
                    date: `2000-${el.querySelector('.f-anni-m').value.padStart(2,'0')}-${el.querySelector('.f-anni-d').value.padStart(2,'0')}`
                }))
            };
            if(id==="") dolls.push(data); else dolls[id]=data;
            await saveToSupabase('dolls', dolls); location.reload();
        }

        function openModalWithClear() {
            document.getElementById('edit-id').value=""; 
            document.getElementById('crop-preview').classList.add('hidden'); document.getElementById('doll-hint').classList.remove('hidden');
            document.getElementById('modal').style.display='flex'; toggleMenu('side-menu');
        }

        function addAnniversaryInput(v={name:'', date:''}) {
            const div = document.createElement('div'); div.className="f-anni-item p-4 bg-white border rounded-xl relative space-y-2";
            let mOpt='<option value="">月</option>', dOpt='<option value="">日</option>';
            for(let i=1;i<=12;i++) mOpt+=`<option value="${i}">${i}</option>`;
            for(let i=1;i<=31;i++) dOpt+=`<option value="${i}">${i}</option>`;
            div.innerHTML=`<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button><input type="text" class="f-anni-name w-full border-b font-bold outline-none" placeholder="記念日名" value="${v.name}"><div class="flex gap-2"><select class="f-anni-m border rounded p-2 text-xs flex-1">${mOpt}</select><select class="f-anni-d border rounded p-2 text-xs flex-1">${dOpt}</select></div>`;
            document.getElementById('anniversary-inputs').appendChild(div);
            if(v.date){ const dt=new Date(v.date); div.querySelector('.f-anni-m').value=dt.getMonth()+1; div.querySelector('.f-anni-d').value=dt.getDate(); }
        }

        function renderDollList() {
            const area = document.getElementById('doll-display-area'); area.innerHTML = '';
            area.className = "grid grid-cols-3 gap-2";
            dolls.forEach((d, i) => { area.innerHTML += `<img src="${d.image}" onclick="showDetail(${i})" class="aspect-square object-cover rounded-xl border">`; });
        }

        function showDetail(idx) {
            const d = dolls[idx], ov = document.getElementById('profile-overlay'), bg = document.getElementById('profile-bg');
            bg.style.backgroundColor = d.bgColor || "#fff"; bg.style.color = d.textColor || "#000";
            document.getElementById('view-img').src = d.image; document.getElementById('view-name').innerText = d.name; document.getElementById('view-kana').innerText = d.kana || "";
            document.getElementById('view-profile').innerText = d.profile || "";
            const box = document.getElementById('detail-box'); box.innerHTML = '';
            if(d.birthday) box.innerHTML += `<div><span class="text-[10px] opacity-60 font-bold block">BIRTHDAY</span><b>${d.birthday}</b></div>`;
            if(d.welcomeDay) box.innerHTML += `<div><span class="text-[10px] opacity-60 font-bold block">WELCOME</span><b>${d.welcomeDay}</b></div>`;
            document.getElementById('detail-edit-btn').onclick = () => editDoll(idx);
            document.getElementById('detail-del-btn').onclick = () => { customConfirm("この「うちの子」データを削除しますか？", async ()=>{ dolls.splice(idx,1); await saveToSupabase('dolls', dolls); location.reload(); }); };
            ov.classList.remove('hidden');
        }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }

        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days');
            area.innerHTML = ''; const map = {};
            dolls.forEach(d => {
                const evs = [{n:'誕', d:d.birthday, c:d.calColor}, {n:'迎', d:d.welcomeDay, c:d.calColor}, ...(d.anniversaries||[]).map(a=>({n:a.name, d:a.date, c:d.calColor}))];
                evs.forEach(e => { if(e.d){ const dt=new Date(e.d); if(dt.getMonth()===m){ const day=dt.getDate(); if(!map[day])map[day]=[]; map[day].push(e); }}});
            });
            for(let i=0; i<first; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=last; d++) {
                const div = document.createElement('div'); div.className = "cal-day";
                if(map[d]) {
                    const dots = document.createElement('div'); dots.className = "cal-dots";
                    map[d].forEach(a => { const dot=document.createElement('div'); dot.className="cal-dot"; dot.style.background=a.c; dots.appendChild(dot); });
                    div.appendChild(dots);
                }
                div.innerHTML += `<span>${d}</span>`; area.appendChild(div);
            }
        }
        function changeMonth(n) { calOffset += n; renderCalendar(); }

        function closeModal() { document.querySelectorAll('.modal-base').forEach(m=>m.style.display='none'); }

        function initColorPalettes() {
            const colors = ['#000000','#ffffff','#E11D48','#FB923C','#FACC15','#4ADE80','#2DD4BF','#3B82F6','#818CF8','#C084FC'];
            ['bg','text','cal'].forEach(t => {
                const g = document.getElementById(`${t}-color-grid`);
                colors.forEach(c => {
                    const chip = document.createElement('div'); chip.className="color-chip"; chip.style.background=c;
                    chip.onclick = () => { document.getElementById(`f-${t}-color`).value=c; document.getElementById(`${t}-select-icon`).style.background=c; g.classList.remove('grid-open'); };
                    g.appendChild(chip);
                });
            });
        }
        function toggleColorGrid(t) { document.getElementById(`${t}-color-grid`).classList.toggle('grid-open'); }
        
        // 投稿ブロック追加
        function addPostBlock(v={img:'', text:''}) {
            const div = document.createElement('div'); div.className = "p-4 bg-stone-50 rounded-2xl space-y-3 relative block-item";
            div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button><div class="preview-sq mb-2" onclick="this.nextElementSibling.click()"><img src="${v.img}" class="${v.img?'':'hidden'} w-full h-full object-cover rounded-lg"><span class="${v.img?'hidden':''} text-stone-300 text-xs font-bold">画像を選択</span></div><input type="file" accept="image/*" class="hidden" onchange="loadBlockImg(event)"><textarea class="w-full border p-3 rounded-xl text-sm h-24 outline-none" placeholder="テキストを入力">${v.text}</textarea>`;
            document.getElementById('post-blocks-container').appendChild(div);
        }
        function loadBlockImg(e) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader(); rd.onload=(re)=>{ const img=new Image(); img.onload=()=>{
                const cvs=document.createElement('canvas'), ctx=cvs.getContext('2d'); cvs.width=800; cvs.height=img.height*(800/img.width); ctx.drawImage(img,0,0,cvs.width,cvs.height);
                const p=e.target.previousElementSibling; p.querySelector('img').src=cvs.toDataURL('image/webp',0.7); p.querySelector('img').classList.remove('hidden'); p.querySelector('span').classList.add('hidden');
            }; img.src=re.target.result; }; rd.readAsDataURL(f);
        }
        async function savePost() {
            const id = document.getElementById('edit-post-id').value;
            const data = { title: document.getElementById('p-title').value, pos: document.querySelector('input[name="p-pos"]:checked').value, blocks: Array.from(document.querySelectorAll('.block-item')).map(el=>({ img: el.querySelector('img').src, text: el.querySelector('textarea').value })) };
            if(id==="") posts.push(data); else posts[id]=data;
            await saveToSupabase('posts', posts); location.reload();
        }
        function openPostModal(idx=null) {
            document.getElementById('post-blocks-container').innerHTML='';
            if(idx!==null){ const p=posts[idx]; document.getElementById('edit-post-id').value=idx; document.getElementById('p-title').value=p.title; p.blocks.forEach(b=>addPostBlock(b)); }
            else { document.getElementById('edit-post-id').value=""; addPostBlock(); }
            document.getElementById('post-modal').style.display='flex';
        }
    </script>
