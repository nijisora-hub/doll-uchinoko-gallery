<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        /* 基本設定 */
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fcfaf8; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保護の設定 */
        img { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none !important; 
            user-select: none !important; 
            pointer-events: none; 
            -webkit-user-drag: none; 
        }
        .clickable-img, .film-frame { pointer-events: auto !important; }
        
        /* テキストエリア・入力フォーム */
        textarea, input, select, .user-select-auto { 
            user-select: text !important; 
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            pointer-events: auto !important;
            -webkit-touch-callout: default !important;
        }

        /* フィルムロール：バーチャルスクロール設定 */
        .film-outer { 
            background: #1a1a1a; 
            overflow-x: auto; 
            overflow-y: hidden;
            padding: 20px 0; 
            position: relative; 
            min-height: 120px; 
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
            -webkit-overflow-scrolling: touch;
        }
        .film-outer::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .film-scroll-track { 
            display: flex; 
            gap: 12px; 
            width: max-content; 
            padding: 0 6px;
            /* アニメーションはJSで行うためCSSからは削除 */
        }

        .film-frame { 
            width: 80px; height: 80px; background: #333; 
            border: 2px solid #eee; border-radius: 8px; 
            object-fit: cover; flex-shrink: 0; cursor: pointer; 
            position: relative; z-index: 10; 
        }
        
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; pointer-events: none; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; border: 1px solid transparent; }
        .cal-today { border: 2px solid #888; font-weight: bold; background-color: #f9f9f9; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        .color-grid { grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; box-shadow: 0 0 0 2px #fff; }
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        .viewer-only { display: block !important; }
        body.is-admin .viewer-only { display: none !important; }
    </style>
</head>

    <script>
        const SB_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"", custom_id: "" }, posts = [], calOffset = 0;
        let dollViewMode = 'grid', currentRawImg = { doll: null, owner: null };
        let currentUser = null, galleryId = new URLSearchParams(window.location.search).get('id');

        window.onload = async () => {
            initDateSelectors();
            initColorPalettes();
            setupAutoExpand();
            setupUnifiedProtection();
            
            const { data: { session } } = await sbClient.auth.getSession();

        let filmScrollId;
        let isFilmTouching = false;
        function initFilmScroll() {
            const container = document.getElementById('film-container');
            const track = document.getElementById('top-film-roll');
            if (!container || !track || track.children.length === 0) return;

            if (filmScrollId) cancelAnimationFrame(filmScrollId);

            // リスナーの重複登録を防ぐ
            container.onpointerdown = () => { isFilmTouching = true; };
            window.onpointerup = () => { isFilmTouching = false; };

            // スクロール時のループ処理
            const handleLoop = () => {
                const half = track.scrollWidth / 2;
                if (container.scrollLeft >= half) {
                    container.scrollLeft -= half;
                } else if (container.scrollLeft <= 0) {
                    container.scrollLeft += half;
                }
            };
            container.onscroll = handleLoop;

            function scrollStep() {
                if (!isFilmTouching) {
                    container.scrollLeft += 0.5; // 自動スクロールの速さ
                }
                filmScrollId = requestAnimationFrame(scrollStep);
            }
            filmScrollId = requestAnimationFrame(scrollStep);
        }

        function renderAnniversaries() {
            const anniList = [], today = new Date();
            const todayStr = `${today.getMonth()+1}/${today.getDate()}`;
            dolls.forEach(d => {
                if (d.birthday) {
                    const m = new Date(d.birthday).getMonth()+1, dd = new Date(d.birthday).getDate();
                    if (`${m}/${dd}` === todayStr) anniList.push({ name: d.name, type: "Happy Birthday! 🎂" });
                }
                if (d.welcome_day) {
                    const m = new Date(d.welcome_day).getMonth()+1, dd = new Date(d.welcome_day).getDate();
                    if (`${m}/${dd}` === todayStr) anniList.push({ name: d.name, type: "Happy Welcome Day! ✨" });
                }
                (d.anniversaries || []).forEach(a => {
                    if (a.date) {
                        const m = new Date(a.date).getMonth()+1, dd = new Date(a.date).getDate();
                        if (`${m}/${dd}` === todayStr) anniList.push({ name: d.name, type: a.name });
                    }
                });
            });
            const hAnni = document.getElementById('happy-anniversary'), hList = document.getElementById('happy-anniversary-list');
            hList.innerHTML = '';
            if (anniList.length > 0) {
                hAnni.classList.remove('hidden');
                anniList.forEach(a => {
                    const d = document.createElement('div');
                    d.className = "p-4 bg-white rounded-2xl mb-2 border-2 border-pink-100 shadow-sm animate-anni";
                    d.innerHTML = `<p class="text-[10px] font-bold text-pink-400 mb-1 uppercase">${a.type}</p><p class="font-bold text-lg text-pink-600">${a.name}</p>`;
                    hList.appendChild(d);
                });
            } else hAnni.classList.add('hidden');

            const allEvents = [];
            dolls.forEach(d => {
                if (d.birthday) allEvents.push({ n: d.name, t: "誕生日", d: new Date(d.birthday) });
                if (d.welcome_day) allEvents.push({ n: d.name, t: "お迎え記念日", d: new Date(d.welcome_day) });
                (d.anniversaries || []).forEach(a => { if(a.date) allEvents.push({ n: d.name, t: a.name, d: new Date(a.date) }); });
            });
            const closestDiv = document.getElementById('closest-anniversary');
            closestDiv.innerHTML = '';
            if (allEvents.length > 0) {
                const sorted = allEvents.map(e => {
                    let next = new Date(today.getFullYear(), e.d.getMonth(), e.d.getDate());
                    if (next < new Date(today.getFullYear(), today.getMonth(), today.getDate())) next.setFullYear(today.getFullYear() + 1);
                    return { ...e, next, diff: Math.ceil((next - today)/(1000*60*60*24)) };
                }).sort((a,b) => a.diff - b.diff);
                const top = sorted[0];
                closestDiv.innerHTML = `<div class="p-6 bg-white rounded-3xl shadow-sm border border-stone-100 text-center"><p class="text-[10px] font-bold text-stone-400 mb-2 uppercase tracking-widest">${top.t}</p><p class="text-2xl font-bold mb-1">${top.n}</p><p class="text-sm font-bold text-stone-400">あと ${top.diff} 日</p></div>`;
            }
        }

        function renderCalendar() {
            const now = new Date();
            const viewDate = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
            document.getElementById('cal-month').innerText = `${viewDate.getFullYear()}年 ${viewDate.getMonth()+1}月`;
            const daysDiv = document.getElementById('cal-days'); daysDiv.innerHTML = '';
            const lastDay = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
            const startDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            for(let i=0; i<startDay; i++) daysDiv.appendChild(document.createElement('div'));
            for(let d=1; d<=lastDay; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = "cal-day";
                dayEl.innerText = d;
                const isToday = calOffset === 0 && d === now.getDate();
                if(isToday) dayEl.classList.add('cal-today');
                const evs = getEventsForDay(viewDate.getFullYear(), viewDate.getMonth()+1, d);
                if(evs.length > 0) {
                    const dots = document.createElement('div'); dots.className = "cal-dots";
                    evs.forEach(e => {
                        const dot = document.createElement('div'); dot.className = "cal-dot";
                        dot.style.backgroundColor = e.doll.cal_color || "#E11D48";
                        dots.appendChild(dot);
                    });
                    dayEl.appendChild(dots);
                    dayEl.onclick = () => showDayEvents(evs, viewDate.getMonth()+1, d);
                }
                daysDiv.appendChild(dayEl);
            }
            document.getElementById('day-events').innerHTML = '';
        }

        function getEventsForDay(y, m, d) {
            const evs = [];
            dolls.forEach(doll => {
                if (doll.birthday) {
                    const dt = new Date(doll.birthday);
                    if(dt.getMonth()+1 === m && dt.getDate() === d) evs.push({ doll, type: "誕生日" });
                }
                if (doll.welcome_day) {
                    const dt = new Date(doll.welcome_day);
                    if(dt.getMonth()+1 === m && dt.getDate() === d) evs.push({ doll, type: "お迎え記念日" });
                }
                (doll.anniversaries || []).forEach(a => {
                    if (a.date) {
                        const dt = new Date(a.date);
                        if(dt.getMonth()+1 === m && dt.getDate() === d) evs.push({ doll, type: a.name });
                    }
                });
            });
            return evs;
        }

        function showDayEvents(evs, m, d) {
            const div = document.getElementById('day-events');
            div.innerHTML = `<p class="text-[10px] font-bold text-stone-400 mb-2 uppercase tracking-widest">${m}月${d}日の記念日</p>`;

                div.appendChild(item);
            });
        }

            document.getElementById('o-bio').value = owner.bio;
            document.getElementById('sns-inputs-container').innerHTML = '';
            (owner.sns || []).forEach(s => addSnsInput(s));
            if(owner.image) {
                const op = document.getElementById('owner-preview'); op.src = owner.image; op.classList.remove('hidden');
                document.getElementById('owner-hint').classList.add('hidden');
            }
            document.getElementById('owner-modal').style.display = 'flex';
        }

        function closeModal() {
            document.querySelectorAll('.modal-base').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.color-grid').forEach(g => g.classList.remove('grid-open'));
        }

        function toggleMenu(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'none' ? 'flex' : 'none');
        }

        function toggleColorGrid(type) {
            const grids = ['bg', 'text', 'cal'];
            grids.forEach(g => {
                const el = document.getElementById(`${g}-color-grid`);
                if(g === type) el.classList.toggle('grid-open'); else el.classList.remove('grid-open');
            });
        }

        function initColorPalettes() {
            const palette = [
                '#ffffff','#f3f4f6','#e5e7eb','#d1d5db','#9ca3af','#6b7280','#4b5563','#374151','#1f2937','#111827','#000000',
                '#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e',
                '#fecaca','#fed7aa','#fef3c7','#fef08a','#d9f99d','#bbf7d0','#a7f3d0','#a5f3fc','#bfdbfe','#c7d2fe','#ddd6fe','#f5d0fe','#fbcfe8','#fecdd3',
                '#7f1d1d','#7c2d12','#78350f','#713f12','#365314','#14532d','#064e3b','#164e63','#1e3a8a','#312e81','#4c1d95','#581c87','#701a75','#831843','#881337'
            ];
            ['bg', 'text', 'cal'].forEach(type => {
                const grid = document.getElementById(`${type}-color-grid`);
                palette.forEach(c => {
                    const chip = document.createElement('div');
                    chip.className = "color-chip";
                    chip.style.backgroundColor = c;
                    chip.onclick = () => {
                        document.getElementById(`f-${type}-color`).value = c;
                        updateColorIcons();
                        toggleColorGrid(type);
                    };
                    grid.appendChild(chip);
                });
            });
            updateColorIcons();
        }

        function updateColorIcons() {
            ['bg', 'text', 'cal'].forEach(type => {
                document.getElementById(`${type}-select-icon`).style.backgroundColor = document.getElementById(`f-${type}-color`).value;
            });
        }

        function showAlert(msg) {
            const d = document.getElementById('custom-dialog'), m = document.getElementById('dialog-message'), b = document.getElementById('dialog-buttons');
            m.innerText = msg; b.innerHTML = '';
            const btn = document.createElement('button');
            btn.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold";
            btn.innerText = "OK";
            btn.onclick = closeModal;
            b.appendChild(btn);
            document.getElementById('dialog-input-container').classList.add('hidden');
            d.style.display = 'flex';
        }

        function showInputDialog(msg, onOk) {
            const d = document.getElementById('custom-dialog'), m = document.getElementById('dialog-message'), bA = document.getElementById('dialog-buttons');
            m.innerText = msg;
            const inputCont = document.getElementById('dialog-input-container');
            const input = document.getElementById('dialog-text-input');
            inputCont.classList.remove('hidden'); input.value = "";
            bA.innerHTML = '';
            const b1 = document.createElement('button');
            b1.className = "w-full bg-blue-500 text-white py-4 rounded-full font-bold shadow-lg";
            b1.innerText = "決定してログイン";
            b1.onclick = () => { if(input.value) { onOk(input.value); closeDialog(); } };
            const b2 = document.createElement('button');
            b2.className = "w-full bg-stone-100 py-4 rounded-full font-bold";
            b2.innerText = "キャンセル";
            b2.onclick = closeDialog;
            bA.append(b1, b2);
            d.style.display = 'flex';
            input.focus();
        }

        function closeDialog() { document.getElementById('custom-dialog').style.display = 'none'; }

        async function requestClearAll() {
            showInputDialog("「DELETE」と入力して全データを削除します", async (val) => {
                if(val === 'DELETE') {
                    await Promise.all([
                        sbClient.from('dolls').delete().eq('owner_id', currentUser.id),
                        sbClient.from('posts').delete().eq('owner_id', currentUser.id)
                    ]);
                    location.reload();
                }
            });
        }

        async function deleteDoll(id) {
            if(confirm("このデータを削除しますか？")) {
                await sbClient.from('dolls').delete().eq('id', id);
                location.reload();
            }
        }

        async function deletePost(id) {
            if(confirm("この投稿を削除しますか？")) {
                await sbClient.from('posts').delete().eq('id', id);
                location.reload();
            }
        }

        function loadImg(e, type) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                currentRawImg[type] = re.target.result;
                const prevId = (type === 'doll' ? 'crop-preview' : 'owner-preview');
                const hintId = (type === 'doll' ? 'doll-hint' : 'owner-hint');
                const p = document.getElementById(prevId);
                p.src = re.target.result; p.classList.remove('hidden');
                document.getElementById(hintId).classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function processImageToWebP(dataUrl, size, cropH, cropV) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = size; canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    const side = Math.min(img.width, img.height);
                    const sx = (img.width - side) * (cropH / 100);
                    const sy = (img.height - side) * (cropV / 100);
                    ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
                    resolve(canvas.toDataURL('image/webp', 0.8));
                };
                img.src = dataUrl;
            });
        }

        function updateCrop(id, hId, vId) {
            const img = document.getElementById(id); if(!img || img.classList.contains('hidden')) return;
            const h = document.getElementById(hId).value, v = document.getElementById(vId).value;
            img.style.objectPosition = `${h}% ${v}%`;
        }

        function initDateSelectors() {
            const ms = document.querySelectorAll('select[id$="-m"]'), ds = document.querySelectorAll('select[id$="-d"]');
            ms.forEach(s => { for(let i=1; i<=12; i++) s.innerHTML += `<option value="${i}">${i}月</option>`; });
            ds.forEach(s => { for(let i=1; i<=31; i++) s.innerHTML += `<option value="${i}">${i}日</option>`; });
            ms.forEach(s => s.onchange = (e) => syncDateInput(e.target.id));
            ds.forEach(s => s.onchange = (e) => syncDateInput(e.target.id));
        }

        function syncDateInput(sid) {
            const base = sid.substring(0, sid.lastIndexOf('-'));
            const m = document.getElementById(`${base}-m`).value, d = document.getElementById(`${base}-d`).value;
            if(m && d) {
                const year = new Date().getFullYear();
                document.getElementById(base).value = `${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            }
        }

        function setDateSelectors(baseId, val) {
            if(!val) return; const d = new Date(val);
            document.getElementById(`${baseId}-m`).value = d.getMonth() + 1;
            document.getElementById(`${baseId}-d`).value = d.getDate();
        }

        function getDateValue(mainId, mId, dId) {
            const m = document.getElementById(mId).value, d = document.getElementById(dId).value;
            if(m && d) { return `${new Date().getFullYear()}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
            return document.getElementById(mainId).value;
        }

        function addAnniversaryInput(val = null) {
            const cont = document.getElementById('anniversary-inputs'), id = Date.now();
            const div = document.createElement('div');
            div.className = "p-4 bg-stone-50 rounded-2xl space-y-3 relative";
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300 text-xs">✕</button>
                <input type="text" class="f-anni-name w-full border-b bg-transparent py-1 text-xs font-bold outline-none" placeholder="記念日名 (例: 1周年)" value="${val?.name || ''}">
                <div class="flex gap-2 items-center">
                    <select id="anni-m-${id}" class="f-anni-m border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select>
                    <select id="anni-d-${id}" class="f-anni-d border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select>
                </div>
                <input type="date" id="anni-dt-${id}" class="f-anni-date date-input" value="${val?.date || ''}">
            `;
            cont.appendChild(div);
            const mS = div.querySelector('.f-anni-m'), dS = div.querySelector('.f-anni-d');
            for(let i=1; i<=12; i++) mS.innerHTML += `<option value="${i}">${i}月</option>`;
            for(let i=1; i<=31; i++) dS.innerHTML += `<option value="${i}">${i}日</option>`;
            mS.onchange = dS.onchange = () => {
                if(mS.value && dS.value) div.querySelector('.f-anni-date').value = `${new Date().getFullYear()}-${String(mS.value).padStart(2,'0')}-${String(dS.value).padStart(2,'0')}`;
            };
            if(val?.date) { const dt = new Date(val.date); mS.value = dt.getMonth()+1; dS.value = dt.getDate(); }
        }

        function addSnsInput(val = null) {
            const cont = document.getElementById('sns-inputs-container');
            const div = document.createElement('div');
            div.className = "sns-input-row flex gap-2";
            div.innerHTML = `
                <select class="sns-type border rounded p-2 text-xs w-24"><option>X</option><option>Instagram</option><option>YouTube</option><option>Other</option></select>
                <input type="text" class="sns-val border rounded p-2 text-xs flex-1" placeholder="URL" value="${val?.val || ''}">
                <button onclick="this.parentElement.remove()" class="text-red-400 text-xs px-2">✕</button>
            `;
            if(val) div.querySelector('.sns-type').value = val.type;
            cont.appendChild(div);
        }

        function addPostBlock(val = null) {
            const cont = document.getElementById('post-blocks-container'), id = Date.now();
            const div = document.createElement('div');
            div.className = "post-block p-4 bg-stone-50 rounded-2xl space-y-4";
            div.innerHTML = `
                <div class="flex justify-between"><p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Block</p><button onclick="this.parentElement.parentElement.remove()" class="text-stone-300">✕</button></div>
                <div class="preview-sq bg-white" onclick="document.getElementById('post-file-${id}').click()">
                    <img id="post-prev-${id}" class="${val?.img ? '' : 'hidden'}" src="${val?.img || ''}">
                    <span class="text-stone-300 text-xs font-bold ${val?.img ? 'hidden' : ''}">画像を追加</span>
                </div>
                <input type="file" id="post-file-${id}" accept="image/*" class="hidden" onchange="loadPostImg(event, '${id}')">
                <textarea class="w-full border p-3 rounded-xl h-32 text-sm outline-none auto-expand" placeholder="本文を入力">${val?.text || ''}</textarea>
            `;
            cont.appendChild(div);
        }

        function loadPostImg(e, id) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (re) => {
                const webp = await processImageToWebP(re.target.result, 1200, 50, 50);
                const prev = document.getElementById(`post-prev-${id}`);
                prev.src = webp; prev.classList.remove('hidden');
                prev.nextElementSibling.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function shareSNS(type) {
            const url = window.location.href, text = `${owner.name}さんのうちの子ギャラリー 📸`;
            if(type === 'x') window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`);
            else window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text + " " + url)}`);
        }

        function copyURL() {
            navigator.clipboard.writeText(window.location.href).then(() => showAlert("URLをコピーしました"));
        }

        function setupAutoExpand() {
            document.addEventListener('input', (e) => {
                if (e.target.classList.contains('auto-expand')) {
                    const scrollPos = window.pageYOffset;
                    e.target.style.height = 'auto';
                    e.target.style.height = e.target.scrollHeight + 'px';
                    window.scrollTo(0, scrollPos);
                }
            });
        }

        function setupUnifiedProtection() {
            document.addEventListener('contextmenu', (e) => {
                if (['TEXTAREA', 'INPUT'].includes(e.target.tagName) || e.target.closest('.user-select-auto')) return;
                e.preventDefault();
            }, false);
            document.addEventListener('touchstart', (e) => {
                if (e.target.tagName === 'IMG' && !e.target.classList.contains('clickable-img') && !e.target.classList.contains('film-frame')) {
                    e.preventDefault();
                }
            }, { passive: false });
        }
    </script>
</body>
