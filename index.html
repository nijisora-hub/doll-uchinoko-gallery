<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        :root { --max-width: 600px; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像長押し・右クリック禁止 */
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; pointer-events: none; }
        .can-click { pointer-events: auto; }

        /* PC/iPad表示調整 */
        .app-container { max-width: var(--max-width); margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; pointer-events: auto; }

        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; pointer-events: auto; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; pointer-events: auto; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        .today-mark { border: 2px solid #000 !important; font-weight: bold; }
        
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip:active { transform: scale(0.9); }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }

        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }

        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        .share-btn { transition: all 0.2s ease; pointer-events: auto; }
        .share-btn:active { transform: scale(0.96); opacity: 0.85; }

        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }

        /* テキストエリアの自動伸縮用 */
        textarea { resize: none; overflow: hidden; }
    </style>
</head>

        function renderAnni() { 
            const area = document.getElementById('closest-anniversary'), happyArea = document.getElementById('happy-anniversary'), happyListArea = document.getElementById('happy-anniversary-list');
            if(!area || !happyArea) return; 
            area.innerHTML = ''; happyListArea.innerHTML = ''; happyArea.classList.add('hidden');
            let list = [], happyEvents = []; const now = new Date(), todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            dolls.forEach((d, idx) => { 
                const ds = [{ type: 'birth', n: "誕生日", d: d.birthday }, { type: 'welcome', n: "お迎え日", d: d.welcomeDay }, ...(d.anniversaries || []).map(a => ({ type: 'custom', n: a.name, d: a.date }))]; 
                ds.forEach(v => { 
                    if(v.d) { 
                        const originDate = new Date(v.d), originZero = new Date(originDate.getFullYear(), originDate.getMonth(), originDate.getDate());
                        const diffDaysTotal = Math.floor((todayZero - originZero) / (1000 * 60 * 60 * 24));
                        const isToday = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate());
                        const diffYears = now.getFullYear() - originDate.getFullYear();
                        
                        let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate()); 
                        if(next < todayZero) next.setFullYear(now.getFullYear() + 1); 
                        const daysToNext = Math.ceil((next - todayZero) / (1000 * 60 * 60 * 24));

                        if (isToday && diffYears >= 0) {
                            let text = "";
                            if (v.type === 'birth') text = `${d.name} の誕生日 ${diffYears}歳`;
                            else if (v.type === 'welcome') text = diffYears === 0 ? `${d.name} と出会った日！` : `${d.name} と出会って ${diffYears}年`;
                            else text = diffYears === 0 ? `${d.name} の ${v.n}` : `${d.name} の ${v.n} ${diffYears}年`;
                            happyEvents.push({ text, img: d.image, dollIdx: idx });
                        } else if (diffDaysTotal > 0 && diffDaysTotal % 100 === 0) {
                            let text = "";
                            if (v.type === 'welcome') text = `${d.name} と出会って ${diffDaysTotal}日`;
                            else if (v.type === 'custom') text = `${d.name} の ${v.n} ${diffDaysTotal}日`;
                            if(text) happyEvents.push({ text, img: d.image, dollIdx: idx });
                        }
                        list.push({ doll: d.name, title: v.n, color: d.calColor || '#E11D48', diff: daysToNext, isToday: isToday, order: idx }); 
                    } 
                }); 
            }); 
            
            if (happyEvents.length > 0) {
                happyArea.classList.remove('hidden');
                happyEvents.forEach(ev => {
                    const div = document.createElement('div'); div.className = "bg-white p-4 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-3 pointer-events-auto cursor-pointer";
                    div.onclick = () => showDetail(ev.dollIdx);
                    div.innerHTML = `<img src="${ev.img}" class="w-10 h-10 rounded-full object-cover border-2 border-pink-200"><p class="font-bold text-stone-800 text-sm">${ev.text}</p>`;
                    happyListArea.appendChild(div);
                });
            }
            if(list.length > 0) { 
                list.sort((a,b) => a.diff - b.diff || a.order - b.order); const closestDiff = list[0].diff; const closestEvents = list.filter(item => item.diff === closestDiff);
                let html = `<div class="space-y-3">`;
                closestEvents.forEach(b => {
                    const displayDay = b.isToday ? "Today" : `あと ${b.diff} 日`;
                    html += `<div class="bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold">${b.doll}</p><p class="font-bold">${b.title}</p></div><b class="text-lg">${displayDay}</b></div>`;
                });
                html += `</div>`; area.innerHTML = html;
            } 
        }

        function renderCalendar() {
            const area = document.getElementById('cal-days');
            if(!area) return; 

            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            const label = document.getElementById('cal-month'); 
            if(label) label.innerText = `${y} / ${m+1}`;
            
            const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m+1, 0).getDate();
            const map = {};
            area.innerHTML = '';

            dolls.forEach((d, idx) => {
                const evs = [{n: "誕生日", d: d.birthday}, {n: "お迎え日", d: d.welcomeDay}, ...(d.anniversaries || []).map(a => ({n: a.name, d: a.date}))];
                evs.forEach(ev => { 
                    if(ev.d) { 
                        const dt = new Date(ev.d); 
                        if(dt.getMonth() === m) { 
                            const day = dt.getDate(); 
                            if(!map[day]) map[day] = []; 
                            map[day].push({ dollName: d.name, eventName: ev.n, calColor: d.calColor || '#E11D48', uBg: d.bgColor || '#ffffff', uTxt: d.textColor || '#000000', mm: m + 1, dd: day, order: idx }); 
                        } 
                    } 
                });
            });

            const realToday = new Date();
            for(let i=0; i<firstDay; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const isToday = (y === realToday.getFullYear() && m === realToday.getMonth() && d === realToday.getDate());
                const annis = map[d], div = document.createElement('div'); 
                div.className = `cal-day ${isToday ? 'today-mark' : ''}`;
                if(annis) {
                    const dotsDiv = document.createElement('div'); dotsDiv.className = "cal-dots";
                    annis.sort((a,b) => a.order - b.order).forEach(a => {
                        const dot = document.createElement('div'); dot.className = "cal-dot"; dot.style.backgroundColor = a.calColor; dotsDiv.appendChild(dot);
                    });
                    div.appendChild(dotsDiv);
                    div.onclick = () => {
                        const eventContainer = document.getElementById('day-events'); eventContainer.innerHTML = '';
                        annis.sort((a,b) => a.order - b.order).forEach(a => {
                            const row = document.createElement('div'); row.className = "p-5 rounded-2xl shadow-sm border border-stone-100 text-lg leading-relaxed space-y-1"; row.style.backgroundColor = a.uBg; row.style.color = a.uTxt;
                            row.innerHTML = `<div class="font-bold">${a.dollName}：${a.mm}月${a.dd}日</div><div class="font-bold opacity-80">${a.eventName}</div>`; eventContainer.appendChild(row);
                        });
                    };
                }
                div.innerHTML += `<span>${d}</span>`; area.appendChild(div);
            }
        }

        // 画像処理：WebP変換
        async function loadImg(e, type) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader();
            rd.onload = (re) => {
                const img = new Image();
                img.onload = () => {
                    currentRawImg[type] = img;
                    const el = document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview');
                    if(el) {
                        el.src = img.src;
                        el.classList.remove('hidden');
                    }
                    const hint = document.getElementById(type === 'doll' ? 'doll-hint' : 'owner-hint');
                    if(hint) hint.classList.add('hidden');
                };
                img.src = re.target.result;
            };
            rd.readAsDataURL(f);
        }

        async function processToWebP(img, size, h, v) {
            const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
            cvs.width = cvs.height = size;
            const s = Math.max(size / img.width, size / img.height);
            ctx.drawImage(img, (size - img.width * s) * (h / 100), (size - img.height * s) * (v / 100), img.width * s, img.height * s);
            return cvs.toDataURL('image/webp', 0.8);
        }

            colorList.forEach(c => { const chip = document.createElement('div'); chip.className = `color-chip ${type}-chip`; chip.style.backgroundColor = c; if(c.toLowerCase() === defaultColor.toLowerCase()) chip.classList.add('selected'); chip.onclick = e => { e.stopPropagation(); selectPaletteColor(type, c, chip); }; grid.appendChild(chip); });

        }
        function toggleColorGrid(type) { const grid = document.getElementById(`${type}-color-grid`), isOpen = grid.classList.contains('grid-open'); document.querySelectorAll('.color-grid').forEach(g => g.classList.remove('grid-open')); if(!isOpen) grid.classList.add('grid-open'); }
        function selectPaletteColor(type, color, el) { document.querySelectorAll(`.${type}-chip`).forEach(c => c.classList.remove('selected')); el.classList.add('selected'); document.getElementById(`f-${type}-color`).value = color; document.getElementById(`${type}-select-icon`).style.backgroundColor = color; document.getElementById(`${type}-color-grid`).classList.remove('grid-open'); }
        function updatePaletteSelection(type, color) { document.querySelectorAll(`.${type}-chip`).forEach(chip => { const tempDiv = document.createElement('div'); tempDiv.style.color = color; const targetColor = tempDiv.style.color; chip.classList.toggle('selected', chip.style.backgroundColor === targetColor); }); document.getElementById(`${type}-select-icon`).style.backgroundColor = color; }
        function updateCrop(imgId, hId, vId) { document.getElementById(imgId).style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`; }
        function changeMonth(d) { calOffset += d; const ev = document.getElementById('day-events'); if(ev) ev.innerHTML = ''; renderCalendar(); }
        function getDateValue(mainId, mId, dId) { const main = document.getElementById(mainId).value, m = document.getElementById(mId).value, d = document.getElementById(dId).value; if(!main && m && d) return `2000-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; return main; }
        function setDateValue(val, mainId, mId, dId) { if(!val) return; const dt = new Date(val); if(dt.getFullYear() === 2000) { document.getElementById(mId).value = dt.getMonth() + 1; document.getElementById(dId).value = dt.getDate(); document.getElementById(mainId).value = ""; } else { document.getElementById(mainId).value = val; document.getElementById(mId).value = ""; document.getElementById(dId).value = ""; } }
        
        function clearDollForm() { 
            document.getElementById('edit-id').value = ""; document.getElementById('f-name').value = ""; document.getElementById('f-kana').value = ""; document.getElementById('f-size-label').value = ""; document.getElementById('f-body-make').value = ""; document.getElementById('f-head').value = ""; document.getElementById('f-bday').value = ""; document.getElementById('f-bday-m').value = ""; document.getElementById('f-bday-d').value = ""; document.getElementById('f-welcome').value = ""; document.getElementById('f-welcome-m').value = ""; document.getElementById('f-welcome-d').value = ""; document.getElementById('anniversary-inputs').innerHTML = ''; document.getElementById('f-profile').value = ""; document.getElementById('f-bg-color').value = "#ffffff"; document.getElementById('f-text-color').value = "#000000"; document.getElementById('f-cal-color').value = "#E11D48"; updatePaletteSelection('bg', "#ffffff"); updatePaletteSelection('text', "#000000"); updatePaletteSelection('cal', "#E11D48"); document.getElementById('crop-preview').classList.add('hidden'); document.getElementById('doll-hint').classList.remove('hidden'); currentRawImg.doll = null; 
            const profileArea = document.getElementById('f-profile'); profileArea.style.height = 'auto';
        }

        function openModalWithClear() { clearDollForm(); document.getElementById('modal-title').innerText = "うちの子登録"; document.getElementById('modal').style.display='flex'; toggleMenu('side-menu'); }
        function editDoll(idx) {
            closeProfile(); const d = dolls[idx]; document.getElementById('edit-id').value = idx; document.getElementById('modal-title').innerText = "うちの子編集";
            document.getElementById('f-name').value = d.name; document.getElementById('f-kana').value = d.kana || ""; document.getElementById('f-size-label').value = d.bodySize || ""; document.getElementById('f-body-make').value = d.bodyMake || ""; document.getElementById('f-head').value = d.head || "";
            setDateValue(d.birthday, 'f-bday', 'f-bday-m', 'f-bday-d'); setDateValue(d.welcomeDay, 'f-welcome', 'f-welcome-m', 'f-welcome-d');
            const anniArea = document.getElementById('anniversary-inputs'); anniArea.innerHTML = ''; (d.anniversaries || []).forEach(a => addAnniversaryInput(a));
            document.getElementById('f-profile').value = d.profile || ""; const bg = d.bgColor || "#ffffff", txt = d.textColor || "#000000", cal = d.calColor || "#E11D48";
            document.getElementById('f-bg-color').value = bg; document.getElementById('f-text-color').value = txt; document.getElementById('f-cal-color').value = cal;
            updatePaletteSelection('bg', bg); updatePaletteSelection('text', txt); updatePaletteSelection('cal', cal);
            if(d.image) { const pre = document.getElementById('crop-preview'); pre.src = d.image; pre.classList.remove('hidden'); document.getElementById('doll-hint').classList.add('hidden'); }
            autoResize(document.getElementById('f-profile'));
            document.getElementById('modal').style.display = 'flex';
        }

        function openOwnerModal() { 
            document.getElementById('o-name').value = owner.name; document.getElementById('o-bio').value = owner.bio; document.getElementById('sns-inputs-container').innerHTML = ''; (owner.sns || []).forEach(s => addSnsInput(s)); 
            if(owner.image) { const p = document.getElementById('owner-preview'); p.src = owner.image; p.classList.remove('hidden'); document.getElementById('owner-hint').classList.add('hidden'); } 
            autoResize(document.getElementById('o-bio'));
            document.getElementById('owner-modal').style.display='flex'; toggleMenu('side-menu'); 
        }

        function addPostBlock(data = {img: '', text: ''}) { 
            const id = Date.now() + Math.random(), div = document.createElement('div'); 
            div.className = "post-block p-4 border rounded-xl mb-4 bg-stone-50"; 
            div.innerHTML = `<div class="preview-sq mb-2 pointer-events-auto" onclick="document.getElementById('p-file-${id}').click()"><img id="p-img-${id}" src="${data.img}" class="${data.img?'':'hidden'}"><span id="p-hint-${id}" class="text-xs text-stone-300 ${data.img?'hidden':''}">画像選択</span></div><input type="file" id="p-file-${id}" accept="image/*" class="hidden" onchange="loadBlockImg(event, '${id}')"><textarea class="w-full text-sm p-3 border rounded-xl min-h-[6rem] mt-2 outline-none pointer-events-auto" placeholder="文章を入力..." oninput="autoResize(this)">${data.text || ''}</textarea><button onclick="this.parentElement.remove()" class="text-xs text-red-400 mt-2 pointer-events-auto">削除</button>`; 
            document.getElementById('post-blocks-container').appendChild(div); 
            autoResize(div.querySelector('textarea'));
        }

        async function loadBlockImg(e, id) { 
            const f = e.target.files[0]; if(!f) return; 
            const rd = new FileReader(); 
            rd.onload = (re) => { 
                const img = new Image(); 
                img.onload = async () => { 
                    const dataUrl = await processToWebP(img, 1200, 50, 50);
                    const t = document.getElementById('p-img-'+id); t.src = dataUrl; t.classList.remove('hidden'); document.getElementById('p-hint-'+id).classList.add('hidden'); 
                }; 
                img.src = re.target.result; 
            }; rd.readAsDataURL(f); 
        }

        function renderDollList() { const area = document.getElementById('doll-display-area'); if(!area) return; area.innerHTML = ''; if (dollViewMode === 'grid') { area.className = "grid grid-cols-3 gap-2"; dolls.forEach((d, i) => { area.innerHTML += `<div onclick="showDetail(${i})" class="aspect-square bg-white border rounded-xl overflow-hidden pointer-events-auto"><img src="${d.image}" class="w-full h-full object-cover"></div>`; }); } else { area.className = "space-y-2"; dolls.forEach((d, i) => { area.innerHTML += `<div onclick="showDetail(${i})" class="flex items-center gap-4 bg-white p-3 border rounded-xl pointer-events-auto"><img src="${d.image}" class="w-16 h-16 rounded-lg object-cover flex-shrink-0"><div><p class="text-xs text-stone-400 font-bold">${d.kana || ''}</p><p class="font-bold text-stone-800">${d.name}</p></div></div>`; }); } }
        function toggleDollViewMode() { dollViewMode = (dollViewMode === 'grid') ? 'list' : 'grid'; document.getElementById('toggle-list-view').innerText = (dollViewMode === 'grid') ? '名前を表示' : 'サムネのみ'; renderDollList(); }
        function shareSNS(type) { const url = window.location.origin + window.location.pathname + '?uid=' + (currentUser?.id || ""); if(type === 'line') window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}`, '_blank'); else if(type === 'x') window.open(`https://twitter.com/intent/tweet?text=Doll Uchinoko Gallery&url=${encodeURIComponent(url)}`, '_blank'); }
        function copyURL() { const url = window.location.origin + window.location.pathname + '?uid=' + (currentUser?.id || ""); navigator.clipboard.writeText(url).then(() => { showAlert("共有URLをコピーしました"); }); }
        function addSnsInput(v = {type:'X(旧Twitter)', val:''}) { const div = document.createElement('div'); div.className = "sns-input-row flex gap-2 items-center"; div.innerHTML = `<select class="sns-type text-sm border p-2 rounded-lg bg-white h-10 outline-none pointer-events-auto">${['X(旧Twitter)','Instagram','mixi2','Bluesky','Misskey','その他URL'].map(t => `<option ${v.type===t?'selected':''}>${t}</option>`).join('')}</select><input type="text" class="sns-val flex-1 text-sm border p-2 rounded-lg h-10 outline-none pointer-events-auto" placeholder="ID or URL" value="${v.val}"><button onclick="this.parentElement.remove()" class="p-2 text-stone-400 pointer-events-auto">✕</button>`; document.getElementById('sns-inputs-container').appendChild(div); }
        function addAnniversaryInput(v = {name:'', date:''}) { const id = Date.now() + Math.random(), div = document.createElement('div'); div.className = "p-4 bg-stone-100/50 rounded-2xl space-y-2 border border-stone-100"; div.innerHTML = `<div class="flex justify-between items-center"><span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">記念日</span><button onclick="this.parentElement.parentElement.remove()" class="text-stone-400 text-xs pointer-events-auto">✕ 削除</button></div><input type="text" class="f-anni-name w-full border-b bg-transparent py-1 text-sm font-bold outline-none" placeholder="記念日名" value="${v.name}"><div class="flex gap-2 items-center"><select id="m-${id}" class="f-anni-m border rounded p-2 text-xs flex-1 outline-none pointer-events-auto"><option value="">月</option>${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select><select id="d-${id}" class="f-anni-d border rounded p-2 text-xs flex-1 outline-none pointer-events-auto"><option value="">日</option>${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select></div><input type="date" id="date-${id}" class="date-input f-anni-date pointer-events-auto">`; document.getElementById('anniversary-inputs').appendChild(div); if(v.date) setDateValue(v.date, `date-${id}`, `m-${id}`, `d-${id}`); }
        function setupInfiniteScroll() { const container = document.getElementById('film-container'); if(!container) return; container.addEventListener('scroll', () => { const items = dolls.filter(d => d.image); if (items.length < 5) return; const w = items.length * (80 + 12); if (container.scrollLeft < w * 0.5) container.scrollLeft += w; if (container.scrollLeft > w * 1.5) container.scrollLeft -= w; }); }
        function openPostModal() { document.getElementById('edit-post-id').value = ""; document.getElementById('post-modal-title').innerText = "投稿作成"; document.getElementById('p-title').value = ""; document.getElementById('post-blocks-container').innerHTML = ''; addPostBlock(); document.querySelector(`input[name="p-pos"][value="home"]`).checked = true; document.getElementById('post-modal').style.display='flex'; toggleMenu('side-menu'); }
        function viewPost(idx) { const p = posts[idx]; document.getElementById('art-title').innerText = p.title; const container = document.getElementById('art-content'); container.innerHTML = ''; p.blocks.forEach(b => { if(b.img) { const img = document.createElement('img'); img.src = b.img; img.className = "w-full rounded-2xl mb-4 can-click"; container.appendChild(img); } if(b.text) { const txt = document.createElement('p'); txt.className = "text-stone-700 whitespace-pre-wrap leading-relaxed mb-6"; txt.innerText = b.text; container.appendChild(txt); } }); document.getElementById('art-edit-btn').onclick = () => { closeArticle(); editPost(idx); }; document.getElementById('art-del-btn').onclick = () => showConfirm("この投稿を削除しますか？", async () => { posts.splice(idx, 1); await syncToSupabase(); location.reload(); }); document.getElementById('article-page').style.display = 'block'; }
        function editPost(idx) { const p = posts[idx]; document.getElementById('edit-post-id').value = idx; document.getElementById('post-modal-title').innerText = "投稿編集"; document.getElementById('p-title').value = p.title; document.getElementById('post-blocks-container').innerHTML = ''; p.blocks.forEach(b => addPostBlock(b)); document.querySelector(`input[name="p-pos"][value="${p.pos}"]`).checked = true; document.getElementById('post-modal').style.display = 'flex'; }
        function deletePostDirectly(idx) { showConfirm("この投稿を削除しますか？", async () => { posts.splice(idx, 1); await syncToSupabase(); renderAll(); }); }
    </script>
</body>
</html>
