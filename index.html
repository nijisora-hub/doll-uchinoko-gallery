<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doll Uchinoko Gallery</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#fcfaf8;
  margin:0;
}

.wrapper{
  max-width:520px;
  margin:auto;
}

@media(min-width:1024px){
  .wrapper{max-width:520px;}
}

.film-outer{
  background:#111;
  overflow:hidden;
  position:relative;
}

.film-track{
  display:flex;
  gap:12px;
  padding:16px;
  transition:transform .1s linear;
}

.film-frame{
  width:80px;
  height:80px;
  border-radius:8px;
  object-fit:cover;
  border:2px solid #eee;
  flex-shrink:0;
  cursor:pointer;
}

@media(min-width:1024px){
  .film-frame{
    width:90px;
    height:90px;
  }
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.cal-day{
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
  position:relative;
}

.cal-dot{
  width:4px;
  height:4px;
  border-radius:50%;
  position:absolute;
  bottom:4px;
}

.color-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  margin-top:16px;
}

.color-chip{
  aspect-ratio:1;
  border-radius:2px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 上部フィルム -->
<div class="film-outer">
  <div id="film-track" class="film-track"></div>
</div>

<!-- カレンダー -->
<div class="wrapper p-6">

  <h2 class="text-lg font-bold mb-4">カレンダー</h2>

  <div class="flex justify-between mb-4">
    <button onclick="changeMonth(-1)">◀</button>
    <div id="cal-month"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div id="cal-days" class="cal-grid mb-4"></div>
  <div id="day-events"></div>

  <!-- カラーパレット -->
  <div id="palette" class="color-grid"></div>

</div>

<script>
/* ===============================
   データ管理
=============================== */

let dolls = JSON.parse(localStorage.getItem('dolls') || '[]')
let calOffset = 0

function saveDolls() {
  localStorage.setItem('dolls', JSON.stringify(dolls))
}

/* ===============================
   カレンダー
=============================== */

function renderCalendar() {
  const now = new Date()
  const view = new Date(now.getFullYear(), now.getMonth() + calOffset, 1)
  
  document.getElementById('cal-month').innerText =
    `${view.getFullYear()}年 ${view.getMonth()+1}月`
  
  const grid = document.getElementById('cal-days')
  grid.innerHTML = ''
  
  /* 月移動時イベント非表示 */
  const dayEventsEl = document.getElementById('day-events')
  if (dayEventsEl) {
    dayEventsEl.innerHTML = ''
    dayEventsEl.style.display = 'none'
  }
  
  const first = view.getDay()
  const last = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate()
  
  for (let i = 0; i < first; i++) {
    grid.appendChild(document.createElement('div'))
  }
  
  for (let d = 1; d <= last; d++) {
    const cell = document.createElement('div')
    cell.className = 'p-2 text-center cursor-pointer hover:bg-gray-100 rounded'
    cell.innerText = d
    
    const events = getEventsForDay(view.getMonth() + 1, d)
    
    if (events.length) {
      cell.classList.add('bg-pink-100')
    }
    
    cell.addEventListener('click', () => {
      showDayEvents(events, view.getMonth() + 1, d)
    })
    
    grid.appendChild(cell)
  }
}

function getEventsForDay(month, day) {
  const list = []
  dolls.forEach((doll, idx) => {
    if (doll.birthdayMonth == month && doll.birthdayDay == day) {
      list.push({ type: '誕生日', idx })
    }
    if (doll.welcomeMonth == month && doll.welcomeDay == day) {
      list.push({ type: 'お迎え日', idx })
    }
    if (doll.annivMonth == month && doll.annivDay == day) {
      list.push({ type: '記念日', idx })
    }
  })
  return list
}

function showDayEvents(evs, month, day) {
 const area = document.getElementById('film-track')
  area.innerHTML = ''
  if (!evs.length) return
  
  area.style.display = 'block'
  
  evs.forEach(e => {
    const doll = dolls[e.idx]
    const card = document.createElement('div')
    card.className = 'p-4 border rounded-xl mb-2 cursor-pointer'
    card.innerHTML =
      `<div class="text-xs text-gray-400">
        ${e.type}（${month}月${day}日）
      </div>
      <div class="font-bold">${doll.name}</div>`
    area.appendChild(card)
  })
}

function prevMonth() {
  calOffset--
  renderCalendar()
}

function nextMonth() {
  calOffset++
  renderCalendar()
}

function changeMonth(step) {
  calOffset += step
  renderCalendar()
}
/* ===============================
   ギャラリー表示
=============================== */

function renderGallery() {
  const area = document.getElementById('film-track')
  area.innerHTML = ''
  
  dolls.forEach((doll, index) => {
    const card = document.createElement('div')
    card.className = 'min-w-[120px] mr-4 text-center'
    
    card.innerHTML = `
      <img src="${doll.image || ''}" 
           class="w-28 h-28 object-cover rounded-xl mx-auto mb-2">
      <div class="text-sm">${doll.name}</div>
    `
    
    area.appendChild(card)
  })
  
  applyAutoScroll()
}

/* ===============================
   無限オートスクロール
=============================== */

function applyAutoScroll() {
  const area = document.getElementById('film-track')
  
  if (dolls.length < 5) {
    area.style.animation = 'none'
    return
  }
  
  area.innerHTML += area.innerHTML
  
  area.style.display = 'flex'
  area.style.overflow = 'hidden'
  area.style.whiteSpace = 'nowrap'
  
  let scrollAmount = 0
  
  setInterval(() => {
    scrollAmount += 1
    area.scrollLeft = scrollAmount
    
    if (scrollAmount >= area.scrollWidth / 2) {
      scrollAmount = 0
    }
  }, 30)
}
/* ===============================
   ドール追加
=============================== */

function addDoll(data) {
  dolls.push(data)
  saveDolls()
  renderGallery()
  renderCalendar()
}

/* ===============================
   設定保存後はホームへ戻る
=============================== */

function goHome() {
  document.getElementById('home').classList.remove('hidden')
  document.getElementById('settings').classList.add('hidden')
}

function saveOwnerInfo() {
  goHome()
}

function saveLoginInfo() {
  goHome()
}

function saveRecovery() {
  goHome()
}

/* ===============================
   初期化
=============================== */

document.addEventListener('DOMContentLoaded', () => {
  renderCalendar()
  renderGallery()
})
</script>
</body>
</html>
