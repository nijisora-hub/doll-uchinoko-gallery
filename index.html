<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像の長押し保存やドラッグを制限 */
        img { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-user-drag: none;
            pointer-events: auto;
        }

        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        textarea { overflow: hidden; resize: none; }
        
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        
        /* 管理者表示制御 */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <div id="custom-dialog">
        <div class="bg-white w-full max-w-xs p-8 rounded-3xl shadow-2xl text-center">
            <p id="dialog-message" class="text-[16px] mb-8 leading-relaxed font-bold whitespace-pre-wrap text-stone-700"></p>
            <div id="dialog-inputs" class="mb-6 space-y-4 hidden">
                <input type="text" id="auth-gallery-id" class="w-full border p-3 rounded-xl text-sm outline-none focus:border-stone-400" placeholder="公開用ID(半角英数)">
            </div>
            <div id="dialog-buttons" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div class="film-outer" id="film-container">
        <div id="top-film-roll" class="film-scroll-track"></div>
        <div id="empty-msg" class="absolute inset-0 flex items-center justify-center text-stone-500 text-xs font-bold">画像が登録されるとここに並びます</div>
    </div>

    <header class="p-4 bg-white border-b sticky top-0 z-[100] flex justify-between items-center">
        <h1 onclick="showHome()" class="logo-font text-3xl cursor-pointer">Doll Uchinoko Gallery</h1>
        <div onclick="toggleMenu('side-menu')" class="p-2 cursor-pointer">
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800"></div>
        </div>
    </header>

    <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">
        <div class="bg-white w-72 h-full ml-auto p-6 flex flex-col overflow-y-auto" onclick="event.stopPropagation()">
            <div class="space-y-1">
                <button onclick="showHome(); toggleMenu('side-menu');" class="text-left py-4 font-bold border-b w-full text-stone-800">🏠 ホーム</button>
                <button onclick="openModalWithClear()" class="text-left py-4 font-bold border-b text-blue-600 w-full admin-only">✨ うちの子を登録する</button>
                <button onclick="showDollList()" class="text-left py-4 font-bold border-b w-full text-stone-800">📸 うちの子一覧</button>
                <button onclick="openPostModal()" class="text-left py-4 font-bold border-b text-green-600 w-full admin-only">📝 新規投稿(タイムライン)</button>
            </div>
            <div class="py-6 space-y-2 border-b">
                <button id="login-btn" onclick="handleGoogleLogin()" class="w-full py-3 bg-stone-800 rounded-xl text-xs font-bold text-white">Googleでログイン</button>
                <button id="logout-btn" onclick="handleLogout()" class="w-full py-3 bg-red-50 rounded-xl text-xs font-bold text-red-400 hidden">ログアウト</button>
            </div>
            <div class="py-8 space-y-4 admin-only">
                <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Admin Settings</p>
                <button onclick="openOwnerModal()" class="w-full py-4 bg-stone-100 rounded-2xl text-sm font-bold">👤 オーナープロフ編集</button>
                <button onclick="requestClearAll()" class="w-full py-4 bg-red-50 text-red-400 rounded-2xl text-sm font-bold border border-red-100">⚠️ 全データ削除</button>
            </div>
            <div class="mt-auto pt-10">
                <button onclick="requestNewGallery()" class="w-full py-3 bg-stone-100 rounded-xl text-xs font-bold">🆕 新規ギャラリー作成</button>
            </div>
        </div>
    </div>

    <main id="home-content" class="max-w-md mx-auto">
        <section id="owner-section" class="p-8 bg-white text-center">
            <img id="display-owner-img" class="w-24 h-24 rounded-full object-cover mx-auto mb-4 border-4 border-stone-5 hidden">
            <h2 id="owner-name" class="text-2xl font-bold mb-2"></h2>
            <p id="owner-bio" class="text-sm text-stone-500 px-4 mb-6 whitespace-pre-wrap"></p>
            <div id="owner-sns-links" class="flex flex-wrap justify-center gap-2"></div>
        </section>

        <section class="p-6 bg-stone-50">
            <div id="happy-anniversary" class="mb-8 hidden">
                <h3 class="text-[10px] font-bold text-pink-500 uppercase mb-4 tracking-widest border-b border-pink-100 pb-2">Happy Anniversary!</h3>
                <div id="happy-anniversary-list"></div>
            </div>
            <h3 class="text-[10px] font-bold text-stone-400 uppercase mb-4 tracking-widest border-b pb-2">Next Anniversary</h3>
            <div id="closest-anniversary"></div>
        </section>

        <section class="p-8 bg-white mt-4 border-t">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="p-2">◀</button>
                <h3 id="cal-month" class="font-bold text-lg"></h3>
                <button onclick="changeMonth(1)" class="p-2">▶</button>
            </div>
            <div id="cal-days" class="cal-grid mb-6"></div>
            <div id="day-events" class="space-y-3"></div>
        </section>

        <section class="p-6 bg-stone-50 border-t">
            <h3 class="text-[10px] font-bold text-stone-400 uppercase mb-6 tracking-widest">Timeline</h3>
            <div id="post-list" class="space-y-6"></div>
        </section>
    </main>

    <div id="doll-list-page" class="max-w-md mx-auto hidden p-6">
        <div class="mb-6"><button onclick="showHome()" class="text-sm font-bold bg-stone-100 px-4 py-2 rounded-full">← 戻る</button></div>
        <div id="doll-display-area" class="grid grid-cols-3 gap-2"></div>
    </div>

    <div id="modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 id="modal-title" class="text-xl font-bold mb-6">うちの子登録</h3>
            
            <div class="crop-area">
                <div class="preview-sq" onclick="document.getElementById('doll-file').click()"><img id="crop-preview" class="hidden"><span id="doll-hint" class="text-stone-300 text-xs font-bold">画像を選択</span></div>
                <div class="v-bar-box"><input type="range" id="crop-v" min="0" max="100" class="vertical-range" oninput="updateCrop('crop-preview', 'crop-h', 'crop-v')"></div>
            </div>
            <input type="range" id="crop-h" min="0" max="100" class="w-full mb-6" oninput="updateCrop('crop-preview', 'crop-h', 'crop-v')">

            <div class="space-y-6">
                <input type="file" id="doll-file" accept="image/*" class="hidden" onchange="loadImg(event, 'doll')">
                <input type="hidden" id="edit-id">
                <input type="text" id="f-name" class="w-full border-b p-2 font-bold text-lg outline-none" placeholder="お名前">
                <input type="text" id="f-kana" class="w-full border-b p-2 text-sm outline-none" placeholder="ふりがな">
                
                <div class="p-4 bg-stone-50 rounded-2xl space-y-4">
                    <input type="text" id="f-size-label" class="w-full border-b bg-transparent py-2 text-sm font-bold outline-none" placeholder="SIZE (例: 1/6, 20cm)">
                    <input type="text" id="f-body-make" class="w-full border-b bg-transparent py-2 text-sm outline-none" placeholder="BODY">
                    <input type="text" id="f-head" class="w-full border-b bg-transparent py-2 text-sm outline-none" placeholder="HEAD">
                </div>

                <div class="p-4 bg-stone-50 rounded-2xl space-y-4 text-sm px-2">
                    <p class="text-[10px] font-bold text-stone-400 uppercase">日付設定</p>
                    <div class="border-b pb-4">
                        <span class="block text-stone-400 text-[10px] mb-1">誕生日 (年なしは月日を選択)</span>
                        <div class="flex gap-2 mb-2">
                            <select id="f-b-m" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select>
                            <select id="f-b-d" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select>
                        </div>
                        <input type="date" id="f-bday" class="date-input">
                    </div>
                    <div class="border-b pb-4">
                        <span class="block text-stone-400 text-[10px] mb-1">お迎え日</span>
                        <div class="flex gap-2 mb-2">
                            <select id="f-w-m" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select>
                            <select id="f-w-d" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select>
                        </div>
                        <input type="date" id="f-welcome" class="date-input">
                    </div>
                </div>

                <div class="p-4 bg-stone-50 rounded-2xl space-y-4">
                    <p class="text-[10px] font-bold text-stone-400 uppercase">カラー設定</p>
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('bg')"><span class="text-xs font-bold text-stone-500">詳細背景色</span><div id="bg-select-icon" class="color-select-btn"></div></div>
                    <div id="bg-color-grid" class="color-grid"></div><input type="hidden" id="f-bg-color" value="#ffffff">
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('text')"><span class="text-xs font-bold text-stone-500">詳細文字色</span><div id="text-select-icon" class="color-select-btn"></div></div>
                    <div id="text-color-grid" class="color-grid"></div><input type="hidden" id="f-text-color" value="#000000">
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('cal')"><span class="text-xs font-bold text-stone-500">カレンダー色</span><div id="cal-select-icon" class="color-select-btn"></div></div>
                    <div id="cal-color-grid" class="color-grid"></div><input type="hidden" id="f-cal-color" value="#E11D48">
                </div>

                <div id="anniversary-inputs" class="space-y-3"></div>
                <button onclick="addAnniInput()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-xl text-xs text-stone-400 font-bold">+ 記念日を追加</button>

                <textarea id="f-profile" class="w-full border p-4 rounded-2xl min-h-[120px] text-sm outline-none" placeholder="プロフィール" oninput="autoResize(this)"></textarea>
                <button onclick="saveData()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold text-lg shadow-xl">保存する</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6">タイムライン投稿</h3>
            <textarea id="post-text" class="w-full border p-4 rounded-2xl min-h-[150px] mb-6 text-sm outline-none" placeholder="なにがあった？"></textarea>
            <button onclick="savePost()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">投稿する</button>
        </div>
    </div>

    <div id="owner-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <div class="preview-sq mb-6" onclick="document.getElementById('owner-file').click()">
                <img id="owner-preview" class="hidden">
                <span id="owner-hint" class="text-stone-300 text-xs font-bold">プロフィール画像を選択</span>
            </div>
            <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="loadImg(event, 'owner')">
            <input type="text" id="owner-f-name" class="w-full border-b p-2 mb-4 font-bold outline-none" placeholder="オーナー名">
            <textarea id="owner-f-bio" class="w-full border-b p-2 mb-6 text-sm outline-none" placeholder="自己紹介"></textarea>
            
            <div id="sns-inputs" class="space-y-3 mb-6"></div>
            <button onclick="addSNSInput()" class="w-full py-2 border border-dashed text-xs text-stone-400 mb-6">+ SNSリンク追加</button>
            
            <button onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">保存</button>
        </div>
    </div>

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div id="profile-bg" class="min-h-full p-6 pb-32">
            <button onclick="closeProfile()" class="bg-white shadow px-6 py-2 rounded-full text-xs font-bold mb-6">閉じる</button>
            <img id="view-img" class="w-full aspect-square object-cover rounded-3xl shadow-xl mb-8">
            <div class="text-center mb-8"><p id="view-kana" class="text-sm opacity-70 mb-1"></p><h2 id="view-name" class="text-3xl font-bold"></h2></div>
            <div id="view-details" class="bg-white/20 backdrop-blur-md p-6 rounded-3xl mb-8 text-sm space-y-1 hidden"></div>
            <p id="view-profile" class="whitespace-pre-wrap leading-relaxed px-2 text-[18px] font-medium"></p>
            <div class="fixed bottom-6 inset-x-0 px-6 flex gap-4 max-w-md mx-auto admin-only-flex hidden">
                <button id="detail-edit-btn" class="flex-1 bg-stone-800 text-white py-4 rounded-full font-bold">編集</button>
                <button id="detail-del-btn" class="flex-1 bg-red-50 text-red-400 py-4 rounded-full font-bold border border-red-100">削除</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCWzLwhTnOg58o4rdf-T8e0E57_dLGm2gk",
          authDomain: "doll-uchinoko-gallery.firebaseapp.com",
          projectId: "doll-uchinoko-gallery",
          storageBucket: "doll-uchinoko-gallery.firebasestorage.app",
          messagingSenderId: "78946857999",
          appId: "1:78946857999:web:d0ffcac3527334f66c5f7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        window.fb = { db, doc, setDoc, getDoc, updateDoc, auth, provider, signInWithPopup, signOut, onAuthStateChanged };
    </script>

    <script>
        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [];
        let calOffset = 0, currentRawImg = { doll: null, owner: null }, isLoggedIn = false, adminEmail = "";
        const urlParams = new URLSearchParams(window.location.search);
        let galleryId = urlParams.get('id');

        window.onload = () => {
            document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG' || !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) e.preventDefault(); }, false);
            initDateSelects();
            initColorPalettes();
            const check = setInterval(async () => {
                if (window.fb) {
                    clearInterval(check);
                    if (urlParams.get('mode') === 'new') { openCreationModal(); } 
                    else { await loadGalleryData(); }
                    window.fb.onAuthStateChanged(window.fb.auth, (u) => {
                        isLoggedIn = u && adminEmail && u.email === adminEmail;
                        renderAll();
                    });
                }
            }, 100);
        };

        async function loadGalleryData() {
            try {
                const snap = await window.fb.getDoc(window.fb.doc(window.fb.db, "galleries", galleryId));
                if (snap.exists()) {
                    const d = snap.data();
                    dolls = d.dolls || []; owner = d.owner || owner; posts = d.posts || []; adminEmail = d.adminEmail || "";
                    renderAll();
                }
            } catch (e) { console.error(e); }
        }

        async function syncFirebase() {
            if (!window.fb || !galleryId) return;
            await window.fb.updateDoc(window.fb.doc(window.fb.db, "galleries", galleryId), { dolls, owner, posts });
        }

        function renderAll() {
            document.body.classList.toggle('is-admin', isLoggedIn);
            const track = document.getElementById('top-film-roll');
            track.innerHTML = '';
            const items = dolls.filter(d => d.image);
            if (items.length > 0) {
                document.getElementById('empty-msg').style.display = 'none';
                items.forEach((d, i) => {
                    const img = document.createElement('img');
                    img.src = d.image; img.className = "film-frame"; img.onclick = () => showDetail(i);
                    track.appendChild(img);
                });
            } else { document.getElementById('empty-msg').style.display = 'flex'; }
            
            // オーナー表示
            document.getElementById('owner-name').innerText = owner.name;
            document.getElementById('owner-bio').innerText = owner.bio;
            if(owner.image) { 
                const oImg = document.getElementById('display-owner-img');
                oImg.src = owner.image; oImg.classList.remove('hidden'); 
            }
            const snsArea = document.getElementById('owner-sns-links');
            snsArea.innerHTML = '';
            (owner.sns || []).forEach(s => {
                snsArea.innerHTML += `<a href="${s.url}" target="_blank" class="bg-stone-100 px-3 py-1 rounded-full text-[10px] font-bold text-stone-500"># ${s.name}</a>`;
            });

            renderCalendar();
            renderAnni();
            renderPosts();
        }

        function renderCalendar() {
            const area = document.getElementById('cal-days'), label = document.getElementById('cal-month');
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
            label.innerText = `${v.getFullYear()} / ${v.getMonth() + 1}`;
            area.innerHTML = '';
            const last = new Date(v.getFullYear(), v.getMonth()+1, 0).getDate();
            for(let d=1; d<=last; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = "cal-day";
                dayDiv.innerHTML = `<span>${d}</span>`;
                const dots = document.createElement('div');
                dots.className = "cal-dots";
                const dateStr = `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const mStr = `${v.getMonth()+1}-${d}`;
                dolls.forEach(doll => {
                    const isBirth = doll.birthday === dateStr || (doll.b_m_d === mStr);
                    const isWelcome = doll.welcomeDay === dateStr || (doll.w_m_d === mStr);
                    const isAnni = (doll.anniversaries || []).some(a => a.date === dateStr || a.m_d === mStr);
                    if(isBirth || isWelcome || isAnni) {
                        const dot = document.createElement('div');
                        dot.className = "cal-dot"; dot.style.backgroundColor = doll.calColor || "#E11D48";
                        dots.appendChild(dot);
                    }
                });
                dayDiv.appendChild(dots); area.appendChild(dayDiv);
            }
        }

        function renderAnni() {
            const area = document.getElementById('closest-anniversary'), happyArea = document.getElementById('happy-anniversary'), happyListArea = document.getElementById('happy-anniversary-list');
            area.innerHTML = ''; happyListArea.innerHTML = ''; happyArea.classList.add('hidden');
            let list = [], happyEvents = []; const now = new Date(), todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            dolls.forEach((d, idx) => {
                const ds = [
                    { type: 'birth', n: "誕生日", d: d.birthday, md: d.b_m_d },
                    { type: 'welcome', n: "お迎え日", d: d.welcomeDay, md: d.w_m_d }
                ];
                (d.anniversaries || []).forEach(a => ds.push({ type: 'custom', n: a.name, d: a.date, md: a.m_d }));

                ds.forEach(v => {
                    let originDate;
                    if(v.d) originDate = new Date(v.d);
                    else if(v.md) { const [m, day] = v.md.split('-'); originDate = new Date(now.getFullYear(), m-1, day); }
                    else return;

                    const isMatch = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate());
                    const totalDays = v.d ? Math.floor((todayZero - new Date(v.d)) / 86400000) : -1;
                    const diffYears = v.d ? now.getFullYear() - new Date(v.d).getFullYear() : -1;

                    let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate());
                    if(next < todayZero) next.setFullYear(now.getFullYear() + 1);
                    const daysToNext = Math.ceil((next - todayZero) / 86400000);

                    if (isMatch || (totalDays > 0 && totalDays % 100 === 0)) {
                        let msg = isMatch ? (diffYears > 0 ? `${d.name} の ${v.n} (${diffYears}周年)` : `${d.name} の ${v.n}`) : `${d.name} の ${v.n} ${totalDays}日記念`;
                        happyEvents.push({ text: msg, color: d.calColor || '#f472b6' });
                    }
                    list.push({ doll: d.name, title: v.n, color: d.calColor || '#E11D48', diff: daysToNext, isToday: isMatch });
                });
            });

            if (happyEvents.length > 0) {
                happyArea.classList.remove('hidden');
                happyEvents.forEach(ev => {
                    happyListArea.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm mb-2 animate-anni flex items-center gap-3" style="border-color:${ev.color}"><span class="text-xl">🎉</span><p class="font-bold text-sm">${ev.text}</p></div>`;
                });
            }
            if(list.length > 0) {
                list.sort((a,b) => a.diff - b.diff).slice(0,3).forEach(b => {
                    area.innerHTML += `<div class="bg-white p-4 border-l-4 rounded shadow-sm flex justify-between items-center mb-2" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold">${b.doll}</p><p class="font-bold text-sm">${b.title}</p></div><b class="text-xs ${b.isToday ? 'text-pink-500' : ''}">${b.isToday ? "Today!" : "あと "+b.diff+" 日"}</b></div>`;
                });
            }
        }

        function renderPosts() {
            const area = document.getElementById('post-list'); area.innerHTML = '';
            [...posts].reverse().forEach((p, idx) => {
                const realIdx = posts.length - 1 - idx;
                area.innerHTML += `
                <div class="bg-white p-6 rounded-3xl shadow-sm relative">
                    <p class="text-[10px] text-stone-300 mb-2 font-bold uppercase tracking-wider">${p.date || ""}</p>
                    <p class="text-sm leading-relaxed whitespace-pre-wrap">${p.text}</p>
                    <button onclick="deletePost(${realIdx})" class="admin-only absolute top-4 right-4 text-[10px] text-red-300 font-bold uppercase">Delete</button>
                </div>`;
            });
        }

        // --- ダイアログ/メニュー ---
        function showConfirm(msg, onOk, okLabel="OK") {
            const d = document.getElementById('custom-dialog');
            document.getElementById('dialog-message').innerText = msg;
            const btnArea = document.getElementById('dialog-buttons');
            btnArea.innerHTML = '';
            const okBtn = document.createElement('button');
            okBtn.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold";
            okBtn.innerText = okLabel;
            okBtn.onclick = () => { d.style.display='none'; onOk(); };
            const cancelBtn = document.createElement('button');
            cancelBtn.className = "w-full bg-stone-50 text-stone-400 py-3 rounded-full text-xs font-bold";
            cancelBtn.innerText = "キャンセル";
            cancelBtn.onclick = () => { d.style.display='none'; };
            btnArea.appendChild(okBtn); btnArea.appendChild(cancelBtn);
            d.style.display = 'flex';
        }

        function requestClearAll() { 
            showConfirm("全てのデータを完全に削除しますか？\nこの操作は取り消せません。", async () => {
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "galleries", galleryId), { dolls: [], owner: { name: "Owner Name", bio: "", sns: [], image:"" }, posts: [] });
                location.reload();
            }, "削除する");
        }

        function requestNewGallery() {
             showConfirm("新しいギャラリーを作成しますか？", () => window.open(window.location.origin + window.location.pathname + '?mode=new', '_blank'), "作成する");
        }

        // --- うちの子管理 ---
        function editDoll(idx) {
            closeProfile();
            const d = dolls[idx];
            document.getElementById('edit-id').value = idx;
            document.getElementById('modal-title').innerText = "うちの子編集";
            document.getElementById('f-name').value = d.name || "";
            document.getElementById('f-kana').value = d.kana || "";
            document.getElementById('f-size-label').value = d.bodySize || "";
            document.getElementById('f-body-make').value = d.bodyMake || "";
            document.getElementById('f-head').value = d.head || "";
            document.getElementById('f-profile').value = d.profile || "";
            document.getElementById('f-bday').value = d.birthday || "";
            if(d.b_m_d) { const [m,day] = d.b_m_d.split('-'); document.getElementById('f-b-m').value = m; document.getElementById('f-b-d').value = day; }
            document.getElementById('f-welcome').value = d.welcomeDay || "";
            if(d.w_m_d) { const [m,day] = d.w_m_d.split('-'); document.getElementById('f-w-m').value = m; document.getElementById('f-w-d').value = day; }
            document.getElementById('f-bg-color').value = d.bgColor || "#ffffff";
            document.getElementById('bg-select-icon').style.backgroundColor = d.bgColor || "#ffffff";
            document.getElementById('f-text-color').value = d.textColor || "#000000";
            document.getElementById('text-select-icon').style.backgroundColor = d.textColor || "#000000";
            document.getElementById('f-cal-color').value = d.calColor || "#E11D48";
            document.getElementById('cal-select-icon').style.backgroundColor = d.calColor || "#E11D48";
            document.getElementById('anniversary-inputs').innerHTML = '';
            (d.anniversaries || []).forEach(a => addAnniInput(a));
            if (d.image) {
                document.getElementById('crop-preview').src = d.image;
                document.getElementById('crop-preview').classList.remove('hidden');
                document.getElementById('doll-hint').classList.add('hidden');
            }
            document.getElementById('modal').style.display = 'flex';
        }

        async function saveData() {
            const id = document.getElementById('edit-id').value;
            const h = document.getElementById('crop-h').value, v = document.getElementById('crop-v').value;
            let imgData = (id !== "" && dolls[id]) ? dolls[id].image : "";
            if (currentRawImg.doll) {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                cvs.width = cvs.height = 1000;
                const s = Math.max(1000/currentRawImg.doll.width, 1000/currentRawImg.doll.height);
                ctx.fillStyle = "#fff"; ctx.fillRect(0,0,1000,1000);
                ctx.drawImage(currentRawImg.doll, (1000-currentRawImg.doll.width*s)*(h/100), (1000-currentRawImg.doll.height*s)*(v/100), currentRawImg.doll.width*s, currentRawImg.doll.height*s);
                imgData = cvs.toDataURL('image/webp', 0.8);
            }
            const annis = [];
            document.querySelectorAll('.anni-block').forEach(b => {
                const name = b.querySelector('.f-anni-n').value;
                const date = b.querySelector('.f-anni-date').value;
                const m = b.querySelector('.f-anni-m').value, d = b.querySelector('.f-anni-d').value;
                if(name && (date || (m && d))) annis.push({ name, date, m_d: m && d ? `${m}-${d}` : "" });
            });
            const b_m = document.getElementById('f-b-m').value, b_d = document.getElementById('f-b-d').value;
            const w_m = document.getElementById('f-w-m').value, w_d = document.getElementById('f-w-d').value;
            const data = {
                name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value,
                image: imgData, profile: document.getElementById('f-profile').value,
                bodySize: document.getElementById('f-size-label').value, bodyMake: document.getElementById('f-body-make').value, head: document.getElementById('f-head').value,
                birthday: document.getElementById('f-bday').value, b_m_d: b_m && b_d ? `${b_m}-${b_d}` : "",
                welcomeDay: document.getElementById('f-welcome').value, w_m_d: w_m && w_d ? `${w_m}-${w_d}` : "",
                bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value,
                anniversaries: annis
            };
            if(id === "") dolls.push(data); else dolls[id] = data;
            await syncFirebase(); location.reload();
        }

        // --- オーナー管理 ---
        function openOwnerModal() {
            document.getElementById('owner-f-name').value = owner.name;
            document.getElementById('owner-f-bio').value = owner.bio;
            if(owner.image) { document.getElementById('owner-preview').src = owner.image; document.getElementById('owner-preview').classList.remove('hidden'); document.getElementById('owner-hint').classList.add('hidden'); }
            document.getElementById('sns-inputs').innerHTML = '';
            (owner.sns || []).forEach(s => addSNSInput(s));
            document.getElementById('owner-modal').style.display = 'flex';
            toggleMenu('side-menu');
        }

        function addSNSInput(v = {name:'', url:''}) {
            const div = document.createElement('div');
            div.className = "flex gap-2 sns-item";
            div.innerHTML = `<input type="text" class="sns-n border rounded p-2 text-xs w-20" placeholder="ラベル" value="${v.name}"><input type="text" class="sns-u border rounded p-2 text-xs flex-1" placeholder="URL" value="${v.url}"><button onclick="this.parentElement.remove()" class="text-xs text-red-300">×</button>`;
            document.getElementById('sns-inputs').appendChild(div);
        }

        async function saveOwner() {
            let imgData = owner.image;
            if (currentRawImg.owner) {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                cvs.width = cvs.height = 400;
                const s = Math.max(400/currentRawImg.owner.width, 400/currentRawImg.owner.height);
                ctx.drawImage(currentRawImg.owner, (400-currentRawImg.owner.width*s)/2, (400-currentRawImg.owner.height*s)/2, currentRawImg.owner.width*s, currentRawImg.owner.height*s);
                imgData = cvs.toDataURL('image/webp', 0.8);
            }
            const sns = [];
            document.querySelectorAll('.sns-item').forEach(i => {
                const n = i.querySelector('.sns-n').value, u = i.querySelector('.sns-u').value;
                if(n && u) sns.push({ name: n, url: u });
            });
            owner = { name: document.getElementById('owner-f-name').value, bio: document.getElementById('owner-f-bio').value, image: imgData, sns: sns };
            await syncFirebase(); location.reload();
        }

        // --- 投稿管理 ---
        function openPostModal() { document.getElementById('post-modal').style.display='flex'; toggleMenu('side-menu'); }
        async function savePost() {
            const txt = document.getElementById('post-text').value; if(!txt) return;
            posts.push({ text: txt, date: new Date().toLocaleDateString('ja-JP') });
            await syncFirebase(); location.reload();
        }
        function deletePost(idx) { if(confirm("投稿を削除しますか？")) { posts.splice(idx,1); syncFirebase(); renderPosts(); } }

        // --- ユーティリティ ---
        function addAnniInput(v = {name:'', date:'', m_d:''}) {
            const div = document.createElement('div');
            div.className = "anni-block p-4 bg-white border rounded-xl space-y-2";
            div.innerHTML = `
                <input type="text" class="f-anni-n w-full border-b text-xs font-bold outline-none" placeholder="記念日名" value="${v.name}">
                <div class="flex gap-2">
                    <select class="f-anni-m border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option>${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select>
                    <select class="f-anni-d border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option>${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select>
                </div>
                <input type="date" class="f-anni-date date-input" value="${v.date}">
                <button onclick="this.parentElement.remove()" class="text-[10px] text-red-400 font-bold uppercase">削除</button>
            `;
            if(v.m_d) { const [m,d] = v.m_d.split('-'); div.querySelector('.f-anni-m').value = m; div.querySelector('.f-anni-d').value = d; }
            document.getElementById('anniversary-inputs').appendChild(div);
        }

        function initDateSelects() {
            const ms = document.querySelectorAll('select[id$="-m"]'), ds = document.querySelectorAll('select[id$="-d"]');
            ms.forEach(s => { for(let i=1;i<=12;i++) s.innerHTML += `<option value="${i}">${i}</option>`; });
            ds.forEach(s => { for(let i=1;i<=31;i++) s.innerHTML += `<option value="${i}">${i}</option>`; });
        }

        function initColorPalettes() {
            const colors = ["#000000", "#ffffff", "#f44336", "#e91e63", "#9c27b0", "#673ab7", "#3f51b5", "#2196f3", "#03a9f4", "#00bcd4", "#4caf50", "#8bc34a", "#cddc39", "#ffeb3b", "#ffc107", "#ff9800", "#ff5722", "#795548", "#607d8b"];
            ['bg', 'text', 'cal'].forEach(t => {
                const g = document.getElementById(`${t}-color-grid`);
                colors.forEach(c => {
                    const chip = document.createElement('div'); chip.className = "color-chip"; chip.style.backgroundColor = c;
                    chip.onclick = () => {
                        document.getElementById(`f-${t}-color`).value = c;
                        document.getElementById(`${t}-select-icon`).style.backgroundColor = c;
                        g.classList.remove('grid-open');
                    }; g.appendChild(chip);
                });
            });
        }

        function loadImg(e, type) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader(); rd.onload = (re) => {
                const img = new Image(); img.onload = () => { 
                    currentRawImg[type] = img; 
                    const prv = document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview');
                    prv.src = img.src; prv.classList.remove('hidden');
                    document.getElementById(type === 'doll' ? 'doll-hint' : 'owner-hint').classList.add('hidden');
                };
                img.src = re.target.result;
            }; rd.readAsDataURL(f);
        }

        function openModalWithClear() {
            document.getElementById('edit-id').value = "";
            document.getElementById('modal-title').innerText = "うちの子登録";
            document.querySelectorAll('input[id^="f-"], textarea[id^="f-"], select[id^="f-"]').forEach(el => el.value = "");
            document.getElementById('anniversary-inputs').innerHTML = '';
            document.getElementById('f-text-color').value = "#000000";
            document.getElementById('text-select-icon').style.backgroundColor = "#000000";
            document.getElementById('crop-preview').classList.add('hidden');
            document.getElementById('doll-hint').classList.remove('hidden');
            document.getElementById('modal').style.display='flex';
            toggleMenu('side-menu');
        }

        function showDetail(idx) {
            const d = dolls[idx], overlay = document.getElementById('profile-overlay'), bg = document.getElementById('profile-bg');
            bg.style.backgroundColor = d.bgColor || "#ffffff"; bg.style.color = d.textColor || "#000000";
            document.getElementById('view-img').src = d.image;
            document.getElementById('view-name').innerText = d.name;
            document.getElementById('view-kana').innerText = d.kana || "";
            document.getElementById('view-profile').innerText = d.profile || "";
            let info = "";
            if(d.bodySize) info += `<p>SIZE: ${d.bodySize}</p>`;
            if(d.bodyMake) info += `<p>BODY: ${d.bodyMake}</p>`;
            if(d.head) info += `<p>HEAD: ${d.head}</p>`;
            const det = document.getElementById('view-details');
            if(info) { det.innerHTML = info; det.classList.remove('hidden'); } else { det.classList.add('hidden'); }
            document.getElementById('detail-edit-btn').onclick = () => editDoll(idx);
            document.getElementById('detail-del-btn').onclick = () => { if(confirm("削除しますか？")) { dolls.splice(idx,1); syncFirebase(); location.reload(); } };
            overlay.classList.remove('hidden');
        }

        function showDollList() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.remove('hidden'); renderDollList(); toggleMenu('side-menu'); }
        function renderDollList() {
            const area = document.getElementById('doll-display-area'); area.innerHTML = '';
            dolls.forEach((d, i) => { if(d.image) area.innerHTML += `<div onclick="showDetail(${i})" class="aspect-square bg-white border rounded-xl overflow-hidden"><img src="${d.image}" class="w-full h-full object-cover"></div>`; });
        }

        function toggleMenu(id) { document.getElementById(id).style.display = (document.getElementById(id).style.display === 'flex') ? 'none' : 'flex'; }
        function closeModal() { document.querySelectorAll('.modal-base').forEach(m => m.style.display='none'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function showHome() { location.reload(); }
        function toggleColorGrid(type) { document.getElementById(`${type}-color-grid`).classList.toggle('grid-open'); }
        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
        function updateCrop(imgId, hId, vId) { document.getElementById(imgId).style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`; }
        function changeMonth(n) { calOffset += n; renderCalendar(); }

        function openCreationModal() {
            const d = document.getElementById('custom-dialog');
            document.getElementById('dialog-message').innerText = "新規ギャラリー作成";
            document.getElementById('dialog-inputs').classList.remove('hidden');
            const btnArea = document.getElementById('dialog-buttons'); btnArea.innerHTML = '';
            const btn = document.createElement('button');
            btn.className="w-full bg-stone-800 text-white py-4 rounded-full font-bold";
            btn.innerText = "作成";
            btn.onclick = async () => {
                const gid = document.getElementById('auth-gallery-id').value;
                if(!gid) return;
                const res = await window.fb.signInWithPopup(window.fb.auth, window.fb.provider);
                await window.fb.setDoc(window.fb.doc(window.fb.db, "galleries", gid), { adminEmail: res.user.email, dolls:[], owner:owner, posts:[] });
                window.location.search = `?id=${gid}`;
            };
            btnArea.appendChild(btn);
            d.style.display = 'flex';
        }

        async function handleGoogleLogin() {
            try {
                const res = await window.fb.signInWithPopup(window.fb.auth, window.fb.provider);
                if (res.user.email === adminEmail) { isLoggedIn = true; renderAll(); toggleMenu('side-menu'); }
                else { alert("権限がありません"); await window.fb.signOut(window.fb.auth); }
            } catch (e) { alert("ログイン失敗"); }
        }
        async function handleLogout() { await window.fb.signOut(window.fb.auth); isLoggedIn = false; renderAll(); toggleMenu('side-menu'); }
    </script>
</body>
</html>
