<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fcfaf8; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保護 */
        img { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-user-drag: none;
            user-drag: none;
            pointer-events: auto;
        }

        /* フィルムロール */
        .film-outer { 
            background: #1a1a1a; 
            overflow-x: auto; 
            overflow-y: hidden; 
            padding: 20px 0; 
            position: relative; 
            min-height: 120px; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
        }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { 
            width: 80px; 
            height: 80px; 
            background: #333; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            object-fit: cover; 
            flex-shrink: 0; 
            cursor: pointer; 
            position: relative; 
            z-index: 10; 
        }

        /* モーダル */
        .modal-base { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
        }
        .modal-content { 
            background: white; 
            width: 100%; 
            max-width: 440px; 
            max-height: 90vh; 
            overflow-y: auto; 
            border-radius: 24px; 
            padding: 24px; 
            position: relative; 
        }
        #custom-dialog { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.6); 
            z-index: 100000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        
        /* クロップ */
        .crop-area { 
            display: flex; 
            flex-direction: row-reverse; 
            gap: 10px; 
            align-items: center; 
            margin-bottom: 10px; 
        }
        .v-bar-box { 
            width: 20px; 
            height: 180px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .vertical-range { 
            writing-mode: vertical-lr; 
            direction: rtl; 
            appearance: slider-vertical; 
            width: 8px; 
            height: 100%; 
        }
        .preview-sq { 
            flex: 1; 
            aspect-ratio: 1/1; 
            background: #f3f3f3; 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative; 
            cursor: pointer; 
            border: 1px solid #eee; 
        }
        .preview-sq img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
        }

        /* カレンダー */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { 
            aspect-ratio: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            border-radius: 50%; 
            cursor: pointer; 
            position: relative; 
        }
        .cal-dots { 
            display: flex; 
            gap: 2px; 
            justify-content: center; 
            position: absolute; 
            bottom: 4px; 
            width: 100%; 
            height: 4px; 
            overflow: hidden; 
        }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        /* カラーチップ */
        .color-grid { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            margin-top: 12px; 
            padding: 4px; 
            display: none; 
        }
        .color-grid.grid-open { display: grid; }
        .color-chip { 
            aspect-ratio: 1; 
            border-radius: 4px; 
            border: 1px solid rgba(0,0,0,0.1); 
            cursor: pointer; 
        }
        .color-chip.selected { 
            outline: 3px solid #000; 
            outline-offset: 1px; 
        }
        .color-select-btn { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 3px solid #ddd; 
            cursor: pointer; 
        }

        /* フォーム要素 */
        .date-input { 
            font-size: 16px !important; 
            padding: 8px; 
            border-radius: 8px; 
            border: 1px solid #e5e7eb; 
            width: 100%; 
        }
        .share-btn { transition: all 0.2s ease; }
        .share-btn:active { transform: scale(0.96); opacity: 0.85; }

        textarea { resize: none; overflow: hidden; min-height: 48px; }

        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { 
            animation: pulse-anni 2s infinite ease-in-out; 
            border: 2px solid #f472b6 !important; 
        }

        /* 管理者制御 */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>

    <script>
        const SB_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg4OTk3NzYsImV4cCI6MjA1NDQ3NTc3Nn0.R-fI-V-tF_Gv_6_j-u-u-u-u-u-u-u-u-u-u-u-u-u-u-u"; 
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let dollViewMode = 'grid', currentRawImg = { doll: null, owner: null }, loopInterval, isLoggedIn = false, currentUid = null;

        document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); }, false);
        document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); }, false);

        function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }

        const palette100 = (() => {
            const hues = [0, 30, 60, 120, 150, 180, 220, 280, 330], colors = [];
            for(let i=0; i<10; i++) colors.push(`hsl(0, 0%, ${Math.min(i * 11, 100)}%)`);
            hues.forEach(h => { for(let i=0; i<10; i++) colors.push(`hsl(${h}, 80%, ${Math.min(30 + (i * 7.2), 95)}%)`); });
            return colors.slice(0, 100);
        })();

        window.onload = async () => {
            initDateSelectors(); initColorPalettes(); await checkLoginSession(); await loadAllData(); renderAll(); setupInfiniteScroll();
        };

        async function checkLoginSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) { isLoggedIn = true; currentUid = session.user.id; }
        }

        async function handleLogin() {
            const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } });
            if (error) showAlert("ログインエラー: " + error.message);
        }

        async function handleLogout() { await sb.auth.signOut(); location.reload(); }

        async function loadAllData() {
            try {
                const { data: dDolls } = await sb.from('dolls').select('*').order('created_at', { ascending: true });
                if (dDolls) dolls = dDolls;

        function renderAnni() { 
            const area = document.getElementById('closest-anniversary'), happyArea = document.getElementById('happy-anniversary'), happyListArea = document.getElementById('happy-anniversary-list');
            area.innerHTML = ''; happyListArea.innerHTML = ''; happyArea.classList.add('hidden');
            let list = [], happyEvents = []; const now = new Date(), todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            dolls.forEach((d, idx) => { 
                const ds = [{ type: 'birth', n: "誕生日", d: d.birthday }, { type: 'welcome', n: "お迎え日", d: d.welcomeDay }, ...(d.anniversaries || []).map(a => ({ type: 'custom', n: a.name, d: a.date }))]; 
                ds.forEach(v => { 
                    if(v.d) { 
                        const originDate = new Date(v.d);
                        const isToday = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate());
                        const diffYears = now.getFullYear() - originDate.getFullYear();
                        let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate()); 
                        if(next < todayZero) next.setFullYear(now.getFullYear() + 1); 
                        const daysToNext = Math.ceil((next - todayZero) / (1000 * 60 * 60 * 24));
                        if (isToday && diffYears >= 0) happyEvents.push({ text: `${d.name} の ${v.n} ${diffYears > 0 ? diffYears + '周年' : ''}`, order: idx });
                        list.push({ doll: d.name, title: v.n, color: d.calColor || '#E11D48', diff: daysToNext, isToday: isToday }); 
                    } 
                }); 
            }); 
            if (happyEvents.length > 0) {
                happyArea.classList.remove('hidden');
                happyEvents.forEach(ev => {
                    const div = document.createElement('div'); div.className = "bg-white p-5 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-3";
                    div.innerHTML = `<span class="text-2xl">🎉</span><p class="font-bold text-stone-800">${ev.text}</p>`;
                    happyListArea.appendChild(div);
                });
            }
            if(list.length > 0) { 
                list.sort((a,b) => a.diff - b.diff); const closestEvents = list.filter(item => item.diff === list[0].diff);
                let html = `<div class="space-y-3">`;
                closestEvents.forEach(b => { html += `<div class="bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold">${b.doll}</p><p class="font-bold">${b.title}</p></div><b class="text-lg">${b.isToday ? "Today" : `あと ${b.diff} 日`}</b></div>`; });
                html += `</div>`; area.innerHTML = html;
            } 
        }

        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days'), map = {};
            area.innerHTML = '';
            dolls.forEach(d => {
                const evs = [{n:"誕生日", d:d.birthday}, {n:"お迎え日", d:d.welcomeDay}, ...(d.anniversaries||[]).map(a=>({n:a.name, d:a.date}))];
                evs.forEach(ev => { if(ev.d) { const dt = new Date(ev.d); if(dt.getMonth()===m) { const day = dt.getDate(); if(!map[day]) map[day]=[]; map[day].push({doll:d.name, ev:ev.n, color:d.calColor||'#E11D48'}); } } });
            });
            for(let i=0; i<firstDay; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const isToday = (calOffset===0 && d===now.getDate()), annis = map[d], div = document.createElement('div');
                div.className = `cal-day ${isToday?'bg-black text-white':''}`;
                if(annis) {
                    const dots = document.createElement('div'); dots.className="cal-dots";
                    annis.forEach(a => { const dot=document.createElement('div'); dot.className="cal-dot"; dot.style.backgroundColor=a.color; dots.appendChild(dot); });
                    div.appendChild(dots);
                    div.onclick = () => {
                        const dayEv = document.getElementById('day-events'); dayEv.innerHTML = '';
                        annis.forEach(a => { dayEv.innerHTML += `<div class="p-4 bg-white border rounded-xl font-bold">${a.doll} : ${a.ev}</div>`; });
                    };
                }
                div.innerHTML += `<span>${d}</span>`; area.appendChild(div);
            }
        }

        async function saveData() {
            if (!isLoggedIn) return;
            const idIdx = document.getElementById('edit-id').value, h = document.getElementById('crop-h').value, v = document.getElementById('crop-v').value;
            let imgData = (idIdx !== "") ? dolls[idIdx].image : "";
            if(currentRawImg.doll) {
                const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d'); cvs.width = cvs.height = 800;
                const s = Math.max(800/currentRawImg.doll.width, 800/currentRawImg.doll.height);
                ctx.drawImage(currentRawImg.doll, (800-currentRawImg.doll.width*s)*(h/100), (800-currentRawImg.doll.height*s)*(v/100), currentRawImg.doll.width*s, currentRawImg.doll.height*s);
                imgData = cvs.toDataURL('image/webp', 0.7);
            }
            const payload = {
                name: document.getElementById('f-name').value,
                kana: document.getElementById('f-kana').value,
                image: imgData,
                bodySize: document.getElementById('f-size-label').value,
                bodyMake: document.getElementById('f-body-make').value,
                head: document.getElementById('f-head').value,
                birthday: getDateValue('f-bday', 'f-bday-m', 'f-bday-d'),
                welcomeDay: getDateValue('f-welcome', 'f-welcome-m', 'f-welcome-d'),
                anniversaries: Array.from(document.querySelectorAll('#anniversary-inputs > div')).map(row => ({ 
                    name: row.querySelector('.f-anni-name').value, 
                    date: getDateValue(row.querySelector('.f-anni-date').id, row.querySelector('.f-anni-m').id, row.querySelector('.f-anni-d').id) 
                })),
                bgColor: document.getElementById('f-bg-color').value,
                textColor: document.getElementById('f-text-color').value,
                calColor: document.getElementById('f-cal-color').value,
                profile: document.getElementById('f-profile').value,
                uid: currentUid
            };
            if (idIdx === "") await sb.from('dolls').insert([payload]);
            else await sb.from('dolls').update(payload).eq('id', dolls[idIdx].id);
            location.reload();
        }

        function openPostModal() { document.getElementById('edit-post-id').value = ""; document.getElementById('post-blocks-container').innerHTML = ''; addPostBlock(); document.getElementById('post-modal').style.display='flex'; toggleMenu('side-menu'); }
        function addAnniversaryInput(v = {name:'', date:''}) {
            const id = Date.now() + Math.random(), div = document.createElement('div'); div.className = "p-4 bg-stone-100/50 rounded-2xl space-y-2 border border-stone-100";
            div.innerHTML = `<div class="flex justify-between items-center"><span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">記念日</span><button onclick="this.parentElement.parentElement.remove()" class="text-stone-400 text-xs">✕ 削除</button></div><input type="text" class="f-anni-name w-full border-b bg-transparent py-1 text-sm font-bold outline-none" placeholder="記念日名" value="${v.name}"><div class="flex gap-2 items-center"><select id="m-${id}" class="f-anni-m border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option>${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select><select id="d-${id}" class="f-anni-d border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option>${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select></div><input type="date" id="date-${id}" class="date-input f-anni-date">`;
            document.getElementById('anniversary-inputs').appendChild(div);
            if(v.date) setDateValue(v.date, `date-${id}`, `m-${id}`, `d-${id}`);
        }
    </script>
</body>
</html>
