<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery - Complete Full Source</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fcfaf8; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保護・選択制御 */
        img { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none !important; 
            user-select: none !important; 
            pointer-events: none; 
            -webkit-user-drag: none; 
        }
        /* ボタンや対話要素は操作可能に */
        .clickable-img, .film-frame, .preview-sq img, .post-img, .doll-thumb, .btn-action, button, a, input, textarea, select { 
            pointer-events: auto !important; 
        }
        
        textarea, input, select, .user-select-auto { 
            user-select: text !important; 
            -webkit-user-select: text !important;
        }

        /* フィルムロール */
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        
        /* モーダル基盤 */
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        
        /* サイドメニュー専用（右からスライド） */
        #side-menu { justify-content: flex-end; padding: 0; }
        .side-menu-content { width: 280px; height: 100%; background: white; padding: 24px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); position: relative; z-index: 10001; }

        /* カスタムダイアログ */
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        /* クロップUI */
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        
        /* カレンダー */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; border: 1px solid transparent; }
        .cal-today { border: 2px solid #888; font-weight: bold; background-color: #f9f9f9; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        /* カラー選択チップ */
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip:active { transform: scale(0.9); }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }

        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        
        /* 管理・閲覧制御 */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        .viewer-only { display: block !important; }
        body.is-admin .viewer-only { display: none !important; }

        .auto-expand { overflow: hidden; resize: none; min-height: 40px; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <script>
        // --- 設定・初期化 ---
        const { createClient } = supabase;
        // ※実際のエンドポイントに書き換えてください
        const _S = createClient('https://YOUR_PROJECT.supabase.co', 'YOUR_ANON_KEY'); 

        let dolls = [], posts = [], owner = { sns: [] }, selectedDollIds = [];
        let currentDate = new Date();
        let dollViewMode = 'img';
        const colors = [
            '#ffffff','#f8fafc','#f1f5f9','#e2e8f0','#fef2f2','#fff7ed','#fefce8','#f0fdf4','#eff6ff','#faf5ff',
            '#000000','#1e293b','#475569','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899'
        ];

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'admin') document.body.classList.add('is-admin');
            
            setupAutoExpand();
            setupProtection();
            await checkAuth();
            await loadAll();
            renderAll();
            checkAnniversaries();
        };

        // --- 認証・データロード ---
        async function checkAuth() {
            const { data: { user } } = await _S.auth.getUser();
            if (user) {
                document.body.classList.add('is-admin');
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            }
        }

        async function loginWithGoogle() {
            try {
                const { error } = await _S.auth.signInWithOAuth({ 
                    provider: 'google',
                    options: { redirectTo: window.location.origin + window.location.pathname }
                });

        // --- カレンダーロジック ---
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('cal-month').innerText = `${year}年 ${month + 1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('cal-days');
            grid.innerHTML = '';
            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= lastDate; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'cal-day';
                dayEl.innerText = d;
                const fullDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (fullDate === new Date().toISOString().split('T')[0]) dayEl.classList.add('cal-today');
                const dayPosts = posts.filter(p => p.date === fullDate);
                if (dayPosts.length > 0) {
                    const dots = document.createElement('div');
                    dots.className = 'cal-dots';
                    dayPosts.forEach(() => {
                        const dot = document.createElement('div');
                        dot.className = 'cal-dot bg-stone-300';
                        dots.appendChild(dot);
                    });
                    dayEl.appendChild(dots);
                }
                dayEl.onclick = () => renderDayEvents(fullDate);
                grid.appendChild(dayEl);
            }
        }

        // --- 画像処理・クロップ ---
        function loadImg(e, type) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                let imgId, hintId, hR, vR;
                if(type === 'doll') { imgId = 'crop-preview'; hintId = 'doll-hint'; hR = 'crop-h'; vR = 'crop-v'; }
                else if(type === 'post') { imgId = 'post-preview'; hintId = 'post-hint'; hR = 'post-crop-h'; vR = 'post-crop-v'; }
                else if(type === 'owner') { imgId = 'owner-preview'; hintId = 'owner-hint'; }
                const img = document.getElementById(imgId);
                img.src = ev.target.result;
                img.classList.remove('hidden');
                if(hintId) document.getElementById(hintId).classList.add('hidden');
                if(type !== 'owner') updateCrop(imgId, hR, vR);
            };
            reader.readAsDataURL(file);
        }

        function updateCrop(imgId, hId, vId) {
            const img = document.getElementById(imgId);
            const h = document.getElementById(hId).value;
            const v = document.getElementById(vId).value;
            img.style.objectPosition = `${h}% ${v}%`;
        }

        // --- 記念日算出 ---
        function checkAnniversaries() {
            const today = new Date();
            const m = today.getMonth() + 1, d = today.getDate();
            const happyList = [], allAnnis = [];
            dolls.forEach(doll => {
                if(doll.birthday) {
                    const [yb, mb, db] = doll.birthday.split('-').map(Number);
                    if(mb === m && db === d) happyList.push({ name: doll.name, type: 'Happy Birthday!' });
                    allAnnis.push({ name: doll.name, type: 'Birthday', m: mb, d: db });
                }
                if(doll.welcome_date) {
                    const [yw, mw, dw] = doll.welcome_date.split('-').map(Number);
                    if(mw === m && dw === d) happyList.push({ name: doll.name, type: 'Anniversary!' });
                    allAnnis.push({ name: doll.name, type: 'Welcome', m: mw, d: dw });
                }
                (doll.anniversaries || []).forEach(a => {
                    const [ya, ma, da] = a.date.split('-').map(Number);
                    if(ma === m && da === d) happyList.push({ name: doll.name, type: a.name });
                    allAnnis.push({ name: doll.name, type: a.name, m: ma, d: da });
                });
            });
            if(happyList.length > 0) {
                const container = document.getElementById('happy-anniversary');
                container.classList.remove('hidden');
                const list = document.getElementById('happy-anniversary-list');
                happyList.forEach(h => {
                    list.innerHTML += `<div class="p-4 bg-pink-50 rounded-2xl mb-2 border-2 border-pink-100 animate-anni"><p class="text-xs font-bold text-pink-500">${h.type}</p><p class="text-lg font-bold">${h.name}</p></div>`;
                });
            }
            allAnnis.sort((a,b) => {
                const da = new Date(2000, a.m-1, a.d) - new Date(2000, m-1, d);
                const db = new Date(2000, b.m-1, b.d) - new Date(2000, m-1, d);
                return (da < 0 ? da + 366 * 86400000 : da) - (db < 0 ? db + 366 * 86400000 : db);
            });
            if(allAnnis[0]) {
                const next = allAnnis[0];
                document.getElementById('closest-anniversary').innerHTML = `
                    <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-stone-100">
                        <div class="text-center bg-stone-800 text-white rounded-xl p-2 min-w-[50px]">
                            <p class="text-[10px] font-bold opacity-70">${next.m}月</p>
                            <p class="text-lg font-bold">${next.d}</p>
                        </div>
                        <div><p class="text-xs font-bold text-stone-400">${next.type}</p><p class="font-bold">${next.name}</p></div>
                    </div>`;
            }
        }

        }

        function openOwnerModal() {
            document.getElementById('f-owner-name').value = owner.name || "";
            document.getElementById('f-owner-bio').value = owner.bio || "";
            if (owner.img) {
                const p = document.getElementById('owner-preview');
                p.src = owner.img; p.classList.remove('hidden');
                document.getElementById('owner-hint').classList.add('hidden');
            }
            const snsCont = document.getElementById('sns-inputs');
            snsCont.innerHTML = '';
            (owner.sns || []).forEach(s => addSNSInput(s.name, s.url));
            document.getElementById('owner-modal').style.display = 'flex';
        }

        function addAnniversaryInput(v = {name:'', date:''}) {
            const div = document.createElement('div');
            div.className = "p-4 bg-stone-50 rounded-2xl space-y-3 f-anni-group";
            div.innerHTML = `<div class="flex justify-between items-center"><span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">記念日</span><button onclick="this.parentElement.parentElement.remove()" class="text-stone-400 text-xs">✕ 削除</button></div><input type="text" class="f-anni-name w-full border-b bg-transparent py-1 text-sm font-bold outline-none" placeholder="記念日名" value="${v.name}"><input type="date" class="f-anni-date date-input" value="${v.date}">`;
            document.getElementById('anniversary-inputs').appendChild(div);
        }

        function addSNSInput(name = "", url = "") {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center sns-group";
            div.innerHTML = `<input type="text" class="f-sns-name w-24 border rounded p-2 text-xs" placeholder="SNS名" value="${name}"><input type="text" class="f-sns-url flex-1 border rounded p-2 text-xs" placeholder="URL" value="${url}"><button onclick="this.parentElement.remove()" class="text-stone-300 btn-action">✕</button>`;
            document.getElementById('sns-inputs').appendChild(div);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function closePostModal() { document.getElementById('post-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function closeOwnerModal() { document.getElementById('owner-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function copyURL() { navigator.clipboard.writeText(window.location.href).then(() => showAlert("URLをコピーしました")); }
        function shareSNS(type) {
            const url = encodeURIComponent(window.location.href);
            const txt = encodeURIComponent((owner.name || "Owner") + "さんのギャラリー");
            if (type === 'x') window.open(`https://twitter.com/intent/tweet?url=${url}&text=${txt}`);
            else window.open(`https://social-plugins.line.me/lineit/share?url=${url}`);
        }

        async function requestClearAll() {
            showConfirm("すべてのデータを削除してよろしいですか？", async () => {
                await _S.from('dolls').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await _S.from('posts').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                location.reload();
            });
        }

        function requestNewGallery() {
            showPrompt("ギャラリーID（半角英数字）を入力してください", (id) => {
                if(!id || !id.match(/^[a-zA-Z0-9]+$/)) return showAlert("有効なIDを入力してください");
                window.open(`${window.location.origin}${window.location.pathname}?id=${id}&mode=admin`, '_blank');
            });
        }

        function renderOwnerSNS() {
            const container = document.getElementById('owner-sns-links');
            container.innerHTML = '';
            (owner.sns || []).forEach(s => {
                const a = document.createElement('a');
                a.href = s.url; a.target = "_blank"; a.className = "text-xs font-bold text-stone-400 border-b border-stone-100 pb-1";
                a.innerText = s.name; container.appendChild(a);
            });
        }
    </script>
</body>
</html>
