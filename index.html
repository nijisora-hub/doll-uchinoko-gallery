<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        /* 基本設定 */
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fcfaf8; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保護の設定 */
        img { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none !important; 
            user-select: none !important; 
            pointer-events: none; 
            -webkit-user-drag: none; 
        }
        .clickable-img, .film-frame { pointer-events: auto !important; }
        
        /* テキストエリアと表示の完全一致設定 */
        textarea, .wysiwyg-text { 
            user-select: text !important; 
            -webkit-user-select: text !important;
            pointer-events: auto !important;
            -webkit-touch-callout: default !important;
            font-size: 16px !important; /* スマホのズーム防止と読みやすさ */
            line-height: 1.6 !important;
            width: 100% !important;
            box-sizing: border-box !important;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            border: none;
            padding: 0;
            background: transparent;
            outline: none;
        }
        
        /* 入力枠がある場合の調整 */
        .input-bordered {
            border: 1px solid #e5e7eb !important;
            border-radius: 12px !important;
            padding: 12px !important;
            background: #ffffff !important;
        }

        /* フィルムロール */
        .film-outer { 
            background: #1a1a1a; 
            overflow-x: auto; 
            padding: 20px 0; 
            position: relative; 
            min-height: 120px; 
            -ms-overflow-style: none;
            scrollbar-width: none;
            scroll-behavior: auto;
        }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 6px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; pointer-events: none; }
        
        .preview-post { width: 100%; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; min-height: 80px; }
        .preview-post img { width: 100%; height: auto; display: block; position: relative; top:0; left:0; pointer-events: none; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; border: 1px solid transparent; }
        .cal-today { border: 2px solid #888; font-weight: bold; background-color: #f9f9f9; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        .color-grid { grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; box-shadow: 0 0 0 2px #fff; }
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        .viewer-only { display: block !important; }
        body.is-admin .viewer-only { display: none !important; }
    </style>
</head>

        function renderAnni() {
            const area = document.getElementById('closest-anniversary'),
                  happyArea = document.getElementById('happy-anniversary'),
                  happyListArea = document.getElementById('happy-anniversary-list');
            area.innerHTML = ''; happyListArea.innerHTML = '';
            happyArea.classList.add('hidden');
            let list = [], happyEvents = [];
            const now = new Date();
            const todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            dolls.forEach((d, idx) => {
                const ds = [
                    { type: 'birth', n: "誕生日", d: d.birthday },
                    { type: 'welcome', n: "お迎え日", d: d.welcome_day },
                    ...(d.anniversaries || []).map(a => ({ type: 'custom', n: a.name, d: a.date }))
                ];
                ds.forEach(v => {
                    if(v.d) {
                        const originDate = new Date(v.d);
                        const originZero = new Date(originDate.getFullYear(), originDate.getMonth(), originDate.getDate());
                        const diffMs = todayZero.getTime() - originZero.getTime();
                        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                        const isAnniDay = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate());
                        const diffYears = now.getFullYear() - originDate.getFullYear();

                        // 通常の記念日（当日）
                        if (isAnniDay && diffYears >= 0) {
                            let text = `${d.name}の${v.n}`;
                            if (v.type === 'welcome') text = `${d.name}お迎え${diffYears}周年`;
                            else if (v.type === 'birth') text = `${d.name}の誕生日`;
                            happyEvents.push({ text, img: d.image, dollIdx: idx });
                        }

                        // キリ番判定 (年月日が揃っている＝2000年ではない場合)
                        if (originDate.getFullYear() !== 2000) {
                            if (diffDays > 0 && diffDays % 100 === 0) {
                                happyEvents.push({ text: `${d.name}と出会って${diffDays}日！`, img: d.image, dollIdx: idx });
                            }
                        }

                        let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate());
                        if (next < todayZero) next.setFullYear(now.getFullYear() + 1);
                        const wait = Math.ceil((next - todayZero) / (1000 * 60 * 60 * 24));
                        list.push({ doll: d.name, title: v.n, diff: wait, isToday: isAnniDay, color: d.cal_color || '#E11D48' });
                    }
                });
            });

            if (happyEvents.length > 0) {
                happyArea.classList.remove('hidden');
                happyEvents.forEach(ev => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-3 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-3 cursor-pointer";
                    div.onclick = () => showDetail(ev.dollIdx);
                    div.innerHTML = `<img src="${ev.img}" class="w-12 h-12 rounded-full object-cover flex-shrink-0 border-2 border-pink-200 clickable-img"><p class="font-bold text-stone-800 text-sm">${ev.text}</p><span class="ml-auto text-xl">🎉</span>`;
                    happyListArea.appendChild(div);
                });
            }

            if(list.length > 0) {
                list.sort((a,b) => a.diff - b.diff);
                const closest = list.filter(item => item.diff === list[0].diff);
                let html = `<div class="space-y-3">`;
                closest.forEach(b => {
                    html += `<div class="bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold">${b.doll}</p><p class="font-bold">${b.title}</p></div><b class="text-lg">${b.isToday ? "Today" : "あと "+b.diff+" 日"}</b></div>`;
                });
                area.innerHTML = html + `</div>`;
            }
        }

        async function processImageToWebP(imgEl, size, cropH, cropV, isPost = false) {
            return new Promise(resolve => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                if (isPost) {
                    let w = imgEl.width, h = imgEl.height, max = size;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    cvs.width = w; cvs.height = h;
                    ctx.drawImage(imgEl, 0, 0, w, h);
                } else {
                    cvs.width = cvs.height = size;
                    const s = Math.max(size/imgEl.width, size/imgEl.height);
                    ctx.drawImage(imgEl, (size-imgEl.width*s)*(cropH/100), (size-imgEl.height*s)*(cropV/100), imgEl.width*s, imgEl.height*s);
                }
                resolve(cvs.toDataURL('image/webp', 0.8));
            });
        }

            document.getElementById('view-img').src = d.image;
            document.getElementById('view-name').innerText = d.name;
            document.getElementById('view-kana').innerText = d.kana || '';
            const b = document.getElementById('detail-box'); b.innerHTML = '';
            let hasInfo = false;
            const fmt = (v) => { if(!v) return ''; const dt = new Date(v); return dt.getFullYear() === 2000 ? `${dt.getMonth()+1}/${dt.getDate()}` : `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`; };
            [['SIZE', d.size_label], ['BODY', d.body_make], ['HEAD', d.head_info], ['BIRTH', fmt(d.birthday)], ['WELCOME', fmt(d.welcome_day)]].forEach(row => {
                if(row[1]) { b.innerHTML += `<div class="flex justify-between border-b border-current/10 py-2"><span class="text-[10px] font-bold opacity-50 uppercase">${row[0]}</span><span class="font-bold text-sm">${row[1]}</span></div>`; hasInfo = true; }
            });
            (d.anniversaries || []).forEach(a => {
                if(a.name && a.date) {
                    b.innerHTML += `<div class="flex flex-col mb-4"><span>✨ ${a.name}</span><b>${fmt(a.date)}</b></div>`;
                    hasInfo = true;
                }
            });
            b.classList.toggle('hidden', !hasInfo);
            document.getElementById('view-profile').innerText = d.profile || "";
            document.getElementById('detail-edit-btn').onclick = () => editDoll(idx);
            document.getElementById('detail-del-btn').onclick = () => showConfirm("このデータを削除しますか？", async () => {
                await sbClient.from('dolls').delete().eq('id', d.id);
                location.reload();
            });
            overlay.classList.remove('hidden');
        }

        function closeModal() { document.querySelectorAll('.modal-base').forEach(m => m.style.display='none'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function closeArticle() { document.getElementById('article-page').style.display = 'none'; }
        function closeDialog() { document.getElementById('custom-dialog').style.display = 'none'; document.getElementById('dialog-input-container').classList.add('hidden'); }
        function changeMonth(d) { calOffset += d; document.getElementById('day-events').innerHTML = ''; renderCalendar(); }

        function getDateValue(mainId, mId, dId) {
            const main = document.getElementById(mainId).value;
            const m = document.getElementById(mId).value;
            const d = document.getElementById(dId).value;
            if(main) return main;
            if(m && d) return `2000-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
            return null;
        }

        function setDateValue(val, mainId, mId, dId) {
            if(!val) {
                document.getElementById(mainId).value = "";
                document.getElementById(mId).value = "";
                document.getElementById(dId).value = "";
                return;
            }
            const dt = new Date(val);
            if(dt.getFullYear() === 2000) {
                document.getElementById(mId).value = dt.getMonth() + 1;
                document.getElementById(dId).value = dt.getDate();
                document.getElementById(mainId).value = "";
            } else {
                document.getElementById(mainId).value = val;
                document.getElementById(mId).value = "";
                document.getElementById(dId).value = "";
            }
        }

        function initDateSelectors(specificPrefix = null) {
            const prefixes = specificPrefix ? [specificPrefix] : ["f-bday", "f-welcome"];
            prefixes.forEach(p => {
                const mId = p.includes('anni') ? p.replace('-date', '-m') : p+"-m";
                const dId = p.includes('anni') ? p.replace('-date', '-d') : p+"-d";
                const m = document.getElementById(mId), d = document.getElementById(dId);
                if(m && m.options.length <= 1){for(let i=1; i<=12; i++) m.innerHTML += `<option value="${i}">${i}</option>`;}
                if(d && d.options.length <= 1){for(let i=1; i<=31; i++) d.innerHTML += `<option value="${i}">${i}</option>`;}
            });
        }

        function initColorPalettes() {
            ["bg", "text", "cal"].forEach(t => {
                const g = document.getElementById(t+"-color-grid"), def = (t==='bg'?'#ffffff':(t==='text'?'#000000':'#E11D48'));
                palette100.forEach(c => {
                    const chip = document.createElement('div');
                    chip.className = `color-chip ${t}-chip`;
                    chip.style.backgroundColor = c;
                    if(c.toLowerCase() === def.toLowerCase()) chip.classList.add('selected');
                    chip.onclick = e => {
                        document.querySelectorAll(`.${t}-chip`).forEach(x => x.classList.remove('selected'));
                        chip.classList.add('selected');
                        document.getElementById('f-'+t+'-color').value = c;
                        document.getElementById(t+'-select-icon').style.backgroundColor = c;
                    };
                    g.appendChild(chip);
                });
                document.getElementById(t+'-select-icon').style.backgroundColor = def;
            });
        }

        function toggleColorGrid(type) { document.getElementById(type+'-color-grid').classList.toggle('grid-open'); }

        function setupAutoExpand() {
            document.querySelectorAll('textarea.auto-expand').forEach(el => {
                el.addEventListener('input', () => {
                    el.style.height = 'auto';
                    el.style.height = el.scrollHeight + 'px';
                });
            });
        }

        function setupUnifiedProtection() {
            document.addEventListener('contextmenu', e => { if(e.target.tagName === 'IMG') e.preventDefault(); }, false);
        }

        function openModalWithClear() {
            document.getElementById('edit-id').value = "";
            document.getElementById('modal-title').innerText = "うちの子登録";
            document.getElementById('f-name').value = "";
            document.getElementById('f-kana').value = "";
            document.getElementById('f-size-label').value = "";
            document.getElementById('f-body-make').value = "";
            document.getElementById('f-head').value = "";
            document.getElementById('f-bday').value = "";
            document.getElementById('f-welcome').value = "";
            document.getElementById('f-bday-m').value = ""; document.getElementById('f-bday-d').value = "";
            document.getElementById('f-welcome-m').value = ""; document.getElementById('f-welcome-d').value = "";
            document.getElementById('f-profile').value = "";
            document.getElementById('anniversary-inputs').innerHTML = '';
            document.getElementById('crop-preview').classList.add('hidden');
            document.getElementById('doll-hint').classList.remove('hidden');
            currentRawImg.doll = null;

            // カラー設定をリセット
            const colorDefaults = { bg: '#ffffff', text: '#000000', cal: '#E11D48' };
            ['bg', 'text', 'cal'].forEach(t => {
                const def = colorDefaults[t];
                document.getElementById('f-'+t+'-color').value = def;
                document.getElementById(t+'-select-icon').style.backgroundColor = def;
                // パレットの選択状態（枠線）もデフォルト位置にリセット
                document.querySelectorAll(`.${t}-chip`).forEach(chip => {
                    const chipColor = chip.style.backgroundColor;
                    // 背景色のRGB値と比較するため、一時的にCanvas等で正規化が必要な場合もありますが、
                    // ここでは簡易的に全選択を解除してから、デフォルトの色にselectedを付与します。
                    chip.classList.remove('selected');
                    // palette100生成時の定義に合わせ、16進数またはhsl等での比較
                });
                // 初期化時と同じロジックでデフォルト色に枠を付ける
                const chips = document.querySelectorAll(`.${t}-chip`);
                chips.forEach(c => {
                    // 背景色から色を取得（ブラウザによりrgb形式になるため注意）
                    if(c.style.backgroundColor.replace(/\s/g, '') === (t==='bg'?'rgb(255,255,255)':(t==='text'?'rgb(0,0,0)':'rgb(225,29,72)'))) {
                        c.classList.add('selected');
                    }
                });
            });

            document.getElementById('modal').style.display = 'flex';
            if(document.getElementById('side-menu').style.display === 'flex') toggleMenu('side-menu');
            updateAllTextareaHeights();
        }

        function updateAllTextareaHeights() {
            document.querySelectorAll('textarea.auto-expand').forEach(el => {
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
            });
        }

        function loadImg(e, type) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader();
            rd.onload = (re) => {
                const img = new Image();
                img.onload = () => {
                    currentRawImg[type] = img;
                    const el = document.getElementById(type==='doll'?'crop-preview':'owner-preview');
                    el.src = img.src; el.classList.remove('hidden');
                    document.getElementById(type==='doll'?'doll-hint':'owner-hint').classList.add('hidden');
                };
                img.src = re.target.result;
            };
            rd.readAsDataURL(f);
        }

        function editDoll(idx) {
            closeProfile();
            const d = dolls[idx];
            document.getElementById('edit-id').value = d.id;
            document.getElementById('modal-title').innerText = "うちの子編集";
            document.getElementById('f-name').value = d.name;
            document.getElementById('f-kana').value = d.kana || "";
            document.getElementById('f-size-label').value = d.size_label || "";
            document.getElementById('f-body-make').value = d.body_make || "";
            document.getElementById('f-head').value = d.head_info || "";
            setDateValue(d.birthday, 'f-bday', 'f-bday-m', 'f-bday-d');
            setDateValue(d.welcome_day, 'f-welcome', 'f-welcome-m', 'f-welcome-d');
            const anniA = document.getElementById('anniversary-inputs');
            anniA.innerHTML = '';
            (d.anniversaries || []).forEach(a => addAnniversaryInput(a));
            document.getElementById('f-profile').value = d.profile || "";
            ['bg', 'text', 'cal'].forEach(t => {
                const color = d[t+'_color'] || (t==='bg'?'#ffffff':(t==='text'?'#000000':'#E11D48'));
                document.getElementById('f-'+t+'-color').value = color;
                document.getElementById(t+'-select-icon').style.backgroundColor = color;
                // パレットの選択枠を更新
                document.querySelectorAll(`.${t}-chip`).forEach(chip => {
                    chip.classList.remove('selected');
                    // 背景色が一致する場合にselected付与
                    // rgb文字列同士で比較（ブラウザ依存対策としてreplaceで空白削除）
                    const targetDiv = document.createElement('div');
                    targetDiv.style.color = color;
                    if(chip.style.backgroundColor.replace(/\s/g, '') === targetDiv.style.color.replace(/\s/g, '')) {
                        chip.classList.add('selected');
                    }
                });
            });
            if(d.image) {
                const p = document.getElementById('crop-preview'); p.src = d.image; p.classList.remove('hidden');
                document.getElementById('doll-hint').classList.add('hidden');
            }
            document.getElementById('modal').style.display = 'flex';
            updateAllTextareaHeights();
        }

        function addAnniversaryInput(v = {name:'', date:''}) {
            const id = Date.now() + Math.random().toString(36).substring(2);
            const div = document.createElement('div');
            div.className = "anni-input-box p-4 bg-stone-100/50 rounded-2xl space-y-2 border";
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">記念日</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-stone-400 text-xs">✕ 削除</button>
                </div>
                <input type="text" class="f-anni-name w-full border-b bg-transparent py-2 text-sm outline-none" placeholder="記念日名(例:ハーフバースデー)" value="${v.name}">
                <div class="flex gap-2 mb-2 items-center">
                    <select id="f-anni-m-${id}" class="f-anni-m border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select>
                    <select id="f-anni-d-${id}" class="f-anni-d border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select>
                </div>
                <input type="date" id="f-anni-date-${id}" class="f-anni-date date-input" value="${v.date || ''}">
            `;
            document.getElementById('anniversary-inputs').appendChild(div);
            initDateSelectors(`f-anni-date-${id}`);
            if (v.date) {
                setDateValue(v.date, `f-anni-date-${id}`, `f-anni-m-${id}`, `f-anni-d-${id}`);
            }
        }

        function openOwnerModal() {
            document.getElementById('o-name').value = owner.name;
            document.getElementById('o-bio').value = owner.bio || "";
            const cont = document.getElementById('sns-inputs-container'); cont.innerHTML = '';
            (owner.sns || []).forEach(s => addSnsInput(s));
            if(owner.image) {
                const p = document.getElementById('owner-preview'); p.src = owner.image; p.classList.remove('hidden');
                document.getElementById('owner-hint').classList.add('hidden');
            }
            document.getElementById('owner-modal').style.display = 'flex';
            if(document.getElementById('side-menu').style.display === 'flex') toggleMenu('side-menu');
            updateAllTextareaHeights();
        }

        function addSnsInput(v = {type:'X(旧Twitter)', val:'', label:''}) {
            const id = Date.now() + Math.random(), div = document.createElement('div');
            div.className = "p-4 bg-stone-50 rounded-xl border space-y-2";
            div.innerHTML = `<div class="flex justify-between items-center"><select class="sns-type text-xs font-bold bg-transparent outline-none" onchange="toggleSnsLabel(this, '${id}')"><option ${v.type==='X(旧Twitter)'?'selected':''}>X(旧Twitter)</option><option ${v.type==='Instagram'?'selected':''}>Instagram</option><option ${v.type==='Bluesky'?'selected':''}>Bluesky</option><option ${v.type==='Threads'?'selected':''}>Threads</option><option ${v.type==='mixi2'?'selected':''}>mixi2</option><option ${v.type==='その他URL'?'selected':''}>その他URL</option></select><button onclick="this.parentElement.parentElement.remove()" class="text-stone-400 text-xs">✕</button></div><input type="text" class="sns-val w-full border-b bg-transparent py-1 text-sm outline-none" placeholder="ユーザーID または URL" value="${v.val}"><div id="sns-label-container-${id}" class="${v.type==='その他URL'?'':'hidden'}"><input type="text" class="sns-label w-full border-b bg-transparent py-1 text-xs outline-none" placeholder="表示名 (例: ほしい物リスト)" value="${v.label}"></div>`;
            document.getElementById('sns-inputs-container').appendChild(div);
        }

        function toggleSnsLabel(select, id) {
            const container = document.getElementById(`sns-label-container-${id}`);
            if (select.value === 'その他URL') container.classList.remove('hidden'); else container.classList.add('hidden');
        }

        function openPostModal() {
            document.getElementById('edit-post-id').value = "";
            document.getElementById('post-modal-title').innerText = "投稿作成";
            document.getElementById('p-title').value = "";
            document.getElementById('post-blocks-container').innerHTML = '';
            addPostBlock();
            document.getElementById('post-modal').style.display='flex';
            if(document.getElementById('side-menu').style.display === 'flex') toggleMenu('side-menu');
            updateAllTextareaHeights();
        }

        function editPost(idx) {
            const p = posts[idx];
            document.getElementById('edit-post-id').value = p.id;
            document.getElementById('post-modal-title').innerText = "投稿編集";
            document.getElementById('p-title').value = p.title;
            document.getElementById('post-blocks-container').innerHTML = '';
            p.blocks.forEach(b => addPostBlock(b));
            document.querySelector(`input[name="p-pos"][value="${p.pos}"]`).checked = true;
            document.getElementById('post-modal').style.display = 'flex';
            updateAllTextareaHeights();
        }

        function addPostBlock(data = {img: '', text: ''}) {
            const id = Date.now() + Math.random(), div = document.createElement('div');
            div.className = "post-block p-4 border rounded-xl mb-4 bg-stone-50";
            div.innerHTML = `<div class="preview-post mb-2" onclick="document.getElementById('p-file-${id}').click()"><img id="p-img-${id}" src="${data.img}" class="${data.img?'':'hidden'} clickable-img"><span id="p-hint-${id}" class="text-xs text-stone-300 ${data.img?'hidden':''} absolute inset-0 flex items-center justify-center font-bold">画像選択</span></div><input type="file" id="p-file-${id}" accept="image/*" class="hidden" onchange="loadBlockImg(event, '${id}')"><div class="input-bordered mt-2"><textarea class="auto-expand" placeholder="文章を入力...">${data.text||''}</textarea></div><button onclick="this.parentElement.remove()" class="text-xs text-red-400 mt-2">削除</button>`;
            document.getElementById('post-blocks-container').appendChild(div);
            setTimeout(() => updateAllTextareaHeights(), 0);
        }

        async function loadBlockImg(e, id) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader();
            rd.onload = (re) => {
                const img = document.getElementById(`p-img-${id}`);
                img.src = re.target.result; img.classList.remove('hidden');
                document.getElementById(`p-hint-${id}`).classList.add('hidden');
            };
            rd.readAsDataURL(f);
        }

        function viewPost(idx) {
            const p = posts[idx], art = document.getElementById('article-page');
            document.getElementById('art-title').innerText = p.title;
            const cont = document.getElementById('art-content'); cont.innerHTML = '';
            p.blocks.forEach(b => {
                if(b.img) cont.innerHTML += `<img src="${b.img}" class="w-full rounded-2xl shadow-sm clickable-img">`;
                if(b.text) cont.innerHTML += `<p class="wysiwyg-text text-stone-600 px-2">${b.text}</p>`;
            });
            document.getElementById('art-edit-btn').onclick = () => { closeArticle(); editPost(idx); };
            document.getElementById('art-del-btn').onclick = () => showConfirm("この投稿を削除しますか？", async () => {
                await sbClient.from('posts').delete().eq('id', p.id);
                location.reload();
            });
            art.style.display = 'block';
            history.pushState({page: 'article', index: idx}, "");
        }

        function closeArticle() { document.getElementById('article-page').style.display = 'none'; }

        function copyURL() {
            navigator.clipboard.writeText(window.location.href); showAlert("URLをコピーしました");
        }

        function shareSNS(type) {
            const url = encodeURIComponent(window.location.href), txt = encodeURIComponent(owner.name + "のドールギャラリー");
            if(type === 'x') window.open(`https://x.com/intent/tweet?url=${url}&text=${txt}`);
            else window.open(`https://social-plugins.line.me/lineit/share?url=${url}`);
        }

        function showInputDialog(m, onY) {
            const d = document.getElementById('custom-dialog');
            document.getElementById('dialog-message').innerText = m;
            document.getElementById('dialog-input-container').classList.remove('hidden');
            const bA = document.getElementById('dialog-buttons'); bA.innerHTML = '';
            const b1 = document.createElement('button');
            b1.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold";
            b1.innerText = "決定";
            b1.onclick = () => { onY(document.getElementById('dialog-text-input').value); closeDialog(); };
            const b2 = document.createElement('button');
            b2.className = "w-full bg-stone-100 py-4 rounded-full font-bold";
            b2.innerText = "キャンセル";
            b2.onclick = closeDialog;
            bA.append(b1, b2);
            d.style.display = 'flex';
        }

        async function requestClearAll() {
            showConfirm("全てのデータ(オーナー情報、うちの子、投稿)を完全に削除しますか？\nこの操作は取り消せません。", async () => {
                const { data: ownerData } = await sbClient.from('owners').select('id').eq('custom_id', galleryId).single();
                if(ownerData && ownerData.id === currentUser.id) {
                    await Promise.all([
                        sbClient.from('owners').delete().eq('id', currentUser.id),
                        sbClient.from('dolls').delete().eq('owner_id', currentUser.id),
                        sbClient.from('posts').delete().eq('owner_id', currentUser.id)
                    ]);
                    await sbClient.auth.signOut();
                    location.href = window.location.origin + window.location.pathname;
                }
            }, "完全に削除して初期化する");
        }

        function showConfirm(m, onY, yesText = "実行") {
            const d = document.getElementById('custom-dialog');
            document.getElementById('dialog-message').innerText = m;
            const bA = document.getElementById('dialog-buttons'); bA.innerHTML = '';
            const b1 = document.createElement('button');
            b1.className = "w-full bg-red-400 text-white py-4 rounded-full font-bold shadow-lg";
            b1.innerText = yesText;
            b1.onclick = () => { onY(); closeDialog(); };
            const b2 = document.createElement('button');
            b2.className = "w-full bg-stone-100 py-4 rounded-full font-bold";
            b2.innerText = "キャンセル";
            b2.onclick = closeDialog;
            bA.append(b1, b2);
            d.style.display = 'flex';
        }

        function showAlert(msg) {
            const d = document.getElementById('custom-dialog');
            document.getElementById('dialog-message').innerText = msg;
            const bA = document.getElementById('dialog-buttons'); bA.innerHTML = '';
            const b1 = document.createElement('button');
            b1.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold";
            b1.innerText = "OK"; b1.onclick = closeDialog;
            bA.appendChild(b1);
            d.style.display = 'flex';
        }

        function setupBackButton() {
            window.onpopstate = (event) => {
                const article = document.getElementById('article-page');
                const profile = document.getElementById('profile-overlay');
                const sideMenu = document.getElementById('side-menu');
                const modal = document.getElementById('modal');
                const ownerModal = document.getElementById('owner-modal');
                const postModal = document.getElementById('post-modal');
                const dollList = document.getElementById('doll-list-page');
                const postList = document.getElementById('post-list-page');

                if (article.style.display === 'block') {
                    closeArticle();
                    history.pushState({page: 'base'}, "");
                } else if (!profile.classList.contains('hidden')) {
                    closeProfile();
                    history.pushState({page: 'base'}, "");
                } else if (sideMenu.style.display === 'flex') {
                    toggleMenu('side-menu');
                    history.pushState({page: 'base'}, "");
                } else if (modal.style.display === 'flex' || ownerModal.style.display === 'flex' || postModal.style.display === 'flex') {
                    closeModal();
                    history.pushState({page: 'base'}, "");
                } else if (!dollList.classList.contains('hidden') || !postList.classList.contains('hidden')) {
                    showHome();
                    history.pushState({page: 'base'}, "");
                } else {
                    showConfirm("ログアウトしますか？", async () => {
                        await handleLogout();
                    }, "ログアウトする");
                    history.pushState({page: 'base'}, "");
                }
            };
        }
    </script>
</body>
</html>
