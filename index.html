<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; pointer-events: none; -webkit-user-drag: none; }
        .clickable-img { pointer-events: auto; }
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; pointer-events: auto; }
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        textarea { resize: none; overflow: hidden; user-select: auto !important; }
        .user-select-auto { user-select: auto !important; }
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; pointer-events: none; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; border: 1px solid transparent; }
        .cal-today { border: 2px solid #888; font-weight: bold; background-color: #f9f9f9; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        .color-grid { grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; box-shadow: 0 0 0 2px #fff; }
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        
        /* 管理メニュー制御用クラス */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        .viewer-only { display: block !important; }
        body.is-admin .viewer-only { display: none !important; }
    </style>
</head>

    <script>
        const SB_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let dollViewMode = 'grid', currentRawImg = { doll: null, owner: null }, loopInterval;
        let currentUser = null, galleryId = new URLSearchParams(window.location.search).get('id');

        const palette100 = (() => {
            const hues = [0, 30, 60, 120, 150, 180, 220, 280, 330], colors = [];
            for(let i=0; i<10; i++) colors.push(`hsl(0, 0%, ${Math.min(0 + (i * 11), 100)}%)`);
            hues.forEach(h => { for(let i=0; i<10; i++) colors.push(`hsl(${h}, 80%, ${Math.min(30 + (i * 7.2), 95)}%)`); });
            return colors.slice(0, 100);
        })();

        window.onload = async () => {
            initDateSelectors();
            initColorPalettes();
            setupAutoExpand();
            setupImageProtection();
            
            const { data: { session } } = await sbClient.auth.getSession();
            currentUser = session?.user || null;

            if (currentUser && !galleryId) {
                location.href = `?id=${currentUser.id}`;
                return;
            }

            if (galleryId) {
                await loadAllData(galleryId);
            } else {
                renderAll();
            }

            checkAdminStatus();

            sbClient.auth.onAuthStateChanged((_event, session) => {
                currentUser = session?.user || null;
                checkAdminStatus();
                renderAll();
            });
        };

        function checkAdminStatus() {
            const isAdmin = currentUser && (galleryId === currentUser.id);

        function renderAnni() {
            const area = document.getElementById('closest-anniversary'), happyArea = document.getElementById('happy-anniversary'), happyListArea = document.getElementById('happy-anniversary-list');
            area.innerHTML = ''; happyListArea.innerHTML = ''; happyArea.classList.add('hidden');
            let list = [], happyEvents = []; const now = new Date(), todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            dolls.forEach((d, idx) => {
                const ds = [{ type: 'birth', n: "誕生日", d: d.birthday }, { type: 'welcome', n: "お迎え日", d: d.welcome_day }, ...(d.anniversaries || []).map(a => ({ type: 'custom', n: a.name, d: a.date }))];
                ds.forEach(v => {
                    if(v.d) {
                        const originDate = new Date(v.d);
                        const isToday = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate());
                        const diffYears = now.getFullYear() - originDate.getFullYear();
                        let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate());
                        if(next < todayZero) next.setFullYear(now.getFullYear() + 1);
                        const daysToNext = Math.ceil((next - todayZero) / (1000 * 60 * 60 * 24));
                        if (isToday && diffYears >= 0) {
                            let text = (v.type === 'birth') ? `${d.name} の誕生日 ${diffYears}歳` : (v.type === 'welcome' ? (diffYears === 0 ? `${d.name} と出会った日！` : `${d.name} と出会って ${diffYears}年`) : (diffYears === 0 ? `${d.name} の ${v.n}` : `${d.name} の ${v.n} ${diffYears}年`));
                            happyEvents.push({ text, img: d.image, dollIdx: idx });
                        }
                        list.push({ doll: d.name, title: v.n, color: d.cal_color || '#E11D48', diff: daysToNext, isToday, idx });
                    }
                });
            });
            if (happyEvents.length > 0) {
                happyArea.classList.remove('hidden');
                happyEvents.forEach(ev => {
                    const div = document.createElement('div'); div.className = "bg-white p-3 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-3 cursor-pointer";
                    div.onclick = () => showDetail(ev.dollIdx);
                    div.innerHTML = `<img src="${ev.img}" class="w-12 h-12 rounded-full object-cover flex-shrink-0 border-2 border-pink-200"><p class="font-bold text-stone-800 text-sm">${ev.text}</p><span class="ml-auto text-xl">🎉</span>`;
                    happyListArea.appendChild(div);
                });
            }
            if(list.length > 0) {
                list.sort((a,b) => a.diff - b.diff);
                const closest = list.filter(item => item.diff === list[0].diff);
                let html = `<div class="space-y-3">`;
                closest.forEach(b => { html += `<div class="bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold">${b.doll}</p><p class="font-bold">${b.title}</p></div><b class="text-lg">${b.isToday ? "Today" : "あと "+b.diff+" 日"}</b></div>`; });
                area.innerHTML = html + `</div>`;
            }
        }

        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days'), map = {};
            area.innerHTML = '';
            dolls.forEach((d, idx) => {
                [{n: "誕生日", d: d.birthday}, {n: "お迎え日", d: d.welcome_day}, ...(d.anniversaries || [])].forEach(ev => { 
                    if(ev.d || ev.date) { 
                        const dt = new Date(ev.d || ev.date); 
                        if(dt.getMonth() === m) { 
                            const day = dt.getDate(); if(!map[day]) map[day] = []; 
                            map[day].push({ dollName: d.name, eventName: ev.n || ev.name, calColor: d.cal_color || '#E11D48', uBg: d.bg_color || '#ffffff', uTxt: d.text_color || '#000000', mm: m+1, dd: day, order: idx }); 
                        } 
                    } 
                });
            });
            for(let i=0; i<firstDay; i++) area.appendChild(document.createElement('div'));
            const realToday = new Date();
            for(let d=1; d<=lastDate; d++) {
                const isRealToday = (realToday.getFullYear()===y && realToday.getMonth()===m && realToday.getDate()===d);
                const annis = map[d], div = document.createElement('div'); div.className = `cal-day ${isRealToday?'cal-today':''}`;
                div.innerHTML = `<span>${d}</span>`;
                if(annis) {
                    const dots = document.createElement('div'); dots.className="cal-dots";
                    annis.sort((a,b)=>a.order-b.order).forEach(a => { const dot=document.createElement('div'); dot.className="cal-dot"; dot.style.backgroundColor=a.calColor; dots.appendChild(dot); });
                    div.appendChild(dots);
                    div.onclick = () => {
                        const evC = document.getElementById('day-events'); evC.innerHTML = '';
                        annis.forEach(a => { const r=document.createElement('div'); r.className="p-5 rounded-2xl shadow-sm border text-lg space-y-1"; r.style.backgroundColor=a.uBg; r.style.color=a.uTxt; r.innerHTML=`<div class="font-bold">${a.dollName}：${a.mm}/${a.dd}</div><div class="opacity-80">${a.eventName}</div>`; evC.appendChild(r); });
                    };
                }
                area.appendChild(div);
            }
        }

        async function processImageToWebP(imgEl, size, cropH, cropV) {
            return new Promise((resolve) => {
                const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d'); cvs.width = cvs.height = size;
                const s = Math.max(size/imgEl.width, size/imgEl.height);
                ctx.drawImage(imgEl, (size-imgEl.width*s)*(cropH/100), (size-imgEl.height*s)*(cropV/100), imgEl.width*s, imgEl.height*s);
                resolve(cvs.toDataURL('image/webp', 0.8));
            });
        }

            document.getElementById('modal').style.display = 'flex'; 
        }

        function addAnniversaryInput(v = {name:'', date:''}) { 
            const id = Date.now() + Math.random(), div = document.createElement('div'); 
            div.className = "p-4 bg-stone-100/50 rounded-2xl space-y-2 border"; 
            div.innerHTML = `<div class="flex justify-between items-center"><span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">記念日</span><button onclick="this.parentElement.parentElement.remove()" class="text-stone-400 text-xs">✕ 削除</button></div><input type="text" class="f-anni-name w-full border-b bg-transparent py-1 text-sm font-bold outline-none" placeholder="記念日名" value="${v.name}"><div class="flex gap-2 items-center"><select id="m-${id}" class="f-anni-m border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option>${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select><select id="d-${id}" class="f-anni-d border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option>${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select></div><input type="date" id="date-${id}" class="date-input f-anni-date">`; 
            document.getElementById('anniversary-inputs').appendChild(div); 
            if(v.date) setDateValue(v.date, `date-${id}`, `m-${id}`, `d-${id}`); 
        }

        function openOwnerModal() { 
            document.getElementById('o-name').value = owner.name; 
            document.getElementById('o-bio').value = owner.bio; 
            document.getElementById('sns-inputs-container').innerHTML = ''; 
            (owner.sns || []).forEach(s => addSnsInput(s)); 
            if(owner.image) { 
                const p = document.getElementById('owner-preview'); 
                p.src = owner.image; p.classList.remove('hidden'); 
                document.getElementById('owner-hint').classList.add('hidden'); 
            } 
            document.getElementById('owner-modal').style.display='flex'; 
            if(document.getElementById('side-menu').style.display === 'flex') toggleMenu('side-menu'); 
        }

        function addSnsInput(v = {type:'X(旧Twitter)', val:''}) { 
            const div = document.createElement('div'); 
            div.className = "sns-input-row flex gap-2 items-center"; 
            div.innerHTML = `<select class="sns-type text-sm border p-2 rounded-lg bg-white h-10 outline-none">${['X(旧Twitter)','Instagram','mixi2','Bluesky','Misskey','その他URL'].map(t => `<option ${v.type===t?'selected':''}>${t}</option>`).join('')}</select><input type="text" class="sns-val flex-1 text-sm border p-2 rounded-lg h-10 outline-none" placeholder="ID or URL" value="${v.val}"><button onclick="this.parentElement.remove()" class="p-2 text-stone-400">✕</button>`; 
            document.getElementById('sns-inputs-container').appendChild(div); 
        }

        function openPostModal() { 
            document.getElementById('edit-post-id').value = ""; 
            document.getElementById('post-modal-title').innerText = "投稿作成"; 
            document.getElementById('p-title').value = ""; 
            document.getElementById('post-blocks-container').innerHTML = ''; 
            addPostBlock(); 
            document.getElementById('post-modal').style.display='flex'; 
            if(document.getElementById('side-menu').style.display === 'flex') toggleMenu('side-menu'); 
        }

        function editPost(idx) { 
            const p = posts[idx]; 
            document.getElementById('edit-post-id').value = p.id; 
            document.getElementById('post-modal-title').innerText = "投稿編集"; 
            document.getElementById('p-title').value = p.title; 
            document.getElementById('post-blocks-container').innerHTML = ''; 
            p.blocks.forEach(b => addPostBlock(b)); 
            document.querySelector(`input[name="p-pos"][value="${p.pos}"]`).checked = true; 
            document.getElementById('post-modal').style.display = 'flex'; 
        }

        function addPostBlock(data = {img: '', text: ''}) { 
            const id = Date.now() + Math.random(), div = document.createElement('div'); 
            div.className = "post-block p-4 border rounded-xl mb-4 bg-stone-50"; 
            div.innerHTML = `<div class="preview-sq mb-2" onclick="document.getElementById('p-file-${id}').click()"><img id="p-img-${id}" src="${data.img}" class="${data.img?'':'hidden'}"><span id="p-hint-${id}" class="text-xs text-stone-300 ${data.img?'hidden':''}">画像選択</span></div><input type="file" id="p-file-${id}" accept="image/*" class="hidden" onchange="loadBlockImg(event, '${id}')"><textarea class="w-full text-sm p-3 border rounded-xl h-24 mt-2 outline-none auto-expand" placeholder="文章を入力...">${data.text||''}</textarea><button onclick="this.parentElement.remove()" class="text-xs text-red-400 mt-2">削除</button>`; 
            document.getElementById('post-blocks-container').appendChild(div); 
        }

        async function loadBlockImg(e, id) { 
            const f = e.target.files[0]; if(!f) return; 
            const rd = new FileReader(); 
            rd.onload = (re) => { 
                const img = new Image(); 
                img.onload = async () => { 
                    const webp = await processImageToWebP(img, 1000, 50, 50); 
                    const t = document.getElementById('p-img-'+id); 
                    t.src = webp; t.classList.remove('hidden'); 
                    document.getElementById('p-hint-'+id).classList.add('hidden'); 
                }; 
                img.src = re.target.result; 
            }; 
            rd.readAsDataURL(f); 
        }

        function deletePostDirectly(idx) { 
            const p = posts[idx]; 
            showConfirm("削除しますか？", async () => { 
                await sbClient.from('posts').delete().eq('id', p.id); 
                location.reload(); 
            }); 
        }

        function viewPost(idx) { 
            const p = posts[idx]; 
            document.getElementById('art-title').innerText = p.title; 
            const c = document.getElementById('art-content'); 
            c.innerHTML = ''; 
            p.blocks.forEach(b => { 
                if(b.img) { const i = document.createElement('img'); i.src = b.img; i.className = "w-full rounded-2xl mb-4 clickable-img"; c.appendChild(i); } 
                if(b.text) { const t = document.createElement('p'); t.className = "text-stone-700 whitespace-pre-wrap leading-relaxed mb-6 user-select-auto"; t.innerText = b.text; c.appendChild(t); } 
            }); 
            document.getElementById('art-edit-btn').onclick = () => { closeArticle(); editPost(idx); }; 
            document.getElementById('art-del-btn').onclick = () => showConfirm("削除しますか？", async () => { await sbClient.from('posts').delete().eq('id', p.id); location.reload(); }); 
            document.getElementById('article-page').style.display = 'block'; 
        }

        function setupInfiniteScroll() { 
            const container = document.getElementById('film-container'); 
            container.addEventListener('scroll', () => { 
                const items = dolls.filter(d => d.image); if (items.length < 5) return; 
                const w = items.length * (80 + 12); 
                if (container.scrollLeft < w * 0.5) container.scrollLeft += w; 
                if (container.scrollLeft > w * 1.5) container.scrollLeft -= w; 
            }); 
        }

        function shareSNS(type) { 
            const url = window.location.origin + window.location.pathname + (galleryId ? '?id='+galleryId : ''); 
            if(type === 'line') window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}`, '_blank'); 
            else if(type === 'x') window.open(`https://twitter.com/intent/tweet?text=Doll Uchinoko Gallery&url=${encodeURIComponent(url)}`, '_blank'); 
        }

        function copyURL() { 
            const url = window.location.origin + window.location.pathname + (galleryId ? '?id='+galleryId : ''); 
            navigator.clipboard.writeText(url).then(() => { showAlert("コピーしました"); }); 
        }

        async function requestClearAll() { 
            showConfirm("全てのデータを削除しますか？\n(この操作は取り消せません)", async () => { 
                if (currentUser && galleryId === currentUser.id) { 
                    await Promise.all([
                        sbClient.from('owners').delete().eq('id', currentUser.id), 
                        sbClient.from('dolls').delete().eq('owner_id', currentUser.id), 
                        sbClient.from('posts').delete().eq('owner_id', currentUser.id)
                    ]); 
                    await sbClient.auth.signOut();
                    location.href = window.location.origin + window.location.pathname;
                } 
            }, "完全に削除して初期化する"); 
        }

        function showConfirm(m, onY, yesText = "実行") { 
            const d = document.getElementById('custom-dialog'); 
            document.getElementById('dialog-message').innerText = m; 
            const bA = document.getElementById('dialog-buttons'); 
            bA.innerHTML = ''; 
            const b1 = document.createElement('button'); 
            b1.className = "w-full bg-red-400 text-white py-4 rounded-full font-bold shadow-lg"; 
            b1.innerText = yesText; 
            b1.onclick = () => { onY(); closeDialog(); }; 
            const b2 = document.createElement('button'); 
            b2.className = "w-full bg-stone-100 py-4 rounded-full font-bold"; 
            b2.innerText = "キャンセル"; 
            b2.onclick = closeDialog; 
            bA.append(b1, b2); 
            d.style.display = 'flex'; 
        }

        function showAlert(msg, callback = null) { 
            const dialog = document.getElementById('custom-dialog'); 
            document.getElementById('dialog-message').innerText = msg; 
            const buttons = document.getElementById('dialog-buttons'); 
            buttons.innerHTML = ''; 
            const btn = document.createElement('button'); 
            btn.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold"; 
            btn.innerText = "OK"; 
            btn.onclick = () => { closeDialog(); if(callback) callback(); }; 
            buttons.appendChild(btn); 
            dialog.style.display = 'flex'; 
        }

        function showInputDialog(m, onOk) { 
            const d = document.getElementById('custom-dialog'); 
            document.getElementById('dialog-message').innerText = m; 
            document.getElementById('dialog-input-container').classList.remove('hidden'); 
            const input = document.getElementById('dialog-text-input'); 
            input.value = ""; 
            const bA = document.getElementById('dialog-buttons'); 
            bA.innerHTML = ''; 
            const b1 = document.createElement('button'); 
            b1.className = "w-full bg-blue-500 text-white py-4 rounded-full font-bold shadow-lg"; 
            b1.innerText = "決定してログイン"; 
            b1.onclick = () => { if(input.value) { onOk(input.value); closeDialog(); } }; 
            const b2 = document.createElement('button'); 
            b2.className = "w-full bg-stone-100 py-4 rounded-full font-bold"; 
            b2.innerText = "キャンセル"; 
            b2.onclick = closeDialog; 
            bA.append(b1, b2); 
            d.style.display = 'flex'; 
            input.focus(); 
        }

        function setupAutoExpand() { 
            document.addEventListener('input', (e) => { 
                if (e.target.classList.contains('auto-expand')) { 
                    e.target.style.height = 'auto'; 
                    e.target.style.height = e.target.scrollHeight + 'px'; 
                } 
            }); 
        }

        function setupImageProtection() { 
            document.addEventListener('dragstart', (e) => { 
                if(e.target.tagName === 'IMG') e.preventDefault(); 
            }); 
        }
    </script>
</body>
</html>
