<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        .url-input-field { width: 100%; border: 1px solid #e5e7eb; padding: 12px; border-radius: 12px; font-size: 14px; outline: none; margin-bottom: 8px; }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        @keyframes pulse-anni { 0% { transform: scale(1); } 70% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .date-input { width: 0; height: 0; opacity: 0; position: absolute; pointer-events: none; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <div id="custom-dialog">
        <div class="bg-white w-full max-w-xs p-8 rounded-3xl shadow-2xl text-center">
            <p id="dialog-message" class="text-[16px] mb-8 leading-relaxed font-bold whitespace-pre-wrap text-stone-700"></p>
            <div id="dialog-inputs" class="mb-6 space-y-4 hidden">
                <input type="text" id="auth-gallery-id" class="w-full border p-3 rounded-xl text-sm outline-none focus:border-stone-400" placeholder="公開用ID(半角英数)">
            </div>
            <div id="dialog-buttons" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div class="film-outer" id="film-container">
        <div id="top-film-roll" class="film-scroll-track"></div>
        <div id="empty-msg" class="absolute inset-0 flex items-center justify-center text-stone-500 text-xs font-bold">画像URLが登録されるとここに並びます</div>
    </div>

    <header class="p-4 bg-white border-b sticky top-0 z-[100] flex justify-between items-center">
        <h1 onclick="showHome()" class="logo-font text-3xl cursor-pointer">Doll Uchinoko Gallery</h1>
        <div onclick="toggleMenu('side-menu')" class="p-2 cursor-pointer">
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800"></div>
        </div>
    </header>

    <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">
        <div class="bg-white w-72 h-full ml-auto p-6 flex flex-col overflow-y-auto" onclick="event.stopPropagation()">
            <div class="space-y-1">
                <button onclick="showHome(); toggleMenu('side-menu');" class="text-left py-4 font-bold border-b w-full text-stone-800">🏠 ホーム</button>
                <button onclick="openModalWithClear()" class="text-left py-4 font-bold border-b text-blue-600 w-full admin-only">✨ うちの子を登録する</button>
                <button onclick="showDollList()" class="text-left py-4 font-bold border-b w-full text-stone-800">📸 うちの子一覧</button>
                <button onclick="showPostListPage()" class="text-left py-4 font-bold border-b w-full text-stone-800">📝 投稿一覧</button>
            </div>
            <div class="py-6 space-y-2 border-b">
                <button id="login-btn" onclick="handleGoogleLogin()" class="w-full py-3 bg-stone-800 rounded-xl text-xs font-bold text-white">Googleでログイン</button>
                <button id="logout-btn" onclick="handleLogout()" class="w-full py-3 bg-red-50 rounded-xl text-xs font-bold text-red-400 hidden">ログアウト</button>
            </div>
            <div class="py-10 space-y-4 admin-only">
                <button onclick="openOwnerModal()" class="w-full py-4 bg-stone-100 rounded-2xl text-sm font-bold shadow-sm">👤 オーナー設定</button>
                <button onclick="openPostModal()" class="w-full py-4 bg-stone-800 text-white rounded-2xl text-sm font-bold shadow-lg">📝 投稿を追加</button>
                <button onclick="requestClearAll()" class="w-full py-3 text-red-300 text-[10px] font-bold">全データ削除（初期化）</button>
            </div>
            <div class="mt-auto pt-10 space-y-4">
                <div class="flex gap-2 justify-center mb-4">
                    <button onclick="shareSNS('x')" class="w-8 h-8 bg-stone-100 rounded-full flex items-center justify-center text-sm">𝕏</button>
                    <button onclick="shareSNS('line')" class="w-8 h-8 bg-stone-100 rounded-full flex items-center justify-center text-sm">L</button>
                </div>
                <button onclick="requestNewGallery()" class="w-full py-3 bg-cyan-50 text-cyan-500 rounded-xl text-xs font-bold border border-cyan-100 shadow-sm">🆕 新規ギャラリー作成</button>
            </div>
        </div>
    </div>

    <main id="home-content" class="max-w-md mx-auto">
        <section id="owner-section" class="p-8 bg-white text-center">
            <img id="display-owner-img" class="w-24 h-24 rounded-full object-cover mx-auto mb-4 border-4 border-stone-5 hidden">
            <h2 id="owner-name" class="text-2xl font-bold mb-2"></h2>
            <p id="owner-bio" class="text-sm text-stone-500 px-4 mb-6"></p>
            <div id="owner-sns-links" class="flex flex-col items-center gap-3"></div>
        </section>

        <section class="p-6 bg-stone-50">
            <div id="happy-anniversary" class="mb-8 hidden">
                <h3 class="text-[10px] font-bold text-pink-500 uppercase mb-4 tracking-widest border-b border-pink-100 pb-2">Happy Anniversary!</h3>
                <div id="happy-anniversary-list"></div>
            </div>
            <h3 class="text-[10px] font-bold text-stone-400 uppercase mb-4 tracking-widest border-b pb-2">Next Anniversary</h3>
            <div id="closest-anniversary"></div>
        </section>

        <section class="p-8 bg-white mt-4 border-t">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="p-2">◀</button>
                <h3 id="cal-month" class="font-bold text-lg text-stone-600"></h3>
                <button onclick="changeMonth(1)" class="p-2">▶</button>
            </div>
            <div id="cal-days" class="cal-grid mb-6 text-stone-400"></div>
            <div id="day-events" class="space-y-3"></div>
        </section>

        <div id="home-posts" class="p-6 space-y-8"></div>
    </main>

    <div id="doll-list-page" class="max-w-md mx-auto hidden p-6">
        <div class="flex justify-between items-center mb-6">
            <button onclick="showHome()" class="text-sm font-bold bg-stone-100 px-4 py-2 rounded-full">戻る</button>
            <button id="toggle-list-view" onclick="toggleDollViewMode()" class="text-xs font-bold bg-stone-800 text-white px-4 py-2 rounded-full">名前を表示</button>
        </div>
        <div id="doll-display-area"></div>
    </div>

    <div id="post-list-page" class="max-w-md mx-auto hidden p-6">
        <div class="mb-6"><button onclick="showHome()" class="text-sm font-bold bg-stone-100 px-4 py-2 rounded-full">戻る</button></div>
        <h2 class="text-xl font-bold mb-6">投稿一覧</h2>
        <div id="menu-post-list" class="space-y-2"></div>
    </div>

    <div id="modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 id="modal-title" class="text-xl font-bold mb-6">うちの子登録</h3>
            
            <p class="text-[10px] font-bold text-stone-400 mb-2 uppercase tracking-widest">画像URL</p>
            <input type="text" id="f-img-url" class="url-input-field" placeholder="https://..." oninput="updateUrlPreview('crop-preview', this.value)">
            
            <div class="crop-area">
                <div class="preview-sq"><img id="crop-preview" class="hidden"></div>
                <div class="v-bar-box"><input type="range" id="crop-v" min="0" max="100" value="50" class="vertical-range" oninput="updatePosition('crop-preview', 'crop-h', 'crop-v')"></div>
            </div>
            <input type="range" id="crop-h" min="0" max="100" value="50" class="w-full mb-6" oninput="updatePosition('crop-preview', 'crop-h', 'crop-v')">
            
            <div class="space-y-6">
                <input type="hidden" id="edit-id">
                <input type="text" id="f-name" class="w-full border-b p-2 font-bold text-lg outline-none" placeholder="お名前">
                <input type="text" id="f-kana" class="w-full border-b p-2 text-sm outline-none" placeholder="ふりがな">
                
                <div class="p-4 bg-stone-50 rounded-2xl space-y-4">
                    <input type="text" id="f-size-label" class="w-full border-b bg-transparent py-2 text-sm font-bold outline-none" placeholder="SIZE">
                    <input type="text" id="f-body-make" class="w-full border-b bg-transparent py-2 text-sm outline-none" placeholder="BODY">
                    <input type="text" id="f-head" class="w-full border-b bg-transparent py-2 text-sm outline-none" placeholder="HEAD">
                </div>

                <div class="p-4 bg-stone-50 rounded-2xl space-y-4">
                    <p class="text-[10px] font-bold text-stone-400 tracking-widest uppercase">カラー設定</p>
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('bg')"><span class="text-xs text-stone-500 font-bold">背景色</span><div id="bg-select-icon" class="color-select-btn"></div></div>
                    <div id="bg-color-grid" class="color-grid"></div><input type="hidden" id="f-bg-color" value="#ffffff">
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('text')"><span class="text-xs text-stone-500 font-bold">文字色</span><div id="text-select-icon" class="color-select-btn"></div></div>
                    <div id="text-color-grid" class="color-grid"></div><input type="hidden" id="f-text-color" value="#000000">
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('cal')"><span class="text-xs text-stone-500 font-bold">カレンダー強調色</span><div id="cal-select-icon" class="color-select-btn"></div></div>
                    <div id="cal-color-grid" class="color-grid"></div><input type="hidden" id="f-cal-color" value="#E11D48">
                </div>

                <div class="space-y-4 text-sm px-2">
                    <div class="border-b pb-4"><span class="block text-stone-400 text-[10px] font-bold mb-1 uppercase tracking-widest">誕生日</span>
                        <div class="flex gap-2 mb-2 items-center"><select id="f-bday-m" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select><select id="f-bday-d" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select></div>
                        <input type="date" id="f-bday" class="date-input" oninput="syncDateSelectors('f-bday', 'f-bday-m', 'f-bday-d')">
                    </div>
                    <div class="border-b pb-4"><span class="block text-stone-400 text-[10px] font-bold mb-1 uppercase tracking-widest">お迎え日</span>
                        <div class="flex gap-2 mb-2 items-center"><select id="f-welcome-m" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select><select id="f-welcome-d" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select></div>
                        <input type="date" id="f-welcome" class="date-input" oninput="syncDateSelectors('f-welcome', 'f-welcome-m', 'f-welcome-d')">
                    </div>
                </div>

                <div id="anniversary-inputs" class="space-y-3"></div>
                <button onclick="addAnniversaryInput()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-xl text-xs text-stone-400 font-bold">+ 記念日を追加</button>
                
                <textarea id="f-profile" class="w-full border p-4 rounded-2xl min-h-[120px] text-sm outline-none" placeholder="プロフィール"></textarea>
                <button onclick="saveData()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold text-lg shadow-xl">保存する</button>
            </div>
        </div>
    </div>

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div id="profile-bg" class="min-h-full p-6 pb-32">
            <button onclick="closeProfile()" class="bg-white shadow px-6 py-2 rounded-full text-xs font-bold mb-6">閉じる</button>
            <img id="view-img" class="w-full aspect-square object-cover rounded-3xl shadow-xl mb-8">
            <div class="text-center mb-8"><p id="view-kana" class="text-sm opacity-70 mb-1"></p><h2 id="view-name" class="text-3xl font-bold"></h2></div>
            <div id="detail-box" class="bg-white/20 backdrop-blur-md p-6 rounded-3xl space-y-4 mb-8 text-[16px] hidden"></div>
            <p id="view-profile" class="whitespace-pre-wrap leading-relaxed px-2 text-[18px] font-medium"></p>
            <div class="fixed bottom-6 inset-x-0 px-6 flex gap-4 max-w-md mx-auto admin-only-flex hidden">
                <button id="detail-edit-btn" class="flex-1 bg-stone-800 text-white py-4 rounded-full font-bold">編集</button>
                <button id="detail-del-btn" class="flex-1 bg-red-50 text-red-400 py-4 rounded-full font-bold border border-red-100">削除</button>
            </div>
        </div>
    </div>

    <div id="owner-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <p class="text-[10px] font-bold text-stone-400 mb-2 uppercase tracking-widest">画像URL</p>
            <input type="text" id="o-img-url" class="url-input-field" placeholder="https://..." oninput="updateUrlPreview('owner-preview', this.value)">
            <div class="crop-area">
                <div class="preview-sq"><img id="owner-preview" class="hidden"></div>
                <div class="v-bar-box"><input type="range" id="o-crop-v" min="0" max="100" value="50" class="vertical-range" oninput="updatePosition('owner-preview', 'o-crop-h', 'o-crop-v')"></div>
            </div>
            <input type="range" id="o-crop-h" min="0" max="100" value="50" class="w-full mb-6" oninput="updatePosition('owner-preview', 'o-crop-h', 'o-crop-v')">
            <div class="space-y-4">
                <input type="text" id="o-name" class="w-full border-b p-2 font-bold outline-none" placeholder="オーナー名">

                <div id="sns-inputs-container" class="space-y-3"></div>
                <button onclick="addSnsInput()" class="w-full py-2 bg-stone-100 rounded text-[10px] font-bold">+ SNSリンクを追加</button>
                <button onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">保存</button>
            </div>
        </div>

    <div id="post-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 id="post-modal-title" class="text-xl font-bold mb-4">投稿作成</h3>
            <input type="hidden" id="edit-post-id">
            <input type="text" id="p-title" class="w-full border-b p-3 font-bold mb-4 outline-none" placeholder="タイトル">
            <div id="post-blocks-container" class="space-y-4"></div>
            <button onclick="addPostBlock()" class="w-full py-4 border-2 border-dashed border-stone-200 rounded-2xl text-stone-400 text-sm font-bold mt-4">+ ブロック追加</button>
            <div class="flex gap-4 p-4 bg-stone-50 rounded-2xl text-[10px] font-bold mt-6 items-center">
                <span>表示場所:</span>
                <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="p-pos" value="home" checked> ホーム</label>
                <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="p-pos" value="menu"> 投稿一覧</label>

            <button onclick="savePost()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold mt-6">保存する</button>

    <div id="article-page" style="display:none; position:fixed; inset:0; background:white; z-index:10001; overflow-y:auto;">
        <div class="max-w-2xl mx-auto p-6 pb-20">
            <div class="flex justify-between items-center py-6 mb-10 border-b">
                <button onclick="closeArticle()" class="text-sm font-bold text-stone-400">← 戻る</button>
                <div class="flex gap-4 admin-only-flex hidden">
                    <button id="art-edit-btn" class="text-xs font-bold bg-stone-100 px-4 py-2 rounded-full">編集</button>
                    <button id="art-del-btn" class="text-xs font-bold bg-red-50 text-red-400 px-4 py-2 rounded-full">削除</button>
                </div>
            </div>
            <h2 id="art-title" class="text-3xl font-bold text-center mb-12"></h2>
            <div id="art-content" class="space-y-6"></div>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWzLwhTnOg58o4rdf-T8e0E57_dLGm2gk",
            authDomain: "doll-uchinoko-gallery.firebaseapp.com",
            projectId: "doll-uchinoko-gallery"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        window.fb = { db, doc, setDoc, getDoc, updateDoc, auth, provider, signInWithPopup, signOut, onAuthStateChanged };
    </script>

    <script>
        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"", pos:"50% 50%" }, posts = [], calOffset = 0, dollViewMode = 'grid', isLoggedIn = false, adminEmail = "";
        const urlParams = new URLSearchParams(window.location.search), galleryId = urlParams.get('id');

        window.onload = () => {
            const check = setInterval(async () => {
                if(window.fb) {
                    clearInterval(check);
                    initDateSelectors(); initColorPalettes();
                    if (!galleryId || urlParams.get('mode') === 'new') { openCreationModal(); } 
                    else { await loadData(); }
                    window.fb.onAuthStateChanged(window.fb.auth, (user) => {
                        isLoggedIn = (user && adminEmail && user.email === adminEmail);
                        renderAll();
                    });
                }
            }, 100);
        };

        async function loadData() {
            const snap = await window.fb.getDoc(window.fb.doc(window.fb.db, "galleries", galleryId));
            if(snap.exists()){
                const d = snap.data();
                dolls = d.dolls || []; owner = d.owner || owner; posts = d.posts || []; adminEmail = d.adminEmail || "";
                renderAll();
            }
        }

        async function sync() {
            if(!isLoggedIn) return;
            await window.fb.updateDoc(window.fb.doc(window.fb.db, "galleries", galleryId), { dolls, owner, posts });
        }

        function renderAll() {
            document.body.classList.toggle('is-admin', isLoggedIn);
            document.getElementById('login-btn').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('logout-btn').style.display = isLoggedIn ? 'block' : 'none';

            const track = document.getElementById('top-film-roll'); track.innerHTML = '';
            dolls.forEach((d, i) => {
                if(d.image) {
                    const img = document.createElement('img'); img.src = d.image; img.className = "film-frame";
                    img.style.objectPosition = d.pos || "50% 50%";
                    img.onclick = () => showDetail(i); track.appendChild(img);
                }
            });
            document.getElementById('empty-msg').style.display = dolls.length ? 'none' : 'flex';

            document.getElementById('display-owner-img').src = owner.image || "";
            document.getElementById('display-owner-img').style.objectPosition = owner.pos || "50% 50%";
            document.getElementById('display-owner-img').classList.toggle('hidden', !owner.image);
            document.getElementById('owner-name').innerText = owner.name;
            document.getElementById('owner-bio').innerText = owner.bio;
            const snsArea = document.getElementById('owner-sns-links'); snsArea.innerHTML = '';
            (owner.sns || []).forEach(s => {
                const a = document.createElement('a'); a.href = s.val; a.target = "_blank"; a.className = "block w-full max-w-[200px] text-center bg-white border py-2 rounded-xl text-xs font-bold shadow-sm"; a.innerText = "🔗 " + s.type; snsArea.appendChild(a);
            });

            const hp = document.getElementById('home-posts'); hp.innerHTML = '';
            const mpl = document.getElementById('menu-post-list'); mpl.innerHTML = '';
            posts.forEach((p, i) => {
                if(p.pos === 'home') {
                    const card = document.createElement('div'); card.className = "bg-white rounded-[32px] p-6 pt-12 border shadow-sm relative";
                    if(isLoggedIn) card.innerHTML = `<button onclick="editPost(${i})" class="absolute top-4 right-4 text-[10px] bg-stone-100 p-2 rounded font-bold">編集</button>`;
                    card.innerHTML += `<h4 class="font-bold mb-4 text-lg border-b pb-2">${p.title}</h4>`;
                    p.blocks.forEach(b => {
                        if(b.img) card.innerHTML += `<img src="${b.img}" class="w-full rounded-2xl mb-4">`;
                        if(b.text) card.innerHTML += `<p class="text-sm text-stone-600 mb-6 whitespace-pre-wrap">${b.text}</p>`;
                    });
                    hp.appendChild(card);
                } else {
                    const btn = document.createElement('button'); btn.className = "w-full text-left py-4 px-6 bg-white border rounded-2xl font-bold mb-2"; btn.innerText = "📝 " + p.title; btn.onclick = () => viewPost(i); mpl.appendChild(btn);
                }
            });
            renderCalendar(); renderAnni();
        }

        // 画像URL関連
        function updateUrlPreview(id, url) {
            const el = document.getElementById(id);
            if(url) { el.src = url; el.classList.remove('hidden'); } else { el.classList.add('hidden'); }
        }
        function updatePosition(imgId, hId, vId) {
            document.getElementById(imgId).style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`;
        }

        // 保存・同期
        async function saveData() {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value,
                image: document.getElementById('f-img-url').value, pos: `${document.getElementById('crop-h').value}% ${document.getElementById('crop-v').value}%`,
                bodySize: document.getElementById('f-size-label').value, bodyMake: document.getElementById('f-body-make').value, head: document.getElementById('f-head').value,
                birthday: getDateValue('f-bday', 'f-bday-m', 'f-bday-d'), welcomeDay: getDateValue('f-welcome', 'f-welcome-m', 'f-welcome-d'),
                anniversaries: Array.from(document.querySelectorAll('#anniversary-inputs > div')).map(row => ({ name: row.querySelector('.f-anni-name').value, date: getDateValue(row.querySelector('.f-anni-date').id, row.querySelector('.f-anni-m').id, row.querySelector('.f-anni-d').id) })).filter(a => a.name),
                bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value, profile: document.getElementById('f-profile').value
            };
            if(id === "") dolls.push(data); else dolls[id] = data;
            await sync(); location.reload();
        }

        async function saveOwner() {
            owner = {
                name: document.getElementById('o-name').value, bio: document.getElementById('o-bio').value,
                image: document.getElementById('o-img-url').value, pos: `${document.getElementById('o-crop-h').value}% ${document.getElementById('o-crop-v').value}%`,
                sns: Array.from(document.querySelectorAll('.sns-input-row')).map(row => ({ type: row.querySelector('.sns-type').value, val: row.querySelector('.sns-val').value })).filter(s => s.val)
            };
            await sync(); location.reload();
        }

        async function savePost() {
            const blocks = Array.from(document.querySelectorAll('.post-block')).map(el => ({ img: el.querySelector('.block-img-url').value, text: el.querySelector('textarea').value }));
            const idx = document.getElementById('edit-post-id').value, data = { title: document.getElementById('p-title').value, blocks, pos: document.querySelector('input[name="p-pos"]:checked').value };
            if(idx === "") posts.push(data); else posts[idx] = data;
            await sync(); location.reload();
        }

        // ダイアログ・ユーティリティ
        function showConfirm(msg, onOk, okLabel = \"OK\") {
            const d = document.getElementById('custom-dialog'), m = document.getElementById('dialog-message'), b = document.getElementById('dialog-buttons');
            m.innerText = msg; b.innerHTML = '';
            const ok = document.createElement('button'); ok.className = \"bg-stone-800 text-white py-4 rounded-2xl font-bold\"; ok.innerText = okLabel;
            ok.onclick = () => { d.style.display = 'none'; onOk(); };
            const cancel = document.createElement('button'); cancel.className = \"text-stone-400 text-sm font-bold py-2\"; cancel.innerText = \"キャンセル\";
            cancel.onclick = () => d.style.display = 'none';
            b.appendChild(ok); b.appendChild(cancel); d.style.display = 'flex';
        }

        async function openCreationModal() {
            const gid = prompt(\"新しいギャラリーID(半角英数)\"); if(!gid) return;
            const res = await window.fb.signInWithPopup(window.fb.auth, window.fb.provider);
            await window.fb.setDoc(window.fb.doc(window.fb.db, \"galleries\", gid), { adminEmail: res.user.email, dolls: [], owner: {}, posts: [] });
            window.location.search = `?id=${gid}`;
        }

        // カレンダー・記念日ロジック
        function renderCalendar() {
            const now = new Date(), view = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
            document.getElementById('cal-month').innerText = `${view.getFullYear()} / ${view.getMonth()+1}`;
            const area = document.getElementById('cal-days'); area.innerHTML = '';
            const last = new Date(view.getFullYear(), view.getMonth()+1, 0).getDate();
            for(let i=1; i<=last; i++) {
                const d = document.createElement('div'); d.className = \"cal-day\"; d.innerText = i;
                const events = getEvents(view.getFullYear(), view.getMonth()+1, i);
                if(events.length) {
                    const dots = document.createElement('div'); dots.className = \"cal-dots\";
                    events.forEach(ev => { const dot = document.createElement('div'); dot.className = \"cal-dot\"; dot.style.backgroundColor = ev.color || \"#E11D48\"; dots.appendChild(dot); });
                    d.appendChild(dots); d.onclick = () => showDayEvents(events);
                }
                area.appendChild(d);
            }
        }
        function getEvents(y, m, d) {
            const res = [];
            dolls.forEach(doll => {
                const check = (dateStr, label) => { if(!dateStr) return; const dt = new Date(dateStr); if(dt.getMonth()+1 === m && dt.getDate() === d) res.push({ name: doll.name, label, color: doll.calColor }); };
                check(doll.birthday, \"Birthday\"); check(doll.welcomeDay, \"Anniversary\");
                (doll.anniversaries || []).forEach(a => check(a.date, a.name));
            });
            return res;
        }
        function showDayEvents(events) { const area = document.getElementById('day-events'); area.innerHTML = events.map(e => `<div class=\"p-3 bg-white border rounded-xl text-xs flex justify-between items-center\"><span><b style=\"color:${e.color}\">${e.name}</b> ${e.label}</span></div>`).join(''); }
        function changeMonth(diff) { calOffset += diff; renderCalendar(); }

        function renderAnni() {
            const now = new Date(), todayStr = `${now.getMonth()+1}/${now.getDate()}`, list = [], happies = [];
            dolls.forEach(d => {
                const check = (dateStr, label) => {
                    if(!dateStr) return; const dt = new Date(dateStr), m = dt.getMonth()+1, dd = dt.getDate();
                    if(m === now.getMonth()+1 && dd === now.getDate()) happies.push({ name: d.name, label, img: d.image, pos: d.pos });
                    let next = new Date(now.getFullYear(), m-1, dd); if(next < now) next.setFullYear(now.getFullYear()+1);
                    list.push({ name: d.name, label, date: next, diff: Math.ceil((next - now)/(1000*60*60*24)), color: d.calColor });
                };
                check(d.birthday, \"Birthday\"); check(d.welcomeDay, \"Anniversary\");
                (d.anniversaries || []).forEach(a => check(a.date, a.name));
            });
            const hSec = document.getElementById('happy-anniversary'), hList = document.getElementById('happy-anniversary-list');
            if(happies.length) { hSec.classList.remove('hidden'); hList.innerHTML = happies.map(h => `<div class=\"bg-white p-4 rounded-3xl border-2 border-pink-200 animate-anni mb-2 flex items-center gap-4\"><img src=\"${h.img}\" class=\"w-12 h-12 rounded-full object-cover\" style=\"object-position:${h.pos}\"><div class=\"text-left\"><p class=\"text-[10px] font-bold text-pink-400\">${h.label}</p><p class=\"font-bold\">${h.name}</p></div></div>`).join(''); }
            list.sort((a,b) => a.diff - b.diff);
            if(list.length) { document.getElementById('closest-anniversary').innerHTML = `<div class=\"flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm\"><div class=\"text-left\"><p class=\"text-[10px] font-bold text-stone-400\">${list[0].label}</p><p class=\"font-bold\">${list[0].name}</p></div><div class=\"text-right\"><p class=\"text-[10px] text-stone-400 font-bold mb-1\">あと</p><p class=\"text-2xl font-bold\" style=\"color:${list[0].color}\">${list[0].diff}<span class=\"text-xs ml-1 italic\">days</span></p></div></div>`; }
        }

        // 初期化・UI制御
        function initDateSelectors() {
            const bM = document.getElementById('f-bday-m'), bD = document.getElementById('f-bday-d'), wM = document.getElementById('f-welcome-m'), wD = document.getElementById('f-welcome-d');
            for(let i=1; i<=12; i++) { bM.innerHTML += `<option value=\"${i}\">${i}</option>`; wM.innerHTML += `<option value=\"${i}\">${i}</option>`; }
            for(let i=1; i<=31; i++) { bD.innerHTML += `<option value=\"${i}\">${i}</option>`; wD.innerHTML += `<option value=\"${i}\">${i}</option>`; }
        }
        function initColorPalettes() {
            ['bg', 'text', 'cal'].forEach(type => {
                const grid = document.getElementById(`${type}-color-grid`);
                const palette = [\"#ffffff\", \"#000000\", \"#f472b6\", \"#fbbf24\", \"#34d399\", \"#60a5fa\", \"#a78bfa\", \"#f87171\"];
                palette.forEach(c => {
                    const chip = document.createElement('div'); chip.className = \"color-chip\"; chip.style.backgroundColor = c;
                    chip.onclick = () => { document.getElementById(`f-${type}-color`).value = c; document.getElementById(`${type}-select-icon`).style.backgroundColor = c; };
                    grid.appendChild(chip);
                });
            });
        }
        function toggleColorGrid(type) { document.getElementById(`${type}-color-grid`).classList.toggle('grid-open'); }
        function getDateValue(mainId, mId, dId) { const main = document.getElementById(mainId).value, m = document.getElementById(mId).value, d = document.getElementById(dId).value; if(!main && m && d) return `2000-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; return main; }
        function syncDateSelectors(mainId, mId, dId) { const val = document.getElementById(mainId).value; if(val) { const dt = new Date(val); document.getElementById(mId).value = dt.getMonth()+1; document.getElementById(dId).value = dt.getDate(); } }

        function showDetail(idx) {
            const d = dolls[idx], overlay = document.getElementById('profile-overlay'), bg = document.getElementById('profile-bg');
            bg.style.backgroundColor = d.bgColor || \"#ffffff\"; bg.style.color = d.textColor || \"#000000\";
            document.getElementById('view-img').src = d.image; document.getElementById('view-img').style.objectPosition = d.pos || \"50% 50%\";
            document.getElementById('view-name').innerText = d.name; document.getElementById('view-kana').innerText = d.kana || \"\";
            document.getElementById('view-profile').innerText = d.profile || \"\";
            const box = document.getElementById('detail-box'); box.innerHTML = '';
            const add = (l, v) => { if(v) box.innerHTML += `<div class=\"flex justify-between border-b border-current/10 py-2\"><span class=\"text-[10px] font-bold opacity-50 uppercase\">${l}</span><span class=\"font-bold\">${v}</span></div>`; };
            add(\"Size\", d.bodySize); add(\"Body\", d.bodyMake); add(\"Head\", d.head);
            if(d.birthday) add(\"Birthday\", d.birthday.split('-').slice(1).join('/')); if(d.welcomeDay) add(\"Welcome\", d.welcomeDay.split('-').slice(1).join('/'));
            box.classList.toggle('hidden', !box.innerHTML);
            document.getElementById('detail-edit-btn').onclick = () => editDoll(idx);
            document.getElementById('detail-del-btn').onclick = () => showConfirm(\"削除しますか？\", async () => { dolls.splice(idx, 1); await sync(); location.reload(); }, \"削除\");
            overlay.classList.remove('hidden');
        }

        function editDoll(idx) {
            const d = dolls[idx]; document.getElementById('edit-id').value = idx;
            document.getElementById('f-name').value = d.name; document.getElementById('f-kana').value = d.kana || \"\";
            document.getElementById('f-img-url').value = d.image; updateUrlPreview('crop-preview', d.image);
            const p = (d.pos || \"50% 50%\").split(' '); document.getElementById('crop-h').value = parseInt(p[0]); document.getElementById('crop-v').value = parseInt(p[1]);
            document.getElementById('f-size-label').value = d.bodySize || \"\"; document.getElementById('f-body-make').value = d.bodyMake || \"\"; document.getElementById('f-head').value = d.head || \"\";
            document.getElementById('f-bday').value = d.birthday || \"\"; document.getElementById('f-welcome').value = d.welcomeDay || \"\";
            document.getElementById('f-bg-color').value = d.bgColor || \"#ffffff\"; document.getElementById('f-text-color').value = d.textColor || \"#000000\"; document.getElementById('f-cal-color').value = d.calColor || \"#E11D48\";
            document.getElementById('f-profile').value = d.profile || \"\";
            document.getElementById('anniversary-inputs').innerHTML = ''; (d.anniversaries || []).forEach(addAnniversaryInput);
            document.getElementById('profile-overlay').classList.add('hidden'); document.getElementById('modal').style.display='flex';
        }

        function openModalWithClear() { document.getElementById('edit-id').value = \"\"; document.getElementById('f-img-url').value = \"\"; document.getElementById('crop-preview').classList.add('hidden'); document.getElementById('modal').style.display='flex'; }
        function closeModal() { document.querySelectorAll('.modal-base').forEach(m => m.style.display='none'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function showHome() { document.getElementById('home-content').classList.remove('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.add('hidden'); }
        function showDollList() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.remove('hidden'); renderDollList(); toggleMenu('side-menu'); }
        function renderDollList() { const area = document.getElementById('doll-display-area'); area.innerHTML = dolls.map((d,i) => `<div onclick=\"showDetail(${i})\" class=\"aspect-square bg-white border rounded-xl overflow-hidden\"><img src=\"${d.image}\" class=\"w-full h-full object-cover\" style=\"object-position:${d.pos}\"></div>`).join(''); area.className = \"grid grid-cols-3 gap-2\"; }
        function showPostListPage() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('post-list-page').classList.remove('hidden'); toggleMenu('side-menu'); }
        function toggleMenu(id) { const el = document.getElementById(id); el.style.display = (el.style.display==='flex')?'none':'flex'; }
        
        function openPostModal() { document.getElementById('edit-post-id').value = \"\"; document.getElementById('p-title').value = \"\"; document.getElementById('post-blocks-container').innerHTML = ''; addPostBlock(); document.getElementById('post-modal').style.display='flex'; toggleMenu('side-menu'); }
        function addPostBlock(data = {img:'', text:''}) {
            const div = document.createElement('div'); div.className = \"post-block p-4 border rounded-xl mb-4 bg-stone-50\";
            div.innerHTML = `<input type=\"text\" class=\"url-input-field text-xs block-img-url\" placeholder=\"画像URL\" value=\"${data.img}\" oninput=\"this.nextElementSibling.src=this.value; this.nextElementSibling.classList.toggle('hidden', !this.value)\"><img src=\"${data.img}\" class=\"w-full rounded mb-2 ${data.img?'':'hidden'}\"><textarea class=\"w-full text-sm p-3 border rounded-xl min-h-[60px] outline-none\" placeholder=\"文章を入力...\">${data.text}</textarea><button onclick=\"this.parentElement.remove()\" class=\"text-xs text-red-400 mt-2\">削除</button>`;
            document.getElementById('post-blocks-container').appendChild(div);
        }
        function editPost(idx) {
            const p = posts[idx]; document.getElementById('edit-post-id').value = idx; document.getElementById('p-title').value = p.title;
            document.getElementById('post-blocks-container').innerHTML = ''; (p.blocks || []).forEach(addPostBlock);
            document.querySelector(`input[name=\"p-pos\"][value=\"${p.pos || 'home'}\"]`).checked = true;
            document.getElementById('post-modal').style.display = 'flex';
        }
        function viewPost(idx) {
            const p = posts[idx]; document.getElementById('art-title').innerText = p.title;
            document.getElementById('art-content').innerHTML = p.blocks.map(b => `${b.img ? `<img src=\"${b.img}\" class=\"w-full rounded-3xl shadow-lg\">` : ''}${b.text ? `<p class=\"text-stone-600 leading-relaxed whitespace-pre-wrap\">${b.text}</p>` : ''}`).join('');
            document.getElementById('art-edit-btn').onclick = () => { closeArticle(); editPost(idx); };
            document.getElementById('art-del-btn').onclick = () => showConfirm(\"削除しますか？\", async () => { posts.splice(idx, 1); await sync(); location.reload(); }, \"削除\");
            document.getElementById('article-page').style.display = 'block';
        }
        function closeArticle() { document.getElementById('article-page').style.display = 'none'; }

        function openOwnerModal() { document.getElementById('o-name').value = owner.name; document.getElementById('o-bio').value = owner.bio; document.getElementById('o-img-url').value = owner.image || \"\"; updateUrlPreview('owner-preview', owner.image); document.getElementById('sns-inputs-container').innerHTML = ''; (owner.sns || []).forEach(addSnsInput); document.getElementById('owner-modal').style.display='flex'; toggleMenu('side-menu'); }
        function addSnsInput(v = {type:'X(旧Twitter)', val:''}) {
            const div = document.createElement('div'); div.className = \"sns-input-row flex gap-2\";
            div.innerHTML = `<select class=\"sns-type border p-2 rounded text-[10px]\"><option ${v.type==='X(旧Twitter)'?'selected':''}>X(旧Twitter)</option><option ${v.type==='Instagram'?'selected':''}>Instagram</option><option ${v.type==='その他URL'?'selected':''}>その他URL</option></select><input type=\"text\" class=\"sns-val border p-2 flex-1 text-[10px]\" value=\"${v.val}\"><button onclick=\"this.parentElement.remove()\">✕</button>`;
            document.getElementById('sns-inputs-container').appendChild(div);
        }
        function addAnniversaryInput(v = {name:'', date:''}) {
            const id = Date.now(), div = document.createElement('div'); div.className = \"p-3 bg-stone-100 rounded-xl mb-2\";
            div.innerHTML = `<input type=\"text\" class=\"f-anni-name w-full border-b mb-2 text-sm\" placeholder=\"記念日名\" value=\"${v.name}\"><div class=\"flex gap-2\"><select id=\"m-${id}\" class=\"f-anni-m border rounded p-2 text-xs flex-1\"><option value=\"\">月</option>${Array.from({length:12},(_,i)=>`<option value=\"${i+1}\">${i+1}</option>`).join('')}</select><select id=\"d-${id}\" class=\"f-anni-d border rounded p-2 text-xs flex-1\"><option value=\"\">日</option>${Array.from({length:31},(_,i)=>`<option value=\"${i+1}\">${i+1}</option>`).join('')}</select></div><input type=\"date\" id=\"date-${id}\" class=\"date-input f-anni-date\" oninput=\"syncDateSelectors('date-${id}', 'm-${id}', 'd-${id}')\">`;
            document.getElementById('anniversary-inputs').appendChild(div);
            if(v.date) { const dt = new Date(v.date); document.getElementById(`date-${id}`).value = v.date; document.getElementById(`m-${id}`).value = dt.getMonth()+1; document.getElementById(`d-${id}`).value = dt.getDate(); }
        }

        async function requestClearAll() { showConfirm(\"全てのデータを完全に削除しますか？\\nこの操作は取り消せません。\", async () => { await window.fb.setDoc(window.fb.doc(window.fb.db, \"galleries\", galleryId), { dolls: [], owner: { name: \"Owner Name\", bio: \"\", sns: [], image:\"\" }, posts: [] }, { merge: true }); location.reload(); }, \"削除する\"); }
        function handleLogout() { window.fb.signOut(window.fb.auth); location.reload(); }
        function shareSNS(type) { const url = window.location.href; if(type === 'line') window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}`, '_blank'); else window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`, '_blank'); }
    </script>
</body>
