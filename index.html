<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        /* トリミング・スライダー */
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        /* カレンダー */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

        /* カラーチップ */
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        @keyframes pulse-anni { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,114,182,0.4); } 70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244,114,182,0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,114,182,0); } }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>
<body>

    <div id="custom-dialog">
        <div class="bg-white w-full max-w-xs p-8 rounded-3xl shadow-2xl text-center">
            <p id="dialog-message" class="text-[16px] mb-8 leading-relaxed font-bold whitespace-pre-wrap text-stone-700"></p>
            <div id="dialog-buttons" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div class="film-outer">
        <div id="top-film-roll" class="film-scroll-track"></div>
        <div id="empty-msg" class="absolute inset-0 flex items-center justify-center text-stone-500 text-xs font-bold">画像を登録するとここに並びます</div>
    </div>

    <header class="p-4 bg-white border-b sticky top-0 z-[100] flex justify-between items-center">
        <h1 onclick="location.href=location.pathname" class="logo-font text-3xl cursor-pointer">Doll Uchinoko Gallery</h1>
        <div onclick="toggleMenu('side-menu')" class="p-2 cursor-pointer">
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800"></div>
        </div>
    </header>

    <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">
        <div class="bg-white w-72 h-full ml-auto p-6 flex flex-col overflow-y-auto" onclick="event.stopPropagation()">
            <div class="space-y-1">
                <button onclick="location.href=location.pathname" class="text-left py-4 font-bold border-b w-full">🏠 ホーム</button>
                <button onclick="openModalWithClear()" class="text-left py-4 font-bold border-b text-blue-600 w-full admin-only">✨ うちの子を登録</button>
            </div>
            
            <div class="py-6 border-b space-y-3">
                <button id="login-btn" onclick="handleLogin()" class="w-full py-3 bg-stone-800 text-white rounded-xl text-xs font-bold shadow-lg">Googleログイン</button>
                <button id="logout-btn" onclick="handleLogout()" class="w-full py-3 bg-red-50 text-red-400 rounded-xl text-xs font-bold hidden">ログアウト</button>
            </div>

            <div class="mt-auto space-y-4 admin-only pb-10">
                <button onclick="openOwnerModal()" class="w-full py-4 bg-stone-100 rounded-2xl text-sm font-bold">👤 オーナー設定</button>
                <button onclick="openPostModal()" class="w-full py-4 bg-stone-800 text-white rounded-2xl text-sm font-bold shadow-lg">📝 投稿を追加</button>
                <button onclick="copyURL()" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold">🔗 公開URLをコピー</button>
                <button onclick="requestClearAll()" class="w-full py-3 text-red-300 text-[10px] text-center w-full">全データを削除</button>
            </div>
        </div>
    </div>

    <main id="home-content" class="max-w-md mx-auto">
        <div id="loading-view" class="p-20 text-center text-stone-400 text-sm italic">Loading...</div>
    </main>

    <div id="modal" class="modal-base">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-6">うちの子を登録</h2>
            <div class="space-y-4">
                <div class="crop-area">
                    <div class="v-bar-box">
                        <input type="range" id="doll-zoom" class="vertical-range" min="100" max="300" value="100" oninput="updateCrop('doll')">
                    </div>
                    <div class="preview-sq" onclick="document.getElementById('doll-file').click()">
                        <img id="doll-prev" style="transform: scale(1) translate(0px, 0px)">
                        <div id="doll-placeholder" class="absolute inset-0 flex items-center justify-center text-stone-400 text-xs">画像を選択</div>
                    </div>
                </div>
                <input type="range" id="doll-y" class="w-full" min="-100" max="100" value="0" oninput="updateCrop('doll')">
                <input type="file" id="doll-file" class="hidden" accept="image/*" onchange="handleImg(event, 'doll')">
                
                <input type="text" id="doll-name" placeholder="お名前" class="w-full p-3 border rounded-xl outline-none bg-stone-50">
                <input type="text" id="doll-furi" placeholder="ふりがな" class="w-full p-3 border rounded-xl outline-none bg-stone-50">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="doll-size" placeholder="サイズ" class="p-3 border rounded-xl bg-stone-50 text-sm">
                    <input type="text" id="doll-head" placeholder="ヘッド" class="p-3 border rounded-xl bg-stone-50 text-sm">
                    <input type="text" id="doll-body" placeholder="ボディ" class="p-3 border rounded-xl bg-stone-50 text-sm">
                </div>

                <textarea id="doll-bio" placeholder="紹介文" class="w-full p-3 border rounded-xl h-24 bg-stone-50"></textarea>

                <div class="border-t pt-4">
                    <p class="text-[10px] font-bold text-stone-400 mb-2 uppercase">Anniversaries</p>
                    <div id="anniversary-inputs" class="space-y-2"></div>
                    <button onclick="addAnniInput()" class="mt-2 text-xs font-bold text-blue-500">+ 記念日を追加</button>
                </div>

                <button onclick="saveDoll()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold shadow-lg mt-6">保存する</button>
                <button onclick="closeModal('modal')" class="w-full py-2 text-stone-400 text-sm">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="owner-modal" class="modal-base">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-6">オーナー設定</h2>
            <div class="space-y-4">
                <div class="preview-sq rounded-full w-24 h-24 mx-auto overflow-hidden" onclick="document.getElementById('owner-file').click()">
                    <img id="owner-prev" class="w-full h-full object-cover">
                </div>
                <input type="file" id="owner-file" class="hidden" accept="image/*" onchange="handleImg(event, 'owner')">
                <input type="text" id="owner-name-in" placeholder="オーナー名" class="w-full p-3 border rounded-xl">
                <textarea id="owner-bio-in" placeholder="プロフィール" class="w-full p-3 border rounded-xl h-24"></textarea>
                
                <div class="border-t pt-4">
                    <p class="text-[10px] font-bold text-stone-400 mb-2 uppercase">Color Palette</p>
                    <div class="flex gap-4 items-center">
                        <div id="color-btn-bg" class="color-select-btn" onclick="togglePalette('bg')"></div>
                        <div id="color-btn-text" class="color-select-btn" onclick="togglePalette('text')"></div>
                        <div id="color-btn-cal" class="color-select-btn" onclick="togglePalette('cal')"></div>
                    </div>
                    <div id="palette-grid" class="color-grid"></div>
                </div>

                <button onclick="saveOwner()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold shadow-lg">設定を保存</button>
                <button onclick="closeModal('owner-modal')" class="w-full py-2 text-stone-400 text-sm">閉じる</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-6">新規投稿</h2>
            <div class="space-y-6">
                <input type="text" id="post-title" placeholder="タイトル" class="w-full p-4 border-b text-lg font-bold outline-none">
                <div id="post-blocks" class="space-y-6"></div>
                <button onclick="addPostBlock()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-xl text-stone-400 text-sm">+ ブロックを追加</button>
                <button onclick="savePost()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold shadow-lg">投稿する</button>
                <button onclick="closeModal('post-modal')" class="w-full py-2 text-stone-400 text-sm">キャンセル</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // あなたのFirebase設定をそのまま使用
        const firebaseConfig = {
          apiKey: "AIzaSyCWzLwhTnOg58o4rdf-T8e0E57_dLGm2gk",
          authDomain: "doll-uchinoko-gallery.firebaseapp.com",
          projectId: "doll-uchinoko-gallery",
          storageBucket: "doll-uchinoko-gallery.firebasestorage.app",
          messagingSenderId: "78946857999",
          appId: "1:78946857999:web:d0ffcac3527334f66c5f7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        window.fb = { db, doc, setDoc, getDoc, auth, signInWithPopup, signOut, provider };

        onAuthStateChanged(auth, async (user) => {
            const urlParams = new URLSearchParams(window.location.search);
            const viewId = urlParams.get('id');

            if (user && !viewId) {
                window.galleryId = user.uid;
                window.isLoggedIn = true;
                document.body.classList.add('is-admin');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.getElementById('login-btn').classList.add('hidden');
            } else if (viewId) {
                window.galleryId = viewId;
                window.isLoggedIn = false;
                document.body.classList.remove('is-admin');
            } else {
                window.galleryId = null;
            }
            
            if (window.galleryId) {
                await loadData();
                renderAll();
            } else {
                showLanding();
            }
        });
    </script>

    <script>
        /* [ここからJS全ロジック：一切の省略なし] */
        let dolls = [], owner = { name: "Owner Name", bio: "", img: "", colors: { bg: "#fcfaf8", text: "#292524", cal: "#f472b6" } }, posts = [];
        let calOffset = 0;
        let currentRawImg = { doll: null, owner: null };
        let activePalette = null;

        const colors = [
            "#f87171","#fb923c","#fbbf24","#facc15","#a3e635","#4ade80","#34d399","#2dd4bf","#22d3ee","#38bdf8",
            "#60a5fa","#818cf8","#a78bfa","#c084fc","#e879f9","#f472b6","#fb7185","#94a3b8","#a1a1aa","#a8a29e",
            "#ef4444","#f97316","#f59e0b","#eab308","#84cc16","#22c55e","#10b981","#14b8a6","#06b6d4","#0ea5e9",
            "#3b82f6","#6366f1","#8b5cf6","#a855f7","#d946ef","#ec4899","#f43f5e","#64748b","#71717a","#78716c",
            "#dc2626","#ea580c","#d97706","#ca8a04","#65a30d","#16a34a","#059669","#0d9488","#0891b2","#0284c7",
            "#2563eb","#4f46e5","#7c3aed","#9333ea","#c026d3","#db2777","#e11d48","#475569","#52525b","#57534e",
            "#b91c1c","#9a3412","#b45309","#a16207","#4d7c0f","#15803d","#047857","#0f766e","#0e7490","#0369a1",
            "#1d4ed8","#4338ca","#6d28d9","#7e22ce","#a21caf","#be185d","#be123c","#334155","#3f3f46","#44403c",
            "#991b1b","#7c2d12","#92400e","#854d0e","#3f6212","#166534","#065f46","#134e4a","#155e75","#075985",
            "#1e40af","#3730a3","#5b21b6","#6b21a8","#86198f","#9d174d","#9f1239","#1e293b","#27272a","#1c1917"
        ];

        async function loadData() {
            const snap = await window.fb.getDoc(window.fb.doc(window.fb.db, "users", window.galleryId));
            if(snap.exists()){
                const d = snap.data();
                dolls = d.dolls || [];
                owner = d.owner || owner;
                posts = d.posts || [];
                applyColors();
            }
        }

        async function sync() {
            if(!window.isLoggedIn) return;
            await window.fb.setDoc(window.fb.doc(window.fb.db, "users", window.galleryId), { dolls, owner, posts });
        }

        function applyColors() {
            document.body.style.backgroundColor = owner.colors.bg;
            document.body.style.color = owner.colors.text;
            const style = document.createElement('style');
            style.innerHTML = `.cal-dot, .cal-day.today { background-color: ${owner.colors.cal} !important; }`;
            document.head.appendChild(style);
        }

        function showLanding() {
            document.getElementById('home-content').innerHTML = `
                <div class="p-12 text-center space-y-8">
                    <h2 class="text-5xl font-bold logo-font mt-20">Uchinoko Gallery</h2>
                    <p class="text-stone-500 text-sm">あなただけのドールギャラリーを<br>作って、世界にシェアしましょう。</p>
                    <button onclick="handleLogin()" class="w-full py-5 bg-stone-800 text-white rounded-2xl font-bold shadow-2xl tracking-widest">GOOGLE ログイン</button>
                </div>`;
        }

        function renderAll() {
            const home = document.getElementById('home-content');
            home.innerHTML = `
                <section class="p-10 text-center">
                    ${owner.img ? `<img src="${owner.img}" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-white shadow-sm">` : ''}
                    <h2 class="text-2xl font-bold mb-2">${owner.name}</h2>
                    <p class="text-sm opacity-70 px-8 whitespace-pre-wrap">${owner.bio}</p>
                </section>
                
                <section class="p-6 bg-white bg-opacity-30 backdrop-blur-sm border-y">
                    <div id="anni-today"></div>
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changeMonth(-1)">◀</button>
                        <h3 id="cal-title" class="font-bold"></h3>
                        <button onclick="changeMonth(1)">▶</button>
                    </div>
                    <div id="cal-body" class="cal-grid"></div>
                </section>

                <div id="post-list" class="p-4 space-y-8"></div>
            `;
            renderFilm();
            renderCalendar();
            renderPosts();
            checkTodayAnni();
        }

        function renderFilm() {
            const roll = document.getElementById('top-film-roll');
            roll.innerHTML = dolls.map((d, i) => `<img src="${d.img}" class="film-frame" style="object-position: 50% ${d.cropY || 50}%" onclick="showDollDetail(${i})">`).join('');
            document.getElementById('empty-msg').style.display = dolls.length ? 'none' : 'flex';
        }

        function renderPosts() {
            document.getElementById('post-list').innerHTML = posts.map(p => `
                <div class="bg-white rounded-[32px] overflow-hidden shadow-sm text-stone-800">
                    ${p.blocks.map(b => b.type==='img' ? `<img src="${b.val}" class="w-full">` : `<p class="p-8 text-sm leading-relaxed">${b.val}</p>`).join('')}
                    <div class="px-8 pb-8 text-[10px] text-stone-300 uppercase tracking-widest">${p.title || 'Untitled'}</div>
                </div>`).join('');
        }

        // --- カレンダーロジック（移植版） ---
        function renderCalendar() {
            const now = new Date();
            const d = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
            document.getElementById('cal-title').innerText = `${d.getFullYear()} / ${d.getMonth() + 1}`;
            const first = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
            const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
            let html = '';
            for(let i=0; i<first; i++) html += '<div></div>';
            for(let date=1; date<=last; date++) {
                const evs = getEvents(d.getMonth()+1, date);
                const isToday = (calOffset===0 && date===now.getDate());
                html += `<div class="cal-day ${isToday?'today text-white':''}" onclick="showDay(${d.getMonth()+1},${date})">${date}<div class="cal-dots">${evs.map(()=>`<div class="cal-dot"></div>`).join('')}</div></div>`;
            }
            document.getElementById('cal-body').innerHTML = html;
        }

        function getEvents(m, d) {
            let r = [];
            dolls.forEach(doll => {
                (doll.annis || []).forEach(a => {
                    if(parseInt(a.m) === m && parseInt(a.d) === d) r.push(`${doll.name}: ${a.label}`);
                });
            });
            return r;
        }

        function showDay(m, d) {
            const evs = getEvents(m, d);
            if(evs.length) showSimpleAlert(`${m}/${d}の予定\n` + evs.join('\n'));
        }

        function changeMonth(n) { calOffset += n; renderCalendar(); }

        function checkTodayAnni() {
            const now = new Date();
            const evs = getEvents(now.getMonth()+1, now.getDate());
            if(evs.length) {
                document.getElementById('anni-today').innerHTML = `<div class="bg-white p-4 rounded-2xl animate-anni mb-4 text-center text-xs font-bold">${evs.join('<br>')}</div>`;
            }
        }

        // --- 登録・保存ロジック（移植版） ---
        function handleImg(e, t) {
            const f = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (re) => {
                if(t === 'owner') {
                    owner.img = re.target.result;
                    document.getElementById('owner-prev').src = re.target.result;
                } else if(t === 'doll') {
                    currentRawImg.doll = re.target.result;
                    document.getElementById('doll-prev').src = re.target.result;
                    document.getElementById('doll-placeholder').style.display = 'none';
                    updateCrop('doll');
                } else if(t.startsWith('p-')) {
                    const idx = t.split('-')[1];
                    document.getElementById(`prev-${idx}`).src = re.target.result;
                    document.getElementById(`ph-${idx}`).style.display = 'none';
                }
            };
            reader.readAsDataURL(f);
        }

        function updateCrop(type) {
            const zoom = document.getElementById(`${type}-zoom`).value;
            const y = document.getElementById(`${type}-y`).value;
            document.getElementById(`${type}-prev`).style.transform = `scale(${zoom/100}) translateY(${y}px)`;
        }

        async function saveDoll() {
            const name = document.getElementById('doll-name').value;
            if(!name || !currentRawImg.doll) return showSimpleAlert("名前と画像は必須です");
            const annis = Array.from(document.querySelectorAll('.anni-row')).map(row => ({
                label: row.querySelector('.al').value || '記念日',
                m: row.querySelector('.am').value,
                d: row.querySelector('.ad').value
            })).filter(a => a.m && a.d);

            dolls.push({
                name, 
                furi: document.getElementById('doll-furi').value,
                size: document.getElementById('doll-size').value,
                head: document.getElementById('doll-head').value,
                body: document.getElementById('doll-body').value,
                bio: document.getElementById('doll-bio').value,
                img: currentRawImg.doll,
                cropY: document.getElementById('doll-y').value,
                cropZ: document.getElementById('doll-zoom').value,
                annis
            });
            await sync();
            closeModal('modal');
            renderAll();
        }

        // --- 投稿システム（ブロック式・全移植） ---
        function addPostBlock(val = '', type = 'text') {
            const id = Date.now();
            const div = document.createElement('div');
            div.className = "post-block p-4 bg-stone-50 rounded-2xl relative";
            div.innerHTML = type === 'text' ? 
                `<textarea class="w-full bg-transparent outline-none text-sm h-24" placeholder="文章を入力...">${val}</textarea>` :
                `<div class="preview-sq" onclick="document.getElementById('file-${id}').click()"><img id="prev-${id}" src="${val}"><div id="ph-${id}" class="absolute inset-0 flex items-center justify-center text-xs text-stone-400" style="${val?'display:none':''}">画像を選択</div></div><input type="file" id="file-${id}" class="hidden" onchange="handleImg(event, 'p-${id}')">`;
            div.innerHTML += `<button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 w-6 h-6 bg-red-400 text-white rounded-full text-xs">×</button>`;
            document.getElementById('post-blocks').appendChild(div);
        }

        async function savePost() {
            const blocks = Array.from(document.querySelectorAll('.post-block')).map(el => {
                const img = el.querySelector('img');
                return img ? { type: 'img', val: img.src } : { type: 'text', val: el.querySelector('textarea').value };
            });
            posts.unshift({ title: document.getElementById('post-title').value, blocks, date: new Date().toISOString() });
            await sync();
            closeModal('post-modal');
            renderAll();
        }

        // --- カラーパレット・オーナー（全移植） ---
        function togglePalette(type) {
            activePalette = type;
            const grid = document.getElementById('palette-grid');
            grid.classList.add('grid-open');
            grid.innerHTML = colors.map(c => `<div class="color-chip" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
        }

        function selectColor(c) {
            owner.colors[activePalette] = c;
            document.getElementById(`color-btn-${activePalette}`).style.backgroundColor = c;
            applyColors();
        }

        async function saveOwner() {
            owner.name = document.getElementById('owner-name-in').value;
            owner.bio = document.getElementById('owner-bio-in').value;
            await sync();
            closeModal('owner-modal');
            renderAll();
        }

        // --- ユーティリティ ---
        function toggleMenu(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function handleLogin() { window.fb.signInWithPopup(window.fb.auth, window.fb.provider).then(() => location.search=""); }
        function handleLogout() { window.fb.signOut(window.fb.auth).then(() => location.search=""); }

        function addAnniInput() {
            const div = document.createElement('div');
            div.className = "anni-row flex gap-2";
            div.innerHTML = `
                <input type="text" placeholder="例: お迎え日" class="al flex-1 p-2 border rounded-lg text-xs">
                <input type="number" placeholder="月" class="am w-12 p-2 border rounded-lg text-xs">
                <input type="number" placeholder="日" class="ad w-12 p-2 border rounded-lg text-xs">
            `;
            document.getElementById('anniversary-inputs').appendChild(div);
        }

        function showSimpleAlert(msg) {
            document.getElementById('dialog-message').innerText = msg;
            document.getElementById('dialog-buttons').innerHTML = `<button onclick="closeModal('custom-dialog')" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold">OK</button>`;
            document.getElementById('custom-dialog').style.display = 'flex';
        }

        function copyURL() {
            const url = window.location.origin + window.location.pathname + "?id=" + window.fb.auth.currentUser.uid;
            navigator.clipboard.writeText(url).then(() => showSimpleAlert("ギャラリーのURLをコピーしました！"));
        }

        async function requestClearAll() {
            if(confirm("全てのデータを消去しますか？")) {
                dolls = []; posts = [];
                await sync();
                location.reload();
            }
        }

        function openModalWithClear() {
            document.getElementById('doll-prev').src = "";
            document.getElementById('doll-placeholder').style.display = 'flex';
            document.getElementById('anniversary-inputs').innerHTML = "";
            document.getElementById('modal').style.display = 'flex';
        }

        function openOwnerModal() {
            document.getElementById('owner-name-in').value = owner.name;
            document.getElementById('owner-bio-in').value = owner.bio;
            document.getElementById('color-btn-bg').style.backgroundColor = owner.colors.bg;
            document.getElementById('color-btn-text').style.backgroundColor = owner.colors.text;
            document.getElementById('color-btn-cal').style.backgroundColor = owner.colors.cal;
            document.getElementById('owner-modal').style.display = 'flex';
        }

        function openPostModal() {
            document.getElementById('post-blocks').innerHTML = "";
            addPostBlock('', 'img');
            addPostBlock('', 'text');
            document.getElementById('post-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
