<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        .share-btn { transition: all 0.2s ease; }
        .share-btn:active { transform: scale(0.96); opacity: 0.85; }
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        
        /* 管理者表示制御 */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCWzLwhTnOg58o4rdf-T8e0E57_dLGm2gk",
          authDomain: "doll-uchinoko-gallery.firebaseapp.com",
          projectId: "doll-uchinoko-gallery",
          storageBucket: "doll-uchinoko-gallery.firebasestorage.app",
          messagingSenderId: "78946857999",
          appId: "1:78946857999:web:d0ffcac3527334f66c5f7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.fb = { db, doc, setDoc, getDoc, updateDoc, auth, provider, signInWithPopup, signOut };

        // 認証状態の監視
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // ログイン中
                const targetId = new URLSearchParams(window.location.search).get('id');
                // 自分のギャラリーを見ている、またはギャラリー未指定の場合は「管理者モード」
const currentUid = user.uid;
const urlParams = new URLSearchParams(window.location.search);
const targetId = urlParams.get('id');

// 自分のIDでログイン中、かつURLのIDが自分のもの、もしくはID未指定なら管理者
window.isLoggedIn = (targetId === currentUid || !targetId);

if (!targetId) {
    // 自分の専用ページへ移動
    window.location.href = window.location.pathname + '?id=' + currentUid;
    return;
}

                    // 自分のURLにリダイレクト（初回ログインなど）
                    window.location.search = `?id=${user.uid}`;
                    return;
                }
                document.getElementById('user-display-name').innerText = user.displayName + " さん";
            } else {
                window.isLoggedIn = false;
                document.getElementById('user-display-name').innerText = "";
            }
            
            // ギャラリーデータのロード
            const urlParams = new URLSearchParams(window.location.search);
            window.galleryId = urlParams.get('id');
            if (window.galleryId) {
                await loadGalleryData();
            } else {
                showAlert("Googleログインして自分専用のギャラリーを作成しましょう。");
            }
            renderAll();
        });
    </script>

    <script>
        let dolls = [], owner = { name: "New User", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let dollViewMode = 'grid', currentRawImg = { doll: null, owner: null }, loopInterval;

        const palette100 = (() => {
            const hues = [0, 30, 60, 120, 150, 180, 220, 280, 330], colors = [];
            for(let i=0; i<10; i++) colors.push(`hsl(0, 0%, ${Math.min(0 + (i * 11), 100)}%)`);
            hues.forEach(h => { for(let i=0; i<10; i++) colors.push(`hsl(${h}, 80%, ${Math.min(30 + (i * 7.2), 95)}%)`); });
            return colors.slice(0, 100);
        })();

        async function handleGoogleLogin() {
            try {
                await window.fb.signInWithPopup(window.fb.auth, window.fb.provider);
            } catch (e) {
                showAlert("ログインに失敗しました");
            }
        }

        async function handleLogout() {
            await window.fb.signOut(window.fb.auth);
            location.reload();
        }

        async function loadGalleryData() {
            const docRef = window.fb.doc(window.fb.db, "galleries", window.galleryId);
            const snap = await window.fb.getDoc(docRef);
            if(snap.exists()) {
                const data = snap.data();
                dolls = data.dolls || []; owner = data.owner || owner; posts = data.posts || [];
            } else if (window.isLoggedIn && window.galleryId === window.fb.auth.currentUser.uid) {
                // 初回作成
                await syncFirebase();
            }
        }

        async function syncFirebase() {
            if(!window.isLoggedIn) return showAlert("編集権限がありません");
            const uid = window.fb.auth.currentUser.uid;
            const docRef = window.fb.doc(window.fb.db, "galleries", uid);
            await window.fb.setDoc(docRef, { dolls, owner, posts }, { merge: true });
        }

        // --- 以下、元のロジックを統合・維持 ---

        function renderAll() {
            const isAdmin = window.isLoggedIn;
            document.body.classList.toggle('is-admin', isAdmin);
            document.getElementById('login-btn').style.display = window.fb.auth.currentUser ? 'none' : 'flex';
            document.getElementById('logout-btn').style.display = window.fb.auth.currentUser ? 'block' : 'none';
            
            const track = document.getElementById('top-film-roll'); track.innerHTML = '';
            const items = dolls.filter(d => d.image), container = document.getElementById('film-container');
            clearInterval(loopInterval);
            if (items.length > 0) {
                document.getElementById('empty-msg').style.display = 'none';
                if (items.length >= 5) {
                    const tripleItems = [...items, ...items, ...items];
                    tripleItems.forEach((d, i) => { const img = document.createElement('img'); img.src = d.image; img.className = "film-frame"; img.onclick = () => showDetail(i % items.length); track.appendChild(img); });
                    setTimeout(() => { container.scrollLeft = items.length * (80+12); }, 50);
                    loopInterval = setInterval(() => { container.scrollLeft += 0.5; }, 16);
                } else { items.forEach((d, i) => { const img = document.createElement('img'); img.src = d.image; img.className = "film-frame"; img.onclick = () => showDetail(i); track.appendChild(img); }); }
            } else { document.getElementById('empty-msg').style.display = 'flex'; }
            
            const oImg = document.getElementById('display-owner-img');
            if(owner.image) { oImg.src = owner.image; oImg.classList.remove('hidden'); } else { oImg.classList.add('hidden'); }
            document.getElementById('owner-name').innerText = owner.name || "Owner Name"; document.getElementById('owner-bio').innerText = owner.bio || "";
            
            const snsArea = document.getElementById('owner-sns-links'); snsArea.innerHTML = '';
            (owner.sns || []).forEach(s => {
                let url = s.val;
                const a = document.createElement('a'); a.href = url; a.target = "_blank"; a.className = "block w-full max-w-[200px] text-center bg-white border py-2 rounded-xl text-xs font-bold shadow-sm"; a.innerText = "🔗 " + s.type; snsArea.appendChild(a);
            });

            const hp = document.getElementById('home-posts'); hp.innerHTML = '';
            const mpl = document.getElementById('menu-post-list'); mpl.innerHTML = '';
            posts.forEach((p, i) => {
                if(p.pos === 'home') {
                    const card = document.createElement('div'); card.className = "relative bg-white rounded-[32px] p-6 pt-16 border shadow-sm";
                    if(isAdmin) { card.innerHTML = `<div class="absolute top-4 left-4 flex gap-2"><button onclick="editPost(${i})" class="bg-stone-800 text-white px-4 py-2 rounded-lg text-xs font-bold">編集</button><button onclick="deletePostDirectly(${i})" class="bg-red-50 text-red-400 px-4 py-2 rounded-lg text-xs font-bold border border-red-100">削除</button></div>`; }
                    const title = document.createElement('h4'); title.className="font-bold mb-4 text-lg border-b pb-2"; title.innerText = p.title; card.appendChild(title);
                    p.blocks.forEach(b => { if(b.img) { const img = document.createElement('img'); img.src = b.img; img.className="w-full rounded-2xl mb-4"; card.appendChild(img); } if(b.text) { const txt = document.createElement('p'); txt.className="text-sm text-stone-600 mb-6 whitespace-pre-wrap"; txt.innerText = b.text; card.appendChild(txt); } });
                    hp.appendChild(card);
                } else { const btn = document.createElement('button'); btn.className = "w-full text-left py-4 px-6 bg-white border rounded-2xl text-stone-700 font-bold shadow-sm mb-2"; btn.innerText = "📝 " + p.title; btn.onclick = () => viewPost(i); mpl.appendChild(btn); }
            });
            renderCalendar(); renderAnni();
            initColorPalettes();
        }

        // 保存・編集・UI制御系 (元のコードから主要なものを維持)
        async function saveData() {
            const id = document.getElementById('edit-id').value, h = document.getElementById('crop-h').value, v = document.getElementById('crop-v').value;
            let imgData = (id !== "" && dolls[id]) ? dolls[id].image : "";
            if(currentRawImg.doll) {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 800;
                const s = Math.max(800/currentRawImg.doll.width, 800/currentRawImg.doll.height);
                ctx.drawImage(currentRawImg.doll, (800-currentRawImg.doll.width*s)*(h/100), (800-currentRawImg.doll.height*s)*(v/100), currentRawImg.doll.width*s, currentRawImg.doll.height*s);
                imgData = cvs.toDataURL('image/webp', 0.7);
            }
            const data = { name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value, image: imgData, bodySize: document.getElementById('f-size-label').value, bodyMake: document.getElementById('f-body-make').value, head: document.getElementById('f-head').value, birthday: document.getElementById('f-bday').value, welcomeDay: document.getElementById('f-welcome').value, anniversaries: Array.from(document.querySelectorAll('#anniversary-inputs > div')).map(row => ({ name: row.querySelector('.f-anni-name').value, date: row.querySelector('.f-anni-date').value })).filter(a => a.name), bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value, profile: document.getElementById('f-profile').value };
            if(id === "") dolls.push(data); else dolls[id] = data;
            await syncFirebase(); location.reload();
        }

        async function saveOwner() {
            let img = owner.image; const h = document.getElementById('o-crop-h').value, v = document.getElementById('o-crop-v').value;
            if(currentRawImg.owner) {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 400;
                const s = Math.max(400/currentRawImg.owner.width, 400/currentRawImg.owner.height);
                ctx.drawImage(currentRawImg.owner, (400-currentRawImg.owner.width*s)*(h/100), (400-currentRawImg.owner.height*s)*(v/100), currentRawImg.owner.width*s, currentRawImg.owner.height*s);
                img = cvs.toDataURL('image/webp', 0.7);
            }
            owner = { name: document.getElementById('o-name').value, bio: document.getElementById('o-bio').value, image: img, sns: Array.from(document.querySelectorAll('.sns-input-row')).map(row => ({ type: row.querySelector('.sns-type').value, val: row.querySelector('.sns-val').value })).filter(s => s.val) };
            await syncFirebase(); location.reload();
        }

        async function savePost() {
            const blocks = []; document.querySelectorAll('.post-block').forEach(el => { const imgEl = el.querySelector('img'), text = el.querySelector('textarea').value; if(!imgEl.classList.contains('hidden') || text) blocks.push({img: imgEl.classList.contains('hidden') ? '' : imgEl.src, text}); });
            const idx = document.getElementById('edit-post-id').value, data = { title: document.getElementById('p-title').value, blocks, pos: document.querySelector('input[name="p-pos"]:checked').value };
            if(idx === "") posts.push(data); else posts[idx] = data;
            await syncFirebase(); location.reload();
        }

        function renderAnni() {
            const area = document.getElementById('closest-anniversary'), happyArea = document.getElementById('happy-anniversary'), happyListArea = document.getElementById('happy-anniversary-list');
            if(!area || !happyArea) return; area.innerHTML = ''; happyListArea.innerHTML = ''; happyArea.classList.add('hidden');
            let list = [], happyEvents = []; const now = new Date(), todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            dolls.forEach((d, idx) => {
                const ds = [{ type: 'birth', n: "誕生日", d: d.birthday }, { type: 'welcome', n: "お迎え日", d: d.welcomeDay }, ...(d.anniversaries || []).map(a => ({ type: 'custom', n: a.name, d: a.date }))];
                ds.forEach(v => {
                    if(v.d) {
                        const originDate = new Date(v.d), isToday = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate());
                        let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate());
                        if(next < todayZero) next.setFullYear(now.getFullYear() + 1);
                        const daysToNext = Math.ceil((next - todayZero) / (1000 * 60 * 60 * 24));
                        if (isToday) happyEvents.push({ text: `${d.name} の ${v.n}！`, order: idx });
                        list.push({ doll: d.name, title: v.n, color: d.calColor || '#E11D48', diff: daysToNext, isToday: isToday, order: idx });
                    }
                });
            });
            if (happyEvents.length > 0) { happyArea.classList.remove('hidden'); happyEvents.forEach(ev => { const div = document.createElement('div'); div.className = "bg-white p-5 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-3"; div.innerHTML = `<span class="text-2xl">🎉</span><p class="font-bold text-stone-800">${ev.text}</p>`; happyListArea.appendChild(div); }); }
            if(list.length > 0) {
                list.sort((a,b) => a.diff - b.diff); const closest = list[0];
                area.innerHTML = `<div class="bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center" style="border-color:${closest.color}"><div><p class="text-[10px] text-stone-400 font-bold">${closest.doll}</p><p class="font-bold">${closest.title}</p></div><b class="text-lg">${closest.isToday ? "Today" : "あと "+closest.diff+" 日"}</b></div>`;
            }
        }

        function showDetail(idx) {
            const d = dolls[idx], overlay = document.getElementById('profile-overlay'), bg = document.getElementById('profile-bg');
            bg.style.backgroundColor = d.bgColor || "#ffffff"; bg.style.color = d.textColor || "#000000";
            document.getElementById('view-img').src = d.image; document.getElementById('view-name').innerText = d.name; document.getElementById('view-kana').innerText = d.kana || "";
            const b = document.getElementById('detail-box'); b.innerHTML = ''; let hasInfo = false;
            if(d.birthday) { b.innerHTML += `<div class="flex flex-col mb-4"><span>🎂 誕生日</span><b>${d.birthday}</b></div>`; hasInfo = true; }
            if(d.welcomeDay) { b.innerHTML += `<div class="flex flex-col mb-4"><span>🤝 お迎え日</span><b>${d.welcomeDay}</b></div>`; hasInfo = true; }
            b.classList.toggle('hidden', !hasInfo);
            document.getElementById('view-profile').innerText = d.profile || "";
            document.getElementById('detail-edit-btn').onclick = () => editDoll(idx);
            document.getElementById('detail-del-btn').onclick = () => showConfirm("削除しますか？", async () => { dolls.splice(idx, 1); await syncFirebase(); location.reload(); });
            overlay.classList.remove('hidden');
        }

        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days'), map = {};
            area.innerHTML = '';
            dolls.forEach((d, idx) => {
                const evs = [{n: "誕生日", d: d.birthday}, {n: "お迎え日", d: d.welcomeDay}, ...(d.anniversaries || []).map(a => ({n: a.name, d: a.date}))];
                evs.forEach(ev => { if(ev.d) { const dt = new Date(ev.d); if(dt.getMonth() === m) { const day = dt.getDate(); if(!map[day]) map[day] = []; map[day].push({ dollName: d.name, eventName: ev.n, color: d.calColor }); } } });
            });
            for(let i=0; i<firstDay; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const annis = map[d], div = document.createElement('div');
                div.className = `cal-day`;
                if(annis) {
                    const dot = document.createElement('div'); dot.className = "cal-dot"; dot.style.backgroundColor = annis[0].color;
                    div.appendChild(dot);
                }
                div.innerHTML += `<span>${d}</span>`; area.appendChild(div);
            }
        }

        // デザイン調整用の補助関数 (元のコードから移行)
        function initColorPalettes() {
            const types = ['bg', 'text', 'cal'];
            const defaults = {bg: '#ffffff', text: '#000000', cal: '#E11D48'};
            types.forEach(t => {
                const grid = document.getElementById(`${t}-color-grid`);
                if(grid.innerHTML !== "") return;
                palette100.forEach(c => {
                    const chip = document.createElement('div');
                    chip.className = `color-chip ${t}-chip`;
                    chip.style.backgroundColor = c;
                    chip.onclick = () => selectPaletteColor(t, c, chip);
                    grid.appendChild(chip);
                });
                document.getElementById(`${t}-select-icon`).style.backgroundColor = defaults[t];
            });
        }
        function toggleColorGrid(type) { document.getElementById(`${type}-color-grid`).classList.toggle('grid-open'); }
        function selectPaletteColor(type, color, el) {
            document.querySelectorAll(`.${type}-chip`).forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById(`f-${type}-color`).value = color;
            document.getElementById(`${type}-select-icon`).style.backgroundColor = color;
            toggleColorGrid(type);
        }
        function toggleMenu(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; }
        function closeModal() { document.querySelectorAll('.modal-base').forEach(m => m.style.display='none'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function showHome() { document.getElementById('home-content').classList.remove('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.add('hidden'); }
        function showDollList() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.remove('hidden'); toggleMenu('side-menu'); renderDollList(); }
        function showPostListPage() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('post-list-page').classList.remove('hidden'); toggleMenu('side-menu'); }
        function openModalWithClear() { clearDollForm(); document.getElementById('modal').style.display='flex'; toggleMenu('side-menu'); }
        function updateCrop(imgId, hId, vId) { document.getElementById(imgId).style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`; }
        function changeMonth(d) { calOffset += d; renderCalendar(); }
        function showAlert(msg) { 
            document.getElementById('dialog-message').innerText = msg;
            const btnArea = document.getElementById('dialog-buttons'); btnArea.innerHTML = '';
            const b = document.createElement('button'); b.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold"; b.innerText = "OK"; b.onclick = closeDialog;
            btnArea.appendChild(b); document.getElementById('custom-dialog').style.display = 'flex';
        }
        function showConfirm(m, onY) {
            document.getElementById('dialog-message').innerText = m;
            const btnArea = document.getElementById('dialog-buttons'); btnArea.innerHTML = '';
            const b1 = document.createElement('button'); b1.className = "w-full bg-red-400 text-white py-4 rounded-full font-bold"; b1.innerText = "実行"; b1.onclick = () => { onY(); closeDialog(); };
            const b2 = document.createElement('button'); b2.className = "w-full bg-stone-100 py-4 rounded-full font-bold"; b2.innerText = "キャンセル"; b2.onclick = closeDialog;
            btnArea.append(b1, b2); document.getElementById('custom-dialog').style.display = 'flex';
        }
        function closeDialog() { document.getElementById('custom-dialog').style.display = 'none'; }
        function loadImg(e, type) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader(); rd.onload = (re) => {
                const img = new Image(); img.onload = () => {
                    currentRawImg[type] = img;
                    const el = document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview');
                    el.src = img.src; el.classList.remove('hidden');
                    document.getElementById(type === 'doll' ? 'doll-hint' : 'owner-hint').classList.add('hidden');
                }; img.src = re.target.result;
            }; rd.readAsDataURL(f);
        }
        function copyURL() {
            const url = window.location.origin + window.location.pathname + '?id=' + window.fb.auth.currentUser.uid;
            navigator.clipboard.writeText(url).then(() => showAlert("自分のギャラリーURLをコピーしました"));
        }
        function shareSNS(type) {
            const url = window.location.href;
            if(type === 'line') window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}`);
            else window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`);
        }
        // 他、投稿・SNS入力などの補助関数（元コードから一部簡略化して維持）
        function addSnsInput(v = {type:'X(旧Twitter)', val:''}) {
            const div = document.createElement('div'); div.className = "sns-input-row flex gap-2 items-center";
            div.innerHTML = `<select class="sns-type text-sm border p-2 rounded-lg bg-white h-10 outline-none">${['X(旧Twitter)','Instagram','mixi2','Bluesky','Misskey','その他URL'].map(t => `<option ${v.type===t?'selected':''}>${t}</option>`).join('')}</select><input type="text" class="sns-val flex-1 text-sm border p-2 rounded-lg h-10 outline-none" placeholder="ID or URL" value="${v.val}"><button onclick="this.parentElement.remove()" class="p-2 text-stone-400">✕</button>`;
            document.getElementById('sns-inputs-container').appendChild(div);
        }
        function openOwnerModal() {
            document.getElementById('o-name').value = owner.name;
            document.getElementById('o-bio').value = owner.bio;
            document.getElementById('sns-inputs-container').innerHTML = '';
            (owner.sns || []).forEach(s => addSnsInput(s));
            document.getElementById('owner-modal').style.display='flex';
            toggleMenu('side-menu');
        }
        function clearDollForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('f-name').value = "";
            document.getElementById('f-kana').value = "";
            document.getElementById('f-bday').value = "";
            document.getElementById('f-welcome').value = "";
            document.getElementById('anniversary-inputs').innerHTML = '';
            document.getElementById('f-profile').value = "";
            document.getElementById('crop-preview').classList.add('hidden');
            document.getElementById('doll-hint').classList.remove('hidden');
        }
        function addAnniversaryInput(v = {name:'', date:''}) {
            const div = document.createElement('div'); div.className = "p-4 bg-stone-100/50 rounded-2xl space-y-2 border border-stone-100";
            div.innerHTML = `<input type="text" class="f-anni-name w-full border-b bg-transparent py-1 text-sm font-bold outline-none" placeholder="記念日名" value="${v.name}"><input type="date" class="date-input f-anni-date" value="${v.date}">`;
            document.getElementById('anniversary-inputs').appendChild(div);
        }
    </script>
</body>
</html>
