<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        :root { --app-max-width: 600px; }

        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fcfaf8; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
            /* 画像長押し保存禁止 */
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        /* PC/iPad表示最適化：中央寄せと幅制限 */
        .app-container {
            max-width: var(--app-max-width);
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
        }

        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保存・右クリック・ドラッグ禁止 */
        img { 
            -webkit-user-drag: none;
            -moz-user-drag: none;
            pointer-events: none; 
        }
        /* クリックが必要な画像（ボタン代わり）は例外設定 */
        .clickable-img { pointer-events: auto !important; cursor: pointer; }

        .film-outer { 
            background: #1a1a1a; 
            overflow-x: auto; 
            overflow-y: hidden; 
            padding: 20px 0; 
            position: relative; 
            min-height: 120px; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
        }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; pointer-events: auto; }

        /* モーダル基本設定 */
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }

        /* 画像クロップ調整 */
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; pointer-events: auto; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        /* カレンダー */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
        .is-today { outline: 2px solid #d4af37; outline-offset: -2px; font-weight: bold; background: #fffcf0; }

        /* カラーピッカー */
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; pointer-events: auto; }

        /* テキストエリア自動伸縮 */
        textarea { 
            resize: none; 
            overflow: hidden; 
            min-height: 44px;
            user-select: text !important; /* コピペ可能に */
        }
        input { user-select: text !important; }

        /* 記念日アニメーション */
        @keyframes pulse-anni {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }

        /* 管理UIの制御 */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }

        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

        <div id="profile-bg" class="min-h-full p-6 pb-32 max-w-[600px] mx-auto relative">

            <div class="mt-12 space-y-3 px-2" id="view-anniversaries"></div>

            <div class="fixed bottom-6 inset-x-0 px-6 flex gap-4 max-w-[600px] mx-auto admin-only-flex hidden">

                <button id="detail-del-btn" class="flex-1 bg-red-50 text-red-400 py-4 rounded-full font-bold border border-red-100 clickable-img">削除</button>

    <div id="owner-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">

            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <div class="crop-area">
                <div class="preview-sq" onclick="document.getElementById('owner-file').click()">
                    <img id="owner-preview" class="hidden clickable-img">
                    <span id="owner-hint" class="text-stone-300 text-xs font-bold">画像を選択</span>
                </div>
                <div class="v-bar-box">
                    <input type="range" id="o-crop-v" min="0" max="100" class="vertical-range clickable-img" oninput="updateCrop('owner-preview', 'o-crop-h', 'o-crop-v')">
                </div>
            </div>
            <input type="range" id="o-crop-h" min="0" max="100" class="w-full mb-6 clickable-img" oninput="updateCrop('owner-preview', 'o-crop-h', 'o-crop-v')">

                <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="loadImg(event, 'owner')">

                <button onclick="addSnsInput()" class="w-full py-2 bg-stone-100 rounded text-xs font-bold clickable-img">+ SNSリンクを追加</button>
                <button onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold clickable-img">保存</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block clickable-img">← 閉じる</button>
            <input type="hidden" id="edit-post-id">
            <input type="text" id="p-title" class="w-full border-b p-3 font-bold mb-4 outline-none" placeholder="タイトル">
            <div id="post-blocks-container" class="space-y-4"></div>

            <button onclick="savePost()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold mt-6 clickable-img">保存</button>
        </div>
    </div>

    <script>
        // Supabase 設定
        const SUPABASE_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [];
        let calOffset = 0;
        let isLoggedIn = false;
        let userId = null;
        let currentRawImg = { doll: null, owner: null };

        // --- 初期化 ---
        window.onload = async () => {
            // URLから表示対象IDを取得
            const params = new URLSearchParams(window.location.search);
            const viewId = params.get('id');

            // 認証チェック
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                isLoggedIn = true;
                userId = session.user.id;
                document.body.classList.add('is-admin');
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
            } else if (viewId) {
                userId = viewId;
            }

            // メニューボタンなどの基本UIイベント設定 (データ読込前に完了させる)
            initUIEvents();
            initAutoResize();
            initColorPalettes();

            // データ読み込みと描画
            if (userId) {
                await loadData();
            }
            renderAll();
        };

        function initUIEvents() {
            document.getElementById('menu-trigger').onclick = (e) => {
                e.stopPropagation();
                toggleMenu(true);
            };
            document.getElementById('side-menu').onclick = () => toggleMenu(false);
        }

        async function loadData() {
            try {
                const { data, error } = await _supabase.from('galleries').select('*').eq('id', userId).single();
                if (data) {
                    dolls = data.dolls || [];
                    owner = data.owner || { name: "Owner Name", bio: "", sns: [], image:"" };
                    posts = data.posts || [];
                }
            } catch (e) { console.error("Data load error", e); }
        }

        async function syncData() {
            if (!isLoggedIn) return;
            const { error } = await _supabase.from('galleries').upsert({
                id: userId,
                dolls,
                owner,
                posts,
                updated_at: new Date().toISOString()
            });
            if (error) showAlert("保存に失敗しました: " + error.message);
        }

        function toggleMenu(show) {
            const menu = document.getElementById('side-menu');
            menu.style.display = show ? 'flex' : 'none';
        }

        // --- 認証 ---
        async function handleGoogleLogin() {
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            location.href = window.location.origin + window.location.pathname;
        }

        // --- 描画系 ---
        function renderAll() {
            renderFilmRoll();
            renderOwner();
            renderPosts();
            renderCalendar();
            renderAnniversary();
        }

        function renderFilmRoll() {
            const track = document.getElementById('top-film-roll');
            track.innerHTML = '';
            const activeDolls = dolls.filter(d => d.image);
            if (activeDolls.length > 0) {
                document.getElementById('empty-msg').style.display = 'none';
                activeDolls.forEach((d, i) => {
                    const originalIdx = dolls.indexOf(d);
                    const img = document.createElement('img');
                    img.src = d.image;
                    img.className = "film-frame clickable-img";
                    img.onclick = () => showDetail(originalIdx);
                    track.appendChild(img);
                });
            } else {
                document.getElementById('empty-msg').style.display = 'flex';
            }
        }

        function renderOwner() {
            const oImg = document.getElementById('display-owner-img');
            if(owner.image) { 
                oImg.src = owner.image; 
                oImg.classList.remove('hidden'); 
            } else {
                oImg.classList.add('hidden');
            }
            document.getElementById('owner-name').innerText = owner.name || "Owner Name";
            document.getElementById('owner-bio').innerText = owner.bio || "";
            
            const snsArea = document.getElementById('owner-sns-links');
            snsArea.innerHTML = '';

        function renderAnniversary() {
            const happyList = document.getElementById('happy-anniversary-list');
            const happyArea = document.getElementById('happy-anniversary');
            happyList.innerHTML = '';
            
            const now = new Date();
            const todayStr = `${now.getMonth() + 1}-${now.getDate()}`;
            let hasAnni = false;

            dolls.forEach((d, idx) => {
                const checkDates = [
                    { label: "誕生日", date: d.birthday },
                    { label: "お迎え記念日", date: d.welcomeDay },
                    ...(d.anniversaries || []).map(a => ({ label: a.name, date: a.date }))
                ];

                checkDates.forEach(cd => {
                    if (!cd.date) return;
                    const dt = new Date(cd.date);
                    const isSameDay = (dt.getMonth() === now.getMonth() && dt.getDate() === now.getDate());
                    
                    // キリ番判定 (100日、200日...)
                    const diffDays = Math.floor((now - dt) / (1000 * 60 * 60 * 24));
                    const isMilestone = diffDays > 0 && diffDays % 100 === 0;

                    if (isSameDay || isMilestone) {
                        hasAnni = true;
                        const labelText = isMilestone ? `${cd.label} (${diffDays}日目)` : cd.label;
                        
                        const div = document.createElement('div');
                        div.className = "bg-white p-4 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-4 cursor-pointer clickable-img";
                        div.onclick = () => showDetail(idx);
                        div.innerHTML = `
                            <img src="${d.image}" class="w-12 h-12 rounded-full object-cover border-2 border-pink-200">
                            <div class="flex-1">
                                <p class="font-bold text-stone-800 text-sm">${d.name}</p>
                                <p class="text-xs text-pink-500 font-bold">${labelText}</p>
                            </div>
                        `;
                        happyList.appendChild(div);
                    }
                });
            });

            happyArea.classList.toggle('hidden', !hasAnni);
            renderClosestAnni();
        }

        function renderClosestAnni() {
            const area = document.getElementById('closest-anniversary');
            area.innerHTML = '';
            const now = new Date();
            let all = [];
            dolls.forEach((d, idx) => {
                const dates = [{n:"誕生日", d:d.birthday}, {n:"お迎え日", d:d.welcomeDay}, ...(d.anniversaries||[]).map(a=>({n:a.name, d:a.date}))];
                dates.forEach(ev => {
                    if(!ev.d) return;
                    let target = new Date(ev.d);
                    target.setFullYear(now.getFullYear());
                    if(target < now) target.setFullYear(now.getFullYear() + 1);
                    all.push({ name: d.name, label: ev.n, date: target, dollIdx: idx });
                });
            });
            all.sort((a,b) => a.date - b.date);
            
            all.slice(0, 3).forEach(a => {
                const diff = Math.ceil((a.date - now) / (1000*60*60*24));
                const d = document.createElement('div');
                d.className = "flex justify-between items-center py-3 border-b border-stone-100 cursor-pointer clickable-img";
                d.onclick = () => showDetail(a.dollIdx);
                d.innerHTML = `<div class="flex flex-col"><span class="text-[10px] font-bold text-stone-400">${a.name}</span><span class="text-sm font-bold text-stone-700">${a.label}</span></div><span class="text-xs font-bold text-stone-400">あと ${diff}日</span>`;
                area.appendChild(d);
            });
        }

        function renderCalendar() {
            const now = new Date();
            const today = new Date();
            const viewDate = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            
            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m+1, 0).getDate();
            const area = document.getElementById('cal-days');
            area.innerHTML = '';

            const dayEvents = {};
            dolls.forEach((d, idx) => {
                const dates = [{n: "誕生日", d: d.birthday}, {n: "お迎え", d: d.welcomeDay}, ...(d.anniversaries||[]).map(a=>({n:a.name, d:a.date}))];
                dates.forEach(ev => {
                    if(!ev.d) return;
                    const dt = new Date(ev.d);
                    if(dt.getMonth() === m) {
                        const date = dt.getDate();
                        if(!dayEvents[date]) dayEvents[date] = [];
                        dayEvents[date].push({ name: d.name, label: ev.n, color: d.calColor });
                    }
                });
            });

            for(let i=0; i<first; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=last; d++) {
                const isToday = (y === today.getFullYear() && m === today.getMonth() && d === today.getDate());
                const div = document.createElement('div');
                div.className = `cal-day clickable-img ${isToday ? 'is-today' : ''}`;
                div.innerHTML = `<span class="relative z-10">${d}</span>`;
                if(dayEvents[d]) {
                    const dots = document.createElement('div');
                    dots.className = "cal-dots";
                    dayEvents[d].forEach(e => {
                        const dot = document.createElement('div');
                        dot.className = "cal-dot";
                        dot.style.backgroundColor = e.color || '#E11D48';
                        dots.appendChild(dot);
                    });
                    div.appendChild(dots);
                }
                div.onclick = () => showDayEvents(y, m, d, dayEvents[d]);
                area.appendChild(div);
            }
        }

        // --- 画像処理 (WebP変換) ---
        async function processImage(imgEl, hId, vId) {
            const cvs = document.createElement('canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.height = 800; // 高解像度WebP用
            
            const h = document.getElementById(hId).value / 100;
            const v = document.getElementById(vId).value / 100;
            
            const scale = Math.max(800 / imgEl.width, 800 / imgEl.height);
            const sw = imgEl.width * scale;
            const sh = imgEl.height * scale;
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0,0,800,800);
            ctx.drawImage(imgEl, (800 - sw) * h, (800 - sh) * v, sw, sh);
            
            return cvs.toDataURL('image/webp', 0.8);
        }

        function loadBlockImg(e, el) {
            const f = e.target.files[0];
            if(!f) return;
            const rd = new FileReader();
            rd.onload = (re) => {
                const img = new Image();
                img.onload = async () => {
                    const cvs = document.createElement('canvas');
                    const ctx = cvs.getContext('2d');
                    const scale = Math.min(1200 / img.width, 1200 / img.height, 1);
                    cvs.width = img.width * scale;
                    cvs.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
                    const webp = cvs.toDataURL('image/webp', 0.8);
                    const imgPreview = el.parentElement.querySelector('img');
                    imgPreview.src = webp;
                    imgPreview.classList.remove('hidden');
                    el.parentElement.querySelector('span').classList.add('hidden');
                };
                img.src = re.target.result;
            };
            rd.readAsDataURL(f);
        }

            btnArea.innerHTML = '';
            const b1 = document.createElement('button');
            b1.className = "w-full bg-red-400 text-white py-4 rounded-full font-bold clickable-img";
            b1.innerText = "はい";
            b1.onclick = () => { onYes(); d.style.display = 'none'; };
            const b2 = document.createElement('button');
            b2.className = "w-full bg-stone-100 py-4 rounded-full font-bold text-stone-400 clickable-img";
            b2.innerText = "キャンセル";
            b2.onclick = () => d.style.display = 'none';
            btnArea.append(b1, b2);
            d.style.display = 'flex';
        }
    </script>
</body>
</html>
