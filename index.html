<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: text; }
        
        /* PC・iPad表示最適化 */
        .app-outer { display: flex; justify-content: center; background-color: #f5f5f5; min-height: 100vh; }
        .app-container { width: 100%; max-width: 600px; min-height: 100vh; background: #fcfaf8; box-shadow: 0 0 50px rgba(0,0,0,0.05); position: relative; padding-bottom: 100px; }
        
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保存禁止設定 */
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; pointer-events: none; }
        .clickable-img { pointer-events: auto !important; }

        .film-outer { background: #1a1a1a; overflow-x: auto; padding: 20px 0; position: relative; min-height: 120px; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #444; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; pointer-events: auto; }

        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }

        /* カレンダー設定 */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; border-radius: 50%; position: relative; background: #fff; cursor: pointer; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
        .today-mark { border: 2px solid #333 !important; font-weight: bold; background: #f0f0f0; }

        /* カラーチップ */
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #eee; cursor: pointer; }

        /* 投稿編集ボタン等 */
        .admin-tool { display: none; }
        body.is-admin .admin-tool { display: block; }
        body.is-admin .admin-tool-flex { display: flex; }

        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 100000; flex-direction: column; align-items: center; justify-content: center; }
        
        /* テキストエリア自動伸縮 */
        textarea.auto-resize { resize: none; overflow: hidden; }

        .animate-anni { animation: pulse-anni 2s infinite; }
        @keyframes pulse-anni { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-overlay">
        <div class="w-10 h-10 border-4 border-stone-200 border-t-stone-800 rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-stone-500 tracking-widest">PROCESSING...</p>
    </div>

    <div id="confirm-modal" class="modal-base" style="z-index: 100001;">
        <div class="modal-content text-center">
            <p id="confirm-msg" class="font-bold text-stone-800 mb-8 whitespace-pre-wrap leading-relaxed"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm(false)" class="flex-1 py-4 bg-stone-100 rounded-2xl font-bold text-stone-500">キャンセル</button>
                <button onclick="closeConfirm(true)" class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-bold">実行する</button>
            </div>
        </div>
    </div>

    <div class="app-outer">
        <div class="app-container">
            <div class="film-outer" id="film-container">
                <div id="top-film-roll" class="film-scroll-track"></div>

            </div>

            <header class="p-4 bg-white/80 backdrop-blur-md border-b sticky top-0 z-[100] flex justify-between items-center">
                <h1 onclick="showHome()" class="logo-font text-3xl cursor-pointer">Doll Uchinoko Gallery</h1>
                <div class="flex items-center gap-2">
                    <button onclick="shareSite()" class="p-2 text-stone-600"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
                    <div id="menu-trigger" onclick="toggleMenu('side-menu')" class="p-2 cursor-pointer space-y-1.5">
                        <div class="w-6 h-0.5 bg-stone-800"></div>
                        <div class="w-6 h-0.5 bg-stone-800"></div>
                        <div class="w-6 h-0.5 bg-stone-800"></div>
                    </div>
                </div>
            </header>

            <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">

                    <div class="flex-1 space-y-1">
                        <button onclick="showHome(); toggleMenu('side-menu');" class="w-full text-left py-4 font-bold border-b text-stone-800">🏠 ホーム</button>
                        <button onclick="openDollModal()" class="w-full text-left py-4 font-bold border-b text-blue-600 admin-tool">✨ うちの子を登録</button>
                        <button onclick="showDollList()" class="w-full text-left py-4 font-bold border-b text-stone-800">📸 うちの子一覧</button>
                        <button onclick="showPostList()" class="w-full text-left py-4 font-bold border-b text-stone-800">📝 投稿一覧</button>
                        <div id="guest-menu" class="py-6">
                            <button onclick="handleGoogleLogin()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold">🚀 ギャラリーを作成する</button>
                        </div>
                    </div>
                    <div class="admin-tool space-y-4 pt-6 border-t">
                        <button onclick="openOwnerModal()" class="w-full py-3 bg-stone-100 rounded-xl text-sm font-bold">👤 オーナー設定</button>
                        <button onclick="openPostModal()" class="w-full py-3 bg-stone-800 text-white rounded-xl text-sm font-bold">📝 投稿を作成</button>
                        <button onclick="handleLogout()" class="w-full py-2 text-red-400 text-xs font-bold">ログアウト</button>
                    </div>
                </div>
            </div>

            <main id="home-content">
                <section id="owner-section" class="p-10 bg-white text-center">
                    <img id="display-owner-img" class="w-24 h-24 rounded-full object-cover mx-auto mb-6 border-4 border-stone-5 hidden clickable-img">
                    <h2 id="owner-name" class="text-2xl font-bold mb-3 tracking-tight"></h2>
                    <p id="owner-bio" class="text-sm text-stone-500 leading-relaxed mb-8 whitespace-pre-wrap"></p>
                    <div id="owner-sns-links" class="flex flex-col items-center gap-3"></div>
                </section>

                <section class="p-6 bg-stone-50">
                    <div id="happy-anniversary" class="mb-10 hidden">
                        <h3 class="text-[10px] font-bold text-pink-500 uppercase mb-4 tracking-widest border-b border-pink-100 pb-2">Happy Anniversary!</h3>
                        <div id="happy-anniversary-list" class="space-y-3"></div>
                    </div>
                    <h3 class="text-[10px] font-bold text-stone-400 uppercase mb-4 tracking-widest border-b pb-2">Next Anniversary</h3>
                    <div id="closest-anniversary"></div>
                </section>

                <section class="p-8 bg-white border-y">
                    <div class="flex justify-between items-center mb-8">
                        <button onclick="changeMonth(-1)" class="p-2 text-stone-300">◀</button>
                        <h3 id="cal-month" class="font-bold text-lg tracking-widest"></h3>
                        <button onclick="changeMonth(1)" class="p-2 text-stone-300">▶</button>
                    </div>
                    <div id="cal-days" class="cal-grid mb-4"></div>
                </section>

                <div id="home-posts" class="p-6 space-y-10"></div>
            </main>

            <div id="doll-list-page" class="hidden p-6">
                <div class="flex justify-between items-center mb-8">
                    <button onclick="showHome()" class="text-xs font-bold bg-stone-100 px-5 py-2.5 rounded-full">← 戻る</button>
                    <h2 class="font-bold text-stone-800">うちの子一覧</h2>
                </div>
                <div id="doll-display-area" class="grid grid-cols-3 gap-3"></div>
            </div>

            <div id="post-list-page" class="hidden p-6">
                <div class="mb-8"><button onclick="showHome()" class="text-xs font-bold bg-stone-100 px-5 py-2.5 rounded-full">← 戻る</button></div>
                <h2 class="text-xl font-bold mb-6 text-stone-800">投稿一覧</h2>
                <div id="menu-post-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="doll-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6">うちの子登録</h3>
            <input type="hidden" id="edit-doll-id">
            <div class="aspect-square bg-stone-100 rounded-3xl overflow-hidden mb-6 relative cursor-pointer" onclick="document.getElementById('doll-file').click()">
                <img id="doll-preview" class="w-full h-full object-cover hidden clickable-img">
                <div id="doll-hint" class="absolute inset-0 flex items-center justify-center text-stone-400 text-xs font-bold">画像をタップして選択</div>
            </div>
            <div class="space-y-6">
                <input type="file" id="doll-file" accept="image/*" class="hidden" onchange="processImage(event, 'doll')">
                <input type="text" id="f-name" class="w-full border-b py-3 font-bold outline-none text-lg" placeholder="お名前">
                <input type="text" id="f-kana" class="w-full border-b py-2 text-sm outline-none" placeholder="ふりがな">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-stone-400 uppercase">Birthday</label>
                        <div class="flex gap-1">
                            <select id="f-b-m" class="border rounded-lg p-2 text-xs flex-1"></select>
                            <select id="f-b-d" class="border rounded-lg p-2 text-xs flex-1"></select>
                        </div>
                        <input type="number" id="f-b-y" class="w-full border rounded-lg p-2 text-xs" placeholder="誕生年(西暦)">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-stone-400 uppercase">Welcome</label>
                        <div class="flex gap-1">
                            <select id="f-w-m" class="border rounded-lg p-2 text-xs flex-1"></select>
                            <select id="f-w-d" class="border rounded-lg p-2 text-xs flex-1"></select>
                        </div>
                        <input type="number" id="f-w-y" class="w-full border rounded-lg p-2 text-xs" placeholder="お迎え年(西暦)">
                    </div>
                </div>

                <div id="anniversary-inputs" class="space-y-3"></div>
                <button onclick="addAnniInput()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-2xl text-[10px] font-bold text-stone-400">+ 記念日を追加</button>

                <div class="p-5 bg-stone-50 rounded-3xl space-y-4">
                    <div class="flex justify-between items-center" onclick="toggleColorGrid('bg')">
                        <span class="text-sm font-bold text-stone-600">背景色</span>
                        <div id="bg-select-icon" class="color-select-btn"></div>
                    </div>
                    <div id="bg-color-grid" class="color-grid"></div><input type="hidden" id="f-bg-color" value="#ffffff">

                    <div class="flex justify-between items-center" onclick="toggleColorGrid('text')">
                        <span class="text-sm font-bold text-stone-600">文字色</span>
                        <div id="text-select-icon" class="color-select-btn"></div>
                    </div>
                    <div id="text-color-grid" class="color-grid"></div><input type="hidden" id="f-text-color" value="#000000">

                    <div class="flex justify-between items-center" onclick="toggleColorGrid('cal')">
                        <span class="text-sm font-bold text-stone-600">カレンダー色</span>
                        <div id="cal-select-icon" class="color-select-btn"></div>
                    </div>
                    <div id="cal-color-grid" class="color-grid"></div><input type="hidden" id="f-cal-color" value="#E11D48">
                </div>

                <textarea id="f-profile" class="auto-resize w-full border p-4 rounded-3xl text-sm min-h-[120px] outline-none" placeholder="プロフィール文..."></textarea>
                <button onclick="saveDoll()" class="w-full bg-stone-800 text-white py-5 rounded-3xl font-bold shadow-xl">この内容で登録する</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6">投稿作成</h3>
            <input type="hidden" id="edit-post-id">
            <input type="text" id="p-title" class="w-full border-b py-3 font-bold mb-6 outline-none text-lg" placeholder="タイトル">
            <div id="post-blocks" class="space-y-6"></div>
            <button onclick="addPostBlock()" class="w-full py-4 border-2 border-dashed border-stone-200 rounded-3xl text-stone-400 text-xs font-bold mt-6">+ ブロックを追加</button>
            <div class="flex gap-4 p-5 bg-stone-50 rounded-3xl text-xs mt-8 items-center justify-center">
                <span class="font-bold text-stone-400">表示場所:</span>
                <label class="flex items-center gap-2 font-bold"><input type="radio" name="p-pos" value="home" checked> ホーム</label>
                <label class="flex items-center gap-2 font-bold"><input type="radio" name="p-pos" value="menu"> メニュー</label>
            </div>
            <button onclick="savePost()" class="w-full bg-stone-800 text-white py-5 rounded-3xl font-bold mt-8 shadow-xl">投稿を公開する</button>
        </div>
    </div>

    <div id="owner-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <div class="aspect-square bg-stone-100 rounded-full w-32 h-32 mx-auto overflow-hidden mb-6 relative cursor-pointer" onclick="document.getElementById('owner-file').click()">
                <img id="owner-preview" class="w-full h-full object-cover hidden clickable-img">
                <div id="owner-hint" class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-stone-400">SELECT</div>
            </div>
            <div class="space-y-5">
                <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="processImage(event, 'owner')">
                <input type="text" id="o-name" class="w-full border-b py-2 font-bold text-center outline-none" placeholder="名前">
                <textarea id="o-bio" class="auto-resize w-full border p-4 rounded-2xl text-sm min-h-[100px] outline-none" placeholder="自己紹介..."></textarea>
                <div id="sns-inputs" class="space-y-3"></div>
                <button onclick="addSnsInput()" class="w-full py-2 bg-stone-50 rounded-xl text-[10px] font-bold text-stone-400">+ SNSリンク追加</button>
                <button onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold shadow-lg">設定を保存</button>
            </div>
        </div>
    </div>

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div class="app-outer">
            <div id="profile-bg" class="app-container p-6 pb-40">
                <button onclick="closeProfile()" class="bg-white/80 backdrop-blur shadow-sm px-6 py-2.5 rounded-full text-xs font-bold mb-8">← 戻る</button>
                <img id="view-img" class="w-full aspect-square object-cover rounded-[40px] shadow-2xl mb-10 clickable-img">
                <div class="text-center mb-10">
                    <p id="view-kana" class="text-sm opacity-60 tracking-widest mb-2"></p>
                    <h2 id="view-name" class="text-4xl font-bold tracking-tight"></h2>
                </div>
                <div id="detail-box" class="bg-white/20 backdrop-blur-lg p-8 rounded-[32px] space-y-6 mb-10 border border-white/30"></div>
                <p id="view-profile" class="whitespace-pre-wrap leading-loose px-4 font-medium opacity-90"></p>
                <div class="fixed bottom-8 inset-x-0 px-6 flex gap-4 max-w-[600px] mx-auto admin-tool-flex hidden">
                    <button id="det-edit" class="flex-1 bg-stone-800 text-white py-5 rounded-full font-bold shadow-xl">編集する</button>
                    <button id="det-del" class="w-20 bg-red-50 text-red-400 py-5 rounded-full font-bold border border-red-100">消去</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dolls = [], owner = { name: "", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let currentUID = null, onConfirmAction = null;

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const viewID = params.get('id');
            const { data: { session } } = await db.auth.getSession();
            
            const myID = session?.user?.id;
            currentUID = viewID || myID;

            if (currentUID) {
                await loadAllData(currentUID);
                document.getElementById('guest-menu').classList.add('hidden');
            }
            if (session && (!viewID || viewID === myID)) {
                document.body.classList.add('is-admin');
            }

            initForms();
            renderAll();
            setupAutoResize();
        };

        async function loadAllData(uid) {
            const { data: d } = await db.from('dolls').select('data').eq('id', uid);
            const { data: o } = await db.from('owner').select('data').eq('id', uid).maybeSingle();
            const { data: p } = await db.from('posts').select('data').eq('id', uid);
            if (d) dolls = d.map(x => x.data);
            if (o) owner = o.data;
            if (p) posts = p.map(x => x.data);
        }

        async function syncDB(table, data) {
            loading(true);
            const { data: { user } } = await db.auth.getUser();
            if (Array.isArray(data)) {
                await db.from(table).delete().eq('id', user.id);
                await db.from(table).insert(data.map(d => ({ id: user.id, data: d })));
            } else {
                await db.from(table).upsert({ id: user.id, data: data });
            }
            loading(false);
        }

        function renderAll() {
            const roll = document.getElementById('top-film-roll'); roll.innerHTML = '';
            dolls.forEach((d, i) => {
                const img = document.createElement('img'); img.src = d.image; img.className = "film-frame";
                img.onclick = () => showDetail(i); roll.appendChild(img);
            });
            document.getElementById('empty-msg').style.display = dolls.length ? 'none' : 'flex';

            if(owner.image) { document.getElementById('display-owner-img').src = owner.image; document.getElementById('display-owner-img').classList.remove('hidden'); }
            document.getElementById('owner-name').innerText = owner.name || "Doll Collector";
            document.getElementById('owner-bio').innerText = owner.bio || "";
            
            const snsArea = document.getElementById('owner-sns-links'); snsArea.innerHTML = '';
            (owner.sns || []).forEach(s => {
                const a = document.createElement('a'); a.className = "w-full max-w-[280px] py-4 bg-white border rounded-2xl text-xs font-bold shadow-sm";
                a.href = s.url; a.target = "_blank"; a.innerText = s.name; snsArea.appendChild(a);
            });

            const hp = document.getElementById('home-posts'); hp.innerHTML = '';
            const mpl = document.getElementById('menu-post-list'); mpl.innerHTML = '';
            posts.forEach((p, i) => {
                if(p.pos === 'home') {
                    const card = document.createElement('div'); card.className = "bg-white rounded-[40px] p-8 border shadow-sm relative";
                    let html = `<h4 class="font-bold mb-6 text-xl tracking-tight">${p.title}</h4><div class="space-y-6">`;
                    p.blocks.forEach(b => {
                        if(b.img) html += `<img src="${b.img}" class="w-full rounded-3xl clickable-img">`;
                        if(b.text) html += `<p class="text-sm text-stone-600 leading-loose whitespace-pre-wrap">${b.text}</p>`;
                    });
                    html += `</div>`;
                    if(document.body.classList.contains('is-admin')) {
                        html += `<div class="flex gap-4 mt-8 pt-8 border-t"><button onclick="openPostModal(${i})" class="text-xs font-bold text-stone-400">編集</button><button onclick="confirmDelPost(${i})" class="text-xs font-bold text-red-300">削除</button></div>`;
                    }
                    card.innerHTML = html; hp.appendChild(card);
                } else {
                    const btn = document.createElement('div'); btn.className = "w-full flex items-center justify-between p-5 bg-white border rounded-2xl shadow-sm";
                    btn.innerHTML = `<span class="font-bold text-stone-700">${p.title}</span><button onclick="openPostModal(${i})" class="text-[10px] font-bold text-stone-300 admin-tool">EDIT</button>`;
                    btn.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { showHome(); openPostModal(i); } };
                    mpl.appendChild(btn);
                }
            });
            renderCalendar(); renderAnni();
        }

        function renderAnni() {
            const happyArea = document.getElementById('happy-anniversary'), happyList = document.getElementById('happy-anniversary-list'), nextArea = document.getElementById('closest-anniversary');
            happyList.innerHTML = ''; nextArea.innerHTML = ''; happyArea.classList.add('hidden');
            let nexts = [], events = [];
            const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            dolls.forEach((d, dIdx) => {
                const items = [{t:'b', n:'誕生日', y:d.by, m:d.bm, d:d.bd}, {t:'w', n:'お迎え日', y:d.wy, m:d.wm, d:d.wd}, ...(d.anis||[]).map(a=>({t:'c', n:a.n, m:a.m, d:a.d}))];
                items.forEach(v => {
                    if(!v.m || !v.d) return;
                    const bYear = v.y || now.getFullYear();
                    const origin = new Date(bYear, v.m-1, v.d);
                    const diffDays = Math.floor((today - origin) / 86400000);
                    const isToday = (now.getMonth()+1 == v.m && now.getDate() == v.d);

                    if(isToday && diffDays >= 0) {
                        let label = "";
                        if(diffDays > 0) {
                            const years = now.getFullYear() - bYear;
                            label = (v.t === 'b') ? `(${years}歳)` : `(${years}周年)`;
                        }
                        events.push({ text: `${d.name} の ${v.n} ${label}`, doll: d, idx: dIdx });
                    } else if(diffDays > 0 && diffDays % 100 === 0) {
                        events.push({ text: `${d.name} ${v.n}から ${diffDays}日目！`, doll: d, idx: dIdx });
                    }

                    let next = new Date(now.getFullYear(), v.m-1, v.d);
                    if(next < today) next.setFullYear(now.getFullYear() + 1);
                    nexts.push({ name: d.name, title: v.n, color: d.calC||'#E11D48', days: Math.ceil((next-today)/86400000) });
                });
            });

            if(events.length) {
                happyArea.classList.remove('hidden');
                events.forEach(ev => {
                    const div = document.createElement('div'); div.className = "bg-white p-4 rounded-2xl shadow-sm animate-anni flex items-center gap-4 cursor-pointer";
                    div.onclick = () => showDetail(ev.idx);
                    div.innerHTML = `<img src="${ev.doll.image}" class="w-12 h-12 rounded-full object-cover border-2 border-pink-100 clickable-img"><p class="font-bold text-stone-800 text-xs flex-1 leading-tight">${ev.text}</p><span class="text-xl">🎉</span>`;
                    happyList.appendChild(div);
                });
            }
            if(nexts.length) {
                nexts.sort((a,b)=>a.days - b.days);
                nexts.slice(0,3).forEach(b => {
                    nextArea.innerHTML += `<div class="bg-white p-5 border-l-4 rounded-2xl shadow-sm flex justify-between items-center mb-2" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold mb-1">${b.name}</p><p class="font-bold text-sm">${b.title}</p></div><b class="text-stone-800">あと ${b.days} 日</b></div>`;
                });
            }
        }

        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days');
            area.innerHTML = '';
            const map = {};
            dolls.forEach(d => {
                const dates = [{m:d.bm, d:d.bd, c:d.calC}, {m:d.wm, d:d.wd, c:d.calC}, ...(d.anis||[]).map(a=>({m:a.m, d:a.d, c:d.calC}))];
                dates.forEach(x => { if(x.m == m+1) { if(!map[x.d]) map[x.d]=[]; map[x.d].push(x.c); } });
            });

            for(let i=0; i<first; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=last; d++) {
                const isToday = (now.getFullYear()===y && now.getMonth()===m && now.getDate()===d);
                const div = document.createElement('div'); div.className = `cal-day ${isToday?'today-mark':''}`;
                if(map[d]) {
                    const dots = document.createElement('div'); dots.className = "cal-dots";
                    [...new Set(map[d])].forEach(c => { const dot=document.createElement('div'); dot.className="cal-dot"; dot.style.background=c; dots.appendChild(dot); });
                    div.appendChild(dots);
                }
                div.innerHTML += `<span>${d}</span>`; area.appendChild(div);
            }
        }

        function showDetail(idx) {
            const d = dolls[idx]; const ov = document.getElementById('profile-overlay'); const bg = document.getElementById('profile-bg');
            bg.style.backgroundColor = d.bgC || "#fff"; bg.style.color = d.txC || "#000";
            document.getElementById('view-img').src = d.image;
            document.getElementById('view-name').innerText = d.name;
            document.getElementById('view-kana').innerText = d.kana || "";
            document.getElementById('view-profile').innerText = d.profile || "";
            const box = document.getElementById('detail-box'); box.innerHTML = '';
            if(d.bm) box.innerHTML += `<div><span class="text-[10px] opacity-50 font-bold block uppercase tracking-widest">Birthday</span><b class="text-lg">${d.by?d.by+'.':''}${d.bm}.${d.bd}</b></div>`;
            if(d.wm) box.innerHTML += `<div><span class="text-[10px] opacity-50 font-bold block uppercase tracking-widest">Welcome</span><b class="text-lg">${d.wy?d.wy+'.':''}${d.wm}.${d.wd}</b></div>`;
            (d.anis||[]).forEach(a => { box.innerHTML += `<div><span class="text-[10px] opacity-50 font-bold block uppercase tracking-widest">${a.n}</span><b class="text-lg">${a.m}.${a.d}</b></div>`; });
            
            document.getElementById('det-edit').onclick = () => { closeProfile(); openDollModal(idx); };
            document.getElementById('det-del').onclick = () => { customConfirm("この子のデータを完全に削除しますか？", async () => { dolls.splice(idx,1); await syncDB('dolls', dolls); location.reload(); }); };
            ov.classList.remove('hidden');
        }

        function processImage(e, type) {
            const file = e.target.files[0]; if(!file) return;
            loading(true);
            const reader = new FileReader();
            reader.onload = (re) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = type === 'doll' ? 1000 : 500;
                    canvas.width = canvas.height = size;
                    const scale = Math.max(size/img.width, size/img.height);
                    const w = img.width * scale, h = img.height * scale;
                    ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
                    const webp = canvas.toDataURL('image/webp', 0.8);
                    const prev = document.getElementById(`${type}-preview`);
                    prev.src = webp; prev.classList.remove('hidden');
                    document.getElementById(`${type}-hint`).classList.add('hidden');
                    loading(false);
                };
                img.src = re.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveDoll() {
            const id = document.getElementById('edit-doll-id').value;
            const data = {
                name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value,
                image: document.getElementById('doll-preview').src,
                bm: document.getElementById('f-b-m').value, bd: document.getElementById('f-b-d').value, by: document.getElementById('f-b-y').value,
                wm: document.getElementById('f-w-m').value, wd: document.getElementById('f-w-d').value, wy: document.getElementById('f-w-y').value,
                bgC: document.getElementById('f-bg-color').value, txC: document.getElementById('f-text-color').value, calC: document.getElementById('f-cal-color').value,
                profile: document.getElementById('f-profile').value,
                anis: Array.from(document.querySelectorAll('.anni-item')).map(el => ({ n: el.querySelector('.an-n').value, m: el.querySelector('.an-m').value, d: el.querySelector('.an-d').value }))
            };
            if(!data.name || !data.image) return alert("名前と画像は必須です");
            if(id==="") dolls.push(data); else dolls[id]=data;
            await syncDB('dolls', dolls); location.reload();
        }

        function openDollModal(idx=null) {
            closeModal();
            document.getElementById('anniversary-inputs').innerHTML = '';
            if(idx !== null) {
                const d = dolls[idx]; document.getElementById('edit-doll-id').value = idx;
                document.getElementById('f-name').value = d.name; document.getElementById('f-kana').value = d.kana;
                document.getElementById('doll-preview').src = d.image; document.getElementById('doll-preview').classList.remove('hidden');
                document.getElementById('doll-hint').classList.add('hidden');
                document.getElementById('f-b-m').value = d.bm; document.getElementById('f-b-d').value = d.bd; document.getElementById('f-b-y').value = d.by||'';
                document.getElementById('f-w-m').value = d.wm; document.getElementById('f-w-d').value = d.wd; document.getElementById('f-w-y').value = d.wy||'';
                document.getElementById('f-bg-color').value = d.bgC; document.getElementById('f-text-color').value = d.txC; document.getElementById('f-cal-color').value = d.calC;
                document.getElementById('f-profile').value = d.profile;
                (d.anis||[]).forEach(a => addAnniInput(a));
            } else {
                document.getElementById('edit-doll-id').value = "";
                document.getElementById('doll-preview').classList.add('hidden'); document.getElementById('doll-hint').classList.remove('hidden');
                document.getElementById('f-name').value = ""; document.getElementById('f-profile').value = "";
            }
            document.getElementById('doll-modal').style.display = 'flex';
        }

        function addAnniInput(v={n:'', m:'', d:''}) {
            const div = document.createElement('div'); div.className = "anni-item p-4 bg-stone-50 rounded-2xl relative space-y-2";
            let mOpt = '<option value="">月</option>', dOpt = '<option value="">日</option>';
            for(let i=1;i<=12;i++) mOpt+=`<option value="${i}">${i}</option>`;
            for(let i=1;i<=31;i++) dOpt+=`<option value="${i}">${i}</option>`;
            div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button><input type="text" class="an-n w-full border-b bg-transparent py-1 font-bold outline-none text-xs" placeholder="記念日名" value="${v.n}"><div class="flex gap-2"><select class="an-m border rounded p-2 text-xs flex-1">${mOpt}</select><select class="an-d border rounded p-2 text-xs flex-1">${dOpt}</select></div>`;
            document.getElementById('anniversary-inputs').appendChild(div);
            if(v.m) div.querySelector('.an-m').value = v.m;
            if(v.d) div.querySelector('.an-d').value = v.d;
        }

        function addPostBlock(v={img:'', text:''}) {
            const div = document.createElement('div'); div.className = "post-block bg-stone-50 p-5 rounded-3xl space-y-4 relative";
            div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button><div class="aspect-video bg-white rounded-2xl overflow-hidden relative cursor-pointer" onclick="this.nextElementSibling.click()"><img src="${v.img}" class="${v.img?'':'hidden'} w-full h-full object-cover clickable-img"><div class="${v.img?'hidden':''} absolute inset-0 flex items-center justify-center text-[10px] font-bold text-stone-300 uppercase">Select Image</div></div><input type="file" accept="image/*" class="hidden" onchange="processBlockImg(event)"><textarea class="auto-resize w-full border-none bg-transparent p-2 text-sm outline-none min-h-[60px]" placeholder="本文を入力...">${v.text}</textarea>`;
            document.getElementById('post-blocks').appendChild(div);
            setupAutoResize();
        }
        function processBlockImg(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload=(re)=>{ const img=new Image(); img.onload=()=>{
                const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
                canvas.width=1000; canvas.height=img.height*(1000/img.width); ctx.drawImage(img,0,0,canvas.width,canvas.height);
                const webp=canvas.toDataURL('image/webp',0.7); const p=e.target.previousElementSibling;
                p.querySelector('img').src=webp; p.querySelector('img').classList.remove('hidden'); p.querySelector('div').classList.add('hidden');
            }; img.src=re.target.result; }; reader.readAsDataURL(file);
        }

        async function savePost() {
            const id = document.getElementById('edit-post-id').value;
            const data = {
                title: document.getElementById('p-title').value,
                pos: document.querySelector('input[name="p-pos"]:checked').value,
                blocks: Array.from(document.querySelectorAll('.post-block')).map(el => ({ img: el.querySelector('img').src, text: el.querySelector('textarea').value }))
            };
            if(id==="") posts.push(data); else posts[id]=data;
            await syncDB('posts', posts); location.reload();
        }
        function openPostModal(idx=null) {
            closeModal();
            document.getElementById('post-blocks').innerHTML = '';
            if(idx !== null) {
                const p = posts[idx]; document.getElementById('edit-post-id').value = idx;
                document.getElementById('p-title').value = p.title;
                document.querySelector(`input[name="p-pos"][value="${p.pos}"]`).checked = true;
                p.blocks.forEach(b => addPostBlock(b));
            } else {
                document.getElementById('edit-post-id').value = "";
                document.getElementById('p-title').value = "";
                addPostBlock();
            }
            document.getElementById('post-modal').style.display = 'flex';
        }
        function confirmDelPost(idx) {
            customConfirm("この投稿を削除しますか？\n（データベースから完全に消去されます）", async () => {
                posts.splice(idx,1); await syncDB('posts', posts); renderAll();
            });
        }

        function openOwnerModal() {
            closeModal();
            document.getElementById('o-name').value = owner.name; document.getElementById('o-bio').value = owner.bio;
            document.getElementById('owner-preview').src = owner.image;
            if(owner.image) { document.getElementById('owner-preview').classList.remove('hidden'); document.getElementById('owner-hint').classList.add('hidden'); }
            document.getElementById('sns-inputs').innerHTML = '';
            (owner.sns || []).forEach(s => addSnsInput(s));
            document.getElementById('owner-modal').style.display = 'flex';
        }
        function addSnsInput(v={name:'', url:''}) {
            const div = document.createElement('div'); div.className = "flex gap-2";
            div.innerHTML = `<input type="text" class="sn-n border rounded-lg p-2 text-xs flex-1" placeholder="SNS名" value="${v.name}"><input type="text" class="sn-u border rounded-lg p-2 text-xs flex-2" placeholder="URL" value="${v.url}"><button onclick="this.parentElement.remove()" class="text-stone-300">✕</button>`;
            document.getElementById('sns-inputs').appendChild(div);
        }
        async function saveOwner() {
            owner = {
                name: document.getElementById('o-name').value, bio: document.getElementById('o-bio').value,
                image: document.getElementById('owner-preview').src,
                sns: Array.from(document.querySelectorAll('#sns-inputs div')).map(el => ({ name: el.querySelector('.sn-n').value, url: el.querySelector('.sn-u').value }))
            };
            await syncDB('owner', owner); location.reload();
        }

        function showDollList() { toggleMenu('side-menu'); document.getElementById('home-content').classList.add('hidden'); document.getElementById('post-list-page').classList.add('hidden'); document.getElementById('doll-list-page').classList.remove('hidden'); renderDollList(); }
        function showPostList() { toggleMenu('side-menu'); document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.remove('hidden'); }
        function showHome() { document.getElementById('home-content').classList.remove('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.add('hidden'); closeProfile(); }
        function renderDollList() {
            const area = document.getElementById('doll-display-area'); area.innerHTML = '';
            dolls.forEach((d, i) => { area.innerHTML += `<img src="${d.image}" onclick="showDetail(${i})" class="aspect-square object-cover rounded-2xl border-2 border-white shadow-sm clickable-img">`; });
        }

        function setupAutoResize() {
            document.querySelectorAll('textarea.auto-resize').forEach(el => {
                el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
                el.oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; };
            });
        }

        function customConfirm(msg, callback) {
            document.getElementById('confirm-msg').innerText = msg;
            document.getElementById('confirm-modal').style.display = 'flex';
            onConfirmAction = callback;
        }
        function closeConfirm(res) {
            document.getElementById('confirm-modal').style.display = 'none';
            if(res && onConfirmAction) onConfirmAction();
            onConfirmAction = null;
        }

        function initForms() {
            ['f-b-m','f-w-m'].forEach(id => { const s=document.getElementById(id); s.innerHTML='<option value="">月</option>'; for(let i=1;i<=12;i++) s.innerHTML+=`<option value="${i}">${i}</option>`; });
            ['f-b-d','f-w-d'].forEach(id => { const s=document.getElementById(id); s.innerHTML='<option value="">日</option>'; for(let i=1;i<=31;i++) s.innerHTML+=`<option value="${i}">${i}</option>`; });
            
            const pal = ['#ffffff','#000000','#E11D48','#FB923C','#FACC15','#4ADE80','#2DD4BF','#3B82F6','#818CF8','#C084FC','#fcfaf8','#f5f5f5','#333333','#fee2e2','#fef3c7'];
            ['bg','text','cal'].forEach(t => {
                const g = document.getElementById(`${t}-color-grid`);
                pal.forEach(c => {
                    const chip = document.createElement('div'); chip.className="color-chip"; chip.style.background=c;
                    chip.onclick = () => { document.getElementById(`f-${t}-color`).value=c; document.getElementById(`${t}-select-icon`).style.background=c; g.classList.remove('grid-open'); };
                    g.appendChild(chip);
                });
            });
        }

        async function handleGoogleLogin() { await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); }
        async function handleLogout() { await db.auth.signOut(); window.location.href = window.location.origin + window.location.pathname; }
        function toggleMenu(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; }
        function toggleColorGrid(t) { document.getElementById(`${t}-color-grid`).classList.toggle('grid-open'); }
        function closeModal() { document.querySelectorAll('.modal-base').forEach(m=>m.style.display='none'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function changeMonth(n) { calOffset += n; renderCalendar(); }
        function loading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
        function shareSite() {
            const url = window.location.origin + window.location.pathname + (currentUID ? '?id='+currentUID : '');
            if(navigator.share) navigator.share({ title: document.title, url: url });
            else { navigator.clipboard.writeText(url); alert("サイトURLをコピーしました"); }
        }
    </script>
</body>
</html>
