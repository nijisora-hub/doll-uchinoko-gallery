<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        .share-btn { transition: all 0.2s ease; }
        .share-btn:active { transform: scale(0.96); opacity: 0.85; }
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <div id="custom-dialog">
        <div class="bg-white w-full max-w-xs p-8 rounded-3xl shadow-2xl text-center">
            <p id="dialog-message" class="text-[16px] mb-8 leading-relaxed font-bold whitespace-pre-wrap text-stone-700"></p>
            <div id="dialog-inputs" class="mb-6 space-y-4 hidden">
                <input type="text" id="auth-gallery-id" class="w-full border p-3 rounded-xl text-sm outline-none focus:border-stone-400" placeholder="公開用ID(半角英数)">
                <input type="text" id="auth-id" class="w-full border p-3 rounded-xl text-sm outline-none focus:border-stone-400" placeholder="管理者ユーザー名">
                <input type="password" id="auth-pw" class="w-full border p-3 rounded-xl text-sm outline-none focus:border-stone-400" placeholder="パスワード">
            </div>
            <div id="recovery-inputs" class="mb-6 space-y-3 hidden text-left">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-stone-400 block ml-1 uppercase">Birth</label>
                    <input type="date" id="rec-birth" class="w-full border p-3 rounded-xl text-sm">
                </div>
                <input type="text" id="rec-user" class="w-full border p-3 rounded-xl text-sm" placeholder="ニックネーム">
                <input type="text" id="rec-secret" class="w-full border p-3 rounded-xl text-sm" placeholder="秘密の合言葉">
            </div>
            <div id="dialog-buttons" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div class="film-outer" id="film-container">
        <div id="top-film-roll" class="film-scroll-track"></div>
        <div id="empty-msg" class="absolute inset-0 flex items-center justify-center text-stone-500 text-xs font-bold">画像が登録されるとここに並びます</div>
    </div>

    <header class="p-4 bg-white border-b sticky top-0 z-[100] flex justify-between items-center">
        <h1 onclick="showHome()" class="logo-font text-3xl cursor-pointer">Doll Uchinoko Gallery</h1>
        <div onclick="toggleMenu('side-menu')" class="p-2 cursor-pointer">
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800 mb-1.5"></div>
            <div class="w-6 h-0.5 bg-stone-800"></div>
        </div>
    </header>

    <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">
        <div class="bg-white w-72 h-full ml-auto p-6 flex flex-col overflow-y-auto" onclick="event.stopPropagation()">
            <div class="space-y-1">
                <button onclick="showHome(); toggleMenu('side-menu');" class="text-left py-4 font-bold border-b w-full text-stone-800">🏠 ホーム</button>
                <button onclick="openModalWithClear()" class="text-left py-4 font-bold border-b text-blue-600 w-full admin-only">✨ うちの子を登録する</button>
                <button onclick="openPostModal()" class="text-left py-4 font-bold border-b text-emerald-600 w-full admin-only">📝 投稿する</button>
                <button onclick="showDollList()" class="text-left py-4 font-bold border-b w-full text-stone-800">📸 うちの子一覧</button>
                <button onclick="showPostListPage()" class="text-left py-4 font-bold border-b w-full text-stone-800">📋 投稿一覧</button>
            </div>
            <div class="py-6 space-y-2 border-b">
                <div id="admin-sub-menu" class="admin-only space-y-2 mb-4">
                    <p class="text-[10px] font-bold text-stone-400 tracking-widest uppercase mb-2">管理設定</p>
                    <button onclick="openOwnerModal()" class="w-full py-3 bg-stone-100 rounded-xl text-xs font-bold text-stone-600 text-left px-4">👤 オーナー情報を編集</button>
                    <button onclick="openAuthModal('set')" class="w-full py-3 bg-stone-100 rounded-xl text-xs font-bold text-stone-600 text-left px-4">🔐 ログイン情報の変更</button>
                    <button onclick="openRecoveryModal()" class="w-full py-3 bg-stone-100 rounded-xl text-xs font-bold text-stone-600 text-left px-4">🔑 リカバリ設定</button>
                </div>
                <button id="login-btn" onclick="openAuthModal('login')" class="w-full py-3 bg-stone-800 rounded-xl text-xs font-bold text-white">ログイン</button>
                <button id="forgot-btn" onclick="openForgotModal()" class="w-full py-2 text-[10px] text-stone-400 font-bold">ログインできない場合</button>
                <button id="logout-btn" onclick="handleLogout()" class="w-full py-3 bg-red-50 rounded-xl text-xs font-bold text-red-400 hidden">ログアウト</button>
            </div>
            <div class="mt-auto pt-10">
                <button onclick="requestClearAll()" class="w-full py-3 bg-red-50 text-red-400 rounded-xl text-xs font-bold border border-red-100 shadow-sm admin-only">⚠️ データを完全削除</button>
            </div>
        </div>
    </div>

    <main id="home-content" class="max-w-md mx-auto">
        <section id="owner-section" class="p-8 bg-white text-center">
            <img id="display-owner-img" class="w-24 h-24 rounded-full object-cover mx-auto mb-4 border-4 border-stone-5 hidden">
            <h2 id="owner-name" class="text-2xl font-bold mb-2"></h2>
            <p id="owner-bio" class="text-sm text-stone-500 px-4 mb-6"></p>
            <div id="owner-sns-links" class="flex flex-col items-center gap-3"></div>
        </section>

        <section class="p-6 bg-stone-50">
            <div id="happy-anniversary" class="mb-8 hidden">
                <h3 class="text-[10px] font-bold text-pink-500 uppercase mb-4 tracking-widest border-b border-pink-100 pb-2">Happy Anniversary!</h3>
                <div id="happy-anniversary-list"></div>
            </div>
            <h3 class="text-[10px] font-bold text-stone-400 uppercase mb-4 tracking-widest border-b pb-2">Next Anniversary</h3>
            <div id="closest-anniversary"></div>
        </section>

        <section class="p-8 bg-white mt-4 border-t">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="p-2">◀</button>
                <h3 id="cal-month" class="font-bold text-lg"></h3>
                <button onclick="changeMonth(1)" class="p-2">▶</button>
            </div>
            <div id="cal-days" class="cal-grid mb-6"></div>
            <div id="day-events" class="space-y-3"></div>
        </section>

        <div id="home-posts" class="p-6 space-y-8"></div>

        <section class="p-10 bg-stone-100 mt-10 text-center border-t">
            <p class="text-[10px] font-bold text-stone-400 mb-8 tracking-widest uppercase">Share this gallery</p>
            <div class="flex flex-col gap-4 max-w-[280px] mx-auto">
                <button onclick="shareSNS('x')" class="share-btn w-full h-14 bg-black rounded-full flex items-center justify-center shadow-md"><span class="text-white font-bold tracking-wider">X (旧Twitter)</span></button>
                <button onclick="shareSNS('line')" class="share-btn w-full h-14 bg-[#06C755] rounded-full flex items-center justify-center shadow-md"><span class="text-white font-bold tracking-wider">LINE</span></button>
                <button onclick="copyURL()" class="share-btn w-full h-14 bg-stone-400 rounded-full flex items-center justify-center shadow-md"><span class="text-white font-bold tracking-wider">URL Copy</span></button>
            </div>
        </section>
    </main>

    <div id="doll-list-page" class="max-w-md mx-auto hidden p-6">
        <div class="flex justify-between items-center mb-6">
            <button onclick="showHome()" class="text-sm font-bold bg-stone-100 px-4 py-2 rounded-full">戻る</button>
            <button id="toggle-list-view" onclick="toggleDollViewMode()" class="text-xs font-bold bg-stone-800 text-white px-4 py-2 rounded-full">名前を表示</button>
        </div>
        <div id="doll-display-area"></div>
    </div>

    <div id="post-list-page" class="max-w-md mx-auto hidden p-6">
        <div class="mb-6"><button onclick="showHome()" class="text-sm font-bold bg-stone-100 px-4 py-2 rounded-full">戻る</button></div>
        <h2 class="text-xl font-bold mb-6">投稿一覧</h2>
        <div id="menu-post-list" class="space-y-2"></div>
    </div>
    
    <div id="modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 id="modal-title" class="text-xl font-bold mb-6">うちの子登録</h3>
            <div class="crop-area">
                <div class="preview-sq" onclick="document.getElementById('doll-file').click()"><img id="crop-preview" class="hidden"><span id="doll-hint" class="text-stone-300 text-xs font-bold">画像を選択</span></div>
                <div class="v-bar-box"><input type="range" id="crop-v" min="0" max="100" class="vertical-range" oninput="updateCrop('crop-preview', 'crop-h', 'crop-v')"></div>
            </div>
            <input type="range" id="crop-h" min="0" max="100" class="w-full mb-6" oninput="updateCrop('crop-preview', 'crop-h', 'crop-v')">
            <div class="space-y-6">
                <input type="file" id="doll-file" accept="image/*" class="hidden" onchange="loadImg(event, 'doll')">
                <input type="hidden" id="edit-id"><input type="text" id="f-name" class="w-full border-b p-2 font-bold text-lg outline-none" placeholder="お名前">
                <input type="text" id="f-kana" class="w-full border-b p-2 text-sm outline-none" placeholder="ふりがな">
                
                <div class="p-4 bg-stone-50 rounded-2xl space-y-4">
                    <input type="text" id="f-size-label" class="w-full border-b bg-transparent py-2 text-sm font-bold outline-none" placeholder="SIZE (例: 1/6, 20cmなど)">
                    <input type="text" id="f-body-make" class="w-full border-b bg-transparent py-2 text-sm outline-none" placeholder="BODY (例: オビツ22, ピュアニーモ)">
                    <input type="text" id="f-head" class="w-full border-b bg-transparent py-2 text-sm outline-none" placeholder="HEAD">
                </div>

                <div class="p-4 bg-stone-50 rounded-2xl space-y-4">
                    <p class="text-[10px] font-bold text-stone-400 tracking-widest uppercase">カラー設定</p>
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('bg')"><span class="text-xs text-stone-500 font-bold">背景色</span><div id="bg-select-icon" class="color-select-btn"></div></div>
                    <div id="bg-color-grid" class="color-grid"></div><input type="hidden" id="f-bg-color" value="#ffffff">
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('text')"><span class="text-xs text-stone-500 font-bold">文字色</span><div id="text-select-icon" class="color-select-btn"></div></div>
                    <div id="text-color-grid" class="color-grid"></div><input type="hidden" id="f-text-color" value="#000000">
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('cal')"><span class="text-xs text-stone-500 font-bold">カレンダー強調色</span><div id="cal-select-icon" class="color-select-btn"></div></div>
                    <div id="cal-color-grid" class="color-grid"></div><input type="hidden" id="f-cal-color" value="#E11D48">
                </div>

                <div class="space-y-4 text-sm px-2">
                    <div class="border-b pb-4">
                        <span class="block text-stone-400 text-[10px] font-bold mb-1 uppercase tracking-widest">誕生日</span>
                        <div class="flex gap-2 mb-2 items-center"><select id="f-bday-m" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select><select id="f-bday-d" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select></div>
                        <input type="date" id="f-bday" class="date-input">
                    </div>
                    <div class="border-b pb-4">
                        <span class="block text-stone-400 text-[10px] font-bold mb-1 uppercase tracking-widest">お迎え日</span>
                        <div class="flex gap-2 mb-2 items-center"><select id="f-welcome-m" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">月</option></select><select id="f-welcome-d" class="border rounded p-2 text-xs flex-1 outline-none"><option value="">日</option></select></div>
                        <input type="date" id="f-welcome" class="date-input">
                    </div>
                </div>
                <div id="anniversary-inputs" class="space-y-3"></div>
                <button onclick="addAnniversaryInput()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-xl text-xs text-stone-400 font-bold">+ 記念日を追加</button>
                <textarea id="f-profile" class="w-full border p-4 rounded-2xl h-48 text-sm outline-none" placeholder="プロフィール"></textarea>
                <button onclick="saveData()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold text-lg shadow-xl">保存する</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 id="post-modal-title" class="text-xl font-bold mb-4">投稿作成</h3>
            <input type="hidden" id="edit-post-id">
            <input type="text" id="p-title" class="w-full border-b p-3 font-bold mb-6 outline-none text-lg" placeholder="タイトルを入力">
            <div id="post-blocks-container" class="space-y-6"></div>
            <button id="add-block-btn" onclick="addPostBlock()" class="w-full py-4 border-2 border-dashed border-stone-200 rounded-2xl text-stone-400 text-sm font-bold mt-4 flex flex-col items-center">
                <span>+ 画像と文章を追加</span>
                <span id="block-count-msg" class="text-[10px] mt-1 font-normal opacity-70">(最大10枚まで)</span>
            </button>
            <div class="p-6 bg-stone-50 rounded-3xl mt-8">
                <p class="text-[10px] font-bold text-stone-400 tracking-widest uppercase mb-4">表示場所</p>
                <div class="flex gap-6">
                    <label class="flex items-center gap-2 cursor-pointer font-bold text-sm">
                        <input type="radio" name="p-pos" value="home" checked class="w-4 h-4 accent-stone-800"> ホーム画面
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer font-bold text-sm">
                        <input type="radio" name="p-pos" value="menu" class="w-4 h-4 accent-stone-800"> 投稿一覧(メニュー内)
                    </label>
                </div>
            </div>
            <button onclick="savePost()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold text-lg mt-8 shadow-xl">投稿を保存</button>
        </div>
    </div>

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div id="profile-bg" class="min-h-full p-6 pb-32">
            <button onclick="closeProfile()" class="bg-white shadow px-6 py-2 rounded-full text-xs font-bold mb-6">閉じる</button>
            <img id="view-img" class="w-full aspect-square object-cover rounded-3xl shadow-xl mb-8">
            <div class="text-center mb-8"><p id="view-kana" class="text-sm opacity-70 mb-1"></p><h2 id="view-name" class="text-3xl font-bold"></h2></div>
            <div id="detail-box" class="bg-white/20 backdrop-blur-md p-6 rounded-3xl space-y-4 mb-8 text-[16px] hidden"></div>
            <p id="view-profile" class="whitespace-pre-wrap leading-relaxed px-2 text-[18px] font-medium"></p>
            <div class="fixed bottom-6 inset-x-0 px-6 flex gap-4 max-w-md mx-auto admin-only-flex hidden">
                <button id="detail-edit-btn" class="flex-1 bg-stone-800 text-white py-4 rounded-full font-bold">編集</button>
                <button id="detail-del-btn" class="flex-1 bg-red-50 text-red-400 py-4 rounded-full font-bold border border-red-100">削除</button>
            </div>
        </div>
    </div>

    <div id="owner-modal" class="modal-base" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <div class="crop-area">
                <div class="preview-sq" onclick="document.getElementById('owner-file').click()"><img id="owner-preview" class="hidden"><span id="owner-hint" class="text-stone-300 text-xs font-bold">画像を選択</span></div>
                <div class="v-bar-box"><input type="range" id="o-crop-v" min="0" max="100" class="vertical-range" oninput="updateCrop('owner-preview', 'o-crop-h', 'o-crop-v')"></div>
            </div>
            <input type="range" id="o-crop-h" min="0" max="100" class="w-full mb-6" oninput="updateCrop('owner-preview', 'o-crop-h', 'o-crop-v')">
            <div class="space-y-4">
                <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="loadImg(event, 'owner')">
                <input type="text" id="o-name" class="w-full border-b p-2 font-bold" placeholder="オーナー名">
                <textarea id="o-bio" class="w-full border p-3 rounded-xl h-32 text-sm" placeholder="自己紹介"></textarea>
                <div id="sns-inputs-container" class="space-y-3"></div>
                <button onclick="addSnsInput()" class="w-full py-2 bg-stone-100 rounded text-xs font-bold">+ SNSリンクを追加</button>
                <button onclick="saveOwner()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">保存</button>
            </div>
        </div>
    </div>

    <div id="article-page" style="display:none; position:fixed; inset:0; background:white; z-index:10001; overflow-y:auto;">
        <div class="max-w-2xl mx-auto p-6 pb-20">
            <div class="flex justify-between items-center py-6 mb-10 border-b"><button onclick="closeArticle()" class="text-sm font-bold text-stone-400">← 戻る</button><div class="flex gap-4 admin-only-flex hidden"><button id="art-edit-btn" class="text-xs font-bold bg-stone-100 px-4 py-2 rounded-full">編集</button><button id="art-del-btn" class="text-xs font-bold bg-red-50 text-red-400 px-4 py-2 rounded-full">削除</button></div></div>
            <h2 id="art-title" class="text-3xl font-bold text-center mb-12"></h2><div id="art-content" class="space-y-6"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ここが抜き出したあなた専用の設定です
        const firebaseConfig = {
          apiKey: "AIzaSyCWzLwhTnOg58o4rdf-T8e0E57_dLGm2gk",
          authDomain: "doll-uchinoko-gallery.firebaseapp.com",
          projectId: "doll-uchinoko-gallery",
          storageBucket: "doll-uchinoko-gallery.firebasestorage.app",
          messagingSenderId: "78946857999",
          appId: "1:78946857999:web:d0ffcac3527334f66c5f7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, setDoc, getDoc, updateDoc };
    </script>

    <script>
        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let dollViewMode = 'grid', currentRawImg = { doll: null, owner: null }, loopInterval;
        let isLoggedIn = false;
        const urlParams = new URLSearchParams(window.location.search);
        let galleryId = urlParams.get('id');

        const palette100 = (() => {
            const hues = [0, 30, 60, 120, 150, 180, 220, 280, 330], colors = [];
            for(let i=0; i<10; i++) colors.push(`hsl(0, 0%, ${Math.min(0 + (i * 11), 100)}%)`);
            hues.forEach(h => { for(let i=0; i<10; i++) colors.push(`hsl(${h}, 80%, ${Math.min(30 + (i * 7.2), 95)}%)`); });
            return colors.slice(0, 100);
        })();

        window.onload = async () => {
            const checkFirebase = setInterval(async () => {
                if(window.fb) {
                    clearInterval(checkFirebase);
                    initDateSelectors();
                    initColorPalettes();
                    if (!galleryId || urlParams.get('mode') === 'new') { 
                        openAuthModal('set', true); 
                    } else { 
                        await loadGalleryData(); 
                        checkLoginSession();
                        renderAll(); 
                        setupInfiniteScroll();
                    }
                }
            }, 100);
        };

        async function loadGalleryData() {
            if(!galleryId) return;
            try {
                const docRef = window.fb.doc(window.fb.db, "galleries", galleryId);
                const snap = await window.fb.getDoc(docRef);
                if(snap.exists()) {
                    const data = snap.data();
                    dolls = data.dolls || []; 
                    owner = data.owner || owner; 
                    posts = data.posts || [];
                } else { 
                    showAlert("ギャラリーが見つかりません。"); 
                }
            } catch(e) { console.error(e); }
        }

        async function syncFirebase() {
            if(!galleryId) return;
            const docRef = window.fb.doc(window.fb.db, "galleries", galleryId);
            await window.fb.updateDoc(docRef, { dolls, owner, posts });
        }

        function updateLoginSession() { if(isLoggedIn) localStorage.setItem('uchinoko_last_active', Date.now()); }
        function checkLoginSession() {
            const lastActive = localStorage.getItem('uchinoko_last_active'), session = localStorage.getItem('uchinoko_session'), sid = localStorage.getItem('uchinoko_gallery_id');
            if (session === 'true' && lastActive && sid === galleryId) {
                const oneMonth = 30 * 24 * 60 * 60 * 1000;
                if (Date.now() - lastActive < oneMonth) { isLoggedIn = true; updateLoginSession(); } else { handleLogout(); }
            }
        }

        async function openAuthModal(mode, isNew = false) {
            const dialog = document.getElementById('custom-dialog'), msg = document.getElementById('dialog-message'), inputs = document.getElementById('dialog-inputs'), buttons = document.getElementById('dialog-buttons');
            const idInput = document.getElementById('auth-id'), pwInput = document.getElementById('auth-pw'), gIdInput = document.getElementById('auth-gallery-id');
            inputs.classList.remove('hidden'); document.getElementById('recovery-inputs').classList.add('hidden'); buttons.innerHTML = '';
            if(mode === 'set') {
                gIdInput.classList.toggle('hidden', !isNew);
                msg.innerText = isNew ? "IDとログイン情報を設定してください" : "ログイン設定の変更";
                const btn = document.createElement('button'); btn.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold"; btn.innerText = "保存";
                btn.onclick = async () => {
                    const finalGid = isNew ? gIdInput.value.trim() : galleryId, authData = { adminUser: idInput.value, adminPw: pwInput.value };
                    if(isNew) await window.fb.setDoc(window.fb.doc(window.fb.db, "galleries", finalGid), { auth: authData, dolls: [], owner: { name: "Owner Name", bio: "", sns: [], image:"" }, posts: [] });
                    else await window.fb.updateDoc(window.fb.doc(window.fb.db, "galleries", galleryId), { auth: authData });
                    closeDialog(); location.search = `?id=${finalGid}`;
                };
                buttons.appendChild(btn);
            } else {
                gIdInput.classList.add('hidden'); msg.innerText = "ログイン";
                const btn = document.createElement('button'); btn.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold"; btn.innerText = "ログイン";
                btn.onclick = async () => {
                    const snap = await window.fb.getDoc(window.fb.doc(window.fb.db, "galleries", galleryId)), auth = snap.data().auth;
                    if(auth && auth.adminUser === idInput.value && auth.adminPw === pwInput.value) { isLoggedIn = true; localStorage.setItem('uchinoko_session', 'true'); localStorage.setItem('uchinoko_gallery_id', galleryId); updateLoginSession(); renderAll(); closeDialog(); toggleMenu('side-menu'); } else showAlert("認証失敗");
                };
                buttons.appendChild(btn);
                const cancel = document.createElement('button'); cancel.className = "w-full bg-stone-100 py-4 rounded-full font-bold"; cancel.innerText = "キャンセル"; cancel.onclick = closeDialog; buttons.appendChild(cancel);
            }
            dialog.style.display = 'flex';
        }

        function renderAll() {
            document.body.classList.toggle('is-admin', isLoggedIn);
            document.getElementById('login-btn').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('logout-btn').style.display = isLoggedIn ? 'block' : 'none';
            const track = document.getElementById('top-film-roll'); track.innerHTML = '';
            const items = dolls.filter(d => d.image);
            if (loopInterval) { cancelAnimationFrame(loopInterval); loopInterval = null; }
            if (items.length > 0) {
                document.getElementById('empty-msg').style.display = 'none';
                if (items.length >= 5) {
                    const tripleItems = [...items, ...items, ...items];
                    tripleItems.forEach((d, i) => { const img = document.createElement('img'); img.src = d.image; img.className = "film-frame"; img.onclick = () => showDetail(i % items.length); track.appendChild(img); });
                    setTimeout(() => { 
                        const singleWidth = items.length * (80 + 12);
                        document.getElementById('film-container').scrollLeft = singleWidth; 
                        const scrollStep = () => { document.getElementById('film-container').scrollLeft += 0.5; loopInterval = requestAnimationFrame(scrollStep); };
                        loopInterval = requestAnimationFrame(scrollStep);
                    }, 50);
                } else { items.forEach((d, i) => { const img = document.createElement('img'); img.src = d.image; img.className = "film-frame"; img.onclick = () => showDetail(i); track.appendChild(img); }); }
            } else { document.getElementById('empty-msg').style.display = 'flex'; }
            const oImg = document.getElementById('display-owner-img');
            if(owner.image) { oImg.src = owner.image; oImg.classList.remove('hidden'); } else { oImg.classList.add('hidden'); }
            document.getElementById('owner-name').innerText = owner.name || ""; document.getElementById('owner-bio').innerText = owner.bio || "";
            const snsArea = document.getElementById('owner-sns-links'); snsArea.innerHTML = '';
            (owner.sns || []).forEach(s => {
                let url = s.val;
                if (s.type !== 'その他URL' && !s.val.startsWith('http')) {
                    const base = {'X(旧Twitter)':'x.com/', Instagram:'instagram.com/', mixi2:'mixi.social/@', Bluesky:'bsky.app/profile/', Misskey:'misskey.io/@'}[s.type];
                    if(base) url = 'https://' + base + s.val.replace('@', '');
                }
                const a = document.createElement('a'); a.href = url; a.target = "_blank"; a.className = "block w-full max-w-[200px] text-center bg-white border py-2 rounded-xl text-xs font-bold shadow-sm"; a.innerText = "🔗 " + s.type; snsArea.appendChild(a);
            });
            const hp = document.getElementById('home-posts'); hp.innerHTML = '';
            const mpl = document.getElementById('menu-post-list'); mpl.innerHTML = '';
            posts.forEach((p, i) => {
                if(p.pos === 'home') {
                    const card = document.createElement('div'); card.className = "relative bg-white rounded-[32px] p-6 pt-16 border shadow-sm";
                    if(isLoggedIn) { card.innerHTML = `<div class=\"absolute top-4 left-4 flex gap-2\"><button onclick=\"editPost(${i})\" class=\"bg-stone-800 text-white px-4 py-2 rounded-lg text-xs font-bold\">編集</button><button onclick=\"deletePostDirectly(${i})\" class=\"bg-red-50 text-red-400 px-4 py-2 rounded-lg text-xs font-bold border border-red-100\">削除</button></div>`; }
                    const title = document.createElement('h4'); title.className="font-bold mb-4 text-lg border-b pb-2"; title.innerText = p.title; card.appendChild(title);
                    p.blocks.forEach(b => { if(b.img) { const img = document.createElement('img'); img.src = b.img; img.className="w-full rounded-2xl mb-4"; card.appendChild(img); } if(b.text) { const txt = document.createElement('p'); txt.className="text-sm text-stone-600 mb-6 whitespace-pre-wrap"; txt.innerText = b.text; card.appendChild(txt); } });
                    hp.appendChild(card);
                } else { const btn = document.createElement('button'); btn.className = "w-full text-left py-4 px-6 bg-white border rounded-2xl font-bold shadow-sm mb-2"; btn.innerText = "📝 " + p.title; btn.onclick = () => viewPost(i); mpl.appendChild(btn); }
            });
            renderCalendar(); renderAnni();
        }

        async function saveData() {
            const id = document.getElementById('edit-id').value, h = document.getElementById('crop-h').value, v = document.getElementById('crop-v').value;
            let imgData = (id !== "" && dolls[id]) ? dolls[id].image : "";
            if(currentRawImg.doll) {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 800;
                const s = Math.max(800/currentRawImg.doll.width, 800/currentRawImg.doll.height);
                ctx.drawImage(currentRawImg.doll, (800-currentRawImg.doll.width*s)*(h/100), (800-currentRawImg.doll.height*s)*(v/100), currentRawImg.doll.width*s, currentRawImg.doll.height*s);
                imgData = cvs.toDataURL('image/webp', 0.7);
            }
            const data = { name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value, image: imgData, bodySize: document.getElementById('f-size-label').value, bodyMake: document.getElementById('f-body-make').value, head: document.getElementById('f-head').value, birthday: getDateValue('f-bday', 'f-bday-m', 'f-bday-d'), welcomeDay: getDateValue('f-welcome', 'f-welcome-m', 'f-welcome-d'), anniversaries: Array.from(document.querySelectorAll('#anniversary-inputs > div')).map(row => ({ name: row.querySelector('.f-anni-name').value, date: getDateValue(row.querySelector('.f-anni-date').id, row.querySelector('.f-anni-m').id, row.querySelector('.f-anni-d').id) })).filter(a => a.name), bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value, profile: document.getElementById('f-profile').value };
            if(id === "") dolls.push(data); else dolls[id] = data;
            await syncFirebase(); location.reload();
        }

        async function saveOwner() {
            let img = owner.image; const h = document.getElementById('o-crop-h').value, v = document.getElementById('o-crop-v').value;
            if(currentRawImg.owner) {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 400;
                const s = Math.max(400/currentRawImg.owner.width, 400/currentRawImg.owner.height);
                ctx.drawImage(currentRawImg.owner, (400-currentRawImg.owner.width*s)*(h/100), (400-currentRawImg.owner.height*s)*(v/100), currentRawImg.owner.width*s, currentRawImg.owner.height*s);
                img = cvs.toDataURL('image/webp', 0.7);
            }
            owner = { name: document.getElementById('o-name').value, bio: document.getElementById('o-bio').value, image: img, sns: Array.from(document.querySelectorAll('.sns-input-row')).map(row => ({ type: row.querySelector('.sns-type').value, val: row.querySelector('.sns-val').value })).filter(s => s.val) };
            await syncFirebase(); location.reload();
        }

        async function savePost() {
            const blocks = []; document.querySelectorAll('.post-block').forEach(el => { const imgEl = el.querySelector('img'), text = el.querySelector('textarea').value; if(!imgEl.classList.contains('hidden') || text) blocks.push({img: imgEl.classList.contains('hidden') ? '' : imgEl.src, text}); });
            const idx = document.getElementById('edit-post-id').value, data = { title: document.getElementById('p-title').value, blocks, pos: document.querySelector('input[name="p-pos"]:checked').value };
            if(!data.title) return showAlert("タイトル必須");
            if(idx === "") posts.push(data); else posts[idx] = data;
            await syncFirebase(); location.reload();
        }

        async function requestClearAll() { showConfirm("全データを削除しますか？", async () => { await window.fb.updateDoc(window.fb.doc(window.fb.db, "galleries", galleryId), { dolls: [], owner: { name: "Owner Name", bio: "", sns: [], image:"" }, posts: [] }); location.reload(); }, "削除する"); }

        function handleLogout() { isLoggedIn = false; localStorage.removeItem('uchinoko_session'); localStorage.removeItem('uchinoko_gallery_id'); renderAll(); toggleMenu('side-menu'); }
        function openRecoveryModal() {
            const dialog = document.getElementById('custom-dialog'), msg = document.getElementById('dialog-message'), recArea = document.getElementById('recovery-inputs'), buttons = document.getElementById('dialog-buttons');
            msg.innerText = "リカバリ設定"; document.getElementById('dialog-inputs').classList.add('hidden'); recArea.classList.remove('hidden'); buttons.innerHTML = '';
            const btn = document.createElement('button'); btn.className = "w-full bg-stone-800 text-white py-4 rounded-full font-bold"; btn.innerText = "保存";
            btn.onclick = async () => { await window.fb.updateDoc(window.fb.doc(window.fb.db, "galleries", galleryId), { recovery: { birth: document.getElementById('rec-birth').value, user: document.getElementById('rec-user').value, secret: document.getElementById('rec-secret').value } }); closeDialog(); showAlert("保存完了"); };
            buttons.appendChild(btn); dialog.style.display = 'flex';
        }

        function renderAnni() {
            const area = document.getElementById('closest-anniversary'), happyArea = document.getElementById('happy-anniversary'), happyListArea = document.getElementById('happy-anniversary-list');
            if(!area || !happyArea) return; area.innerHTML = ''; happyListArea.innerHTML = ''; happyArea.classList.add('hidden');
            let list = [], happyEvents = []; const now = new Date(), todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            dolls.forEach((d, idx) => {
                const ds = [{ type: 'birth', n: "誕生日", d: d.birthday }, { type: 'welcome', n: "お迎え日", d: d.welcomeDay }, ...(d.anniversaries || []).map(a => ({ type: 'custom', n: a.name, d: a.date }))];
                ds.forEach(v => {
                    if(v.d) {
                        const originDate = new Date(v.d), isToday = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate()), diffYears = now.getFullYear() - originDate.getFullYear();
                        let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate());
                        if(next < todayZero) next.setFullYear(now.getFullYear() + 1);
                        const daysToNext = Math.ceil((next - todayZero) / (1000 * 60 * 60 * 24));
                        if (isToday && diffYears >= 0) happyEvents.push({ text: `${d.name} ${v.n} ${diffYears}周年`, order: idx });
                        list.push({ doll: d.name, title: v.n, color: d.calColor || '#E11D48', diff: daysToNext, isToday: isToday, order: idx });
                    }
                });
            });
            if (happyEvents.length > 0) { happyArea.classList.remove('hidden'); happyEvents.forEach(ev => { const div = document.createElement('div'); div.className = "bg-white p-5 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-3"; div.innerHTML = `🎉 <p class=\"font-bold\">${ev.text}</p>`; happyListArea.appendChild(div); }); }
            if(list.length > 0) {
                list.sort((a,b) => a.diff - b.diff || a.order - b.order);
                const closestEvents = list.filter(item => item.diff === list[0].diff);
                let html = `<div class=\"space-y-3\">`;
                closestEvents.forEach(b => { html += `<div class=\"bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center\" style=\"border-color:${b.color}\"><div><p class=\"text-[10px] text-stone-400 font-bold\">${b.doll}</p><p class=\"font-bold\">${b.title}</p></div><b class=\"text-lg\">${b.isToday?"Today":`あと ${b.diff} 日`}</b></div>`; });
                html += `</div>`; area.innerHTML = html;
            }
        }

        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days'), map = {};
            area.innerHTML = '';
            dolls.forEach((d, idx) => {
                const evs = [{n: "誕生日", d: d.birthday}, {n: "お迎え日", d: d.welcomeDay}, ...(d.anniversaries || []).map(a => ({n: a.name, d: a.date}))];
                evs.forEach(ev => { if(ev.d) { const dt = new Date(ev.d); if(dt.getMonth() === m) { const day = dt.getDate(); if(!map[day]) map[day] = []; map[day].push({ dollName: d.name, eventName: ev.n, calColor: d.calColor || '#E11D48', uBg: d.bgColor || '#ffffff', uTxt: d.textColor || '#000000', mm: m + 1, dd: day, order: idx }); } } });
            });
            for(let i=0; i<firstDay; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const isToday = (calOffset===0 && d===now.getDate()), annis = map[d], div = document.createElement('div');
                div.className = `cal-day ${isToday?'bg-black text-white':''}`;
                if(annis) {
                    const dotsDiv = document.createElement('div'); dotsDiv.className = "cal-dots";
                    annis.sort((a,b) => a.order - b.order).forEach(a => { const dot = document.createElement('div'); dot.className = "cal-dot"; dot.style.backgroundColor = a.calColor; dotsDiv.appendChild(dot); });
                    div.appendChild(dotsDiv);
                    div.onclick = () => {
                        const eventContainer = document.getElementById('day-events'); eventContainer.innerHTML = '';
                        annis.sort((a,b) => a.order - b.order).forEach(a => {
                            const row = document.createElement('div'); row.className = "p-5 rounded-2xl shadow-sm border border-stone-100"; row.style.backgroundColor = a.uBg; row.style.color = a.uTxt;
                            row.innerHTML = `<div class=\"font-bold\">${a.dollName}：${a.eventName}</div>`; eventContainer.appendChild(row);
                        });
                    };
                }
                div.innerHTML += `<span>${d}</span>`; area.appendChild(div);
            }
        }

        // 補助関数群
        function showDetail(idx) {
            const d = dolls[idx], overlay = document.getElementById('profile-overlay'), bg = document.getElementById('profile-bg');
            bg.style.backgroundColor = d.bgColor || "#ffffff"; bg.style.color = d.textColor || "#000000";
            document.getElementById('view-img').src = d.image; document.getElementById('view-name').innerText = d.name;
            document.getElementById('view-profile').innerText = d.profile || "";
            document.getElementById('detail-edit-btn').onclick = () => editDoll(idx);
            document.getElementById('detail-del-btn').onclick = () => showConfirm("削除しますか？", async () => { dolls.splice(idx, 1); await syncFirebase(); location.reload(); });
            overlay.classList.remove('hidden');
        }
        function initColorPalettes() { createPalette('bg-color-grid', palette100, 'bg', '#ffffff'); createPalette('text-color-grid', palette100, 'text', '#000000'); createPalette('cal-color-grid', palette100, 'cal', '#E11D48'); }
        function createPalette(gridId, colorList, type, defaultColor) { const grid = document.getElementById(gridId); colorList.forEach(c => { const chip = document.createElement('div'); chip.className = `color-chip ${type}-chip`; chip.style.backgroundColor = c; chip.onclick = e => selectPaletteColor(type, c, chip); grid.appendChild(chip); }); }
        function selectPaletteColor(type, color, el) { document.querySelectorAll(`.${type}-chip`).forEach(c => c.classList.remove('selected')); el.classList.add('selected'); document.getElementById(`f-${type}-color`).value = color; document.getElementById(`${type}-select-icon`).style.backgroundColor = color; document.getElementById(`${type}-color-grid`).classList.remove('grid-open'); }
        function toggleColorGrid(type) { document.getElementById(`${type}-color-grid`).classList.toggle('grid-open'); }
        function editDoll(idx) { closeProfile(); const d = dolls[idx]; document.getElementById('edit-id').value = idx; document.getElementById('f-name').value = d.name; document.getElementById('modal').style.display = 'flex'; }
        function showHome() { document.getElementById('home-content').classList.remove('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.add('hidden'); calOffset = 0; renderCalendar(); }
        function showDollList() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.remove('hidden'); renderDollList(); toggleMenu('side-menu'); }
        function showPostListPage() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('post-list-page').classList.remove('hidden'); toggleMenu('side-menu'); }
        function toggleMenu(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; }
        function closeModal() { document.querySelectorAll('.modal-base').forEach(m => m.style.display='none'); }
        function openModalWithClear() { document.getElementById('edit-id').value = ""; document.getElementById('modal').style.display='flex'; toggleMenu('side-menu'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function showAlert(msg) { alert(msg); }
        function showConfirm(m, onY, yesText = "実行") { if(confirm(m)) onY(); }
        function closeDialog() { document.getElementById('custom-dialog').style.display = 'none'; }
        function editPost(idx) { document.getElementById('edit-post-id').value = idx; document.getElementById('post-modal').style.display = 'flex'; }
        function openPostModal() { document.getElementById('edit-post-id').value = ""; document.getElementById('post-modal').style.display='flex'; toggleMenu('side-menu'); }
        function addPostBlock(data = {img: '', text: ''}) { 
            const container = document.getElementById('post-blocks-container');
            const div = document.createElement('div'); div.className = "post-block p-4 border rounded-xl mb-4";
            div.innerHTML = `<input type=\"text\" class=\"w-full text-sm border p-2 mb-2\" placeholder=\"画像URL\" value=\"${data.img}\"><textarea class=\"w-full text-sm p-2 border h-24\" placeholder=\"文章\">${data.text}</textarea>`;
            container.appendChild(div);
        }
        function viewPost(idx) { 
            const p = posts[idx]; document.getElementById('art-title').innerText = p.title; 
            const container = document.getElementById('art-content'); container.innerHTML = p.blocks.map(b => `<p>${b.text}</p>`).join('');
            document.getElementById('article-page').style.display = 'block'; 
        }
        function closeArticle() { document.getElementById('article-page').style.display = 'none'; }
        function setupInfiniteScroll() { /* フィルムスクロール設定 */ }
        function initDateSelectors() { /* 日付プルダウン初期化 */ }
        function updateCrop(imgId, hId, vId) { document.getElementById(imgId).style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`; }
        function changeMonth(d) { calOffset += d; renderCalendar(); }
        function getDateValue(mainId, mId, dId) { return document.getElementById(mainId).value; }
        function loadImg(e, type) { const f = e.target.files[0]; if(!f) return; const rd = new FileReader(); rd.onload = (re) => { currentRawImg[type] = new Image(); currentRawImg[type].src = re.target.result; document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview').src = re.target.result; document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview').classList.remove('hidden'); }; rd.readAsDataURL(f); }
        function renderDollList() { const area = document.getElementById('doll-display-area'); area.innerHTML = dolls.map((d, i) => `<div onclick=\"showDetail(${i})\" class=\"border p-2 mb-2\">${d.name}</div>`).join(''); }
        function toggleDollViewMode() { dollViewMode = (dollViewMode === 'grid') ? 'list' : 'grid'; renderDollList(); }
        function openOwnerModal() { document.getElementById('owner-modal').style.display='flex'; toggleMenu('side-menu'); }
        function addSnsInput() { /* SNS入力追加 */ }
        function addAnniversaryInput() { /* 記念日入力追加 */ }
        function shareSNS(type) { /* SNSシェア */ }
        function copyURL() { navigator.clipboard.writeText(window.location.href); alert("URL Copy"); }
    </script>
</body>
</html>
