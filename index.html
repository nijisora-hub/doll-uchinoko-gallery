<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f5f5f5; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            /* テキスト選択とコピーを許可 */
            -webkit-user-select: text;
            user-select: text;
        }
        
        /* PC/タブレット閲覧時のサイズ調整 */
        .app-outer { display: flex; justify-content: center; background-color: #f5f5f5; }
        .app-container {
            width: 100%;
            max-width: 600px;
            min-height: 100vh;
            background: #fcfaf8;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            position: relative;
            padding-bottom: 80px;
        }

        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保存ブロック */
        img { 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: auto;
        }

        /* フィルム風スクロール */
        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }

        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        
        .preview-sq { aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; background: #fff; }
        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; }

        /* テキストエリア自動伸縮 */
        textarea.auto-resize { resize: none; overflow-y: hidden; min-height: 100px; }

        /* 記念日ポップアップ演出 */
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="app-outer">

    <script>
        const SUPABASE_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dolls = [], owner = { name: "Owner Name", bio: "", sns: [], image:"" }, posts = [], calOffset = 0;
        let dollViewMode = 'grid', currentRawImg = { doll: null, owner: null }, isLoggedIn = false;

        window.onload = async () => {
            initColorPalettes();
            initDateSelectors();
            setupTextareaAutoResize();

            // 認証状態の監視
            db.auth.onAuthStateChange(async (event, session) => {
                isLoggedIn = !!session;
                if (event === 'SIGNED_IN' && window.location.hash) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                await loadAllData();
                renderAll();
            });

            // 初期セッション確認
            const { data: { session } } = await db.auth.getSession();
            isLoggedIn = !!session;

            await loadAllData();
            renderAll();
        };

        // --- データ取得・保存 ---
        async function loadAllData() {
            try {
                const { data: dData } = await db.from('dolls').select('data');
                const { data: oData } = await db.from('owner').select('data').maybeSingle();
                const { data: pData } = await db.from('posts').select('data');
                if (dData) dolls = dData.map(d => d.data);
                if (oData) owner = oData.data;
                if (pData) posts = pData.map(p => p.data);
            } catch (e) {}
        }

        async function saveToSupabase(table, dataArrayOrObject) {
            if (!isLoggedIn) return;
            const { data: { user } } = await db.auth.getUser();
            if (Array.isArray(dataArrayOrObject)) {
                await db.from(table).delete().eq('id', user.id);
                const insertData = dataArrayOrObject.map(d => ({ id: user.id, data: d }));
                await db.from(table).insert(insertData);
            } else {
                await db.from(table).upsert({ id: user.id, data: dataArrayOrObject });
            }
        }

        // --- 認証 ---
        async function handleGoogleLogin() {
            const redirectUrl = window.location.origin + window.location.pathname;
            await db.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: redirectUrl } 
            });
        }
        async function handleLogout() { await db.auth.signOut(); location.reload(); }

        // --- ページ切り替えロジック (バグ修正済み) ---
        function showHome() { 
            document.getElementById('home-content').classList.remove('hidden'); 
            document.getElementById('doll-list-page').classList.add('hidden'); 
            document.getElementById('post-list-page').classList.add('hidden'); 
            closeArticle(); 
        }

        function showDollList() { 
            document.getElementById('home-content').classList.add('hidden'); 
            document.getElementById('doll-list-page').classList.remove('hidden'); 
            document.getElementById('post-list-page').classList.add('hidden'); 
            renderDollList(); 
        }

        function showPostListPage() { 
            document.getElementById('home-content').classList.add('hidden'); 
            document.getElementById('doll-list-page').classList.add('hidden'); 
            document.getElementById('post-list-page').classList.remove('hidden'); 
        }

        // --- メインレンダリング ---
        function renderAll() {
            document.body.classList.toggle('is-admin', isLoggedIn);
            document.getElementById('login-btn').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('logout-btn').style.display = isLoggedIn ? 'block' : 'none';
            
            // フィルムロール
            const track = document.getElementById('top-film-roll'); track.innerHTML = '';
            const items = dolls.filter(d => d.image);
            if (items.length > 0) {
                document.getElementById('empty-msg').style.display = 'none';
                items.forEach((d, i) => {
                    const img = document.createElement('img'); img.src = d.image; img.className = "film-frame";
                    img.onclick = () => showDetail(i); track.appendChild(img);
                });
            } else { document.getElementById('empty-msg').style.display = 'flex'; }
            
            // オーナー
            const oImg = document.getElementById('display-owner-img');
            if(owner.image) { oImg.src = owner.image; oImg.classList.remove('hidden'); }
            document.getElementById('owner-name').innerText = owner.name || "Owner Name";
            document.getElementById('owner-bio').innerText = owner.bio || "";
            const snsArea = document.getElementById('owner-sns-links'); snsArea.innerHTML = '';
            (owner.sns || []).forEach(s => {
                const a = document.createElement('a'); a.href = s.val; a.target = "_blank"; a.className = "block w-full max-w-[240px] text-center bg-white border py-3 rounded-xl text-xs font-bold shadow-sm";
                a.innerText = (s.type === 'Twitter' ? '𝕏 ' : s.type === 'Instagram' ? '📸 ' : '🔗 ') + s.type;
                snsArea.appendChild(a);
            });

            // HOME投稿・メニュー投稿
            const hp = document.getElementById('home-posts'); hp.innerHTML = '';
            const mpl = document.getElementById('menu-post-list'); mpl.innerHTML = '';
            posts.forEach((p, i) => {
                if(p.pos === 'home') {
                    const card = document.createElement('div'); card.className = "bg-white rounded-[32px] p-6 border shadow-sm";
                    card.innerHTML = `<h4 class="font-bold mb-4 text-lg border-b pb-2">${p.title}</h4>`;
                    p.blocks.forEach(b => {
                        if(b.img) card.innerHTML += `<img src="${b.img}" class="w-full rounded-2xl mb-4">`;
                        if(b.text) card.innerHTML += `<p class="text-sm text-stone-600 mb-6 whitespace-pre-wrap">${b.text}</p>`;
                    });
                    hp.appendChild(card);
                } else {
                    const btn = document.createElement('button'); btn.className = "w-full text-left py-4 px-6 bg-white border rounded-2xl text-stone-700 font-bold shadow-sm mb-2";
                    btn.innerText = "📝 " + p.title; btn.onclick = () => viewPost(i); mpl.appendChild(btn);
                }
            });
            renderCalendar(); renderAnni();
        }

        // --- サブコンテンツ表示 ---
        function renderDollList() {
            const area = document.getElementById('doll-display-area'); area.innerHTML = '';
            area.className = dollViewMode === 'grid' ? "grid grid-cols-3 gap-2" : "space-y-2";
            dolls.forEach((d, i) => { 
                if(dollViewMode==='grid') area.innerHTML += `<img src="${d.image}" onclick="showDetail(${i})" class="aspect-square object-cover rounded-xl border">`; 
                else area.innerHTML += `<div onclick="showDetail(${i})" class="flex items-center gap-4 bg-white p-3 rounded-xl border"><img src="${d.image}" class="w-12 h-12 rounded-full object-cover"><b class="text-sm">${d.name}</b></div>`; 
            });
        }

        function showDetail(idx) { 
            const d = dolls[idx], overlay = document.getElementById('profile-overlay'), bg = document.getElementById('profile-bg');
            bg.style.backgroundColor = d.bgColor || "#ffffff"; bg.style.color = d.textColor || "#000000"; 
            document.getElementById('view-img').src = d.image; 
            document.getElementById('view-name').innerText = d.name; 
            document.getElementById('view-kana').innerText = d.kana || ""; 
            const b = document.getElementById('detail-box'); b.innerHTML = '';
            const addInfo = (l, v) => { if(v) b.innerHTML += `<div><span class="text-[10px] opacity-60 font-bold block uppercase">${l}</span><b class="text-lg">${v}</b></div>`; };
            // 元データの表示順: Size -> Body -> Head -> Birthday -> Welcome
            addInfo('Size', d.bodySize); addInfo('Body', d.bodyMake); addInfo('Head', d.headMake);
            if(d.birthday) addInfo('Birthday', d.birthday);
            if(d.welcomeDay) addInfo('Welcome', d.welcomeDay);
            document.getElementById('view-profile').innerText = d.profile || "";
            document.getElementById('detail-edit-btn').onclick = () => editDoll(idx); 
            document.getElementById('detail-del-btn').onclick = () => { if(confirm("削除しますか？")) { dolls.splice(idx, 1); saveToSupabase('dolls', dolls).then(()=>location.reload()); } }; 
            overlay.classList.remove('hidden'); 
        }

        // --- 汎用ユーティリティ ---
        function toggleMenu(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; }
        function closeModal() { document.querySelectorAll('.modal-base').forEach(m => m.style.display='none'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
        function closeArticle() { document.getElementById('article-page').style.display = 'none'; }
        function toggleDollViewMode() { dollViewMode = dollViewMode==='grid'?'list':'grid'; renderDollList(); }
        function setupTextareaAutoResize() { document.addEventListener('input', (e) => { if (e.target.tagName === 'TEXTAREA' && e.target.classList.contains('auto-resize')) { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; } }); }
        function updateCrop(imgId, hId, vId) { const el = document.getElementById(imgId); if(el) el.style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`; }
        function changeMonth(d) { calOffset += d; renderCalendar(); }
        
        // --- データ処理 (WebP変換・画像読み込み) ---
        function loadImg(e, type) { 
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader(); rd.onload = (re) => {
                const img = new Image(); img.onload = () => { 
                    currentRawImg[type] = img; 
                    const el = document.getElementById(type === 'doll' ? 'crop-preview' : 'owner-preview'); 
                    el.src = img.src; el.classList.remove('hidden'); 
                    document.getElementById(type === 'doll' ? 'doll-hint' : 'owner-hint').classList.add('hidden'); 
                }; img.src = re.target.result;
            }; rd.readAsDataURL(f);
        }

        // 記念日演出・カレンダー
        function renderCalendar() {
            const now = new Date(), v = new Date(now.getFullYear(), now.getMonth() + calOffset, 1), y = v.getFullYear(), m = v.getMonth();
            document.getElementById('cal-month').innerText = `${y} / ${m+1}`;
            const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m+1, 0).getDate(), area = document.getElementById('cal-days');
            area.innerHTML = ''; const map = {};
            dolls.forEach((d, idx) => {
                const evs = [{n: "誕生日", d: d.birthday}, {n: "お迎え日", d: d.welcomeDay}, ...(d.anniversaries || [])];
                evs.forEach(ev => { 
                    const rawDate = ev.d || ev.date; if(!rawDate) return;
                    const dt = new Date(rawDate); 
                    if(dt.getMonth() === m) { const day = dt.getDate(); if(!map[day]) map[day] = []; map[day].push({ doll: d.name, name: ev.n || ev.name, color: d.calColor || '#E11D48' }); }
                });
            });
            for(let i=0; i<firstDay; i++) area.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const isToday = (calOffset===0 && d===now.getDate() && m===now.getMonth()), annis = map[d], div = document.createElement('div'); 
                div.className = `cal-day ${isToday?'bg-black text-white':''}`;
                if(annis) {
                    const dots = document.createElement('div'); dots.className = "cal-dots";
                    annis.forEach(a => { const dot = document.createElement('div'); dot.className = "cal-dot"; dot.style.backgroundColor = a.color; dots.appendChild(dot); });
                    div.appendChild(dots);
                    div.onclick = () => {
                        const eventContainer = document.getElementById('day-events'); eventContainer.innerHTML = '';
                        annis.forEach(a => { eventContainer.innerHTML += `<div class="p-4 bg-white border rounded-xl font-bold text-sm border-l-4" style="border-left-color:${a.color}">${a.doll} : ${a.name}</div>`; });
                    };
                }
                div.innerHTML += `<span>${d}</span>`; area.appendChild(div);
            }
        }

        function renderAnni() {
            const area = document.getElementById('closest-anniversary'), happyArea = document.getElementById('happy-anniversary'), happyListArea = document.getElementById('happy-anniversary-list');
            area.innerHTML = ''; happyListArea.innerHTML = ''; happyArea.classList.add('hidden');
            let list = [], happyEvents = []; const now = new Date(), todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            dolls.forEach((d, idx) => { 
                const ds = [{ type: 'birth', n: "誕生日", d: d.birthday }, { type: 'welcome', n: "お迎え日", d: d.welcomeDay }, ...(d.anniversaries || []).map(a => ({ type: 'custom', n: a.name, d: a.date }))]; 
                ds.forEach(v => { 
                    if(v.d) { 
                        const originDate = new Date(v.d), originZero = new Date(originDate.getFullYear(), originDate.getMonth(), originDate.getDate());
                        const diffDaysTotal = Math.floor((todayZero - originZero) / (1000 * 60 * 60 * 24));
                        const isToday = (originDate.getMonth() === now.getMonth() && originDate.getDate() === now.getDate());
                        const diffYears = now.getFullYear() - originDate.getFullYear();
                        let next = new Date(now.getFullYear(), originDate.getMonth(), originDate.getDate()); 
                        if(next < todayZero) next.setFullYear(now.getFullYear() + 1); 
                        const daysToNext = Math.ceil((next - todayZero) / (1000 * 60 * 60 * 24));
                        if (isToday && diffYears >= 0) happyEvents.push({ text: `${d.name} の${v.n}${diffYears === 0 ? '' : ' (' + (v.type==='birth' ? diffYears+'歳' : diffYears+'周年') + ')'}！`, dollIdx: idx });
                        else if (diffDaysTotal > 0 && diffDaysTotal % 100 === 0) happyEvents.push({ text: `${d.name} ${v.n}から ${diffDaysTotal}日！`, dollIdx: idx });
                        list.push({ doll: d.name, title: v.n, color: d.calColor || '#E11D48', diff: daysToNext, isToday: isToday, order: idx }); 
                    } 
                }); 
            }); 
            if (happyEvents.length > 0) {
                happyArea.classList.remove('hidden');
                happyEvents.forEach(ev => {
                    const d = dolls[ev.dollIdx];
                    const div = document.createElement('div'); div.className = "bg-white p-4 rounded-2xl shadow-sm mb-3 animate-anni flex items-center gap-4 cursor-pointer";
                    div.onclick = () => showDetail(ev.dollIdx);
                    div.innerHTML = `<img src="${d.image}" class="w-12 h-12 rounded-full object-cover border-2 border-pink-200"><p class="font-bold text-stone-800 text-sm flex-1">${ev.text}</p><span class="text-xl">🎉</span>`;
                    happyListArea.appendChild(div);
                });
            }
            if(list.length > 0) { 
                list.sort((a,b) => a.diff - b.diff || a.order - b.order); 
                const closestEvents = list.filter(item => item.diff === list[0].diff);
                let html = `<div class="space-y-3">`;
                closestEvents.forEach(b => { html += `<div class="bg-white p-5 border-l-4 rounded shadow-sm flex justify-between items-center" style="border-color:${b.color}"><div><p class="text-[10px] text-stone-400 font-bold">${b.doll}</p><p class="font-bold">${b.title}</p></div><b class="text-lg">${b.isToday ? "Today" : 'あと '+b.diff+' 日'}</b></div>`; });
                html += `</div>`; area.innerHTML = html;
            } 
        }

        // --- フォーム初期化 ---
        function initColorPalettes() { createPalette('bg-color-grid', palette100, 'bg', '#ffffff'); createPalette('text-color-grid', palette100, 'text', '#000000'); createPalette('cal-color-grid', palette100, 'cal', '#E11D48'); }
        const palette100 = (() => { const hues = [0, 30, 60, 120, 150, 180, 220, 280, 330], colors = []; for(let i=0; i<10; i++) colors.push(`hsl(0, 0%, ${i * 11}%)`); hues.forEach(h => { for(let i=0; i<10; i++) colors.push(`hsl(${h}, 80%, ${30 + (i * 7)}%)`); }); return colors.slice(0, 100); })();
        function createPalette(gridId, colorList, type, def) {
            const grid = document.getElementById(gridId);
            colorList.forEach(c => { const chip = document.createElement('div'); chip.className = `color-chip`; chip.style.backgroundColor = c; chip.onclick = () => { document.getElementById(`f-${type}-color`).value = c; document.getElementById(`${type}-select-icon`).style.backgroundColor = c; grid.classList.remove('grid-open'); }; grid.appendChild(chip); });
            document.getElementById(`${type}-select-icon`).style.backgroundColor = def;
        }
        function toggleColorGrid(type) { document.getElementById(`${type}-color-grid`).classList.toggle('grid-open'); }
        function initDateSelectors() { const bM = document.getElementById('f-bday-m'), bD = document.getElementById('f-bday-d'), wM = document.getElementById('f-welcome-m'), wD = document.getElementById('f-welcome-d'); for(let i=1; i<=12; i++) { const o= `<option value="${i}">${i}</option>`; bM.innerHTML += o; wM.innerHTML += o; } for(let i=1; i<=31; i++) { const o= `<option value="${i}">${i}</option>`; bD.innerHTML += o; wD.innerHTML += o; } }

        // --- データ保存ロジック (省略なし) ---
        async function saveData() {
            const id = document.getElementById('edit-id').value, h = document.getElementById('crop-h').value, v = document.getElementById('crop-v').value;
            let imgData = (id !== "" && dolls[id]) ? dolls[id].image : "";
            if(currentRawImg.doll) {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 800;
                const s = Math.max(800/currentRawImg.doll.width, 800/currentRawImg.doll.height);
                ctx.drawImage(currentRawImg.doll, (800-currentRawImg.doll.width*s)*(h/100), (800-currentRawImg.doll.height*s)*(v/100), currentRawImg.doll.width*s, currentRawImg.doll.height*s);
                imgData = cvs.toDataURL('image/webp', 0.7);
            }
            const getD = (mId, dId) => { const m = document.getElementById(mId).value, d = document.getElementById(dId).value; return (m && d) ? `2024-${m.padStart(2,'0')}-${d.padStart(2,'0')}` : ""; };
            const data = { 
                name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value, image: imgData,
                bodySize: document.getElementById('f-size-label').value, bodyMake: document.getElementById('f-body-make').value, headMake: document.getElementById('f-head').value,
                birthday: getD('f-bday-m', 'f-bday-d'), welcomeDay: getD('f-welcome-m', 'f-welcome-d'),
                profile: document.getElementById('f-profile').value, bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value, calColor: document.getElementById('f-cal-color').value,
                anniversaries: Array.from(document.querySelectorAll('.f-anni-item')).map(el => {
                    const m = el.querySelector('.f-anni-m').value, d = el.querySelector('.f-anni-d').value;
                    return { name: el.querySelector('.f-anni-name').value, date: (m && d) ? `2024-${m.padStart(2,'0')}-${d.padStart(2,'0')}` : "" };
                })
            };
            if(id === "") dolls.push(data); else dolls[id] = data;
            await saveToSupabase('dolls', dolls); location.reload();
        }

        function openModalWithClear() {
            document.getElementById('modal-title').innerText = "うちの子登録";
            document.getElementById('edit-id').value = ""; document.getElementById('f-name').value = ""; document.getElementById('f-kana').value = ""; document.getElementById('f-size-label').value = ""; document.getElementById('f-body-make').value = ""; document.getElementById('f-head').value = "";
            document.getElementById('f-bday-m').value = ""; document.getElementById('f-bday-d').value = ""; document.getElementById('f-welcome-m').value = ""; document.getElementById('f-welcome-d').value = "";
            document.getElementById('crop-preview').classList.add('hidden'); document.getElementById('doll-hint').classList.remove('hidden'); document.getElementById('anniversary-inputs').innerHTML = ''; document.getElementById('f-profile').value = ''; currentRawImg.doll = null; toggleMenu('side-menu'); document.getElementById('modal').style.display='flex';
        }

        function editDoll(idx) {
            const d = dolls[idx]; closeProfile();
            document.getElementById('modal-title').innerText = "うちの子編集";
            document.getElementById('edit-id').value = idx; document.getElementById('f-name').value = d.name; document.getElementById('f-kana').value = d.kana || ""; document.getElementById('f-size-label').value = d.bodySize || ""; document.getElementById('f-body-make').value = d.bodyMake || ""; document.getElementById('f-head').value = d.headMake || ""; document.getElementById('f-profile').value = d.profile || ""; 
            if(d.birthday) { const dt = new Date(d.birthday); document.getElementById('f-bday-m').value = dt.getMonth()+1; document.getElementById('f-bday-d').value = dt.getDate(); }
            if(d.welcomeDay) { const dt = new Date(d.welcomeDay); document.getElementById('f-welcome-m').value = dt.getMonth()+1; document.getElementById('f-welcome-d').value = dt.getDate(); }
            document.getElementById('crop-preview').src = d.image; document.getElementById('crop-preview').classList.remove('hidden'); document.getElementById('doll-hint').classList.add('hidden'); document.getElementById('anniversary-inputs').innerHTML = ''; (d.anniversaries || []).forEach(a => addAnniversaryInput(a)); document.getElementById('modal').style.display = 'flex';
        }

        function addAnniversaryInput(v = {name:'', date:''}) {
            const div = document.createElement('div'); div.className = "f-anni-item p-4 bg-white border rounded-xl space-y-2 relative";
            let mOpt = '<option value="">月</option>', dOpt = '<option value="">日</option>';
            for(let i=1; i<=12; i++) mOpt += `<option value="${i}">${i}</option>`;
            for(let i=1; i<=31; i++) dOpt += `<option value="${i}">${i}</option>`;
            div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button><input type="text" class="f-anni-name w-full border-b text-sm font-bold outline-none" placeholder="記念日名" value="${v.name}"><div class="flex gap-2"><select class="f-anni-m border rounded p-2 text-xs flex-1">${mOpt}</select><select class="f-anni-d border rounded p-2 text-xs flex-1">${dOpt}</select></div>`;
            document.getElementById('anniversary-inputs').appendChild(div);
            if(v.date) { const dt = new Date(v.date); div.querySelector('.f-anni-m').value = dt.getMonth() + 1; div.querySelector('.f-anni-d').value = dt.getDate(); }
        }

        // オーナー・投稿・記事詳細などの残りの関数もすべてSupabase対応かつUI戻し版を適用
        function openOwnerModal() {
            document.getElementById('o-name').value = owner.name || ""; document.getElementById('o-bio').value = owner.bio || "";
            if(owner.image) { document.getElementById('owner-preview').src = owner.image; document.getElementById('owner-preview').classList.remove('hidden'); document.getElementById('owner-hint').classList.add('hidden'); }
            document.getElementById('sns-inputs-container').innerHTML = ''; (owner.sns || []).forEach(s => addSnsInput(s));
            toggleMenu('side-menu'); document.getElementById('owner-modal').style.display = 'flex';
        }
        function addSnsInput(v = {type:'Twitter', val:''}) {
            const div = document.createElement('div'); div.className = "flex gap-2 p-3 bg-stone-50 rounded-xl items-center";
            div.innerHTML = `<select class="sns-type border p-2 rounded text-xs bg-white"><option value="Twitter" ${v.type==='Twitter'?'selected':''}>𝕏 (Twitter)</option><option value="Instagram" ${v.type==='Instagram'?'selected':''}>Instagram</option><option value="Bluesky" ${v.type==='Bluesky'?'selected':''}>Bluesky</option><option value="Link" ${v.type==='Link'?'selected':''}>その他Link</option></select><input type="text" class="sns-val border p-2 rounded text-xs flex-1 bg-white" placeholder="URLを入力" value="${v.val}"><button onclick="this.parentElement.remove()" class="text-red-400 text-xs font-bold px-2">✕</button>`;
            document.getElementById('sns-inputs-container').appendChild(div);
        }
        async function saveOwner() {
            owner = { name: document.getElementById('o-name').value, bio: document.getElementById('o-bio').value, image: owner.image, sns: Array.from(document.querySelectorAll('#sns-inputs-container .flex')).map(el => ({ type: el.querySelector('.sns-type').value, val: el.querySelector('.sns-val').value })) };
            if(currentRawImg.owner) { const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 400; const s = Math.max(400/currentRawImg.owner.width, 400/currentRawImg.owner.height); ctx.drawImage(currentRawImg.owner, 0, 0, currentRawImg.owner.width*s, currentRawImg.owner.height*s); owner.image = cvs.toDataURL('image/webp', 0.7); }
            await saveToSupabase('owner', owner); location.reload();
        }
        function openPostModal(idx = null) {
            document.getElementById('post-blocks-container').innerHTML = '';
            if(idx !== null) { const p = posts[idx]; document.getElementById('edit-post-id').value = idx; document.getElementById('p-title').value = p.title; p.blocks.forEach(b => addPostBlock(b)); } 
            else { document.getElementById('edit-post-id').value = ""; document.getElementById('p-title').value = ""; addPostBlock(); }
            document.getElementById('post-modal').style.display = 'flex';
        }
        function addPostBlock(v = {img:'', text:''}) {
            const div = document.createElement('div'); div.className = "p-4 bg-stone-50 rounded-2xl space-y-3 relative block-item";
            div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button><div class="preview-sq mb-2" onclick="this.nextElementSibling.click()"><img src="${v.img}" class="${v.img?'':'hidden'} w-full h-full object-cover rounded-lg"><span class="${v.img?'hidden':''} text-stone-300 text-xs font-bold">画像を選択</span></div><input type="file" accept="image/*" class="hidden" onchange="loadBlockImg(event)"><textarea class="auto-resize w-full border p-3 rounded-xl text-sm outline-none" placeholder="テキストを入力">${v.text}</textarea>`;
            document.getElementById('post-blocks-container').appendChild(div);
        }
        function loadBlockImg(e) {
            const f = e.target.files[0]; if(!f) return;
            const rd = new FileReader(); rd.onload = (re) => {
                const img = new Image(); img.onload = () => { const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); const max = 1000, ratio = Math.min(max/img.width, max/img.height, 1); cvs.width = img.width * ratio; cvs.height = img.height * ratio; ctx.drawImage(img, 0, 0, cvs.width, cvs.height); const p = e.target.previousElementSibling; p.querySelector('img').src = cvs.toDataURL('image/webp', 0.7); p.querySelector('img').classList.remove('hidden'); p.querySelector('span').classList.add('hidden'); }; img.src = re.target.result;
            }; rd.readAsDataURL(f);
        }
        async function savePost() {
            const id = document.getElementById('edit-post-id').value;
            const data = { title: document.getElementById('p-title').value, pos: document.querySelector('input[name="p-pos"]:checked').value, blocks: Array.from(document.querySelectorAll('.block-item')).map(el => ({ img: el.querySelector('img').src, text: el.querySelector('textarea').value })) };
            if(id === "") posts.push(data); else posts[id] = data;
            await saveToSupabase('posts', posts); location.reload();
        }
        function viewPost(idx) {
            const p = posts[idx]; document.getElementById('art-title').innerText = p.title;
            const cnt = document.getElementById('art-content'); cnt.innerHTML = '';
            p.blocks.forEach(b => { if(b.img) cnt.innerHTML += `<img src="${b.img}" class="w-full rounded-[32px] shadow-lg">`; if(b.text) cnt.innerHTML += `<p class="text-stone-600 leading-relaxed whitespace-pre-wrap px-2">${b.text}</p>`; });
            document.getElementById('art-edit-btn').onclick = () => { closeArticle(); openPostModal(idx); };
            document.getElementById('art-del-btn').onclick = () => { if(confirm("削除しますか？")) { posts.splice(idx, 1); saveToSupabase('posts', posts).then(()=>location.reload()); } };
            document.getElementById('article-page').style.display = 'block';
        }
    </script>
