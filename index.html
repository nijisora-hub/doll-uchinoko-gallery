<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doll Uchinoko Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf8; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Dancing Script', cursive; }
        
        /* 画像保存防止 */
        img, .preview-sq, .film-frame, .film-outer { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-user-drag: none;
        }

        .film-outer { background: #1a1a1a; overflow-x: auto; overflow-y: hidden; padding: 20px 0; position: relative; min-height: 120px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .film-outer::-webkit-scrollbar { display: none; }
        .film-scroll-track { display: flex; gap: 12px; width: max-content; padding: 0 20px; }
        .film-frame { width: 80px; height: 80px; background: #333; border: 2px solid #eee; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; position: relative; z-index: 10; }
        
        .modal-base { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 24px; padding: 24px; position: relative; }
        #custom-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; padding: 20px; }
        
        .crop-area { display: flex; flex-direction: row-reverse; gap: 10px; align-items: center; margin-bottom: 10px; }
        .v-bar-box { width: 20px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .vertical-range { writing-mode: vertical-lr; direction: rtl; appearance: slider-vertical; width: 8px; height: 100%; }
        
        .preview-sq { flex: 1; aspect-ratio: 1/1; background: #f3f3f3; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #eee; }
        .preview-sq img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; position: relative; border: 2px solid transparent; }
        
        /* 今日の強調表示 */
        .cal-day.is-today {
            background-color: #f3f4f6;
            border: 2px solid #44403c !important;
            font-weight: bold;
        }

        .cal-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 4px; width: 100%; height: 4px; overflow: hidden; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 12px; padding: 4px; display: none; }
        .color-grid.grid-open { display: grid; }
        .color-chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .color-chip.selected { outline: 3px solid #000; outline-offset: 1px; z-index: 2; }
        .color-select-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 0 2px #fff; }
        
        .date-input { font-size: 16px !important; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; width: 100%; }
        .share-btn { transition: all 0.2s ease; }
        .share-btn:active { transform: scale(0.96); opacity: 0.85; }
        textarea { overflow: hidden; resize: none; }
        
        @keyframes pulse-anni {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .animate-anni { animation: pulse-anni 2s infinite ease-in-out; border: 2px solid #f472b6 !important; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <div id="custom-dialog">
        <div class="bg-white w-full max-w-xs p-8 rounded-3xl shadow-2xl text-center">
            <p id="dialog-message" class="text-[16px] mb-8 leading-relaxed font-bold whitespace-pre-wrap text-stone-700"></p>
            <div id="dialog-buttons" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div class="film-outer" id="film-container">
        <div id="top-film-roll" class="film-scroll-track"></div>
        <div id="empty-msg" class="absolute inset-0 flex items-center justify-center text-stone-500 text-xs font-bold">画像が登録されるとここに並びます</div>

    <header class="p-4 bg-white border-b sticky top-0 z-[100] flex justify-between items-center">

            <div class="w-6 h-0.5 bg-stone-800 mb-1.5 transition-all bar2"></div>
            <div class="w-6 h-0.5 bg-stone-800 transition-all bar3"></div>
        </div>
    </header>

    <div id="side-menu" class="modal-base" onclick="toggleMenu('side-menu')">

                <button onclick="showHome(); toggleMenu('side-menu');" class="text-left py-4 font-bold border-b w-full text-stone-800">🏠 ホーム</button>
                <button onclick="openModalWithClear()" class="text-left py-4 font-bold border-b text-blue-600 w-full admin-only">✨ うちの子を登録する</button>
                <button onclick="showDollList()" class="text-left py-4 font-bold border-b w-full text-stone-800">📸 うちの子一覧</button>
                <button onclick="showPostListPage()" class="text-left py-4 font-bold border-b w-full text-stone-800">📝 投稿一覧</button>

                <button onclick="openPostModal()" class="w-full py-4 bg-stone-800 text-white rounded-2xl text-sm font-bold shadow-lg">📝 投稿を追加</button>

                <button onclick="requestNewGallery()" class="w-full py-3 bg-cyan-50 text-cyan-500 rounded-xl text-xs font-bold border border-cyan-100 shadow-sm">🆕 新規ギャラリー作成</button>

    </div>

    <div id="doll-list-page" class="max-w-md mx-auto hidden p-6">

    <div id="modal" class="modal-base" onclick="closeModal()">

                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('bg')">

                    <div id="bg-color-grid" class="color-grid"></div><input type="hidden" id="f-bg-color" value="#ffffff">

                        <div id="text-select-icon" class="color-select-btn"></div>
                    </div>
                    <div id="text-color-grid" class="color-grid"></div><input type="hidden" id="f-text-color" value="#000000">
                    
                    <div class="flex items-center justify-between border-b pb-2 cursor-pointer" onclick="toggleColorGrid('cal')">
                        <span class="text-xs text-stone-500 font-bold">カレンダー強調色</span>

                    </div>
                    <div id="cal-color-grid" class="color-grid"></div><input type="hidden" id="f-cal-color" value="#E11D48">
                </div>

                    </div>
                </div>

                <textarea id="f-profile" class="w-full border p-4 rounded-2xl min-h-[120px] text-sm outline-none" placeholder="プロフィール" oninput="autoResize(this)"></textarea>
                <button onclick="saveData()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold text-lg shadow-xl">保存する</button>
            </div>
        </div>
    </div>

    <div id="owner-modal" class="modal-base" onclick="closeOwnerModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeOwnerModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 class="text-xl font-bold mb-6">オーナー設定</h3>
            <div class="w-24 h-24 rounded-full bg-stone-100 overflow-hidden cursor-pointer mx-auto mb-6" onclick="document.getElementById('owner-file').click()">
                <img id="owner-preview" class="w-full h-full object-cover hidden"><span id="owner-hint" class="flex items-center justify-center h-full text-[10px] text-stone-400 font-bold">画像選択</span>
            </div>
            <input type="file" id="owner-file" accept="image/*" class="hidden" onchange="loadImg(event, 'owner')">
            <div class="space-y-4">
                <input type="text" id="o-name" class="w-full border-b p-2 font-bold text-lg outline-none" placeholder="オーナー名">
                <textarea id="o-bio" class="w-full border p-4 rounded-2xl min-h-[100px] text-sm outline-none" placeholder="自己紹介" oninput="autoResize(this)"></textarea>
                <div id="sns-inputs" class="space-y-3"></div>
                <button onclick="addSNSInput()" class="w-full py-3 border-2 border-dashed border-stone-200 rounded-xl text-xs text-stone-400 font-bold">+ SNS連携を追加</button>
                <button onclick="saveOwnerData()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold text-lg shadow-xl">情報を保存</button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal-base" onclick="closePostModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closePostModal()" class="text-xs font-bold text-stone-400 mb-4 block">← 閉じる</button>
            <h3 class="text-xl font-bold mb-6">投稿を追加</h3>
            <div class="preview-sq mb-6" onclick="document.getElementById('post-file').click()"><img id="post-preview" class="hidden"><span id="post-hint" class="text-stone-300 text-xs font-bold">画像を選択</span></div>
            <input type="file" id="post-file" accept="image/*" class="hidden" onchange="loadImg(event, 'post')">
            <div class="space-y-4">
                <input type="date" id="post-date" class="date-input">
                <select id="post-doll-tag" class="w-full border p-3 rounded-xl text-sm font-bold"></select>
                <textarea id="post-content" class="w-full border p-4 rounded-2xl min-h-[120px] text-sm outline-none" placeholder="キャプションを入力..." oninput="autoResize(this)"></textarea>
                <button onclick="savePostData()" class="w-full bg-stone-800 text-white py-5 rounded-2xl font-bold text-lg shadow-xl">投稿する</button>

    <div id="profile-overlay" class="fixed inset-0 bg-white z-[10000] hidden overflow-y-auto">
        <div id="profile-bg" class="min-h-full p-6 pb-32">
            <button onclick="closeProfile()" class="bg-white shadow px-6 py-2 rounded-full text-xs font-bold mb-6">閉じる</button>
            <div class="max-w-md mx-auto">
                <div class="relative mb-8">
                    <img id="p-img" class="w-full aspect-square object-cover rounded-3xl shadow-xl">
                    <div id="p-admin-btns" class="absolute top-4 right-4 flex gap-2 admin-only-flex">
                        <button id="p-edit-btn" class="bg-white/90 p-3 rounded-full shadow-lg">✏️</button>
                        <button id="p-del-btn" class="bg-red-500/90 p-3 rounded-full shadow-lg text-white">🗑️</button>
                    </div>
                </div>
                <div id="p-text-color">
                    <h2 id="p-name" class="text-3xl font-bold mb-1"></h2><p id="p-kana" class="text-sm opacity-60 mb-8 font-bold tracking-widest"></p>
                    <div class="grid grid-cols-3 gap-3 mb-10">
                        <div class="bg-black/5 p-4 rounded-2xl text-center"><span class="block text-[10px] opacity-50 mb-1 font-bold">Size</span><span id="p-size" class="text-sm font-bold"></span></div>
                        <div class="bg-black/5 p-4 rounded-2xl text-center"><span class="block text-[10px] opacity-50 mb-1 font-bold">Body</span><span id="p-body" class="text-sm font-bold"></span></div>
                        <div class="bg-black/5 p-4 rounded-2xl text-center"><span class="block text-[10px] opacity-50 mb-1 font-bold">Head</span><span id="p-head" class="text-sm font-bold"></span></div>
                    </div>
                    <div class="space-y-8">
                        <div><h4 class="text-[10px] uppercase tracking-widest opacity-40 font-bold mb-4 border-b pb-2">Profile</h4><p id="p-profile" class="text-[15px] leading-relaxed whitespace-pre-wrap"></p></div>
                        <div><h4 class="text-[10px] uppercase tracking-widest opacity-40 font-bold mb-4 border-b pb-2">Anniversary</h4><div id="p-anniversaries" class="space-y-3"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://eegxuxsyaradufdcvzuj.supabase.co";
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3h1eHN5YXJhZHVmZGN2enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc3ODYsImV4cCI6MjA4ODEyMzc4Nn0.9O7L6iIYJHChTVDu9w3y5FLNunDvYG6jQFGF4laEoRQ";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let galleryData = { dolls: [], owner: { name: "Owner Name", bio: "", sns: [], image: "" }, posts: [] };
        let currentMonth = new Date();
        let isAdmin = false;
        let galleryId = new URLSearchParams(window.location.search).get('id') || 'default';

        window.onload = async () => {
            initDateSelects();
            initColorGrids();
            await loadData();
            checkAdmin();
            renderAll();
        };

        async function loadData() {
            const { data } = await supabase.from('galleries').select('*').eq('id', galleryId).single();
            if(data) galleryData = data;
        }

        async function saveDataToDB() {
            await supabase.from('galleries').upsert({ id: galleryId, ...galleryData });
        }

        function renderAll() {
            renderTopFilm();
            renderOwner();
            renderAnniversaries();
            renderCalendar();
            renderPosts();
            updateDollTagSelect();
        }

        function renderTopFilm() {
            const container = document.getElementById('top-film-roll');
            container.innerHTML = '';
            document.getElementById('empty-msg').style.display = galleryData.dolls.length ? 'none' : 'flex';
            galleryData.dolls.forEach(doll => {
                const img = document.createElement('img');
                img.src = doll.image;
                img.className = 'film-frame';
                img.onclick = () => openProfile(doll);
                container.appendChild(img);
            });
        }

        function renderOwner() {
            document.getElementById('owner-name').textContent = galleryData.owner.name;
            document.getElementById('owner-bio').textContent = galleryData.owner.bio;
            const img = document.getElementById('display-owner-img');
            if(galleryData.owner.image) { img.src = galleryData.owner.image; img.classList.remove('hidden'); }
            const snsContainer = document.getElementById('owner-sns-links');
            snsContainer.innerHTML = '';
            (galleryData.owner.sns || []).forEach(sns => {
                const btn = document.createElement('button');
                btn.className = 'text-xs font-bold text-stone-400 border border-stone-200 px-6 py-2 rounded-full';
                btn.textContent = sns.type.toUpperCase();
                btn.onclick = () => window.open(sns.url, '_blank');
                snsContainer.appendChild(btn);
            });
        }

        function renderCalendar() {
            const y = currentMonth.getFullYear();
            const m = currentMonth.getMonth();
            document.getElementById('cal-month').textContent = `${y}年 ${m + 1}月`;
            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m + 1, 0).getDate();
            const container = document.getElementById('cal-days');
            container.innerHTML = '';
            const now = new Date();
            const isThisMonth = (now.getFullYear() === y && now.getMonth() === m);

            for(let i=0; i<first; i++) container.appendChild(document.createElement('div'));
            for(let d=1; d<=last; d++) {
                const isToday = isThisMonth && (d === now.getDate());
                const dayDiv = document.createElement('div');
                dayDiv.className = `cal-day ${isToday ? 'is-today' : ''}`;
                dayDiv.innerHTML = `<span>${d}</span><div class="cal-dots"></div>`;
                
                const dayAnnis = [];
                galleryData.dolls.forEach(doll => {
                    const annis = [{date: doll.bday, color: doll.calColor, name: '誕生日'}, {date: doll.welcome, color: doll.calColor, name: 'お迎え記念日'}, ...(doll.anniversaries || []).map(a=>({...a, color: doll.calColor}))];
                    annis.forEach(a => {
                        if(a.date) {
                            const ad = new Date(a.date);
                            if(ad.getMonth() === m && ad.getDate() === d) {
                                const dot = document.createElement('div');
                                dot.className = 'cal-dot'; dot.style.backgroundColor = a.color || '#E11D48';
                                dayDiv.querySelector('.cal-dots').appendChild(dot);
                                dayAnnis.push({ doll, name: a.name });
                            }
                        }
                    });
                });
                if(dayAnnis.length) { dayDiv.onclick = () => showDayEvents(d, dayAnnis); dayDiv.style.backgroundColor = 'rgba(0,0,0,0.02)'; }
                container.appendChild(dayDiv);
            }
        }

        function showDayEvents(day, annis) {
            const div = document.getElementById('day-events');
            div.innerHTML = `<p class="text-[10px] font-bold text-stone-400 mb-2">${day}日の予定</p>`;
            annis.forEach(a => {
                div.innerHTML += `<div class="flex items-center gap-3 p-3 bg-white rounded-2xl shadow-sm border border-stone-100">
                    <img src="${a.doll.image}" class="w-8 h-8 rounded-full object-cover">
                    <div><p class="text-xs font-bold">${a.doll.name}</p><p class="text-[10px] text-stone-400">${a.name}</p></div>
                </div>`;
            });
        }

        function changeMonth(diff) { currentMonth.setMonth(currentMonth.getMonth() + diff); renderCalendar(); document.getElementById('day-events').innerHTML = ''; }

        function toggleMenu(id) {
            const el = document.getElementById(id);
            const isOpen = el.style.display === 'flex';
            el.style.display = isOpen ? 'none' : 'flex';
            const b1 = document.querySelector('.bar1'), b2 = document.querySelector('.bar2'), b3 = document.querySelector('.bar3');
            if(!isOpen) {
                b1.style.transform = "translateY(8px) rotate(45deg)"; b2.style.opacity = "0"; b3.style.transform = "translateY(-8px) rotate(-45deg)";
            } else {
                b1.style.transform = "none"; b2.style.opacity = "1"; b3.style.transform = "none";
            }
        }

        function openModal(doll = null) {
            const m = document.getElementById('modal');
            document.getElementById('edit-id').value = doll ? doll.id : '';
            document.getElementById('f-name').value = doll ? doll.name : '';
            document.getElementById('f-kana').value = doll ? doll.kana : '';
            document.getElementById('f-size-label').value = doll ? doll.size : '';
            document.getElementById('f-body-make').value = doll ? doll.body : '';
            document.getElementById('f-head').value = doll ? doll.head : '';
            document.getElementById('f-profile').value = doll ? doll.profile : '';
            document.getElementById('f-bg-color').value = doll ? doll.bgColor : '#ffffff';
            document.getElementById('f-text-color').value = doll ? doll.textColor : '#000000';
            document.getElementById('f-cal-color').value = doll ? doll.calColor : '#E11D48';
            document.getElementById('f-bday').value = doll ? doll.bday : '';
            document.getElementById('f-welcome').value = doll ? doll.welcome : '';
            if(doll && doll.image) { document.getElementById('crop-preview').src = doll.image; document.getElementById('crop-preview').classList.remove('hidden'); document.getElementById('doll-hint').classList.add('hidden'); }
            else { document.getElementById('crop-preview').classList.add('hidden'); document.getElementById('doll-hint').classList.remove('hidden'); }
            document.getElementById('anniversary-inputs').innerHTML = '';
            if(doll && doll.anniversaries) doll.anniversaries.forEach(a => addAnniversaryInput(a));
            m.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function openModalWithClear() { closeModal(); openModal(); toggleMenu('side-menu'); }

        async function saveData() {
            const id = document.getElementById('edit-id').value || Date.now().toString();
            const annis = Array.from(document.querySelectorAll('.f-anni-name')).map((input, idx) => ({
                name: input.value, date: document.querySelectorAll('.f-anni-date')[idx].value
            })).filter(a => a.name && a.date);
            const doll = {
                id, name: document.getElementById('f-name').value, kana: document.getElementById('f-kana').value,
                size: document.getElementById('f-size-label').value, body: document.getElementById('f-body-make').value,
                head: document.getElementById('f-head').value, image: document.getElementById('crop-preview').src,
                bgColor: document.getElementById('f-bg-color').value, textColor: document.getElementById('f-text-color').value,
                calColor: document.getElementById('f-cal-color').value, bday: document.getElementById('f-bday').value,
                welcome: document.getElementById('f-welcome').value, anniversaries: annis, profile: document.getElementById('f-profile').value
            };
            const idx = galleryData.dolls.findIndex(d => d.id === id);
            if(idx > -1) galleryData.dolls[idx] = doll; else galleryData.dolls.push(doll);
            await saveDataToDB(); closeModal(); renderAll();
        }

        function loadImg(e, mode) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const imgId = mode === 'doll' ? 'crop-preview' : (mode === 'owner' ? 'owner-preview' : 'post-preview');
                const hintId = mode === 'doll' ? 'doll-hint' : (mode === 'owner' ? 'owner-hint' : 'post-hint');
                document.getElementById(imgId).src = re.target.result;
                document.getElementById(imgId).classList.remove('hidden');
                document.getElementById(hintId).classList.add('hidden');
                if(mode === 'doll') updateCrop('crop-preview', 'crop-h', 'crop-v');
            };
            reader.readAsDataURL(file);
        }

        function updateCrop(id, hId, vId) {
            const img = document.getElementById(id);
            img.style.objectPosition = `${document.getElementById(hId).value}% ${document.getElementById(vId).value}%`;
        }

        function checkAdmin() {
            if(localStorage.getItem('uchinoko_admin_key') === 'admin123') {
                isAdmin = true; document.body.classList.add('is-admin');
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            }
        }

        function handleGoogleLogin() {
            const pw = prompt("パスワードを入力(admin123)");
            if(pw === 'admin123') { localStorage.setItem('uchinoko_admin_key', 'admin123'); location.reload(); }
        }

        function handleLogout() { localStorage.removeItem('uchinoko_admin_key'); location.reload(); }

        function openProfile(doll) {
            const over = document.getElementById('profile-overlay');
            document.getElementById('profile-bg').style.backgroundColor = doll.bgColor || '#ffffff';
            document.getElementById('p-text-color').style.color = doll.textColor || '#000000';
            document.getElementById('p-img').src = doll.image;
            document.getElementById('p-name').textContent = doll.name;
            document.getElementById('p-kana').textContent = doll.kana;
            document.getElementById('p-size').textContent = doll.size;
            document.getElementById('p-body').textContent = doll.body;
            document.getElementById('p-head').textContent = doll.head;
            document.getElementById('p-profile').textContent = doll.profile;
            const anni = document.getElementById('p-anniversaries'); anni.innerHTML = '';
            [{name:'🎂 誕生日', date:doll.bday}, {name:'🤝 お迎え日', date:doll.welcome}, ...(doll.anniversaries||[])].forEach(a => {
                if(a.date) { const d = new Date(a.date); anni.innerHTML += `<div class="flex justify-between py-2 border-b border-black/5 text-sm font-bold"><span>${a.name}</span><span>${d.getMonth()+1}月${d.getDate()}日</span></div>`; }
            });
            document.getElementById('p-edit-btn').onclick = () => { closeProfile(); openModal(doll); };
            document.getElementById('p-del-btn').onclick = () => deleteDoll(doll.id);
            over.classList.remove('hidden'); document.body.style.overflow = 'hidden';
        }

        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); document.body.style.overflow = ''; }

        async function deleteDoll(id) {
            if(confirm("削除しますか？")) {
                galleryData.dolls = galleryData.dolls.filter(d => d.id !== id);
                await saveDataToDB(); closeProfile(); renderAll();
            }
        }

        function renderPosts() {
            const container = document.getElementById('home-posts');
            container.innerHTML = '';
            (galleryData.posts || []).sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(post => {
                const doll = galleryData.dolls.find(d => d.id === post.dollId);
                container.innerHTML += `<div class="bg-white rounded-[32px] overflow-hidden shadow-sm border border-stone-100">
                    <div class="p-4 flex items-center gap-3"><img src="${doll?.image||''}" class="w-8 h-8 rounded-full object-cover"><div class="text-xs font-bold">${doll?.name||''}</div></div>
                    <img src="${post.image}" class="w-full aspect-square object-cover">
                    <div class="p-6 text-sm leading-relaxed">${post.content}</div>
                </div>`;
            });
        }

        function updateDollTagSelect() {
            const s = document.getElementById('post-doll-tag');
            s.innerHTML = galleryData.dolls.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        }

        function openPostModal() { document.getElementById('post-modal').style.display = 'flex'; toggleMenu('side-menu'); }
        function closePostModal() { document.getElementById('post-modal').style.display = 'none'; }
        async function savePostData() {
            const post = { id:Date.now().toString(), date:document.getElementById('post-date').value, dollId:document.getElementById('post-doll-tag').value, content:document.getElementById('post-content').value, image:document.getElementById('post-preview').src };
            if(!galleryData.posts) galleryData.posts = []; galleryData.posts.push(post);
            await saveDataToDB(); closePostModal(); renderAll();
        }

        function initDateSelects() {
            const mS = ['f-bday-m', 'f-welcome-m'], dS = ['f-bday-d', 'f-welcome-d'];
            mS.forEach(s => { const el = document.getElementById(s); el.innerHTML = '<option value="">月</option>' + Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join(''); });
            dS.forEach(s => { const el = document.getElementById(s); el.innerHTML = '<option value="">日</option>' + Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join(''); });
            
            document.getElementById('f-bday-m').onchange = () => updateIsoDate('f-bday', 'f-bday-m', 'f-bday-d');
            document.getElementById('f-bday-d').onchange = () => updateIsoDate('f-bday', 'f-bday-m', 'f-bday-d');
            document.getElementById('f-welcome-m').onchange = () => updateIsoDate('f-welcome', 'f-welcome-m', 'f-welcome-d');
            document.getElementById('f-welcome-d').onchange = () => updateIsoDate('f-welcome', 'f-welcome-m', 'f-welcome-d');
        }

        function updateIsoDate(isoId, mId, dId) {
            const m = document.getElementById(mId).value, d = document.getElementById(dId).value;
            if(m && d) document.getElementById(isoId).value = `2000-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
        }

        function initColorGrids() {
            const colors = ['#ffffff','#000000','#E11D48','#FB7185','#F472B6','#A855F7','#6366F1','#3B82F6','#06B6D4','#10B981','#84CC16','#EAB308','#F97316','#EF4444','#78716C','#44403C','#292524','#fcfaf8','#f5f5f4','#e7e5e4'];
            ['bg','text','cal'].forEach(type => {
                const grid = document.getElementById(`${type}-color-grid`);
                colors.forEach(c => {
                    const chip = document.createElement('div'); chip.className = 'color-chip'; chip.style.backgroundColor = c;
                    chip.onclick = () => {
                        document.getElementById(`f-${type}-color`).value = c;
                        document.getElementById(`${type}-select-icon`).style.backgroundColor = c;
                        grid.classList.remove('grid-open');
                    };
                    grid.appendChild(chip);
                });
            });
        }
        function toggleColorGrid(type) { document.getElementById(`${type}-color-grid`).classList.toggle('grid-open'); }

        function showHome() { document.getElementById('home-content').classList.remove('hidden'); document.getElementById('doll-list-page').classList.add('hidden'); document.getElementById('post-list-page').classList.add('hidden'); }
        function showDollList() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('doll-list-page').classList.remove('hidden'); renderDollList(); toggleMenu('side-menu'); }
        function renderDollList() {
            const area = document.getElementById('doll-display-area'); area.innerHTML = '';
            galleryData.dolls.forEach(d => { area.innerHTML += `<div onclick="openProfileById('${d.id}')" class="aspect-square rounded-3xl overflow-hidden shadow-lg"><img src="${d.image}" class="w-full h-full object-cover"></div>`; });
        }
        function openProfileById(id) { const d = galleryData.dolls.find(x=>x.id===id); if(d) openProfile(d); }
        function showPostListPage() { document.getElementById('home-content').classList.add('hidden'); document.getElementById('post-list-page').classList.remove('hidden'); toggleMenu('side-menu'); }
        
        function renderAnniversaries() {
            const today = new Date(); const happy = document.getElementById('happy-anniversary-list'); happy.innerHTML = '';
            let found = false; let all = [];
            galleryData.dolls.forEach(doll => {
                [{name:'誕生日', date:doll.bday}, {name:'お迎え記念日', date:doll.welcome}, ...(doll.anniversaries||[])].forEach(a => {
                    if(!a.date) return; const d = new Date(a.date);
                    if(d.getMonth() === today.getMonth() && d.getDate() === today.getDate()) {
                        found = true; happy.innerHTML += `<div class="p-5 bg-white rounded-3xl mb-3 border-2 border-pink-100 flex items-center gap-4 animate-anni"><img src="${doll.image}" class="w-12 h-12 rounded-full object-cover"><div><p class="text-[10px] font-bold text-pink-400">${a.name}</p><p class="text-sm font-bold">${doll.name} おめでとう！</p></div></div>`;
                    }
                    let next = new Date(today.getFullYear(), d.getMonth(), d.getDate()); if(next < today && (d.getMonth()!==today.getMonth() || d.getDate()!==today.getDate())) next.setFullYear(today.getFullYear()+1);
                    all.push({ doll, ...a, next });
                });
            });
            document.getElementById('happy-anniversary').classList.toggle('hidden', !found);
            all.sort((a,b)=>a.next-b.next);
            if(all.length) {
                const n = all[0]; const diff = Math.ceil((n.next-today)/(1000*60*60*24));
                document.getElementById('closest-anniversary').innerHTML = `<div class="p-6 bg-white rounded-3xl flex items-center justify-between"><div class="flex items-center gap-4"><img src="${n.doll.image}" class="w-10 h-10 rounded-full object-cover"><div><p class="text-[10px] text-stone-400 font-bold">${n.name}</p><p class="text-sm font-bold">${n.doll.name}</p></div></div><div class="text-right"><p class="text-[10px] text-stone-300 uppercase font-bold">あと</p><p class="text-xl font-bold">${diff}日</p></div></div>`;
            }
        }

        function addAnniversaryInput(v = { name: '', date: '' }) {
            const div = document.createElement('div'); div.className = 'p-4 bg-stone-100/50 rounded-2xl space-y-3 relative';
            div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button>
                <input type="text" class="f-anni-name w-full border-b bg-transparent py-2 text-xs font-bold outline-none" placeholder="記念日名" value="${v.name}">
                <input type="date" class="date-input f-anni-date" value="${v.date}">`;
            document.getElementById('anniversary-inputs').appendChild(div);
        }

        function addSNSInput(v = { type: 'x', url: '' }) {
            const div = document.createElement('div'); div.className = 'p-4 bg-stone-50 rounded-2xl space-y-2 relative';
            div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-stone-300">✕</button>
                <select class="sns-type w-full border-b bg-transparent py-1 text-xs outline-none"><option value="x" ${v.type==='x'?'selected':''}>X</option><option value="instagram" ${v.type==='instagram'?'selected':''}>Instagram</option></select>
                <input type="text" class="sns-url w-full border-b bg-transparent py-1 text-xs outline-none" placeholder="URL" value="${v.url}">`;
            document.getElementById('sns-inputs').appendChild(div);
        }

        function openOwnerModal() {
            document.getElementById('o-name').value = galleryData.owner.name; document.getElementById('o-bio').value = galleryData.owner.bio;
            if(galleryData.owner.image) { document.getElementById('owner-preview').src = galleryData.owner.image; document.getElementById('owner-preview').classList.remove('hidden'); document.getElementById('owner-hint').classList.add('hidden'); }
            document.getElementById('sns-inputs').innerHTML = ''; (galleryData.owner.sns || []).forEach(s => addSNSInput(s));
            document.getElementById('owner-modal').style.display = 'flex'; toggleMenu('side-menu');
        }
        function closeOwnerModal() { document.getElementById('owner-modal').style.display = 'none'; }
        async function saveOwnerData() {
            galleryData.owner = { name:document.getElementById('o-name').value, bio:document.getElementById('o-bio').value, image:document.getElementById('owner-preview').src, sns:Array.from(document.querySelectorAll('.sns-type')).map((s,i)=>({type:s.value, url:document.querySelectorAll('.sns-url')[i].value})).filter(x=>x.url) };
            await saveDataToDB(); closeOwnerModal(); renderAll();
        }

        function shareSNS(type) { const url = window.location.href; window.open(type==='line' ? `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}` : `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`, '_blank'); }
        function copyURL() { navigator.clipboard.writeText(window.location.href); alert("コピーしました"); }
        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
        function requestNewGallery() { if(confirm("新規作成しますか？")) window.open(window.location.origin + window.location.pathname + '?id=' + Date.now(), '_blank'); }
        async function requestClearAll() { if(confirm("全データを削除しますか？")) { galleryData = { dolls: [], owner: { name: "New Owner", bio: "", sns: [], image: "" }, posts: [] }; await saveDataToDB(); location.reload(); } }
    </script>
</body>
</html>
